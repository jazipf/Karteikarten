pses":0,"explain":"Bei zentrischer Belastung (Last wirkt durch Schwerpunkt der Sohle) ist der Sohldruck gleichmäßig. Wirkt zusätzlich ein Biegemoment (z.B. Windlast auf ein Gebäude), wird der Sohldruck auf einer Seite größer und auf der anderen kleiner. Übersteigt das Moment einen Grenzwert, kann der Sohldruck auf einer Seite negativ werden — der Boden kann aber keinen Zug aufnehmen → Sohle hebt ab → klaffende Fuge."},{"id":"gt-311","q":"Mit welchem Kriterium prüft man, ob eine klaffende Fuge vorliegt?","a":"Über die **Lage der Resultierenden (Ausmitte e) bezogen auf die Kernweite**:\n• Resultierende in der **1. Kernweite** (e ≤ b/6) → keine klaffende Fuge\n• in der **2. Kernweite** → klaffende Fuge, aber nur bis zum Schwerpunkt zulässig","tags":["Geotechnik","Flachgründungen"],"reps":0,"ease":2.5,"interval":0,"due":1781338792034,"created":1781252392034,"last":null,"learning":true,"lapses":0,"explain":"Die Kernweite ist e = B/6 (bei rechteckigem Fundament, B = Breite). Solange die Resultierende innerhalb des Kerns (|e| ≤ B/6) liegt, ist die gesamte Sohlfläche unter Druck. Liegt die Resultierende außerhalb des Kerns (|e| > B/6), klafft die Fuge. In diesem Fall ist die effektive Sohlbreite B_eff = B - 2*e für den Nachweis zu verwenden."}],"created":1781252392034,"fach":"Geotechnik"},{"id":"gt-d4","name":"GT2 – Böschungs- & Geländebruch","desc":"Grenzzustand GEO-3, Nachweisprinzip, Unterschied Böschungs-/Geländebruch","emoji":"⛰️","color":"#ffac42","cards":[{"id":"gt-401","q":"In welchem Grenzzustand (ULS) erfolgt der Standsicherheitsnachweis beim Böschungs- und Geländebruch?","a":"**GEO-3** (Baugrundversagen, Nachweisverfahren 3).","tags":["Geotechnik","Böschungsbruch"],"reps":0,"ease":2.5,"interval":0,"due":1781338792034,"created":1781252392034,"last":null,"learning":true,"lapses":0,"explain":"GEO-3 (Nachweisverfahren 3) wird beim Standsicherheitsnachweis für Böschungen und Geländebruch verwendet. Hier werden die Teilsicherheiten direkt auf die Scherparameter c und φ angewendet (cd = c/γc, tan φd = tan φ/γφ), nicht auf die Einwirkungen. Der Nachweis erfolgt dann mit einem Grenzgleichgewichtsverfahren (z.B. Lamellen methode nach Bishop)."},{"id":"gt-402","q":"Wie unterscheidet sich das Nachweisverfahren beim Böschungs-/Geländebruch (GEO-3) vom Grundbruchnachweis (GEO-2)?","a":"GEO-3: Sicherheit über **Momente bzw. Kräfte an der Gleitfläche** – Vergleich treibende/haltende Momente (Md,dst ≤ Md,stb), Teilsicherheit auf die **Scherfestigkeit**.\nGEO-2 (Grundbruch): Gegenüberstellung **Ed ≤ Rd** (Beanspruchung/Widerstand).","tags":["Geotechnik","Böschungsbruch"],"reps":0,"ease":2.5,"interval":0,"due":1781338792034,"created":1781252392034,"last":null,"learning":true,"lapses":0,"explain":"GEO-2 (Grundbruch, Gleiten): Lasten und Widerstände werden mit Teilsicherheiten beaufschlagt, dann verglichen. GEO-3 (Böschungsbruch): Die Scherparameter werden mit Teilsicherheiten abgemindert, dann wird geprüft ob Gleichgewicht herrscht (stabilisierendes Moment ≥ destabilisierendes Moment in der Gleitfläche). Der Ausgangspunkt ist derselbe (Bruchmechanismus), aber der Rechenweg unterscheidet sich."},{"id":"gt-403","q":"Erläutere kurz den Unterschied zwischen Böschungsbruch und Geländebruch (mit Skizze).","a":"**Böschungsbruch:** Gleitfläche liegt innerhalb der Böschung, **kein Bauwerk** betroffen.\n**Geländebruch:** Gleitfläche umfasst zusätzlich ein **Bauwerk/Gründung** – sie verläuft unter dem Fundament hindurch.\n\n```\nBöschung:        Gelände:\n  \\                \\  ▢ Bauwerk\n   \\ (   )gleit     \\(    )gleit\n    \\___/            \\____/  (unter Bauwerk)\n```","tags":["Geotechnik","Böschungsbruch"],"reps":0,"ease":2.5,"interval":0,"due":1781338792034,"created":1781252392034,"last":null,"learning":true,"lapses":0,"explain":"Böschungsbruch: Die Gleitfläche bleibt vollständig in der Böschung — kein Bauwerk im Hinterland wird einbezogen. Ursache: steile Böschung, schwacher Boden, Wassereinfluss. Geländebruch: Die Gleitfläche reicht bis unter ein Bauwerk im Hinterland (Gebäude, Straße) — auch das Bauwerk wird destabilisiert oder zum Versagen gebracht. Für den Geländebruch muss die Zusatzlast des Bauwerks in der Berechnung berücksichtigt werden."}],"created":1781252392034,"fach":"Geotechnik"},{"id":"gt-d5","name":"GT2 – Pfähle","desc":"Pfahlsysteme, Bohrlochstützung, SOB-/Ortbetonrammpfähle, Tragfähigkeit, Mantelreibung, WSL","emoji":"🔩","color":"#f472b6","cards":[{"id":"gt-501","q":"Nenne die drei grundsätzlichen Arten zur Stützung der Bohrlochwandung bei Bohrpfählen.","a":"**Verrohrt** (Stahlrohr stützt)\n**Suspensionsgestützt** (Bentonit-Suspension)\n**Erdgestützt** (durchgehende Schnecke / anstehender Boden)","tags":["Geotechnik","Pfähle"],"reps":0,"ease":2.5,"interval":0,"due":1781338792034,"created":1781252392034,"last":null,"learning":true,"lapses":0,"explain":"Verrohrte Bohrpfahlherstellung: Ein Stahlrohr wird in den Boden eingedreht oder eingerüttelt und verhindert, dass die Bohrlochwandung einstürzt. Geeignet für alle Böden, aber aufwändig. Suspensionsgestützt: Eine Bentonit-Suspension füllt das Bohrloch und stützt die Wandung (hydrostatischer Druck). Erdgestützt (Schnecke): Der Boden ist so standfest, dass keine Stützung nötig ist — schnell und günstig, aber nur in kohäsiven Böden möglich."},{"id":"gt-502","q":"Wie unterscheiden sich die herstellbaren Pfahldurchmesser bei verrohrter, suspensions- und erdgestützter Bohrung (klein/mittel/groß)?","a":"Verrohrt: **groß**\nSuspensionsgestützt: **mittel–groß**\nErdgestützt (Schnecke): **klein**","tags":["Geotechnik","Pfähle"],"reps":0,"ease":2.5,"interval":0,"due":1781338792034,"created":1781252392034,"last":null,"learning":true,"lapses":0,"explain":"Verrohrt: großer Pfahldurchmesser möglich (D > 1,5 m), weil das Rohr beliebig groß sein kann. Suspensionsgestützt: mittlere bis große Durchmesser. Schneckenbohrpfahl (SOB): eher kleinere Durchmesser (D < 0,9 m), da die Schnecke nicht beliebig groß gebaut werden kann. In der Praxis wird der Durchmesser durch die Tragfähigkeitsanforderung und das Bohrverfahren gemeinsam bestimmt."},{"id":"gt-503","q":"Welche drei generellen Arten von Pfahlsystemen werden (auch nach Ausführungsnormen) unterschieden und wodurch?","a":"**Verdrängungspfähle** (EN 12699): kein Bodenaushub, Boden wird seitlich verdrängt (gerammt/gedrückt).\n**Bohrpfähle** (EN 1536): Boden wird durch Bohren ausgehoben/gefördert (z.B. Kelly).\n**Mikropfähle/Verpresspfähle** (EN 14199): kleiner Durchmesser (< ~30 cm), verpresst.","tags":["Geotechnik","Pfähle"],"reps":0,"ease":2.5,"interval":0,"due":1781338792034,"created":1781252392034,"last":null,"learning":true,"lapses":0,"explain":"Verdrängungspfähle (z.B. Rammpfahl, SOB): Boden wird seitlich verdrängt, nicht abgeführt — Bodenstruktur bleibt erhalten, Mantelreibung erhöht sich durch Verdichtung. Bohrpfähle (z.B. Großbohrpfahl): Boden wird ausgebohrt und abtransportiert — keine Verdichtung, aber große Durchmesser möglich. Mikropfähle (D < 300 mm): für beengte Verhältnisse, Verstärkung bestehender Gründungen, geringe Traglasten."},{"id":"gt-504","q":"Wie unterscheiden sich Verdrängungs-, Bohr- und Mikropfahl bezüglich der Mantelreibung und warum?","a":"**Verdrängungspfahl: hoch** – Boden wird verdrängt und verdichtet/verspannt.\n**Bohrpfahl: niedriger** – durch den Aushub entspannt sich der Boden.\n**Mikropfahl: in Summe klein** (kleine Mantelfläche), aber durch Verpressung lokal hohe Werte.","tags":["Geotechnik","Pfähle"],"reps":0,"ease":2.5,"interval":0,"due":1781338792034,"created":1781252392034,"last":null,"learning":true,"lapses":0,"explain":"Verdrängungspfähle verdichten den Boden durch seitliches Verdrängen — hohe Mantelreibung, hoher Fußwiderstand. Bohrpfahl: Boden wird abgebohrt, keine Vorverdichtung — mittlere Mantelreibung. Mikropfahl: gering, aber durch Verpressen des Ringraums mit Zement erhöhbar. Die Tragfähigkeit hängt also maßgebend vom Herstellverfahren ab, nicht nur von Pfahlgeometrie und Bodenart."},{"id":"gt-505","q":"Was bedeutet SOB und zu welcher Pfahlart gehört er generell?","a":"**SOB = Schneckenbohrpfahl.**\nGehört generell zu den **Bohrpfählen** (Boden wird über die Schneckengänge gefördert).","tags":["Geotechnik","Pfähle"],"reps":0,"ease":2.5,"interval":0,"due":1781338792034,"created":1781252392034,"last":null,"learning":true,"lapses":0,"explain":"SOB = Schneckenbohrpfahl (englisch: CFA = Continuous Flight Auger). Die Bezeichnung \"Bohrpfahl\" ist historisch — es wird zwar gebohrt (Schnecke dreht sich ein), aber der Boden wird nicht vollständig aus dem Loch geholt, sondern nur teilweise. Beim SOB wird Beton durch das Seelenrohr der Schnecke gepresst, während die Schnecke langsam herausgezogen wird. Der Boden wird also teilweise verdrängt."},{"id":"gt-506","q":"Welche zwei SOB-Verfahren werden unterschieden? Was ist bei der Zuordnung der Pfahlart zu beachten?","a":"Unterscheidung nach **Durchmesser des Seelenrohrs**:\n• **kleines** Seelenrohr → reiner Bohrpfahl\n• **großes** Seelenrohr → **Teilverdrängungsbohrpfahl** (relevanter Bodenanteil wird seitlich verdrängt statt gefördert).","tags":["Geotechnik","Pfähle"],"reps":0,"ease":2.5,"interval":0,"due":1781338792034,"created":1781252392034,"last":null,"learning":true,"lapses":0,"explain":"Kleines Seelenrohr (Durchmesser < 100 mm): Beton wird mit hohem Druck eingepresst. Boden und Zementleim vermischen sich — typischer SOB ohne scharfe Grenze zwischen Boden und Pfahl (geringere Mantelreibung). Großes Seelenrohr (Durchmesser > 100 mm): Beton fließt leichter, sauberere Pfahlgeometrie. Beim Ziehen der Schnecke muss die Abzugsgeschwindigkeit genau auf die Betonpumpenleistung abgestimmt sein — sonst Unterbrechungen im Pfahl."},{"id":"gt-507","q":"Wie unterscheidet sich das SOB-Verfahren vom Doppelkopfverfahren?","a":"Beim **Doppelkopfverfahren** wird der Boden kontinuierlich mit einer durchgehenden Schnecke gelöst und gefördert, im Schutz einer **gegenläufig rotierenden Verrohrung**. Dadurch entfallen die Anwendungsgrenzen (auch in nicht standfesten Böden / unter Grundwasser einsetzbar).","tags":["Geotechnik","Pfähle"],"reps":0,"ease":2.5,"interval":0,"due":1781338792034,"created":1781252392034,"last":null,"learning":true,"lapses":0,"explain":"Beim Doppelkopfverfahren rotieren zwei konzentrische Bohrwerkzeuge gegenläufig: Ein innerer Schneckenantrieb dreht die Schnecke, ein äußerer Rohrschuh verdrängt den Boden. Der Boden wird also nicht hochgehoben, sondern seitlich verdrängt — kein Bodenabtransport nötig. Ergebnis: kein Bodenaushub, hohe Mantelreibung durch Verdrängung, gut für weiche Böden geeignet."},{"id":"gt-508","q":"Aus welchen zwei Anteilen setzt sich die äußere Tragfähigkeit eines Druckpfahls zusammen?","a":"**Pfahlmantelreibung Rs** und **Pfahlfußwiderstand Rb**.\nGesamt: R = Rs + Rb","tags":["Geotechnik","Pfähle"],"reps":0,"ease":2.5,"interval":0,"due":1781338792034,"created":1781252392034,"last":null,"learning":true,"lapses":0,"explain":"Mantelreibung Rs: Reibung zwischen Pfahloberfläche und umgebenden Boden über die gesamte Einbindelänge. Fußwiderstand Rb: Widerstand des Bodens am Pfahlende (Spitzendruck). Gesamtwiderstand R = Rs + Rb. Bei langen, schlanken Pfählen überwiegt die Mantelreibung. Bei kurzen, dicken Pfählen (Bohrpfähle mit Erweiterung) kann der Fußwiderstand dominieren."},{"id":"gt-509","q":"Skizziere die idealisierte Widerstand-Setzungs-Linie (WSL) eines Bohrpfahls mit beiden Anteilen.","a":"```\nWiderstand R\n  │        ___ R (gesamt)\n  │      _/  ___ Rb (Fuß, wächst weiter)\n  │    _/ __/\n  │  _//_/ Rs (Mantel, früh ausgeschöpft)\n  └──────────────→ Setzung s\n```\n**Rs (Mantel)** wird bei kleiner Setzung ausgeschöpft (Grenzwert), **Rb (Fuß)** baut sich erst bei größerer Setzung auf. Summe = Gesamtwiderstand R(s).","tags":["Geotechnik","Pfähle"],"reps":0,"ease":2.5,"interval":0,"due":1781338792034,"created":1781252392034,"last":null,"learning":true,"lapses":0,"explain":"Die Widerstand-Setzungs-Linie (WSL) zeigt: Bei kleiner Setzung steigt zuerst die Mantelreibung Rs schnell an (schon bei wenigen mm Setzung aktiviert). Der Fußwiderstand Rb steigt erst bei größerer Setzung (10-15% des Pfahldurchmessers nötig für Vollaktivierung). Die Gesamt-WSL ist die Summe beider Kurven. Bei kleinen Setzungen dominiert die Mantelreibung — wichtig für den SLS-Nachweis."},{"id":"gt-510","q":"Welcher Widerstand R(s) wird im ULS und welcher im SLS angesetzt?","a":"ULS (Tragfähigkeit): **Grenzwiderstand R1** (Bruchwiderstand bei großer Setzung).\nSLS (Gebrauchstauglichkeit): **Widerstand bei der zulässigen Setzung** (Gebrauchswiderstand).","tags":["Geotechnik","Pfähle"],"reps":0,"ease":2.5,"interval":0,"due":1781338792034,"created":1781252392034,"last":null,"learning":true,"lapses":0,"explain":"ULS (Tragfähigkeit): Der Grenzwiderstand R1 ist die maximale Last, die der Pfahl bei großer Setzung tragen kann — Versagensgrenze. SLS (Gebrauchstauglichkeit): Der Widerstand bei zulässiger Setzung (z.B. 10 mm) R2 < R1 — der Pfahl muss die Gebrauchslast ohne zu große Setzung tragen. In der Praxis ist der SLS-Nachweis oft maßgebend (Setzungsbegrenzung), nicht der ULS."},{"id":"gt-511","q":"Aus welchen Anteilen setzt sich die äußere Tragfähigkeit eines Zugpfahls zusammen?","a":"Nur aus der **Pfahlmantelreibung** (kein Fußwiderstand, da Zug → Fuß wird nicht aktiviert).","tags":["Geotechnik","Pfähle"],"reps":0,"ease":2.5,"interval":0,"due":1781338792034,"created":1781252392034,"last":null,"learning":true,"lapses":0,"explain":"Bei einem Zugpfahl wirkt die Last nach oben — der Pfahlfuß wird nicht gedrückt, sondern angehoben. Der Boden unter dem Fuß kann keine Zugkräfte aufnehmen (Boden und Fuß trennen sich). Die einzige Komponente ist die Mantelreibung, die jetzt nach unten wirkt (Boden hält den Pfahl fest). Der Zugwiderstand ist i.d.R. geringer als der Druckwiderstand bei gleichem Pfahl."},{"id":"gt-512","q":"Wann entsteht negative Mantelreibung, wie wirkt sie und wie wird sie bei der Bemessung berücksichtigt?","a":"Wenn sich der **Boden stärker setzt als der Pfahl** (z.B. durch Auflast/Aufschüttung, Konsolidierung). Die Mantelreibung kehrt sich um und **belastet** den Pfahl zusätzlich (erhöht die Pfahllängskraft) statt zu tragen.\nBei der Bemessung als **zusätzliche Einwirkung (Last)** ansetzen.","tags":["Geotechnik","Pfähle"],"reps":0,"ease":2.5,"interval":0,"due":1781338792034,"created":1781252392034,"last":null,"learning":true,"lapses":0,"explain":"Negative Mantelreibung entsteht, wenn der umgebende Boden sich stärker setzt als der Pfahl (z.B. durch neue Aufschüttung über weichem Boden). Normalerweise zieht der Pfahl den Boden mit → positive Mantelreibung (Boden stützt Pfahl). Bei negativer Mantelreibung zieht der Boden am Pfahl nach unten → zusätzliche Druckkraft im Pfahl. Diese Zusatzkraft muss in der Pfahlbemessung berücksichtigt werden."},{"id":"gt-513","q":"Nenne zwei Arten von Ortbetonrammpfählen und wie sich die Rammung unterscheidet.","a":"**Simplexpfahl** und **Frankipfahl**.\n• Simplex: Rohr mit verlorener Fußplatte wird **am Rohrkopf (außen) eingerammt**, dann unter Betonieren gezogen.\n• Franki: Ein **Betonpfropfen wird im Rohr (innen) verrammt** (Innenrohrramme) und am Fuß ausgerammt.","tags":["Geotechnik","Pfähle"],"reps":0,"ease":2.5,"interval":0,"due":1781338792034,"created":1781252392034,"last":null,"learning":true,"lapses":0,"explain":"Simplexpfahl: Stahlrohr mit verlorener Fußplatte wird gerammt, Beton eingefüllt, Rohr gezogen (Beton bleibt). Der Beton verdrängt den Boden beim Ziehen leicht. Frankipfahl: Rohr wird gerammt, Betonpfropfen eingestampft, Rohr hochgezogen, dabei platzt der Pfropfen auf und bildet einen verbreiterten Fuß (Glockenform). Hoher Fußwiderstand durch den breiten Fuß."},{"id":"gt-514","q":"Wie unterscheidet sich die Pfahlfußausbildung bei Simplex- und Frankipfahl?","a":"**Simplex:** ebener Fuß mit verlorener **Fußplatte** (kein verbreiterter Fuß).\n**Franki:** durch Ausrammen des Betonpfropfens entsteht ein **verbreiterter Druckfuß (Knollenfuß)** → höherer Fußwiderstand.","tags":["Geotechnik","Pfähle"],"reps":0,"ease":2.5,"interval":0,"due":1781338792034,"created":1781252392034,"last":null,"learning":true,"lapses":0,"explain":"Simplex: Der Fuß ist eben (verlorene Stahlplatte) — keine Aufweitung. Frankipfahl: Der Betonstopfen platzt beim Herausziehen des Rohrs seitlich auf → bildet eine glockenförmige Aufweitung am Fuß. Diese Aufweitung vergrößert die Druckfläche des Fußwiderstands erheblich — ideal in tragfähigen Schichten am Pfahlende."},{"id":"gt-515","q":"Welche beiden Möglichkeiten gibt es, den axialen Pfahlwiderstand für den Tragfähigkeitsnachweis zu bestimmen?","a":"1. Über **Pfahlprobebelastung** (statisch oder dynamisch)\n2. Über **Erfahrungswerte / Tabellenwerte** (z.B. EA-Pfähle)","tags":["Geotechnik","Pfähle"],"reps":0,"ease":2.5,"interval":0,"due":1781338792034,"created":1781252392034,"last":null,"learning":true,"lapses":0,"explain":"Pfahlprobebelastung (statisch): ein Probeprfahl wird bis zur Versagenslast belastet — aufwändig und teuer, aber sicherste Methode. Dynamische Pfahlprobebelastung: schneller und günstiger, aber weniger genau. Erfahrungswerte aus Tabellen (z.B. EA-Pfähle): Korrelation von Bodenart, Pfahltyp und Tragfähigkeit aus Datenbanken — nur für Routinefälle geeignet. Die sicherste Methode ist immer die statische Probebelastung."},{"id":"gt-516","q":"Wie ändert sich die Beanspruchung eines Pfahls bei zusätzlicher horizontaler Belastung?","a":"Es kommt zu **Biegung** (Biegemoment + Querkraft) zusätzlich zur Normalkraft. Der Pfahl wird über die **seitliche Bodenbettung** (Bettungsmodulverfahren) gehalten und auf Biegung bemessen.","tags":["Geotechnik","Pfähle"],"reps":0,"ease":2.5,"interval":0,"due":1781338792034,"created":1781252392034,"last":null,"learning":true,"lapses":0,"explain":"Horizontale Kräfte (Anprall, Wind, Erdbeben, Erddruck) erzeugen Biegemomente im Pfahl. Ein Pfahl unter kombinierter Druck- und Biegebeanspruchung ist wie ein Stab unter Normalkraft und Moment zu bemessen (Interaktionsnachweis). Die kritische Stelle ist meist im Bereich der größten Biegemomente (oft nahe dem Pfahlkopf oder bei Schichtwechseln). Bewehrung muss für beide Beanspruchungen ausgelegt sein."}],"created":1781252392034,"fach":"Geotechnik"},{"id":"gt-d6","name":"GT2 – Stützmauern","desc":"Tragprinzip Mauer/Wand, Widerstandskräfte, Gewichts-/Winkelstützmauer, Bergsporn, Erddruckansatz","emoji":"🧱","color":"#22d3ee","cards":[{"id":"gt-601","q":"Wie unterscheidet sich das Tragprinzip von Stützmauer und Stützwand? (mit Skizze)","a":"**Stützmauer:** trägt über **Eigengewicht** (Schwergewicht); Form und Abmessungen sind maßgebend, Lastabtrag über Sohlreibung.\n**Stützwand:** trägt über **Einbindung in den Boden** (und ggf. Aussteifung/Verankerung); Einbindetiefe ist maßgebend.\n\n```\nMauer:        Wand:\n ▓▓\\           │←Anker\n ▓▓▓\\  →Ea     │  →Ea\n▓▓▓▓▓\\         │\n══════ Sohle   │___ Einbindung\n```","tags":["Geotechnik","Stützmauern"],"reps":0,"ease":2.5,"interval":0,"due":1781338792034,"created":1781252392034,"last":null,"learning":true,"lapses":0,"explain":"Stützmauer (Schwergewichtsmauer): Trägt durch ihr Eigengewicht — massive Beton- oder Steinmauer, keine Bewehrung nötig. Form und Masse müssen so sein, dass die Resultante innerhalb der Sohlfläche bleibt. Stützwand (Winkelstützmauer): Leichtere Konstruktion aus Beton, trägt durch Hebelwirkung und Eigengewicht des Hinterfüllbodens. Weniger Material nötig, aber Bemessung aufwändiger (Stahlbeton)."},{"id":"gt-602","q":"Wovon hängen die Widerstandskräfte bei einer Stützmauer im Wesentlichen ab und wo wirken sie?","a":"Von der **Gewichtskraft** der Mauer (→ Sohlreibung/Sohlwiderstand). Sie wirken in der **Sohlfuge** (Gründungssohle).","tags":["Geotechnik","Stützmauern"],"reps":0,"ease":2.5,"interval":0,"due":1781338792034,"created":1781252392034,"last":null,"learning":true,"lapses":0,"explain":"Die Gewichtskraft der Stützmauer bestimmt die Reibungskraft (F = μ × N) an der Sohle — damit den Widerstand gegen Gleiten. Außerdem bestimmt das Eigengewicht, ob die Resultierende innerhalb der Sohle bleibt (Kippnachweis). Je schwerer die Mauer, desto sicherer — deshalb werden Schwergewichtsmauern breiter als hoch gebaut (Faustformel: Breite ≈ 0,4-0,6 × Höhe)."},{"id":"gt-603","q":"Wie wirkt sich der Bergsporn der Winkelstützmauer (gegenüber der Gewichtsstützmauer) auf die Standsicherheit aus?","a":"Über dem Bergsporn (der hinteren Fundamentplatte) liegt **Hinterfüllboden**, dessen Gewicht als **stabilisierende Auflast** mitwirkt. Dadurch werden Gleit- und Kippsicherheit verbessert, ohne dass viel Material nötig ist – die Mauer kann schlanker gebaut werden.","tags":["Geotechnik","Stützmauern"],"reps":0,"ease":2.5,"interval":0,"due":1781338792034,"created":1781252392034,"last":null,"learning":true,"lapses":0,"explain":"Die Fundamentplatte der Winkelstützmauer ragt nach hinten (Bergsporn) und nach vorne (Zehensporn). Über dem Bergsporn liegt Füllboden — sein Gewicht drückt die Platte nach unten und stabilisiert die Mauer gegen Gleiten und Kippen. Merkhilfe: Der Bergsporn nutzt den Erddruck des eigenen Hinterfüllbodens als stabilisierende Last — clever, weil der Boden \"kostenlos\" ist."},{"id":"gt-604","q":"Wo/wie wird der aktive Erddruck auf eine Winkelstützmauer angesetzt? Was gilt für die Wandreibung?","a":"Vereinfacht an einer **gedachten senkrechten Ersatzwand** durch das hintere Spornende. Der Bodenkeil über dem Sporn wird zur Mauer gerechnet.\nWandreibung: an dieser Ersatzfläche wirkt **Boden auf Boden** → Reibungswinkel **δ = φ** (voller Reibungswinkel).","tags":["Geotechnik","Stützmauern"],"reps":0,"ease":2.5,"interval":0,"due":1781338792034,"created":1781252392034,"last":null,"learning":true,"lapses":0,"explain":"An der realen Rückseite der Winkelstützmauer wirkt der Erddruck schräg (wegen Wandreibung). Vereinfacht darf eine senkrechte Schnittfläche durch den hinteren Rand des Fundaments als \"Ersatzwand\" angenommen werden — an dieser gedachten senkrechten Wand wirkt der aktive Erddruck. Diese Vereinfachung (Coulombscher Erddruck an der Ersatzwand) ist in der Norm anerkannt und vereinfacht die Berechnung erheblich."}],"created":1781252392034,"fach":"Geotechnik"},{"id":"gt-d7","name":"GT2 – Baugruben & Verbau","desc":"Verbauwände, Böschungen, Normverbau, Schlitzwand, Aussteifung/Verankerung, Einbindetiefe, Tiefe Gleitfuge, Blum","emoji":"🏗️","color":"#d7fb3f","cards":[{"id":"gt-701","q":"Benenne und skizziere die drei Arten von Bohrpfahlwänden.","a":"**Aufgelöste**, **tangierende** und **überschnittene** Bohrpfahlwand.\n\n```\naufgelöst:  ○  ○  ○   (Abstand, Lücken)\ntangierend: ○○○○○      (berühren sich)\nüberschnitten: ◍◍◍◍    (greifen ineinander → wasserdicht)\n```","tags":["Geotechnik","Baugruben"],"reps":0,"ease":2.5,"interval":0,"due":1781338792034,"created":1781252392034,"last":null,"learning":true,"lapses":0,"explain":"Aufgelöste Bohrpfahlwand: Pfähle stehen mit Lücken (kein Bodenschluss, nicht wasserdicht). Tangierende Bohrpfahlwand: Pfähle berühren sich (kein Überlapp, aber keine Lücken — kaum wasserdicht). Überschnittene Bohrpfahlwand: Sekundärpfähle überlappen Primärpfähle — vollständige Wasserdichtheit. Merkhilfe: aufgelöst = Lücken, tangierend = Berührung, überschnitten = Überlappung."},{"id":"gt-702","q":"Nicht verbaute Baugrube, Aushubtiefe 1,0 m: Wie am einfachsten herstellen? Nenne 2 Voraussetzungen.","a":"**Senkrechter Aushub ohne Verbau** (zulässig bis 1,25 m nach DIN 4124).\nVoraussetzungen:\n• Standfester Boden, Geländeoberfläche annähernd waagerecht\n• Schutzstreifen am Rand eingehalten, keine gefährdenden Lasten/Bauwerke daneben","tags":["Geotechnik","Baugruben"],"reps":0,"ease":2.5,"interval":0,"due":1781338792034,"created":1781252392034,"last":null,"learning":true,"lapses":0,"explain":"DIN 4124 erlaubt senkrechten Aushub ohne Nachweis bis 1,25 m in nichtbindigen und 1,75 m in bindigen Böden — wenn kein Grundwasser angeschnitten und kein Verkehr in der Nähe. Für eine Tiefe von 1,0 m reicht also einfaches senkrechtes Ausheben. Schnellste und günstigste Lösung für flache Leitungsgräben."},{"id":"gt-703","q":"Nicht verbaute Baugrube, Aushubtiefe 2,5 m: Wie am einfachsten herstellen? Nenne 2 Voraussetzungen.","a":"**Geböschte Baugrube** (ohne rechnerischen Nachweis).\nVoraussetzungen:\n• Böschungswinkel passend zur Bodenart eingehalten (siehe DIN 4124)\n• Schutzstreifen eingehalten, Tiefe ≤ 5 m, keine Störungen (GW, Erschütterung)","tags":["Geotechnik","Baugruben"],"reps":0,"ease":2.5,"interval":0,"due":1781338792034,"created":1781252392034,"last":null,"learning":true,"lapses":0,"explain":"DIN 4124 erlaubt Böschungsneigungen ohne rechnerischen Nachweis bis 5 m Tiefe: 45° in nichtbindigen Böden, bis 60° in bindigen Böden (in festem Zustand). Bei 2,5 m Tiefe ist die geböschte Baugrube ohne Verbau zulässig, wenn die Bedingungen erfüllt sind (kein GW, keine Auflasten nahe der Böschungskante). Die Böschungsneigung von 45° bedeutet: Böschungsbreite = Tiefe."},{"id":"gt-704","q":"Wovon hängt der zulässige Böschungswinkel ab und wie sind die Winkel ohne Nachweis (DIN 4124) definiert?","a":"Abhängig von der **Bodenart**. Ohne rechnerischen Nachweis zulässig:\n• nichtbindig / weich bindig: **β ≤ 45°**\n• steif/halbfest bindig: **β ≤ 60°**\n• Fels: **β ≤ 80°**","tags":["Geotechnik","Baugruben"],"reps":0,"ease":2.5,"interval":0,"due":1781338792034,"created":1781252392034,"last":null,"learning":true,"lapses":0,"explain":"Nichtbindiger Boden (Sand, Kies): 45° ohne Nachweis. Bindiger Boden (Ton, Schluff) in festem bis steifen Zustand: bis 60°. Fels: steiler möglich (nach Standsicherheitsnachweis). Bei weichem oder breiigem Ton: flachere Neigung nötig (oft 1:3 oder flacher). Wasser aus dem Hang macht jeden Böschungswinkel unsicher — dann immer Verbau oder Entwässerungsmaßnahmen."},{"id":"gt-705","q":"Welche 3 Voraussetzungen müssen erfüllt sein, damit die Böschungswinkel ohne Nachweis angewendet werden dürfen?","a":"1. Aushubtiefe **≤ 5 m**\n2. Kein **Grundwasseraustritt** / keine störende Schichtung in der Böschung\n3. Keine **Erschütterungen** und keine ungünstigen Auflasten; Schutzstreifen eingehalten","tags":["Geotechnik","Baugruben"],"reps":0,"ease":2.5,"interval":0,"due":1781338792034,"created":1781252392034,"last":null,"learning":true,"lapses":0,"explain":"Aushubtiefe ≤ 5 m: Darüber gelten die Tabellenwerte von DIN 4124 nicht mehr — statischer Nachweis erforderlich. Kein Grundwasseraustritt: Wasser aus dem Boden schwächt die Böschung erheblich (Auftrieb, Porenwasserüberdruck). Keine störende Schichtung: Geneigte Schichten können als Gleitfläche wirken und die Standsicherheit erheblich reduzieren. Alle drei Bedingungen müssen gleichzeitig erfüllt sein."},{"id":"gt-706","q":"Ordne Trägerbohlwand, Spundwand, überschnittene Bohrpfahlwand und Schlitzwand nach Kosten, Verformbarkeit und Wasserdichtigkeit.","a":"```\nWand              Kosten   Verformung  wasserdicht\nTrägerbohlwand    gering   groß        nein\nSpundwand         mittel   mittel      ja\nüberschn. BPW     hoch     gering      ja\nSchlitzwand       sehr hoch sehr gering ja\n```\nFaustregel: je teurer/steifer, desto verformungsärmer und (außer Trägerbohlwand) wasserdicht.","tags":["Geotechnik","Baugruben"],"reps":0,"ease":2.5,"interval":0,"due":1781338792034,"created":1781252392034,"last":null,"learning":true,"lapses":0,"explain":"Trägerbohlwand: günstig, hohe Verformung (weich), nicht wasserdicht. Spundwand: mittel, hohe Verformung (weich), wasserdicht. Überschnittene Bohrpfahlwand: teuer, geringe Verformung (steif), wasserdicht. Schlitzwand: sehr teuer, sehr geringe Verformung (sehr steif), wasserdicht. Die Wahl hängt von Grundwasser, Nachbarbebauung (Setzungstoleranz) und Kosten ab."},{"id":"gt-707","q":"Nenne drei Einzelnachweise für die Tragfähigkeit einer Spundwand mit jeweiligem Grenzzustand.","a":"**Gesamtstandsicherheit** → GEO-3\n**Materialversagen (Bauteil)** → STR\n**Hydraulischer Grundbruch** → HYD\n(zusätzlich: Erdwiderstand/Einbindetiefe → GEO-2)","tags":["Geotechnik","Baugruben"],"reps":0,"ease":2.5,"interval":0,"due":1781338792034,"created":1781252392034,"last":null,"learning":true,"lapses":0,"explain":"Gesamtstandsicherheit (GEO-3): Böschungs-/Geländebruch hinter der Wand — klassischer Kreisgleitnachweis. Materialversagen (STR): Biegemomente und Querkräfte im Wandquerschnitt — Stahlbemessung der Spundwand. Hydraulischer Grundbruch (HYD): Auftrieb durch Grundwasser unter der Baugrubensohle. Diese drei Nachweise decken die wesentlichen Versagensmechanismen ab."},{"id":"gt-708","q":"Was ist beim Ansatz des Neigungswinkels der Resultierenden des Erdwiderstandes zu beachten/nachzuweisen?","a":"Es muss nachgewiesen werden, dass die **vertikale Gleichgewichtskomponente aufgenommen** werden kann (Σ V = 0). Der angesetzte Erdwiderstand (Widerstand) darf nicht größer werden, als das vertikale Gleichgewicht zulässt – sonst ist der angesetzte Neigungswinkel δp nicht realistisch.","tags":["Geotechnik","Baugruben"],"reps":0,"ease":2.5,"interval":0,"due":1781338792034,"created":1781252392034,"last":null,"learning":true,"lapses":0,"explain":"Der Erddruck auf eine Wand wirkt in der Regel schräg (unter Wandreibungswinkel δ). Die vertikale Komponente aus dem Erddruck belastet die Wand als Normalkraft — die Wand muss auch diese Vertikalkraft in den Boden abtragen können. Ist die Wand lang und schmal (hohe Schlankheit), kann die Vertikalkraft zu Stabilitätsproblemen führen. Deshalb muss geprüft werden, ob die Einbindung auch die Vertikalkomponenten aufnimmt."},{"id":"gt-709","q":"In welcher Bemessungssituation erfolgt der Nachweis einer Baugrubenwand? Welcher Nachweis ist die Ausnahme?","a":"Generell **BS-T (vorübergehend)**, da Baugrube zeitlich begrenzt.\nAusnahme: Nachweis der **Steifen**, hier ist wegen des möglichen **Ausfalls einer Steife** die **BS-A (außergewöhnlich)** maßgebend.","tags":["Geotechnik","Baugruben"],"reps":0,"ease":2.5,"interval":0,"due":1781338792034,"created":1781252392034,"last":null,"learning":true,"lapses":0,"explain":"Baugrubenwände sind temporäre Strukturen — deshalb BS-T (vorübergehend). Ausnahme: Wenn die Baugrubenwand später als Teil des Gebäudes genutzt wird (z.B. Schlitzwand als spätere Kellerwand) → BS-P (dauerhaft). Steifenausfall ist BS-A. Die Bemessungssituation beeinflusst direkt die Teilsicherheitsbeiwerte und damit die erforderliche Wandstärke."},{"id":"gt-710","q":"Wozu dient der Nachweis der Tiefen Gleitfuge?","a":"Zum Nachweis der **Standsicherheit der Verankerung** – es wird geprüft, ob die Anker ausreichend lang/tief im Boden verankert sind, sodass der Boden zwischen Wand und Ankerkörper nicht auf einer tiefen Gleitfuge abrutscht.","tags":["Geotechnik","Baugruben"],"reps":0,"ease":2.5,"interval":0,"due":1781338792034,"created":1781252392034,"last":null,"learning":true,"lapses":0,"explain":"Eine verankerte Wand hält nur, wenn auch die Anker in ausreichend festem Boden sitzen. Die tiefe Gleitfuge prüft: Könnte ein Erdkeil, der hinter den Ankerfußpunkten ansetzt, die gesamte Wand inklusive Anker herausreißen? Wenn dieser Keil standsicher ist, sind die Anker tief genug. Würde man die Anker zu kurz einbauen, könnten sie mit dem Erdkeil mitgleiten."},{"id":"gt-711","q":"Durch welche beiden Punkte wird die Tiefe Gleitfuge bei einer Spundwand festgelegt?","a":"1. **Fußpunkt der Wand** (theoretischer/rechnerischer Wandfuß)\n2. **Ankerfußpunkt** (Schwerpunkt/Mitte des Verpresskörpers bzw. der Ankerkrafteinleitung).\nDie Verbindungslinie beider Punkte ist die tiefe Gleitfuge.","tags":["Geotechnik","Baugruben"],"reps":0,"ease":2.5,"interval":0,"due":1781338792034,"created":1781252392034,"last":null,"learning":true,"lapses":0,"explain":"Wandfußpunkt: Hier wird die Rückseite der Gleitfuge angesetzt — die Wand kann bis zu diesem Punkt mitgezogen werden. Ankerfußpunkt: Hier sitzt der verpresste Ankerabschnitt im Boden. Die Gleitfuge verbindet beide Punkte — sie beschreibt, welches Erdvolumen herausgleiten müsste, um den Verbau zum Versagen zu bringen. Wenn dieser Keil standsicher ist → Nachweis erbracht."},{"id":"gt-712","q":"Wie kontrolliert man, ob eine veränderliche Flächenlast P beim Nachweis der Tiefen Gleitfuge günstig oder ungünstig wirkt?","a":"Man prüft im **Krafteck** die Wirkungsrichtung von P:\nWirkt P so, dass die **erforderliche Ankerkraft größer** wird → ungünstig → P **ansetzen**.\nWirkt P stabilisierend (Ankerkraft kleiner) → günstig → P **nicht ansetzen** (veränderliche günstige Lasten werden weggelassen).","tags":["Geotechnik","Baugruben"],"reps":0,"ease":2.5,"interval":0,"due":1781338792034,"created":1781252392034,"last":null,"learning":true,"lapses":0,"explain":"Im Krafteck (vektorielle Addition aller Kräfte) wird geprüft, ob die Resultierende aus Eigenlast, Erddruck, Wasserdruck und der Einzellast P im Gleichgewicht mit dem Widerstand auf der Gleitfläche steht. Wirkt P so, dass die Resultierende aus der Gleitfläche herausfällt → destabilisierend. Wirkt P stabilisierend (z.B. als Auflast hinter dem Widerlager) → günstig. Das Krafteck macht die Richtungswirkung explizit."},{"id":"gt-713","q":"Schlitzwand: Was wird als Stützflüssigkeit verwendet und welche Eigenschaft ist wichtig?","a":"In der Regel eine **Bentonit-Suspension**.\nWichtigste Eigenschaft: **Thixotropie** – sie geliert in Ruhe und erzeugt einen Stützdruck, der größer ist als Erd- + Wasserdruck → der offene Schlitz bleibt während Aushub und Betonieren standfest.","tags":["Geotechnik","Baugruben"],"reps":0,"ease":2.5,"interval":0,"due":1781338792034,"created":1781252392034,"last":null,"learning":true,"lapses":0,"explain":"Bentonit ist ein quellfähiger Ton. In Wasser aufgeschwemmt bildet es eine thixotrope Suspension: Im Ruhezustand geliert sie (stützt die Schlitzwandung). Beim Rühren wird sie wieder flüssig (fließt in den Schlitz). Diese Eigenschaft ist genial für Schlitzwände: Die Stützflüssigkeit ist im Schlitz ruhig → geliert → stützt. Beim Einbringen von Beton wird sie verdrängt und kann an der Oberfläche abgepumpt und aufbereitet werden."},{"id":"gt-714","q":"Was ist der \"Filterkuchen\" bei der Schlitzwand und wovon hängt seine Dicke ab?","a":"Eine dünne **Bentonitablagerung an der Schlitzwandung** – die Suspension dringt in den Boden ein und lagert Bentonitpartikel ab, die abdichten und den Stützdruck übertragen.\nDie Dicke hängt v.a. von der **Durchlässigkeit des Bodens** (Porengröße), der Standzeit und den Suspensionseigenschaften ab.","tags":["Geotechnik","Baugruben"],"reps":0,"ease":2.5,"interval":0,"due":1781338792034,"created":1781252392034,"last":null,"learning":true,"lapses":0,"explain":"Die Bentonit-Suspension dringt in die Poren der Schlitzwandung ein und bildet dort einen dünnen, dichten Belag (Filterkuchen). Dieser Kuchen ist der eigentliche Stützmechanismus: Er überträgt den hydrostatischen Druck der Suspension auf die Wandung und verhindert, dass Boden einstürzt. Dicker Filterkuchen entsteht bei grob porösem Boden (Sand, Kies). In feinerem Boden ist der Kuchen dünner."},{"id":"gt-715","q":"Nenne die beiden Arten von Normverbau nach DIN 4124 für Rohrgräben und ihre wesentlichen Bauelemente.","a":"**Waagerechter Grabenverbau:** waagerechte Bohlen/Brusthölzer + senkrechte Brustriegel + Steifen.\n**Senkrechter Grabenverbau:** senkrechte Kanaldielen/Bohlen + waagerechte Gurtungen (Brustriegel) + Steifen.","tags":["Geotechnik","Baugruben"],"reps":0,"ease":2.5,"interval":0,"due":1781338792034,"created":1781252392034,"last":null,"learning":true,"lapses":0,"explain":"Waagerechter Grabenverbau: Horizontale Bohlen (Brustholz) halten den Boden. Senkrechte Träger (Stempel) stützen die Bohlen. Geeignet für weichen, nachgebenden Boden. Senkrechter Grabenverbau: Senkrechte Bohlen werden in den Boden gedrückt. Waagerechte Gurte und Spreizen halten die Bohlen. Geeignet für standfesten Boden. Beide nach DIN 4124 bis 5 m Tiefe ohne statischen Nachweis."},{"id":"gt-716","q":"Welche Verbauart wird häufig alternativ zum Normverbau bei Rohrgräben verwendet?","a":"**Grabenverbaugeräte** – z.B. Verbauboxen (Dielenkammerplatten) oder Gleitschienenverbau, die als Systeme eingebaut werden.","tags":["Geotechnik","Baugruben"],"reps":0,"ease":2.5,"interval":0,"due":1781338792034,"created":1781252392034,"last":null,"learning":true,"lapses":0,"explain":"Grabenverbaugeräte (Verbaubox, Gleitschiene) werden mit dem Bagger in den Graben gedrückt und sichern die Böschung von innen. Vorteil: Schnell, wiederverwendbar, kein Voraushub nötig. Verbauboxen (zwei parallele Stahlplatten mit Spreizen) sind für schmale Leitungsgräben ideal. Sie \"gleiten\" beim Aushub nach unten und werden nach Rohrverlegen hochgezogen."},{"id":"gt-717","q":"Erläutere und skizziere den Unterschied zwischen waagerechtem und senkrechtem Grabenverbau.","a":"```\nwaagerecht:        senkrecht:\n═══════│           ║│║│║│\n═══════│ Bohlen    ║│║│║│ Dielen\n═══════│ waagerecht║│║│║│ senkrecht\n```\n**Waagerecht:** Bohlen werden mit fortschreitendem Aushub waagerecht eingebaut (für standfeste Böden).\n**Senkrecht:** Kanaldielen werden vorab senkrecht eingebracht/eingerammt (für weniger standfeste Böden).","tags":["Geotechnik","Baugruben"],"reps":0,"ease":2.5,"interval":0,"due":1781338792034,"created":1781252392034,"last":null,"learning":true,"lapses":0,"explain":"Waagerechter Verbau: Brustholz liegt waagerecht an der Grabenwand, Stempel stehen senkrecht dazwischen. Das Brustholz überträgt den Erddruck auf die Stempel. Senkrechter Verbau: Bohlen stehen senkrecht am Grabenrand, werden von oben in den Boden gedrückt und durch waagerechte Gurt- und Spreizensysteme gehalten. Senkrechter Verbau ist schneller (Bagger drückt ihn ein), waagerechter flexibler für unregelmäßige Böden."},{"id":"gt-718","q":"Nenne zwei Beispiele für Grabenverbaugeräte (mit Skizze).","a":"**Verbaubox (Dielenkammerplatten):** zwei Platten mit Spreizen.\n**Gleitschienenverbau:** Platten laufen in Führungsschienen, lassen sich beim Aushub absenken.\n\n```\n│  │   ║=║\n│  │   ║ ║  (Box mit Spreizen / Schienen)\n│  │   ║=║\n```","tags":["Geotechnik","Baugruben"],"reps":0,"ease":2.5,"interval":0,"due":1781338792034,"created":1781252392034,"last":null,"learning":true,"lapses":0,"explain":"Verbaubox: zwei parallele Stahlplatten (entsprechend Grabenbreite) mit einstellbaren Spreizen — einfach, weit verbreitet, für Tiefen bis ca. 6 m. Gleitschiene: Mehrere Bohlenelemente werden übereinander gestapelt und keilförmig nach unten getrieben, während ausgehoben wird — für tiefere und schmalere Gräben geeignet."},{"id":"gt-719","q":"Nenne die beiden generellen Möglichkeiten, eine gestützte Verbauwand herzustellen (mit Skizze).","a":"**Aussteifung (Steifen):** Abstützung innerhalb der Baugrube.\n**Verankerung (Anker):** Rückverankerung im Boden hinter der Wand.\n\n```\nAussteifung:     Verankerung:\n│====│           │\\\n│    │           │ \\anker\n│====│           │  \\\n```","tags":["Geotechnik","Baugruben"],"reps":0,"ease":2.5,"interval":0,"due":1781338792034,"created":1781252392034,"last":null,"learning":true,"lapses":0,"explain":"Aussteifung (Steifen): Waagerechte Stahlstreben quer durch die Baugrube zwischen zwei gegenüberliegenden Wänden. Kein Ankern im Boden nötig, aber Baugrubeninnenraum wird eingeschränkt. Verankerung: Anker werden schräg in den Boden hinter der Wand eingebohrt und verpresst. Baugrubeninnenraum bleibt frei — ideal für große Baugruben."},{"id":"gt-720","q":"Nenne je einen Vor- und Nachteil von Aussteifung und Verankerung.","a":"**Aussteifung:** + wiedergewinnbar / − behindert den Arbeitsraum in der Baugrube.\n**Verankerung:** + Baugrube bleibt frei (ungehindert arbeiten) / − Anker verbleiben oft im Boden, Nachbargrundstück nötig.","tags":["Geotechnik","Baugruben"],"reps":0,"ease":2.5,"interval":0,"due":1781338792034,"created":1781252392034,"last":null,"learning":true,"lapses":0,"explain":"Aussteifung: Vorteil = vollständig wiedergewinnbar (Stahl wird nach Rohbau ausgebaut). Nachteil = behindert den Arbeitsraum (Bagger, Kranarbeiten, Materialtransport eingeschränkt). Verankerung: Vorteil = freier Arbeitsraum in der Baugrube. Nachteil = Anker verbleiben z.T. im Boden (wenn nicht rückbaubar), Genehmigung im öffentlichen Raum nötig."},{"id":"gt-721","q":"Warum unterscheidet sich der Nachweis der Einbindetiefe bei Spundwand und Trägerbohlwand?","a":"Die **Spundwand ist durchgehend** und bindet unter die Baugrubensohle ein.\nBei der **Trägerbohlwand** binden nur die **einzelnen Bohlträger** unter die Sohle ein (die Ausfachung endet an der Sohle) → der Erdwiderstand kann nur vor den Trägern (räumlich) angesetzt werden.","tags":["Geotechnik","Baugruben"],"reps":0,"ease":2.5,"interval":0,"due":1781338792034,"created":1781252392034,"last":null,"learning":true,"lapses":0,"explain":"Spundwand reicht kontinuierlich als Platte von oben nach unten in den Boden. Sie überträgt die Lasten als Plattenbiegebeanspruchung. Die Trägerbohlwand dagegen besteht aus diskreten Trägern — zwischen den Trägern überspannen die Bohlen. Für die Einbindetiefe bedeutet das: Spundwand wird wie ein durchlaufender Balken berechnet, Trägerbohlwand muss den Einzelträger mit Erdwiderstand vor dem Träger nachweisen."},{"id":"gt-722","q":"Wie unterscheidet sich der passive Erddruckansatz bei Spundwand und Trägerbohlwand?","a":"**Spundwand:** passiver Erddruck auf der **gesamten Wandfläche** (ebener Erdwiderstand).\n**Trägerbohlwand:** passiver Erddruck nur vor den **einzelnen Trägern** als **räumlicher Erdwiderstand** (begrenzte Wirkbreite je Träger).","tags":["Geotechnik","Baugruben"],"reps":0,"ease":2.5,"interval":0,"due":1781338792034,"created":1781252392034,"last":null,"learning":true,"lapses":0,"explain":"Spundwand: Passiver Erddruck wirkt auf die gesamte Wandfläche (ebener Fall). Trägerbohlwand: Passiver Erddruck wirkt nur vor den Trägerflanschen, nicht vor den Holzbohlen (die Bohlen sind zu nachgiebig). Deshalb ist der wirksame passive Widerstand bei der Trägerbohlwand räumlich begrenzt — und wird als \"räumlicher Erdwiderstand\" bezeichnet."},{"id":"gt-723","q":"Wie ist der passive Erddruck bei der Trägerbohlwand anzusetzen und was ist dabei zu unterscheiden?","a":"Als **räumlicher Erdwiderstand** vor den Trägern, begrenzt auf eine wirksame Breite. Zu unterscheiden:\n• schmale Wirkbreite (einzelner Träger) vs.\n• Überschneidung der Erddruckkörper bei geringem Trägerabstand → es darf höchstens der ebene Erdwiderstand der Gesamtwand angesetzt werden.","tags":["Geotechnik","Baugruben"],"reps":0,"ease":2.5,"interval":0,"due":1781338792034,"created":1781252392034,"last":null,"learning":true,"lapses":0,"explain":"Der räumliche Erdwiderstand vor einem Träger ist größer als der ebene Erdwiderstand für dieselbe Fläche — weil der Boden dreidimensional ausweichen muss (nicht nur flach). Er wird auf eine \"wirksame Breite\" begrenzt (Flanschbreite + bestimmter Mehreintrag). Die genaue Berechnung erfolgt nach Empfehlungen des Arbeitskreises Baugruben (EAB)."},{"id":"gt-724","q":"Skizziere bei einer nicht gestützten (eingespannten) Wand den Verformungs-/Abtragungsmechanismus.","a":"Die Wand wird im Boden **eingespannt** (bodenmechanische Einspannung): sie kippt um einen tiefen Drehpunkt, davor wirkt oben aktiver, unten passiver Erddruck – unterhalb des Drehpunkts kehrt sich der Erdwiderstand um.\n\n```\n→Ea │\n     │)   ← passiv vorne\n  ───┼─── Drehpunkt\n     │(   ← Gegenstütze hinten\n     │ Fuß\n```","tags":["Geotechnik","Baugruben"],"reps":0,"ease":2.5,"interval":0,"due":1781338792034,"created":1781252392034,"last":null,"learning":true,"lapses":0,"explain":"Eine nicht gestützte Wand (kein Anker, keine Steife) ist im Boden eingespannt: Der Bodenwiderstand auf der Passivseite (unten, Baugrubenseite) hält die Wand gegen das Kippen. Im oberen Teil biegt sich die Wand aktiv-seitig (Erddruck drückt), im unteren Teil biegt sie sich passiv-seitig zurück (Einspannung). Das Biegemoment ist maximal an der Stelle des Momentennullpunkts."},{"id":"gt-725","q":"Erläutere den Ansatz von Blum (statisches Ersatzsystem) für die bodenmechanische Einspannung.","a":"Der untere, umkehrte Erdwiderstand wird vereinfacht durch eine **Ersatzkraft C** im Fußpunkt ersetzt. Das System wird dann wie ein **am Fuß gestützter Balken** gerechnet (Auflager = Ersatzkraft C statt verteiltem Gegen-Erddruck).","tags":["Geotechnik","Baugruben"],"reps":0,"ease":2.5,"interval":0,"due":1781338792034,"created":1781252392034,"last":null,"learning":true,"lapses":0,"explain":"Blum vereinfacht den unteren umgekehrten passiven Erddruckbereich durch eine Einzelkraft C am theoretischen Wandfußpunkt. Statt die komplizierte Rückverankerungszone genau zu berechnen, wird angenommen, dass C als Resultierende wirkt. Die Einbindetiefe wird so berechnet, dass C einen sinnvollen Wert ergibt (normalerweise positiv). Danach wird C mit einem Zuschlag erhöht (Sicherheit für die Einspannung) und die tatsächliche Einbindetiefe um 20% verlängert."},{"id":"gt-726","q":"Skizziere den Momentenverlauf und erläutere, wie sich die erforderliche Einbindetiefe zusammensetzt (Blum).","a":"```\nMoment:\n   │\n   │  ╱╲  max M\n   │ ╱  ╲\n───┼╱────╲──── \n   │      ╲_/ ← Fuß (Ersatzkraft C)\n```\nEinbindetiefe **t = t₀ + Δt**:\n• **t₀** = rechnerische Tiefe bis zum Momenten-/Kraftnullpunkt (Gleichgewicht ohne C)\n• **Δt** = Zuschlag (~20 %), um die Ersatzkraft **C** im Boden aufnehmen zu können.","tags":["Geotechnik","Baugruben"],"reps":0,"ease":2.5,"interval":0,"due":1781338792034,"created":1781252392034,"last":null,"learning":true,"lapses":0,"explain":"Das maximale Biegemoment Mmax liegt dort, wo die Querkraft null ist (Momentennullpunkt). Bei einer freistehenden Wand liegt dieser Punkt im Bereich der größten Einspanntiefe. Der Momentenverlauf ist oben positiv (aktiver Erddruck biegt Wand in Baugrube), unten negativ (passive Einspannung zieht zurück). Das maximale Moment bestimmt die erforderliche Wandstärke (Biegebewehrung oder Profilwahl bei Spundwand)."},{"id":"gt-727","q":"Innerstädtische Baugrube, ~4 m tief, Nachbarbebauung in ≥15 m, mitteldicht-dichter schluffiger Sand, GW bei 10 m, wirtschaftlich: Welcher Verbau?","a":"**Trägerbohlwand (Berliner Verbau).**\nBegründung: Geringe Tiefe, GW liegt tief unter der Sohle (keine Wasserdichtigkeit nötig), Nachbarn weit genug entfernt (Verformungen unkritisch), standfester Sand → wirtschaftlichste Lösung.","tags":["Geotechnik","Baugruben"],"reps":0,"ease":2.5,"interval":0,"due":1781338792034,"created":1781252392034,"last":null,"learning":true,"lapses":0,"explain":"Trägerbohlwand (Berliner Verbau): Geringe Tiefe → keine Mehrfachaussteifung nötig. GW liegt tief → keine Wasserdichtheit erforderlich. Nachbarn weit weg → Verformungen unkritisch. Trägerbohlwand ist die günstigste und schnellste Lösung für diese Situation. Einzige Einschränkung: Hindernisse im Boden oder sehr lockerer Sand könnten gegen Trägerbohlwand sprechen."},{"id":"gt-728","q":"Innerstädtische Baugrube, ~6 m tief, GW bei 1 m, sehr durchlässiger Sand, Fluss in 15 m (hoher Wasserandrang), wirtschaftlich: Welcher Verbau?","a":"**Spundwand** (wasserdichte, einbindende Wand).\nBegründung: Hoher Wasserstand und starker Wasserandrang erfordern eine **wasserabsperrende** Wand; die Spundwand kann tief einbinden und das Wasser abhalten – wirtschaftlicher als Schlitz-/Bohrpfahlwand.","tags":["Geotechnik","Baugruben"],"reps":0,"ease":2.5,"interval":0,"due":1781338792034,"created":1781252392034,"last":null,"learning":true,"lapses":0,"explain":"Spundwand: Hoher Wasserstand → Wasserdichtheit zwingend. Durchlässiger Boden (Sand) → viel Grundwasserzufluss, nur wasserdichte Wand verhindert Einstrom. 6 m Tiefe → noch nicht zu tief für Spundwand (bis ca. 10-12 m wirtschaftlich). Innenstädt → Rammung ggf. durch Vibrationsrütteln ersetzbar (leiser). Spundwand ist günstiger als Bohrpfahlwand und erfüllt hier alle Anforderungen."},{"id":"gt-729","q":"Baugrube ~12 m tief, erschütterungsempfindliche Nachbarn in 3 m, Fels ab 8 m, darüber Sand, GW bei 1,5 m, wirtschaftlich: Welcher Verbau?","a":"**Überschnittene Bohrpfahlwand** (ggf. mit Verankerung).\nBegründung: Erschütterungsarme Herstellung (kein Rammen → schont Nachbarn in nur 3 m), tiefe Baugrube mit Wasser → steife, wasserdichte Wand nötig; Einbindung in den Fels möglich.","tags":["Geotechnik","Baugruben"],"reps":0,"ease":2.5,"interval":0,"due":1781338792034,"created":1781252392034,"last":null,"learning":true,"lapses":0,"explain":"Überschnittene Bohrpfahlwand: Erschütterungsempfindliche Nachbarn → kein Rammen/Rütteln. 3 m Abstand → hohe Steifigkeit nötig (wenig Verformung = wenig Setzung beim Nachbarn). 12 m Tiefe → möglicherweise mehrfach verankert. Wasserdicht (überschnitten). Teurer als Trägerbohlwand, aber die einzige Option bei diesen Randbedingungen."},{"id":"gt-730","q":"Baugrube 10 m tief, setzungsempfindliches 6-stöckiges Gebäude in 1 m Abstand, GW ab 3 m: Welcher Verbau und wie viele Stützungen?","a":"**Überschnittene Bohrpfahlwand oder Schlitzwand, mehrfach (2–3-fach) verankert/ausgesteift.**\nBegründung: Sehr verformungsarme, wasserdichte Wand wegen des sehr nahen, setzungsempfindlichen Gebäudes und des Grundwassers; mehrere Stützungslagen begrenzen die Wandverformung.","tags":["Geotechnik","Baugruben"],"reps":0,"ease":2.5,"interval":0,"due":1781338792034,"created":1781252392034,"last":null,"learning":true,"lapses":0,"explain":"Überschnittene Bohrpfahlwand oder Schlitzwand: Setzungsempfindliches Hochhaus → maximale Steifigkeit nötig. 2-3-fache Verankerung wegen 10 m Tiefe. Schlitzwand ist steifer und teurer (kommt bei sehr engen Setzungstoleranzen in Frage). Mehrfache Verankerung reduziert Wandverformung. Detaillierte Setzungsprognose (FEM-Berechnung) nötig, um Setzungen zu prognostizieren."},{"id":"gt-731","q":"Baugrube 3 m tief, Lagerhalle in 25 m Abstand, GW ab 10 m: Welcher Verbau und wie viele Stützungen?","a":"**Trägerbohlwand (Berliner Verbau), ungestützt (frei auskragend) oder einfach gestützt.**\nBegründung: Geringe Tiefe, kein GW im Aushubbereich, Nachbarbebauung weit entfernt (Verformungen unkritisch) → einfachste/wirtschaftlichste Lösung.","tags":["Geotechnik","Baugruben"],"reps":0,"ease":2.5,"interval":0,"due":1781338792034,"created":1781252392034,"last":null,"learning":true,"lapses":0,"explain":"Trägerbohlwand, ungestützt oder einfach gestützt: 3 m Tiefe → sehr gering. GW ab 10 m → irrelevant. Lagerhalle in 25 m → Abstand groß genug, keine Setzungsrestriktionen. Ungestützt (frei auskragend) möglich bis ca. 3-4 m. Einfach gestützt (eine Ankerreihe oder Steife) falls Boden schwächer. Günstigste und einfachste Lösung."},{"id":"gt-732","q":"Nenne die vier klassischen Verbauwände.","a":"**Trägerbohlwand** (Berliner Verbau)\n**Spundwand**\n**Überschnittene Bohrpfahlwand**\n**Schlitzwand**","tags":["Geotechnik","Baugruben"],"reps":0,"ease":2.5,"interval":0,"due":1781338792034,"created":1781252392034,"last":null,"learning":true,"lapses":0,"explain":"Trägerbohlwand: oben günstig + nicht wasserdicht + weich. Spundwand: günstig + wasserdicht + weich-mittel. Überschnittene Bohrpfahlwand: teuer + wasserdicht + steif. Schlitzwand: sehr teuer + wasserdicht + sehr steif. Diese vier Grundtypen decken das gesamte Spektrum von günstig-flexibel bis teuer-steif ab. Alle anderen Sonderlösungen (HDI-Wand, Gefrierverbau) sind Sonderfälle."}],"created":1781252392034,"fach":"Geotechnik"},{"id":"vm-d1","name":"Koordinatensysteme & Bezug","desc":"GK, UTM, geografische Koordinaten, Richtungswinkel, Bezugshorizont","emoji":"🗺️","color":"#6366f1","cards":[{"id":"vm-001","q":"Welche Arten von Koordinaten gibt es?","a":"Kartesische (rechtwinklige), polare und geografische (globale) Koordinaten.","tags":["Vermessung","Koordinaten"],"reps":0,"ease":2.5,"interval":0,"due":1781373445813,"created":1781287045813,"last":null,"learning":true,"lapses":0,"explain":"Kartesische Koordinaten beschreiben einen Punkt durch rechtwinklige Abstände auf zwei oder drei Achsen — wie ein Raster. Polare Koordinaten nutzen Winkel und Entfernung vom Ursprung. Geografische Koordinaten (Breite/Länge) geben die Position auf der Erdkugel an. Merkhilfe: kartesisch = Raster, polar = Kompass, geografisch = GPS."},{"id":"vm-002","q":"Welche zwei Abbildungen/Systeme zur Darstellung von Koordinaten gibt es?","a":"Gauss-Krueger (GK) und UTM.","tags":["Vermessung","Koordinaten"],"reps":0,"ease":2.5,"interval":0,"due":1781373445813,"created":1781287045813,"last":null,"learning":true,"lapses":0,"explain":"Gauß-Krüger (GK) und UTM sind beide konforme (winkelgetreue) Abbildungen, die die Erdkugel auf eine ebene Karte projizieren, indem sie einen Zylinder um die Erde legen. Beide teilen die Erde in schmale Längsstreifen auf, damit die Verzerrung gering bleibt. In Deutschland wird GK historisch für amtliche Karten genutzt, UTM ist der europäische Standard (ETRS89)."},{"id":"vm-003","q":"Woran erkennt man GK- bzw. UTM-Koordinaten?","a":"Am Rechts-/Ostwert: GK-Rechtswert hat 7 Vorkommastellen, UTM-Ostwert 8.","tags":["Vermessung","Koordinaten"],"reps":0,"ease":2.5,"interval":0,"due":1781373445813,"created":1781287045813,"last":null,"learning":true,"lapses":0,"explain":"Der entscheidende Unterschied liegt in der Stellenanzahl: GK-Rechtswerte beginnen mit einer einstelligen Kennzahl (z.B. 3xxxxxx), sodass insgesamt 7 Stellen vor dem Komma stehen. UTM-Ostwerte haben durch das breitere Zonensystem 8 Stellen. Merkhilfe: GK = 7 Stellen (älter, schmaler), UTM = 8 Stellen (breiter, moderner)."},{"id":"vm-004","q":"Woraus bestehen GK- und UTM-Koordinaten?","a":"GK: Rechtswert + Hochwert.\nUTM: Ostwert (East) + Nordwert (North).","tags":["Vermessung","Koordinaten"],"reps":0,"ease":2.5,"interval":0,"due":1781373445813,"created":1781287045813,"last":null,"learning":true,"lapses":0,"explain":"GK und UTM sind ebene kartesische Systeme: Ein Punkt wird durch zwei rechtwinklige Abstände beschrieben. Bei GK heißen diese Rechtswert (nach Osten) und Hochwert (nach Norden), bei UTM Ostwert (East) und Nordwert (North). Die unterschiedlichen Bezeichnungen spiegeln nur verschiedene Normen wider, das Prinzip ist identisch."},{"id":"vm-005","q":"Wofuer steht die erste Ziffer (Kennzahl) des GK-Rechtswerts?","a":"Sie ist die Kennzahl des Meridianstreifens. Kennzahl x 3 = Laengengrad des Hauptmeridians (GK = 3-Grad-Streifen).","tags":["Vermessung","Koordinaten","GK"],"reps":0,"ease":2.5,"interval":0,"due":1781373445813,"created":1781287045813,"last":null,"learning":true,"lapses":0,"explain":"Im GK-System wird Deutschland in 3° breite Meridianstreifen unterteilt. Die Kennzahl ist die Streifennummer, multipliziert man sie mit 3, erhält man den Längengrad des Mittelmeridians. Beispiel: Kennzahl 4 → Mittelmeridian bei 12° Ost. So kann man sofort ablesen, in welchem Streifen ein Punkt liegt."},{"id":"vm-006","q":"Warum erhaelt der GK-Rechtswert einen Zuschlag von 500 km?","a":"Um negative Koordinaten westlich des Hauptmeridians zu vermeiden.","tags":["Vermessung","Koordinaten","GK"],"reps":0,"ease":2.5,"interval":0,"due":1781373445813,"created":1781287045813,"last":null,"learning":true,"lapses":0,"explain":"Westlich des Hauptmeridians wären Koordinatenabstände negativ, was Berechnungen fehleranfällig macht. Der Zuschlag von 500.000 m verschiebt den Nullpunkt nach Westen, sodass alle Rechtswerte im Streifen positiv bleiben. Merkhilfe: 500 km ist die halbe Streifenbreite — damit liegt der Meridian immer bei 500.000+x."},{"id":"vm-007","q":"Wie ermittelt man aus einem GK-Rechtswert Entfernung und Richtung zum Hauptmeridian?","a":"Rechtswert ohne Kennzahl minus 500.000 m. Ergebnis positiv = oestlich, negativ = westlich des Hauptmeridians.","tags":["Vermessung","Koordinaten","GK"],"reps":0,"ease":2.5,"interval":0,"due":1781373445813,"created":1781287045813,"last":null,"learning":true,"lapses":0,"explain":"Man entfernt zunächst die führende Kennziffer aus dem Rechtswert (die Streifennummer), dann zieht man 500.000 m ab. Ein positives Ergebnis bedeutet östlich des Hauptmeridians, ein negatives westlich. Beispiel: Rechtswert 3.512.345 → 512.345 - 500.000 = +12.345 m → rund 12 km östlich des Meridians."},{"id":"vm-008","q":"Was gibt der Hochwert einer GK-Koordinate an?","a":"Die Entfernung in Metern noerdlich vom Aequator.","tags":["Vermessung","Koordinaten","GK"],"reps":0,"ease":2.5,"interval":0,"due":1781373445813,"created":1781287045813,"last":null,"learning":true,"lapses":0,"explain":"Der Hochwert gibt direkt den Abstand in Metern vom Äquator nach Norden an. Da Deutschland weit nördlich des Äquators liegt (ca. 47–55° N), sind Hochwerte dort typischerweise im Bereich 5.200.000 bis 6.100.000 m. Höherer Hochwert = weiter nördlich."},{"id":"vm-009","q":"Wie viele Vorkommastellen hat ein GK-Rechtswert?","a":"7.","tags":["Vermessung","Koordinaten","GK"],"reps":0,"ease":2.5,"interval":0,"due":1781373445813,"created":1781287045813,"last":null,"learning":true,"lapses":0,"explain":"Die 7 Vorkommastellen des GK-Rechtswerts setzen sich zusammen aus: 1 Stelle Kennzahl (Streifennummer, max. 9) + 6 Stellen eigentlicher Ostwert (bis 999.999 m). UTM hat eine Stelle mehr, weil die Zonen doppelt so breit sind und größere Zahlenwerte entstehen."},{"id":"vm-010","q":"Wie erfolgt die Einteilung im GK- bzw. UTM-System?","a":"GK in Streifen (3 Grad breit), UTM in Zonen (6 Grad breit).","tags":["Vermessung","Koordinaten"],"reps":0,"ease":2.5,"interval":0,"due":1781373445813,"created":1781287045813,"last":null,"learning":true,"lapses":0,"explain":"GK teilt die Erde in 3°-Streifen (Deutschland: Streifen 2–5), UTM in 6°-Zonen (Deutschland: Zone 32 und 33). Die engeren GK-Streifen erzeugen weniger Verzerrung am Rand, decken aber kleinere Gebiete ab. UTM ist weltweit einheitlicher, weil es nur 60 Zonen braucht statt ~120."},{"id":"vm-011","q":"UTM vs. GK - Massstab am Hauptmeridian?","a":"UTM: 0,996\nGK: 1,000","tags":["Vermessung","Koordinaten","UTM"],"reps":0,"ease":2.5,"interval":0,"due":1781373445813,"created":1781287045813,"last":null,"learning":true,"lapses":0,"explain":"Am Hauptmeridian (Streifenmitte) ist GK verzerrungsfrei (Maßstab 1,000), UTM hat dort bewusst einen Maßstabsfaktor von 0,996 — eine leichte Verkleinerung. Dafür ist UTM an den Zonenrändern weniger verzerrt. Der Wert 0,996 bedeutet: 1 km in der Realität = 996 m in der Karte am Meridian."},{"id":"vm-012","q":"Welches System bildet den Hauptmeridian massstabstreu ab?","a":"GK (Massstab 1,000). UTM hat am Hauptmeridian 0,996.","tags":["Vermessung","Koordinaten","UTM"],"reps":0,"ease":2.5,"interval":0,"due":1781373445813,"created":1781287045813,"last":null,"learning":true,"lapses":0,"explain":"GK bildet den Hauptmeridian exakt im Maßstab 1:1 ab (maßstabstreu). UTM skaliert den Hauptmeridian bewusst auf 0,996, um die Verzerrung gleichmäßiger über die breitere Zone zu verteilen. Merkhilfe: GK-Meridian stimmt genau, UTM-Meridian ist leicht verkleinert, damit die Ränder besser passen."},{"id":"vm-013","q":"UTM vs. GK - Streifen-/Zonenbreite?","a":"UTM: 6 Laengengrade.\nGK: 3 Laengengrade.","tags":["Vermessung","Koordinaten","UTM"],"reps":0,"ease":2.5,"interval":0,"due":1781373445813,"created":1781287045813,"last":null,"learning":true,"lapses":0,"explain":"GK-Streifen sind 3 Längengrade breit — enger und präziser in der Mitte, aber mehr Streifen nötig. UTM-Zonen sind 6 Längengrade breit — globaler Standard, aber etwas mehr Randverzerrung. Deutschland liegt in zwei UTM-Zonen (32 und 33), aber in vier GK-Streifen (2–5)."},{"id":"vm-014","q":"UTM vs. GK - Art der Verzerrung?","a":"UTM: gleichmaessig ueber die Zone verteilt.\nGK: am Hauptmeridian massstabstreu, mit zunehmender Entfernung zunehmend ungenauer.","tags":["Vermessung","Koordinaten","UTM"],"reps":0,"ease":2.5,"interval":0,"due":1781373445813,"created":1781287045813,"last":null,"learning":true,"lapses":0,"explain":"GK ist am Mittelmeridian exakt, wird aber zu den Rändern hin immer ungenauer. UTM verteilt die Verzerrung gleichmäßiger über die Zone durch den Maßstabsfaktor 0,996 — das Zentrum ist leicht verkleinert, die Ränder sind dadurch weniger stark vergrößert. UTM ist daher homogener für größere Gebiete geeignet."},{"id":"vm-015","q":"Erfolgt die Koordinatenberechnung auf dem Bezugshorizont - und warum?","a":"Ja. Die Messungen werden auf die Bezugsebene (Bezugshorizont / NN) projiziert, damit die Koordinaten einheitlich und massstabsgerecht sind.","tags":["Vermessung","Koordinaten"],"reps":0,"ease":2.5,"interval":0,"due":1781373445813,"created":1781287045813,"last":null,"learning":true,"lapses":0,"explain":"Messpunkte liegen in der Realität auf unterschiedlichen Höhen, was Strecken auf der Geländeoberfläche länger erscheinen lässt als ihre horizontale Projektion. Durch Projektion auf den Bezugshorizont (NN) werden alle Koordinaten vergleichbar und lagegenau. Ohne diese Reduktion würden Koordinaten höherer Lagen systematisch zu groß ausfallen."},{"id":"vm-016","q":"Geografische Koordinaten 52.52 N, 13.40 E - was wird angegeben?","a":"Noerdliche Breite und oestliche Laenge (ein Punkt in Deutschland liegt auf noerdlicher Breite und oestlicher Laenge).","tags":["Vermessung","Koordinaten"],"reps":0,"ease":2.5,"interval":0,"due":1781373445813,"created":1781287045813,"last":null,"learning":true,"lapses":0,"explain":"Geografische Koordinaten beschreiben einen Punkt durch seinen Winkelabstand vom Äquator (Breite, N/S) und vom Nullmeridian in Greenwich (Länge, E/W). 52,52° N, 13,40° E ist Berlin: 52,52° nördlich des Äquators, 13,40° östlich von Greenwich. Diese Angaben gelten für das Ellipsoid, nicht für eine ebene Karte."},{"id":"vm-017","q":"Mit welchen Parametern bestimmt man den Quadranten eines Richtungswinkels?","a":"Ueber die Vorzeichen der Koordinatendifferenzen (Delta Rechts/Y und Delta Hoch/X). Der Winkel selbst wird in gon angegeben (nicht das Vorzeichen).","tags":["Vermessung","Koordinaten"],"reps":0,"ease":2.5,"interval":0,"due":1781373445813,"created":1781287045813,"last":null,"learning":true,"lapses":0,"explain":"Der Richtungswinkel (Azimut) in der Ebene gibt immer einen Wert zwischen 0 und 400 gon an. Um den richtigen Quadranten zu bestimmen, schaut man auf die Vorzeichen der Koordinatendifferenzen: ΔY (Ost-West) und ΔX (Nord-Süd). Positives ΔY = östlich, negatives ΔY = westlich; positives ΔX = nördlich, negatives ΔX = südlich. Der berechnete Winkel selbst ist immer positiv."},{"id":"vm-018","q":"Wie wird die Erde in der Vermessung modelliert?","a":"Als Ellipsoid (Lage, Karten, GPS) und als Geoid (genaue Hoehenbestimmung); die Kugel nur als grobe Naeherung.","tags":["Vermessung","Koordinaten"],"reps":0,"ease":2.5,"interval":0,"due":1781373445813,"created":1781287045813,"last":null,"learning":true,"lapses":0,"explain":"Das Ellipsoid (z.B. GRS80) beschreibt die Form der Erde als abgeplattete Kugel — ideal für Lagekoordinaten und GPS-Auswertung. Das Geoid ist eine physikalische Fläche gleichen Schweredrucks (entspricht dem mittleren Meeresspiegel) und ist das Bezugssystem für Höhen. Die einfache Kugel reicht nur für grobe Überschlagsrechnungen (Fehler bis mehrere km)."},{"id":"vm-019","q":"Um welches Koordinatensystem handelt es sich bei Werten wie Y=3265..., X=5480...?","a":"Um ein ebenes kartesisches (rechtwinkliges) Koordinatensystem - die Gauss-Krueger-Abbildung mit Rechts- und Hochwert.","tags":["Vermessung","Koordinaten","GK"],"reps":0,"ease":2.5,"interval":0,"due":1781373445813,"created":1781287045813,"last":null,"learning":true,"lapses":0,"explain":"Y=3.265.xxx und X=5.480.xxx sind typische GK-Koordinaten: Die führende \"3\" im Y-Wert ist die Kennzahl des Meridianstreifens (Mittelmeridian = 3×3 = 9° Ost). Der X-Wert (~5,5 Mio.) entspricht ca. 5.500 km nördlich des Äquators, also Süddeutschland. Das System ist kartesisch-eben, nicht geografisch (keine Winkelangaben)."}],"created":1781287045813,"fach":"Vermessung"},{"id":"vm-d2","name":"Nivellement & Hoehenmessung","desc":"Nivellier, Libellen, Latten, Nivellieren aus der Mitte, Hoehenbezug","emoji":"📏","color":"#10b981","cards":[{"id":"vm-101","q":"Womit beginnt ein Nivellement?","a":"Mit einem Rueckblick.","tags":["Vermessung","Nivellement"],"reps":0,"ease":2.5,"interval":0,"due":1781373445813,"created":1781287045813,"last":null,"learning":true,"lapses":0,"explain":"Das Nivellement beginnt immer mit einem Rückblick auf einen Festpunkt mit bekannter Höhe. So berechnet das Gerät seine eigene Instrumentenhöhe (= Festpunkthöhe + Rückblickablesung). Ohne diesen Anschluss an einen bekannten Höhenpunkt wären alle Folgehöhen relativ, nicht absolut."},{"id":"vm-102","q":"Womit endet ein Nivellement?","a":"Mit einem Vorblick.","tags":["Vermessung","Nivellement"],"reps":0,"ease":2.5,"interval":0,"due":1781373445813,"created":1781287045813,"last":null,"learning":true,"lapses":0,"explain":"Der letzte Blick im Nivellement ist ein Vorblick auf den Zielpunkt oder Abschlusspunkt. Damit ist der Höhenunterschied vollständig: Instrumentenhöhe minus Vorblickablesung = Höhe des Zielpunkts. Endet man nicht mit einem Vorblick, hat man keinen auswertbaren Abschluss der Messreihe."},{"id":"vm-103","q":"Was versteht man unter \"Nivellieren aus der Mitte\"?","a":"Das Instrument steht mittig zwischen Rueckblick- und Vorblickpunkt (gleiche Zielweiten). Dadurch heben sich Ziellinienfehler, Erdkruemmung und Refraktion auf.","tags":["Vermessung","Nivellement"],"reps":0,"ease":2.5,"interval":0,"due":1781373445813,"created":1781287045813,"last":null,"learning":true,"lapses":0,"explain":"Beim Nivellieren aus der Mitte steht das Instrument möglichst gleich weit von Rückblick- und Vorblickpunkt entfernt. Dadurch wirken Ziellinienfehler, Erdkrümmung und atmosphärische Refraktion auf beide Ablesungen gleich stark — und heben sich bei der Differenzbildung auf. Das ist der wichtigste Qualitätsgrundsatz des Nivellements."},{"id":"vm-104","q":"Horizontierung evtl. verstellt, Zeitdruck - was tun?","a":"Weitermachen: Bei gleichen Zielweiten kompensiert sich der Ziellinienfehler, man erhaelt dennoch die richtige Hoehendifferenz. Zwischenblicke besser als Wechselpunkte aufnehmen.","tags":["Vermessung","Nivellement"],"reps":0,"ease":2.5,"interval":0,"due":1781373445813,"created":1781287045813,"last":null,"learning":true,"lapses":0,"explain":"Solange die Zielweiten bei Rück- und Vorblick annähernd gleich sind, kompensiert sich ein Ziellinienfehler vollständig. Also einfach weitermessen und Zwischenblicke als solche kennzeichnen (nicht als Wechselpunkt verwenden). Nur Zwischenblicke auf wichtige Punkte prüfen — sie hängen direkt von der Instrumentenhöhe ab und erben den Fehler unkorrigiert."},{"id":"vm-105","q":"Instrument versehentlich bewegt (nicht mehr horizontal) - was tun?","a":"Den laufenden Rueck- + Vorblick mit der falschen Einstellung beenden (die Hoehendifferenz hebt sich bei gleichen Zielweiten auf). Dann einen neuen Wechselpunkt mit korrekter Einstellung waehlen und weitermachen; auf Zwischenblicke verzichten.","tags":["Vermessung","Nivellement"],"reps":0,"ease":2.5,"interval":0,"due":1781373445813,"created":1781287045813,"last":null,"learning":true,"lapses":0,"explain":"Wenn das Instrument versehentlich bewegt wurde, ist die Instrumentenhöhe unbekannt geworden. Die laufende Rückblick-Vorblick-Kombination kann noch gerettet werden, wenn die Zielweiten gleich sind. Danach muss ein neuer Wechselpunkt mit korrekt horizontiertem Gerät als Ausgangspunkt dienen — Zwischenblicke der fehlerhaften Standlinie sind unbrauchbar."},{"id":"vm-106","q":"Wie prueft man, ob ein Nivellier justiert werden muss?","a":"Durch Messung in zwei Lagen bzw. Feldpruefung (Vergleich der Messung \"aus der Mitte\" mit einer einseitigen Aufstellung).","tags":["Vermessung","Nivellement"],"reps":0,"ease":2.5,"interval":0,"due":1781373445813,"created":1781287045813,"last":null,"learning":true,"lapses":0,"explain":"Man stellt das Instrument nahe an eine Latte und liest ab (einseitige Aufstellung), dann misst man dieselbe Höhendifferenz aus der Mitte. Stimmen die Ergebnisse nicht überein, ist die Zielachse nicht korrekt justiert. Die maximale zulässige Abweichung ist normiert; bei Überschreitung muss das Gerät justiert werden."},{"id":"vm-107","q":"Was ist ein automatischer Nivellier?","a":"Ein Nivellier mit automatisch horizontierter Zielachse (interner Kompensator). Grob muss er trotzdem mit den Nivellierschrauben eingestellt werden.","tags":["Vermessung","Nivellement"],"reps":0,"ease":2.5,"interval":0,"due":1781373445813,"created":1781287045813,"last":null,"learning":true,"lapses":0,"explain":"Ältere Nivelliere mussten mühsam mit drei Fußschrauben exakt waagerecht gestellt werden. Beim automatischen Nivellier reicht es, die Dosenlibelle grob einzustellen — ein interner Kompensator (Pendelkompensator) justiert die Zielachse automatisch innerhalb eines kleinen Bereichs. Das spart Zeit und reduziert Bedienerfehler erheblich."},{"id":"vm-108","q":"Wie horizontiert ein Nivellier automatisch?","a":"Ueber einen internen Kompensator (Pendel), der ueber die Gravitation wirkt.","tags":["Vermessung","Nivellement"],"reps":0,"ease":2.5,"interval":0,"due":1781373445813,"created":1781287045813,"last":null,"learning":true,"lapses":0,"explain":"Der Kompensator ist ein frei hängendes Pendel oder ein mit Flüssigkeit gedämpftes Element im Strahlengang. Durch die Schwerkraft hängt es immer senkrecht und lenkt den Lichtstrahl so ab, dass die Zielachse trotz leichter Geräteneigung horizontal bleibt. Das Prinzip ähnelt einem Lot — was senkrecht hängt, zeigt immer in Richtung Erdmittelpunkt."},{"id":"vm-109","q":"Wie heissen Nivelliere mit automatischer Ablesung?","a":"Digitalnivelliere.","tags":["Vermessung","Nivellement"],"reps":0,"ease":2.5,"interval":0,"due":1781373445813,"created":1781287045813,"last":null,"learning":true,"lapses":0,"explain":"Digitalnivelliere lesen die Latte automatisch ab (kein Ablesen durch das Okular nötig), speichern die Messwerte digital und berechnen Höhen und Distanzen automatisch. Sie sind deutlich schneller und fehlerärmer als analoge Geräte, benötigen aber Codelatten statt normaler E-Teilungslatten."},{"id":"vm-110","q":"Welches zusaetzliche Element steckt im Strahlengang eines Digitalnivelliers?","a":"Ein CCD-Sensor.","tags":["Vermessung","Nivellement"],"reps":0,"ease":2.5,"interval":0,"due":1781373445813,"created":1781287045813,"last":null,"learning":true,"lapses":0,"explain":"Ein CCD-Sensor (Charge-Coupled Device) ist ein lichtempfindlicher Chip — derselbe Typ wie in Digitalkameras. Er nimmt das Bild des Lattencodes auf und wandelt es in elektrische Signale um, die die interne Software auswertet. Ohne CCD-Sensor wäre eine automatische Ablesung nicht möglich."},{"id":"vm-111","q":"Wie funktioniert ein Digitalnivellier?","a":"Der CCD-Sensor wandelt das von der Barcode-/Codelatte reflektierte Licht in Signale um und bestimmt automatisch Hoehe (und Distanz).","tags":["Vermessung","Nivellement"],"reps":0,"ease":2.5,"interval":0,"due":1781373445813,"created":1781287045813,"last":null,"learning":true,"lapses":0,"explain":"Das Digitalnivellier sendet Licht auf eine Codelatte mit aufgedrucktem Strichcode. Der CCD-Sensor nimmt das reflektierte Muster auf, vergleicht es mit einem gespeicherten Referenzmuster und berechnet daraus die Lattenhöhe (Ablesung) und die Distanz zur Latte. Alles passiert in Sekundenbruchteilen automatisch."},{"id":"vm-112","q":"Welche Funktion hat eine elektronische Libelle?","a":"Hoehere Genauigkeit und Empfindlichkeit gegenueber Neigungen; elektronische Neigungsanzeige.","tags":["Vermessung","Nivellement"],"reps":0,"ease":2.5,"interval":0,"due":1781373445813,"created":1781287045813,"last":null,"learning":true,"lapses":0,"explain":"Die elektronische Libelle misst die Neigung des Geräts viel genauer als das Auge es an einer optischen Libelle könnte. Sie gibt die genaue Neigung digital aus und ermöglicht eine präzisere Horizontierung, manchmal auch eine automatische Korrektur. Besonders bei modernen Tachymetern ist sie Standard."},{"id":"vm-113","q":"Worin unterscheiden sich Dosen- und Roehrenlibelle?","a":"In Ablesegenauigkeit (Roehrenlibelle genauer), Groesse und Verbindung mit dem Geraet. Dosenlibelle = Grobhorizontierung (Neigung in alle Richtungen), Roehrenlibelle = Feinhorizontierung (eine Richtung).","tags":["Vermessung","Nivellement"],"reps":0,"ease":2.5,"interval":0,"due":1781373445813,"created":1781287045813,"last":null,"learning":true,"lapses":0,"explain":"Die Dosenlibelle (runde Blase in einem kreisrunden Gehäuse) zeigt Neigungen in alle Richtungen und dient zur groben Horizontierung. Die Röhrenlibelle (Blase in einem langen Glasrohr) reagiert nur auf Neigungen in einer Achse und ist viel empfindlicher — für die Feinjustierung in einer Richtung. Merkhilfe: Dose = grob = alles, Röhre = fein = eine Achse."},{"id":"vm-114","q":"Wie verlaeuft die justierte Zielachse eines Nivelliers?","a":"Waagerecht / horizontal.","tags":["Vermessung","Nivellement"],"reps":0,"ease":2.5,"interval":0,"due":1781373445813,"created":1781287045813,"last":null,"learning":true,"lapses":0,"explain":"Nach der Justierung verläuft die Zielachse des Nivelliers exakt waagerecht — also senkrecht zur Schwerkraftrichtung. Nur so ist garantiert, dass die Lattenablesung den tatsächlichen Höhenunterschied ergibt. Eine nicht horizontal justierte Zielachse erzeugt systematische Fehler in jeder einzelnen Messung."},{"id":"vm-115","q":"Warum haengt die Hoehenmessung mit der Schwerkraft zusammen?","a":"Hoehen beziehen sich auf das Geoid (Aequipotentialflaeche der Schwere, NN). Wasser fliesst entlang der Schwereflaechen - die Hoehe beschreibt die Lage im Schwerefeld (m ue. NN).","tags":["Vermessung","Nivellement","Hoehe"],"reps":0,"ease":2.5,"interval":0,"due":1781373445813,"created":1781287045813,"last":null,"learning":true,"lapses":0,"explain":"Höhe ist kein geometrisch-beliebiger Abstand, sondern beschreibt, wie weit ein Punkt im Schwerefeld der Erde \"oben\" liegt. Das Geoid ist die Fläche, auf der überall gleicher Schweredruck herrscht — Wasser fließt immer bergab, also von höherem zu niedrigerem Geoid-Potential. NN (Normal-Null) entspricht dem mittleren Meeresspiegel als Nullfläche dieses Schwerefelds."},{"id":"vm-116","q":"Worauf bezieht sich die geodaetische Hoehenmessung?","a":"Auf das Geoid (Gebrauchshoehen, NN). Ellipsoidische Hoehen (GPS) beziehen sich dagegen auf das Rotationsellipsoid.","tags":["Vermessung","Nivellement","Hoehe"],"reps":0,"ease":2.5,"interval":0,"due":1781373445813,"created":1781287045813,"last":null,"learning":true,"lapses":0,"explain":"GPS-Empfänger messen ellipsoidische Höhen (h) — den geometrischen Abstand vom Referenzellipsoid. Für die Praxis (Bauwesen, Karten) braucht man Gebrauchshöhen (H) über NN, die sich am Schwerefeld orientieren. Die Differenz heißt Geoidundulation (N): h = H + N. In Deutschland weicht das Geoid bis zu 50 m vom Ellipsoid ab."},{"id":"vm-117","q":"Welche Messkomponenten braucht ein Nivellement mit Digitalnivellier (+ Besonderheiten)?","a":"Digitalnivellier (autom. Horizontierung), Barcode-/Codelatte (darf nicht verkratzt/verschmutzt sein) und Stativ. Moeglichst alles vom selben Hersteller.","tags":["Vermessung","Nivellement"],"reps":0,"ease":2.5,"interval":0,"due":1781373445813,"created":1781287045813,"last":null,"learning":true,"lapses":0,"explain":"Digitalnivellier und Codelatte müssen aufeinander abgestimmt sein (gleiches Codierungssystem), sonst kann das Gerät die Latte nicht auslesen. Das Stativ sollte stabil und schwingungsfrei sein. Verschmutzte oder zerkratzte Codelatten führen zu Auslesefehlern — regelmäßige Reinigung ist wichtig."},{"id":"vm-118","q":"Welche Arten der Lattenteilung gibt es?","a":"E-Teilung, Schachbrettteilung und Codelatte (Barcode).","tags":["Vermessung","Nivellement"],"reps":0,"ease":2.5,"interval":0,"due":1781373445813,"created":1781287045813,"last":null,"learning":true,"lapses":0,"explain":"Die E-Teilung (Zentimeterteilung mit schwarzen und weißen Feldern) ist die klassische visuelle Ablesung. Die Schachbrettteilung erleichtert die Ablesung in zwei Richtungen. Die Codelatte (Barcode-Muster) ist für Digitalnivelliere entwickelt worden und ermöglicht die automatische Ablesung. Jede Teilung hat ihren Einsatzbereich."},{"id":"vm-119","q":"Wie nennt man die klassische Einteilung der Nivellierlatte?","a":"E-Einteilung (E-Teilung).","tags":["Vermessung","Nivellement"],"reps":0,"ease":2.5,"interval":0,"due":1781373445813,"created":1781287045813,"last":null,"learning":true,"lapses":0,"explain":"Die E-Einteilung leitet sich vom Buchstaben E ab: Die schwarzen Felder auf weißem Grund bilden E-förmige Muster, die in Zentimetern abgelesen werden. Sie ist die älteste und verbreitetste Teilung für optische Nivelliere. Millimeter werden durch Schätzung zwischen den cm-Strichen interpoliert."},{"id":"vm-120","q":"Welchen Nachteil hat die E-Teilung?","a":"Optische Taeuschungen koennen zu Ablesefehlern fuehren.","tags":["Vermessung","Nivellement"],"reps":0,"ease":2.5,"interval":0,"due":1781373445813,"created":1781287045813,"last":null,"learning":true,"lapses":0,"explain":"Bei der E-Teilung muss der Beobachter Millimeterstellen schätzen (interpolieren), weil die Latte nur in cm eingeteilt ist. Dabei können optische Täuschungen (helle Felder wirken breiter) zu systematischen Fehlern führen. Dieser Nachteil entfällt bei der Codelatte mit automatischer digitaler Ablesung."},{"id":"vm-121","q":"Wie liest man die Entfernung zur Nivellierlatte ab?","a":"Ueber die Distanzstriche: Lattenabschnitt zwischen oberem und unterem Distanzstrich (in cm) x 100 = Entfernung in m.","tags":["Vermessung","Nivellement"],"reps":0,"ease":2.5,"interval":0,"due":1781373445813,"created":1781287045813,"last":null,"learning":true,"lapses":0,"explain":"In Fernrohren von Nivellieren gibt es zusätzlich zur Hauptzielachse zwei horizontale Distanzstriche. Die Differenz der Lattenablesungen an diesen Fäden, multipliziert mit 100, ergibt die Entfernung in Metern. Beispiel: Oberer Strich liest 1,42 m, unterer 1,32 m → Differenz 0,10 m × 100 = 10 m Entfernung."}],"created":1781287045813,"fach":"Vermessung"},{"id":"vm-d3","name":"Instrumente, Aufnahme & GNSS","desc":"Tachymeter, Laserscanner, Trimble S6, LoD, Satellitenpositionierung","emoji":"🛰️","color":"#f59e0b","cards":[{"id":"vm-201","q":"Womit beginnt die Aufnahme mit einem Tachymeter?","a":"Mit dem Horizontieren und Zentrieren des Geraets ueber dem Standpunkt.","tags":["Vermessung","Instrumente"],"reps":0,"ease":2.5,"interval":0,"due":1781373445813,"created":1781287045813,"last":null,"learning":true,"lapses":0,"explain":"Bevor gemessen werden kann, muss das Tachymeter exakt über dem bekannten Standpunkt zentriert sein (Lot/Zentrierlaser) und waagerecht stehen (Libelle). Erst dann kann die Software die Standpunkthöhe und -koordinaten übernehmen. Fehler bei der Zentrierung übertragen sich direkt auf alle Messwerte."},{"id":"vm-202","q":"Welche Nachteile hat ein Laserscanner gegenueber dem Tachymeter bei der Bestandsaufnahme?","a":"Es lassen sich keine gezielten, repraesentativen Einzelpunkte einlesen; Ist-Lage und Ist-Hoehe sind kaum direkt bewertbar; grosse Punktwolke mit aufwaendiger Nachbearbeitung.","tags":["Vermessung","Instrumente"],"reps":0,"ease":2.5,"interval":0,"due":1781373445813,"created":1781287045813,"last":null,"learning":true,"lapses":0,"explain":"Ein Laserscanner erfasst Millionen Punkte automatisch, aber wahllos — er wählt nicht aus, welcher Punkt relevant ist. Bei der Bestandsaufnahme interessieren oft nur bestimmte Kanten, Achsen oder Höhenpunkte, die man mit dem Tachymeter gezielt anmessen kann. Die riesige Punktwolke des Scanners muss aufwändig nachbearbeitet werden, bevor sie nutzbar ist."},{"id":"vm-203","q":"Was bedeutet beim Trimble S6 das Messprogramm \"Stationierung +\"?","a":"Freie Stationierung ueber mehrere Anschlusspunkte mit Netzausgleich - fuer bessere Qualitaetskontrolle; reduziert systematische Fehler.","tags":["Vermessung","Instrumente"],"reps":0,"ease":2.5,"interval":0,"due":1781373445813,"created":1781287045813,"last":null,"learning":true,"lapses":0,"explain":"Freie Stationierung bedeutet: Das Tachymeter steht an einem beliebigen Standort (nicht auf einem bekannten Punkt). Durch Messung zu mehreren Anschlusspunkten mit bekannten Koordinaten berechnet die Software die genaue Standpunktposition. Das Pluszeichen bei \"Stationierung+\" steht für den Ne

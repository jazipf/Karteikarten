 nächste Etage spart Mietkosten erheblich (Schalhaut kostet täglich Geld). Folgegewerke (Elektriker, Trockenbauer) können schneller beginnen, wenn die Decke frei ist. Frühausschalen verkürzt also die Gesamtbauzeit und reduziert Vorhaltekosten."},{"id":"bv-214","q":"Wie schalt man Unterzuege ein?","a":"Mit der Balkenzwinge (bis 60 cm Breite einzeln verwendbar)","tags":["Bauverfahren","Schalung"],"reps":0,"ease":2.5,"interval":0,"due":1781333299149,"created":1781246899149,"last":null,"learning":true,"lapses":0,"explain":"Die Balkenzwinge ist eine U-förmige Stahlkonstruktion, die den Schalkasten des Unterzugs zusammenhält. Bis 60 cm Breite reicht eine Zwinge. Breitere Unterzüge brauchen mehrere Zwingen oder eine Sonderkon struktion. Der Unterzug muss zusätzlich zu der Deckenschalung ausgeschalt werden — meistens zuerst der Unterzug, dann die Decke."},{"id":"bv-215","q":"Welche Schalungssysteme gibt es fuer Schachtschalung (Treppenhaus)?","a":"Rahmenschalung oder Traegerschalung, jedoch mit Ausschalhilfen:\nKeilholz\nSpindelbare Gelenkecke\nKlappecke","tags":["Bauverfahren","Schalung"],"reps":0,"ease":2.5,"interval":0,"due":1781333299149,"created":1781246899149,"last":null,"learning":true,"lapses":0,"explain":"Das Problem bei Schachtschalung: Der Innenumfang eines Treppenhauses ist kleiner als der Außenumfang. Die Innenschalung muss nach dem Betonieren nach innen (in den Schacht) herausgezogen werden — was nur geht, wenn sie kleiner ist als der Innenraum. Deshalb braucht man Ausschalhilfen, die die Schalung verkleinern: Keilholz (Schalung löst sich), Gelenkecke (Ecke klappt ein), Klappecke."},{"id":"bv-216","q":"Welche Besonderheiten hat die Schachtschalung?","a":"Innenumfang < Aussenumfang (Innenschalung muss kleiner sein)\nAusschalen in beengten Verhaeltnissen -> Ausschalhilfen zwingend\nKontinuierliche Verwendung ueber mehrere Stockwerke","tags":["Bauverfahren","Schalung"],"reps":0,"ease":2.5,"interval":0,"due":1781333299149,"created":1781246899149,"last":null,"learning":true,"lapses":0,"explain":"Die Schachtschalung muss über viele Stockwerke immer wieder eingesetzt werden — deshalb lohnt sich eine robuste, gut organisierte Lösung. Das Ausschalen in engen Schächten ist körperlich anspruchsvoll (wenig Platz, schwere Elemente). Klappecken und Gelenkecken sind eine konstruktive Lösung für dieses geometrische Problem."},{"id":"bv-217","q":"Wann benoetigt man eine Kletterschalung?","a":"Bei einfachen hohen Formen (z.B. Kerne, Treppenhaeuser)\nBei vorauseilender Bauweise (Kern ohne Decken)\nBetonierhooehen frei waehlbar\nWichtigstes Bauteil: Kletterkonus","tags":["Bauverfahren","Schalung"],"reps":0,"ease":2.5,"interval":0,"due":1781333299149,"created":1781246899149,"last":null,"learning":true,"lapses":0,"explain":"Kletterschalung (z.B. Doka SKE, Peri RCS) bleibt über eine Klettertraverse mit dem Beton verbunden und kann ohne Kran oder mit Kran eine Etage hochgezogen werden. Ideal für vorauseilende Bauweise: Kern wird 1-2 Etagen vor den Decken hochgezogen. Der Kletterkonus ist das Verbindungselement zwischen Schalungsträgern und Beton."},{"id":"bv-218","q":"Was versteht man unter vorauseilender Bauweise?","a":"Der Kern (z.B. Treppenhaus) wird unabhaengig vom Rest des Gebaeudes und ohne Decken vorgezogen hergestellt. Anschlussbewehrung muss vorgesehen werden.","tags":["Bauverfahren","Schalung"],"reps":0,"ease":2.5,"interval":0,"due":1781333299149,"created":1781246899149,"last":null,"learning":true,"lapses":0,"explain":"Bei vorauseilender Bauweise wird der Kern (oft Aufzugs- und Treppenhausschacht) unabhängig von den Geschossdecken gebaut und eilt diesen voraus. Das hat baupraktische Vorteile: Der Kran kann früher installiert werden, der Aufzugschacht steht früher für den Aufzugeinbau bereit. Anschlussbewehrung für die späteren Deckenanbindungen muss vorher eingeplant werden."},{"id":"bv-219","q":"Unterschied: Klettern mit Kran vs. automatisch?","a":"Mit Kran: nur Kletterkonus noetig, Kran muss ausreichend gross sein\nAutomatisch (Selbstkletterung): Kletterstange benoetigt, unabhaengig vom Kran","tags":["Bauverfahren","Schalung"],"reps":0,"ease":2.5,"interval":0,"due":1781333299149,"created":1781246899149,"last":null,"learning":true,"lapses":0,"explain":"Klettern mit Kran: Die Schalung hängt frei am Kran und wird nach oben gezogen — einfach, aber der Kran muss groß genug sein und ist während des Kletterns blockiert. Selbstkletterung (automatisch): Hydraulikzylinder auf einer Kletterstange klettern eigenständig nach oben — kein Kran nötig, die Schalung kann auch klettern wenn der Kran für andere Arbeiten gebraucht wird."},{"id":"bv-220","q":"Wann benoetigt man Gleitschalung?","a":"Hohe geometrisch einfache Bauteile (Silos, Kamine, Kerne)\nKontinuierliche Bauweise ohne Unterbrechung\nSchalungshoehe: 1,2 m (davon 0,2 m Frischbeton, 1,0 m abbindend)\nMax. Steiggeschwindigkeit: bis ca. 7 m/h\nNachteile: schlechte Oberflaechenqualitaet, Nachtarbeit noetig","tags":["Bauverfahren","Schalung"],"reps":0,"ease":2.5,"interval":0,"due":1781333299149,"created":1781246899149,"last":null,"learning":true,"lapses":0,"fig":"<svg viewBox=\"0 0 330 160\" xmlns=\"http://www.w3.org/2000/svg\" style=\"width:100%;max-width:330px;height:auto;font-family:ui-monospace,monospace\">\n<text x=\"10\" y=\"14\" fill=\"var(--txt)\" font-size=\"11\" font-weight=\"700\">Gleitschalung (h=1,2m, 3 Phasen)<\/text>\n<rect x=\"120\" y=\"30\" width=\"60\" height=\"30\" fill=\"var(--red)\" opacity=\".55\"/><text x=\"186\" y=\"50\" fill=\"var(--txt2)\" font-size=\"8.5\">Frischbeton 0,2m<\/text>\n<rect x=\"120\" y=\"60\" width=\"60\" height=\"50\" fill=\"var(--acc)\" opacity=\".5\"/><text x=\"186\" y=\"90\" fill=\"var(--txt2)\" font-size=\"8.5\">Erstarrung 0,8m<\/text>\n<rect x=\"120\" y=\"110\" width=\"60\" height=\"20\" fill=\"var(--blue)\" opacity=\".5\"/><text x=\"186\" y=\"124\" fill=\"var(--txt2)\" font-size=\"8.5\">Erhaertung 0,2m<\/text>\n<line x1=\"110\" y1=\"30\" x2=\"110\" y2=\"130\" stroke=\"var(--txt2)\" stroke-width=\"1.5\"/>\n<path d=\"M105 145 L115 145 M110 130 L110 150\" stroke=\"var(--acc)\" stroke-width=\"2\" marker-end=\"url(#up)\"/>\n<text x=\"40\" y=\"80\" fill=\"var(--txt2)\" font-size=\"8.5\" transform=\"rotate(-90 40 80)\">steigt<\/text>\n<\/svg>","explain":"Gleitschalung (z.B. Meva Gleitschalung) gleitet kontinuierlich (2-8 cm/h) nach oben. Die 1,2 m Schalungshöhe teilt sich auf: 0,2 m Frischbeton oben (noch flüssig), 1,0 m darunter abbindend. Unten tritt bereits fester Beton aus. Nachtarbeit ist nötig, weil das System nicht anhalten darf — sonst klebt die Schalung fest. Nachteile: raue Oberfläche, keine Geometrieänderungen möglich."},{"id":"bv-221","q":"Warum wird die Gleitschalung leicht konisch ausgebildet?","a":"Damit sie beim Klettern leichter aus dem Beton herausgleitet (Entschalungserleichterung). Mindesthoehe 1,2 m, damit unten genuegend fester Beton vorhanden ist.","tags":["Bauverfahren","Schalung"],"reps":0,"ease":2.5,"interval":0,"due":1781333299149,"created":1781246899149,"last":null,"learning":true,"lapses":0,"explain":"Die konische Verjüngung (Schalung ist oben etwas weiter als unten) erleichtert das Herausgleiten beim Hochschieben, weil sich die Schalung vom erhärtenden Beton löst. Ohne Konizität würde die Schalung durch die zunehmende Betonsteifigkeit festklemmen. Die Mindesthöhe von 1,2 m stellt sicher, dass unten immer genug fester Beton vorhanden ist, der die Schalung trägt."},{"id":"bv-222","q":"Nenne die Ziele der Schalungsplanung!","a":"Architektonische Vorgaben moeglichst kostenguenstig umsetzen\nMinimierung der Lohnkosten und des Materialeinsatzes\nErarbeitung einer Taktplanung zur Optimierung des Materialbedarfs","tags":["Bauverfahren","Schalung"],"reps":0,"ease":2.5,"interval":0,"due":1781333299149,"created":1781246899149,"last":null,"learning":true,"lapses":0,"explain":"Die Schalungsplanung bestimmt maßgebend die Wirtschaftlichkeit des Rohbaus. Ziel ist: so wenige verschiedene Elementformate wie möglich (reduziert Rüstaufwand), möglichst viele Wiederholungen (Umsteckfolge), minimale Verschnittmengen. Eine Taktplanung (Schalung Takt 1, Abschnitt A → nächste Woche Abschnitt B) optimiert den Materialbedarf."},{"id":"bv-223","q":"Welche Elementbreiten gibt es bei der Rundschalung?","a":"Innenelemente: 2,40 m\nAusssenelemente: 2,50 m\nLaengenausgleich erforderlich wenn volle Elementzahl nicht aufgeht","tags":["Bauverfahren","Schalung"],"reps":0,"ease":2.5,"interval":0,"due":1781333299149,"created":1781246899149,"last":null,"learning":true,"lapses":0,"explain":"Innenelemente (2,40 m) sind schmaler als Außenelemente (2,50 m), weil beim Runden der Umfang innen kleiner ist als außen. Die Differenz von 10 cm je Element summiert sich. Bei einer Rundschalung (z.B. Silo, Rundbau) muss man ausrechnen, wie viele Elemente für den jeweiligen Radius passen — der Rest wird mit Längenausgleichselementen überbrückt."},{"id":"bv-224","q":"Wie ergibt sich der Frischbetondruck auf senkrechte Schalungen?","a":"p = gamma x h (hydrostatisch bis zum Erstarrungspunkt)\nNach Erstarrungsende: kein weiterer Druckanstieg.\nAbhaengig von: Konsistenz (F1-F6/SVB), Steiggeschwindigkeit v, Frischbetonwichte gamma_c\nNormbezug: DIN 18218","tags":["Bauverfahren","Schalung","Frischbetondruck"],"reps":0,"ease":2.5,"interval":0,"due":1781333299149,"created":1781246899149,"last":null,"learning":true,"lapses":0,"fig":"<svg viewBox=\"0 0 330 180\" xmlns=\"http://www.w3.org/2000/svg\" style=\"width:100%;max-width:330px;height:auto;font-family:ui-monospace,monospace\">\n<text x=\"10\" y=\"14\" fill=\"var(--txt)\" font-size=\"11\" font-weight=\"700\">Frischbetondruck-Druckfigur<\/text>\n<line x1=\"55\" y1=\"28\" x2=\"55\" y2=\"165\" stroke=\"var(--line2)\" stroke-width=\"1.5\"/>\n<line x1=\"55\" y1=\"165\" x2=\"300\" y2=\"165\" stroke=\"var(--line2)\" stroke-width=\"1.5\"/>\n<text x=\"40\" y=\"34\" fill=\"var(--txt2)\" font-size=\"8.5\">h<\/text>\n<text x=\"285\" y=\"160\" fill=\"var(--txt2)\" font-size=\"8.5\">p_b<\/text>\n<polygon points=\"55,28 150,95 150,165 55,165\" fill=\"var(--blue-soft)\" stroke=\"var(--blue)\" stroke-width=\"2\"/>\n<line x1=\"150\" y1=\"95\" x2=\"150\" y2=\"165\" stroke=\"var(--blue)\" stroke-width=\"2\"/>\n<line x1=\"55\" y1=\"28\" x2=\"150\" y2=\"95\" stroke-dasharray=\"3 3\" stroke=\"var(--txt3)\" stroke-width=\"1\"/>\n<text x=\"158\" y=\"72\" fill=\"var(--txt2)\" font-size=\"8.5\">Knick bei h_s<\/text>\n<text x=\"90\" y=\"55\" fill=\"var(--txt2)\" font-size=\"8.5\">hydrostat.<\/text>\n<text x=\"100\" y=\"130\" fill=\"var(--blue)\" font-size=\"9\">p_b = const.<\/text>\n<text x=\"158\" y=\"92\" fill=\"var(--blue)\" font-size=\"9\">p_b,max<\/text>\n<\/svg>","explain":"Frischbeton verhält sich wie eine Flüssigkeit: Druck p = γ × h (spezifisches Gewicht × Höhe) — steigt linear mit der Tiefe. Aber: Sobald der Beton erstarrt (Erstarrungsende, bestimmt durch Knetbeutelversuch), steigt kein weiterer Druck. Der maximale Druck richtet sich nach der Betonhöhe, die in der Erstarrungszeit betoniert wurde. DIN 18218 regelt diese Berechnung."},{"id":"bv-225","q":"Welche Angaben braucht man zur Festlegung des Frischbetondrucks?","a":"Konsistenzklasse (F1-F6)\nSteiggeschwindigkeit v [m/h]\nFrischbetonwichte gamma_c [kN/m3]\nErstarrungsende t_e","tags":["Bauverfahren","Schalung","Frischbetondruck"],"reps":0,"ease":2.5,"interval":0,"due":1781333299149,"created":1781246899149,"last":null,"learning":true,"lapses":0,"explain":"Konsistenzklasse F1 (sehr steif) hat kurze Erstarrungszeit und niedriger Betondruck. F6/SVB (selbstverdichtend) fließt wie Wasser und erzeugt hydrostatischen Druck bis zur vollen Betonierhöhe. Steiggeschwindigkeit v: schneller betonieren → mehr Frischbeton gleichzeitig → höherer Druck. Frischbetonwichte γc ≈ 25 kN/m³. Erstarrungsende bestimmt, bis zu welcher Höhe Druck wirkt."},{"id":"bv-226","q":"Was versteht man unter einer Wanderlast beim Frischbetondruck?","a":"Beim Gleitschalen wandert der Bereich maximalen Drucks (hydrostatischer Druck der Frischbetonzone) mit der Schalung nach oben. Der Druckbereich wandert mit der Schalung.","tags":["Bauverfahren","Schalung","Frischbetondruck"],"reps":0,"ease":2.5,"interval":0,"due":1781333299149,"created":1781246899149,"last":null,"learning":true,"lapses":0,"fig":"<svg viewBox=\"0 0 330 180\" xmlns=\"http://www.w3.org/2000/svg\" style=\"width:100%;max-width:330px;height:auto;font-family:ui-monospace,monospace\">\n<text x=\"10\" y=\"14\" fill=\"var(--txt)\" font-size=\"11\" font-weight=\"700\">Frischbetondruck-Druckfigur<\/text>\n<line x1=\"55\" y1=\"28\" x2=\"55\" y2=\"165\" stroke=\"var(--line2)\" stroke-width=\"1.5\"/>\n<line x1=\"55\" y1=\"165\" x2=\"300\" y2=\"165\" stroke=\"var(--line2)\" stroke-width=\"1.5\"/>\n<text x=\"40\" y=\"34\" fill=\"var(--txt2)\" font-size=\"8.5\">h<\/text>\n<text x=\"285\" y=\"160\" fill=\"var(--txt2)\" font-size=\"8.5\">p_b<\/text>\n<polygon points=\"55,28 150,95 150,165 55,165\" fill=\"var(--blue-soft)\" stroke=\"var(--blue)\" stroke-width=\"2\"/>\n<line x1=\"150\" y1=\"95\" x2=\"150\" y2=\"165\" stroke=\"var(--blue)\" stroke-width=\"2\"/>\n<line x1=\"55\" y1=\"28\" x2=\"150\" y2=\"95\" stroke-dasharray=\"3 3\" stroke=\"var(--txt3)\" stroke-width=\"1\"/>\n<text x=\"158\" y=\"72\" fill=\"var(--txt2)\" font-size=\"8.5\">Knick bei h_s<\/text>\n<text x=\"90\" y=\"55\" fill=\"var(--txt2)\" font-size=\"8.5\">hydrostat.<\/text>\n<text x=\"100\" y=\"130\" fill=\"var(--blue)\" font-size=\"9\">p_b = const.<\/text>\n<text x=\"158\" y=\"92\" fill=\"var(--blue)\" font-size=\"9\">p_b,max<\/text>\n<\/svg>","explain":"Bei der Gleitschalung wandert die Frischbetonzone (und damit der maximale Betondruck) mit der Schalung nach oben. Die Schalung trägt immer die gleiche Höhe an Frischbeton (ca. 0,2 m oben + abbindender Beton) — der Druck ist also konstant und \"wandert\" mit. Anders als bei stehender Schalung, bei der der Druck nach dem Betonieren stehen bleibt."},{"id":"bv-227","q":"Welche Voraussetzungen gelten fuer die DIN 18218 Diagramme?","a":"Betoneinbringung von oben\nMax. Steiggeschwindigkeit 7 m/h\nVerdichtung mit Innenruettler\n(Bei Aussenruettler: hydrostatisches Verhalten -> hoeherer Druck!)","tags":["Bauverfahren","Schalung","Frischbetondruck"],"reps":0,"ease":2.5,"interval":0,"due":1781333299149,"created":1781246899149,"last":null,"learning":true,"lapses":0,"explain":"Die DIN 18218-Diagramme gelten für Standardbedingungen. Außenrüttler erzeugen deutlich höheren Betondruck, weil der Beton durch Vibration verflüssigt wird und das Erstarren verzögert wird. Die Diagramme setzen voraus, dass der Beton von oben eingebracht wird (kein Pumpen von unten). Bei Abweichungen muss der Betondruck separat berechnet werden."},{"id":"bv-228","q":"Wie bestimmt man das Erstarrungsende auf der Baustelle?","a":"Mit dem Knetbeutelversuch","tags":["Bauverfahren","Schalung","Frischbetondruck"],"reps":0,"ease":2.5,"interval":0,"due":1781333299149,"created":1781246899149,"last":null,"learning":true,"lapses":0,"explain":"Der Knetbeutelversuch ist eine einfache Feldmethode: Man nimmt etwas Frischbeton in einen Plastikbeutel und drückt ihn. Lässt er sich noch kneten wie Knetmasse = nicht erstarrt. Fühlt er sich fest an und federt zurück = Erstarrung hat begonnen. Das Erstarrungsende wird so auf der Baustelle ohne Labor ermittelt — wichtig für die Betondruckberechnung nach DIN 18218."},{"id":"bv-229","q":"Welche Sichtbetonklassen gibt es?","a":"SB1 (geringe Anforderungen) bis SB4 (besondere Anforderungen)\nAnforderungskriterien:\n- Textur\n- Porigkeit\n- Farbtongleichmaessigkeit\n- Ebenheit\n- Arbeits- und Schalhautfugen\n- Erprobungsflaechen","tags":["Bauverfahren","Schalung","Sichtbeton"],"reps":0,"ease":2.5,"interval":0,"due":1781333299149,"created":1781246899149,"last":null,"learning":true,"lapses":0,"explain":"SB1: Keine besonderen Anforderungen an Optik. SB4: Höchste Ansprüche (Parlamentsgebäude, Museen). Textur: Holzmaserung oder glatt? Porigkeit: Wie viele Poren sind akzeptabel? Farbtongleichmäßigkeit: Alle Flächen gleich grau? Ebenheit: Abweichungen nach DIN 18202. Erprobungs- und Referenzflächen sind vertraglich vereinbart."},{"id":"bv-230","q":"Wie laeuft die Planung einer Sichtbetonbaustelle ab?","a":"Gestalterische Idee -> Technisches Vorgehen -> Leistungsverzeichnis -> Ausschreibung -> Bauvertrag -> Realisierung -> Abnahme","tags":["Bauverfahren","Schalung","Sichtbeton"],"reps":0,"ease":2.5,"interval":0,"due":1781333299149,"created":1781246899149,"last":null,"learning":true,"lapses":0,"explain":"Die gestalterische Idee (Architekt) muss in technische Anforderungen (Schalung, Beton, Verfahren) übersetzt werden. Das LV beschreibt messbar, was die Baufirma schuldet. Der Bauvertrag legt Referenzflächen fest. Bei der Abnahme wird die ausgeführte Fläche mit der Referenzfläche verglichen. Dieser Prozess sichert ab, dass Erwartungen und Realität übereinstimmen."},{"id":"bv-231","q":"Unterschied Erprobungsflaeche vs. Referenzflaeche bei Sichtbeton?","a":"Erprobungsflaeche: wird ausgeschrieben, kann mehrere geben, dient zum Finden der richtigen Ausfuehrung\nReferenzflaeche: wird aus Erprobungsflaechen festgelegt, dient als Massstab fuer die Abnahme","tags":["Bauverfahren","Schalung","Sichtbeton"],"reps":0,"ease":2.5,"interval":0,"due":1781333299149,"created":1781246899149,"last":null,"learning":true,"lapses":0,"explain":"Erprobungsflächen werden gebaut um herauszufinden, welche Kombination aus Schalung, Beton, Trennmittel und Verarbeitungsweise die gewünschte Optik ergibt. Es kann mehrere Erprobungsflächen geben. Die beste wird als Referenzfläche festgelegt — sie ist ab dann der Maßstab für alle weiteren Flächen und für die Abnahme. Ohne Erprobung geht man das Risiko ein, am Ende nicht das zu bekommen, was man wollte."},{"id":"bv-232","q":"Was regelt die DIN 18202?","a":"Toleranzen im Hochbau:\nTab. 1: Grenzabmasse / Massabweichungen\nTab. 2: Winkeltoleranzen\nTab. 3: Ebenheitstoleranzen\nTab. 4: Fluchtabweichungen","tags":["Bauverfahren","Schalung","DIN 18202"],"reps":0,"ease":2.5,"interval":0,"due":1781333299149,"created":1781246899149,"last":null,"learning":true,"lapses":0,"fig":"<svg viewBox=\"0 0 330 152\" xmlns=\"http://www.w3.org/2000/svg\" style=\"width:100%;max-width:330px;height:auto;font-family:ui-monospace,monospace\">\n<text x=\"10\" y=\"14\" fill=\"var(--txt)\" font-size=\"11\" font-weight=\"700\">Masstoleranz-Begriffe<\/text>\n<line x1=\"40\" y1=\"70\" x2=\"300\" y2=\"70\" stroke=\"var(--line2)\" stroke-width=\"1.5\"/>\n<line x1=\"120\" y1=\"55\" x2=\"120\" y2=\"85\" stroke=\"var(--acc)\" stroke-width=\"2\"/><text x=\"100\" y=\"48\" fill=\"var(--acc)\" font-size=\"9\">Mindestmass<\/text>\n<line x1=\"230\" y1=\"55\" x2=\"230\" y2=\"85\" stroke=\"var(--acc)\" stroke-width=\"2\"/><text x=\"210\" y=\"48\" fill=\"var(--acc)\" font-size=\"9\">Hoechstmass<\/text>\n<line x1=\"175\" y1=\"50\" x2=\"175\" y2=\"90\" stroke=\"var(--blue)\" stroke-width=\"2.2\"/><text x=\"150\" y=\"108\" fill=\"var(--blue)\" font-size=\"9\">Nennmass (Soll)<\/text>\n<line x1=\"120\" y1=\"125\" x2=\"230\" y2=\"125\" stroke=\"var(--red)\" stroke-width=\"1.6\"/>\n<text x=\"128\" y=\"142\" fill=\"var(--red)\" font-size=\"9\">Masstoleranz = Hoechst - Mindest<\/text>\n<\/svg>","explain":"DIN 18202 definiert, welche Maßabweichungen beim Bauen toleriert werden. Tab. 1 (Grenzabmaße) legt fest, wie weit ein Bauteilmaß vom Sollmaß abweichen darf. Tab. 3 (Ebenheitstoleranzen) ist besonders wichtig für Decken und Wände: Es wird nicht nur die Abweichung vom Soll gemessen, sondern auch die lokale Unebenheit über definierte Messpunktabstände."},{"id":"bv-233","q":"Wann ueberprueft man die Ebenheit einer Decke?","a":"Vor dem Ausschalen der Decke, da die Decke danach aktiviert wird (Eigengewicht -> Durchbiegung).","tags":["Bauverfahren","Schalung","DIN 18202"],"reps":0,"ease":2.5,"interval":0,"due":1781333299149,"created":1781246899149,"last":null,"learning":true,"lapses":0,"explain":"Vor dem Ausschalen ist die Decke noch unbelastet (Eigengewicht wird von den Stützen getragen). Nach dem Ausschalen aktiviert sich das Eigengewicht der Decke → Durchbiegung. Ein Ebenheitsnachweis nach dem Ausschalen wäre verfälscht durch diese Durchbiegung. Deshalb muss man vor dem Ausschalen messen — zum Zeitpunkt der geringsten Verformung."},{"id":"bv-234","q":"Welche Mindestauflagerbreite gilt fuer Fertigteile?","a":"> 3,5 cm (allgemein)\nBei vorgespannten Decken: 6 cm","tags":["Bauverfahren","Schalung","Fertigteile"],"reps":0,"ease":2.5,"interval":0,"due":1781333299149,"created":1781246899149,"last":null,"learning":true,"lapses":0,"explain":"Die Mindestauflagerbreite stellt sicher, dass das Fertigteil sicher auf dem Widerlager aufliegt und nicht herausrutscht. Vorgespannte Deckenplatten (z.B. Spannbeton-Hohldecken) übertragen höhere Kräfte auf das Auflager und benötigen deshalb mehr Breite (6 cm). Generell gilt: Je größer die Spannweite und Last, desto mehr Auflagerfläche."},{"id":"bv-235","q":"Warum waessert man Halbfertigteile vor der Betonage?","a":"Um den Verbund zwischen der Fertigteilschale und dem Frischbeton herzustellen (verhindert Wasserentzug aus dem Frischbeton)","tags":["Bauverfahren","Schalung","Fertigteile"],"reps":0,"ease":2.5,"interval":0,"due":1781333299149,"created":1781246899149,"last":null,"learning":true,"lapses":0,"explain":"Halbfertigteile (z.B. Filigrandecken) sind eine dünne vorgefertigte Betonplatte, auf die Ortbeton aufgebracht wird. Ist die Filigranplatte zu trocken, entzieht sie dem Frischbeton das Wasser (Wasser wandert in den Kapillarporen der Platte) — der w/z-Wert des Frischbetons sinkt, der Verbund leidet. Vorwässern sättigt die Kapillaren und verhindert diesen Wasserentzug."},{"id":"bv-236","q":"Welche zulaessigen Frischbetondruecke haben die Schalungssysteme?","a":"Traegerschalung: 50 kN/m2\nRahmenschalung Stahl: ca. 80 kN/m2\nRahmenschalung Alu: ca. 60 kN/m2","tags":["Bauverfahren","Schalung","Frischbetondruck"],"reps":0,"ease":2.5,"interval":0,"due":1781337176284,"created":1781250776284,"last":null,"learning":true,"lapses":0,"explain":"Trägerschalung (Holzträger H20 + Schalhaut) ist flexibel aber druckbegrenzt (50 kN/m²). Rahmenschalung aus Stahl kann deutlich höhere Drücke aufnehmen (80 kN/m²), weil der Stahlrahmen steifer ist. Alu-Rahmenschalung ist leichter aber etwas weniger druckfest (ca. 60 kN/m²). Diese Werte sind bei der Betondruckberechnung nach DIN 18218 zu berücksichtigen."},{"id":"bv-237","q":"Welche Tragfaehigkeit haben Schalungsanker?","a":"Ankerstab 15 mm: 90 kN zulaessig (Bruch 195 kN)\nAnkerstab 20 mm: 150 kN zulaessig (Bruch 350 kN)\nAnkerdurchmesser und -zahl abhaengig von der Betoniergeschwindigkeit.","tags":["Bauverfahren","Schalung"],"reps":0,"ease":2.5,"interval":0,"due":1781337176284,"created":1781250776284,"last":null,"learning":true,"lapses":0,"explain":"Schalungsanker halten die zwei gegenüberliegenden Schalungswände zusammen und nehmen den Betondruck auf. Der Sicherheitsabstand zwischen zulässiger Last (90 kN) und Bruchlast (195 kN) ist der Sicherheitsfaktor ~2,2. Die Anker werden nach dem Ausschalen herausgezogen (mit Huellrohr) oder verbleiben einbetoniert (günstiger, aber nicht wiederverwendbar)."},{"id":"bv-238","q":"Unterschied Schalungsanker mit Huellrohr vs. einbetoniertem Ankerstab?","a":"Mit Huellrohr: Ankerstab wiederverwendbar, Huellrohr bleibt im Beton, Konenloecher werden verschlossen.\nEinbetoniert: Ankerstab als verlorenes Teil bleibt drin -> keine Hohlraeume, mit Wassersperre (Nockenblech) wasserdicht.","tags":["Bauverfahren","Schalung"],"reps":0,"ease":2.5,"interval":0,"due":1781337176284,"created":1781250776284,"last":null,"learning":true,"lapses":0,"fig":"<svg viewBox=\"0 0 330 168\" xmlns=\"http://www.w3.org/2000/svg\" style=\"width:100%;max-width:330px;height:auto;font-family:ui-monospace,monospace\">\n<text x=\"10\" y=\"14\" fill=\"var(--txt)\" font-size=\"11\" font-weight=\"700\">Schalungsanker mit Huellrohr<\/text>\n<rect x=\"40\" y=\"35\" width=\"16\" height=\"110\" fill=\"var(--surface3)\" stroke=\"var(--line2)\"/>\n<rect x=\"250\" y=\"35\" width=\"16\" height=\"110\" fill=\"var(--surface3)\" stroke=\"var(--line2)\"/>\n<rect x=\"80\" y=\"55\" width=\"146\" height=\"70\" fill=\"var(--blue-soft)\" stroke=\"var(--blue)\" stroke-dasharray=\"3 2\"/>\n<text x=\"120\" y=\"95\" fill=\"var(--blue)\" font-size=\"9\">Beton<\/text>\n<rect x=\"56\" y=\"86\" width=\"194\" height=\"8\" fill=\"var(--surface)\" stroke=\"var(--txt3)\"/>\n<line x1=\"48\" y1=\"90\" x2=\"258\" y2=\"90\" stroke=\"var(--acc)\" stroke-width=\"2.4\"/>\n<text x=\"100\" y=\"150\" fill=\"var(--acc)\" font-size=\"9\">Ankerstab (wiederverwendbar)<\/text>\n<text x=\"100\" y=\"80\" fill=\"var(--txt2)\" font-size=\"8.5\">Huellrohr bleibt im Beton<\/text>\n<text x=\"30\" y=\"160\" fill=\"var(--txt2)\" font-size=\"8.5\">Schalhaut | Schalhaut<\/text>\n<\/svg>","explain":"Mit Hüllrohr: Das Rohr bleibt im Beton, der Ankerstab wird herausgezogen und wieder verwendet. Im Beton bleibt ein Kanalgang, der verfüllt wird. Ohne Hüllrohr: Ankerstab bleibt im Beton — günstiger, weil kein Hüllrohr nötig, aber Ankerstab verloren. Bei Sichtbeton sieht man die Ankerstellen (Konuslöcher) — müssen je nach SB-Klasse gespachtelt werden."},{"id":"bv-239","q":"Wie viele Einsaetze halten die Schalhaut-Materialien?","a":"3-Schicht-Platte (Melaminharz, saugend): hohe Lebensdauer, fuer Decken\nFurniersperrholz (Phenolharz): 30-70 Einsaetze\nUnbeschichtetes Sperrholz: max. 5\nSpanplatte/OSB unbehandelt: 3-5 Einsaetze","tags":["Bauverfahren","Schalung"],"reps":0,"ease":2.5,"interval":0,"due":1781337176284,"created":1781250776284,"last":null,"learning":true,"lapses":0,"explain":"Furnierholzplatten (Siebdruck/Phenolfilm) halten 20-50 Einsätze, 3-Schicht-Platten mit Melaminharz je nach Qualität weniger. Stahl-Schalhaut ist am haltbarsten (100+ Einsätze) und teuerste im Anschaffung. Die Anzahl der Einsätze bestimmt die Wirtschaftlichkeit: Teure langlebige Schalung amortisiert sich nur bei vielen Wiederholungen."},{"id":"bv-240","q":"Was bedeuten V20 / V100 / V100G bei Spanplatten?","a":"V20: nicht wetterbestaendige Verleimung\nV100: begrenzt wetterbestaendige Verleimung\nV100G: wetterbestaendige Verleimung + Holzschutzmittel gegen Pilze","tags":["Bauverfahren","Schalung"],"reps":0,"ease":2.5,"interval":0,"due":1781337176284,"created":1781250776284,"last":null,"learning":true,"lapses":0,"explain":"V20: nicht witterungsbeständige Verleimung — nur für trockene Innenräume geeignet. V100: witterungsbeständig unter Feuchte — kurzzeitig außen einsetzbar. V100G: witterungsbeständig und gegen kochend heißes Wasser (G = gekocht) — höchste Anforderung für dauernd feuchte Umgebung. Im Schalungsbau mindestens V100, besser V100G."},{"id":"bv-241","q":"Unterschied saugende vs. nichtsaugende Schalung?","a":"Saugende Schalung: dunklere Oberflaeche, weniger Luftporen; muss vorgenaesst werden (Quellen -> Dichtigkeit), \"Verdursten\" verursacht Absanden.\nNichtsaugende Schalung: hellere Oberflaeche, verstaerkt Luftporen.","tags":["Bauverfahren","Schalung"],"reps":0,"ease":2.5,"interval":0,"due":1781337176284,"created":1781250776284,"last":null,"learning":true,"lapses":0,"explain":"Saugende Schalung (z.B. naturbelassenes Holz) nimmt Wasser aus dem Frischbeton auf — der w/z-Wert an der Oberfläche sinkt, der Beton wird dunkler und fester, weniger Luftporen sichtbar (kompaktere Oberfläche). Nichtsaugende Schalung (Phenolharz-beschichtet) gibt kein Wasser ab — der Beton haftet schlechter, die Oberfläche ist heller, mehr Luftporen sichtbar. Für SB4 oft nichtsaugend mit hellem Ergebnis gewünscht."},{"id":"bv-242","q":"Welche Trennmittelarten gibt es?","a":"Loesemittelhaltig: niedrige Viskositaet, duenner Auftrag, schlechte Hygiene/Umwelt\nLoesemittelfrei: hohe Viskositaet, Ueberschussabtrag noetig, gute Hygiene\nWaessrige Emulsion: duenner Auftrag, vor Frost schuetzen, gute Umweltvertraeglichkeit","tags":["Bauverfahren","Schalung"],"reps":0,"ease":2.5,"interval":0,"due":1781337176284,"created":1781250776284,"last":null,"learning":true,"lapses":0,"explain":"Lösemittelhaltige Trennmittel: dünner Auftrag, gute Trennwirkung, aber schlechte Ökologie und Gesundheit (Lösemitteldämpfe). Wasserhaltige (Emulsionen): umweltfreundlicher, aber dicker Auftrag und schlechtere Trennwirkung bei kaltem Wetter. Reine Öle (Biodiesel, Pflanzenöl): biologisch abbaubar, aber begrenzte Trennwirkung. Wachshaltige Mittel: sehr gute Trennwirkung, hohe Qualität."},{"id":"bv-243","q":"Welche Aufgaben haben Trennmittel?","a":"Laengere Haltbarkeit / Schalung konservieren\nBetonhaftung reduzieren\nEinfachere Ausschalung\nReinigungsaufwand minimieren","tags":["Bauverfahren","Schalung"],"reps":0,"ease":2.5,"interval":0,"due":1781337176284,"created":1781250776284,"last":null,"learning":true,"lapses":0,"explain":"Trennmittel bilden einen Film zwischen Schalung und Beton — dieser verhindert das Kleben und erlaubt das Lösen ohne Beschädigung beider Oberflächen. Gleichzeitig konserviert das Trennmittel die Schalung (verhindert Aufquellen von Holz, Rosten von Stahl). Falsches Trennmittel kann Betonoberfläche beschädigen (Flecken, Farbveränderungen) — besonders kritisch bei Sichtbeton."},{"id":"bv-244","q":"Nenne die Herstellschritte einer Wandschalung!","a":"1. Vorbereiten (Stellflaeche reinigen, Wand einmessen)\n2. Schalung vorstellen (waessern, oelen, ausrichten)\n3. Bewehrung einbauen\n4. Schalung schliessen (Anker einbauen, durchfaedeln, Gegenschalung, Anker spannen)\n5. Betonieren\n6. Ausschalen\n7. Nachbearbeiten","tags":["Bauverfahren","Schalung"],"reps":0,"ease":2.5,"interval":0,"due":1781337176284,"created":1781250776284,"last":null,"learning":true,"lapses":0,"explain":"Schritt 1: Standfläche reinigen, Wand einmessen (wo genau soll sie stehen?). Schritt 2: Erste Schalungsseite vorenstellen (mit Ausrichtern und Ankern). Schritt 3: Bewehrung einlegen und kontrollieren. Schritt 4: Gegenüberliegende Seite schließen. Schritt 5: Ausrichten (lot- und fluchtgerecht). Schritt 6: Betonieren. Schritt 7: Ausschalen (nach Erhärten). Reihenfolge nicht ändern — Bewehrung muss vor dem Schließen eingelegt werden."},{"id":"bv-245","q":"Wie wirkt die Temperatur auf den Frischbetondruck?","a":"Einbautemperatur > Referenztemperatur -> schnelleres Abbinden -> Druck sinkt (Reduktion 3 % je 1 K).\nEinbautemperatur < Referenztemperatur -> langsameres Abbinden -> Druck steigt (Erhoehung 3 % je 1 K; 5 % je 1 K bei F5/F6/SVB).","tags":["Bauverfahren","Schalung","Frischbetondruck"],"reps":0,"ease":2.5,"interval":0,"due":1781337176284,"created":1781250776284,"last":null,"learning":true,"lapses":0,"explain":"Bei höherer Betontemperatur reagiert der Zement schneller — das Erstarren beginnt früher, die Druckhöhe in der Schalung ist geringer (weniger Zeit bis Erstarren). Bei niedrigerer Temperatur: langsameres Erstarren → höhere Betondrücke → Schalung stärker belasten. Faustregel: Je 1°C über Referenz (15°C) sinkt der Druck um einen Korrekturfaktor. Im Winter besonders kritisch."},{"id":"bv-246","q":"Warum erhoeht ein Aussenruettler den Frischbetondruck?","a":"Bei Verdichtung mit Aussenruettler wirkt der hydrostatische Betondruck ueber die gesamte Hoehe bis t_E. Daher Schalungsruettler stufenweise an-/abschalten, nie alle gleichzeitig laufen lassen.","tags":["Bauverfahren","Schalung","Frischbetondruck"],"reps":0,"ease":2.5,"interval":0,"due":1781337176284,"created":1781250776284,"last":null,"learning":true,"lapses":0,"explain":"Innenrüttler (Tauchrüttler) verdichtet lokal — der Beton in der Rüttelzone verflüssigt sich kurz, erstarrt dann wieder schnell. Außenrüttler (am Schalungsträger angebracht) überträgt Schwingungen großflächig auf den Beton — der Beton bleibt länger flüssig und übt über die gesamte Schalhöhe hydrostatischen Druck aus. Deshalb gilt für Außenrüttler: voller hydrostatischer Druck, unabhängig von Steiggeschwindigkeit."},{"id":"bv-247","q":"Was ist eine Selbstkletterschalung?","a":"Bleibt durch Fuehrungsschuhe staendig mit dem Bauwerk verbunden. Umsetzen mit Kletterschienen + hydraulischer Hubeinrichtung -> kranunabhaengig und witterungsunabhaengig (auch bei hohem Wind).","tags":["Bauverfahren","Schalung"],"reps":0,"ease":2.5,"interval":0,"due":1781337176284,"created":1781250776284,"last":null,"learning":true,"lapses":0,"explain":"Die Selbstkletterschalung (z.B. Doka SKE) bleibt durch Führungsschuhe dauerhaft am Beton verankert — sie muss nicht von einem Kran gehoben werden. Hydraulikzylinder heben die Schalung nach oben. Vorteil: Kran ist für andere Arbeiten frei, schnelleres Klettern, unabhängig vom Kranbetrieb. Nachteil: höhere Investition als einfache Kletterschalung."},{"id":"bv-248","q":"Was ist eine Kletterplattform?","a":"Mehrere Klettereinrichtungen werden zu einer zentralen Steuereinheit verbunden; benachbarte Buehnen heben/senken synchron. Eine ganze Geschossplattform wird in einem Hub zum naechsten Betonierabschnitt gehoben.","tags":["Bauverfahren","Schalung"],"reps":0,"ease":2.5,"interval":0,"due":1781337176284,"created":1781250776284,"last":null,"learning":true,"lapses":0,"explain":"Eine Kletterplattform verbindet mehrere Klettereinheiten (z.B. 4 Seiten eines Kerns) zu einem gemeinsamen Arbeitsgerüst. Alle Einheiten klettern synchron — man hat eine durchgehende Plattform um den Kern. Darauf kann man sicher arbeiten (Bewehren, Betonieren, Frischhaltearbeiten) ohne Gerüst und Kran zu benötigen."},{"id":"bv-249","q":"Wie wird eine einseitige Wandschalung (z.B. gegen Verbauwand) abgetragen?","a":"Der Betondruck wird ueber den Schraegbock (A-Bock) mit Verankerung in den Untergrund abgeleitet (statt ueber Durchanker).","tags":["Bauverfahren","Schalung"],"reps":0,"ease":2.5,"interval":0,"due":1781337176284,"created":1781250776284,"last":null,"learning":true,"lapses":0,"explain":"Wenn eine Wand einseitig geschalt wird (z.B. Kellerwand gegen bestehende Verbauwand), wirkt der Betondruck gegen die Schalung — aber es gibt kein Gegenstück auf der anderen Seite. Der A-Bock (Schrägstrebe) überträgt diesen Druck schräg in den Untergrund (Fundament oder Bodenplatte). Anker im Boden nehmen die Zugkräfte auf. Dimensionierung nach dem zu erwartenden Betondruck."},{"id":"bv-250","q":"Welche Eigenschaften sind bei Sichtbeton NICHT zielsicher herstellbar?","a":"Gleicher Farbton aller Flaechen, porenfreie Flaechen, gleichmaessige Porenstruktur, ausbluehungsfreie Flaechen, scharfe Kanten ohne Ausbrueche, farbton-/texturgleiche Schalungsstoesse. (Quelle: DBV-Merkblatt Sichtbeton)","tags":["Bauverfahren","Schalung","Sichtbeton"],"reps":0,"ease":2.5,"interval":0,"due":1781337176284,"created":1781250776284,"last":null,"learning":true,"lapses":0,"explain":"Gleicher Farbton ist von vielen Faktoren abhängig (Zementlieferung, Wetter, Betontemperatur, Abbindezeit) — nicht kontrollierbar auf ±0. Porenfreie Flächen: Luftblasen entstehen beim Betonieren immer. Das Merkblatt Sichtbeton definiert deshalb \"Porigkeit\" in Klassen (P1-P4), nicht als \"porenfrei\". Wer \"keine Poren\" ausschreibt, wird immer Konflikte haben."},{"id":"bv-251","q":"Was ist das DBV-Merkblatt Sichtbeton im Vergleich zur DIN 18217?","a":"DBV-Merkblatt: Stand der Technik, Hinweise fuer Planung/Ausschreibung/Abnahme, gilt nicht verpflichtend (muss vertraglich eingebunden werden).\nDIN 18217: Norm fuer Betonflaechen/Schalungshaut.","tags":["Bauverfahren","Schalung","Sichtbeton"],"reps":0,"ease":2.5,"interval":0,"due":1781337176284,"created":1781250776284,"last":null,"learning":true,"lapses":0,"explain":"Die DIN 18217 (Betonflächen und Schalungshaut) ist eine ältere Norm, die Schalungsoberflächen klassifiziert. Das DBV-Merkblatt (Deutscher Beton- und Bautechnik-Verein) ist ein praxisnaher Leitfaden, der den aktuellen Stand der Technik beschreibt: Wie plant, schreibt man aus und nimmt man Sichtbeton ab? Es ist kein Gesetz, aber anerkannte Regel der Technik."},{"id":"bv-252","q":"Welche Bautechnischen Grundsaetze gelten fuer Sichtbeton-Einbau?","a":"Betonierlagen < 50 cm, Fallhoehe < 1,0 m (Entmischung), kurzer Zeitraum Ein-/Ausschalen, fachgerechte Verdichtung, Ruettelgassen, Mindestmischzeit > 60 s im Werk, Schutz vor Witterung.","tags":["Bauverfahren","Schalung","Sichtbeton"],"reps":0,"ease":2.5,"interval":0,"due":1781337176284,"created":1781250776284,"last":null,"learning":true,"lapses":0,"explain":"Betonierlage < 50 cm: Dicke Lagen lassen sich nicht gut verdichten. Fallhöhe < 1 m: Bei größerer Fallhöhe entmischt sich der Beton (Zuschlag fällt schneller als Zementleim). Kurzer Zeitraum zwischen Ein- und Ausschalen: Je länger die Schalung drin bleibt, desto mehr Abbindeprodukte bilden sich an der Oberfläche (Verfärbung). Nachbehandlung (Feuchthalten) verhindert Rissbildung durch Schwinden."},{"id":"bv-253","q":"Wie lautet die Formel fuer den Frischbetondruck p_b nach DIN 18218?","a":"p_b = (k x v_b + c) x f_t x f_y x f_v\n\nv_b = Steiggeschwindigkeit [m/h]\nk, c = Konsistenzbeiwerte\nf_t = Temperaturfaktor\nf_y = Wichtefaktor (f_y = gamma_vorh / 25)\nf_v = Verdichtungsfaktor\n\nObergrenze ist der hydrostatische Druck p_b = gamma_b x h.","tags":["Bauverfahren","Schalung","Frischbetondruck"],"reps":0,"ease":2.5,"interval":0,"due":1781338765099,"created":1781252365099,"last":null,"learning":true,"lapses":0,"fig":"<svg viewBox=\"0 0 330 180\" xmlns=\"http://www.w3.org/2000/svg\" style=\"width:100%;max-width:330px;height:auto;font-family:ui-monospace,monospace\">\n<text x=\"10\" y=\"14\" fill=\"var(--txt)\" font-size=\"11\" font-weight=\"700\">Frischbetondruck-Druckfigur<\/text>\n<line x1=\"55\" y1=\"28\" x2=\"55\" y2=\"165\" stroke=\"var(--line2)\" stroke-width=\"1.5\"/>\n<line x1=\"55\" y1=\"165\" x2=\"300\" y2=\"165\" stroke=\"var(--line2)\" stroke-width=\"1.5\"/>\n<text x=\"40\" y=\"34\" fill=\"var(--txt2)\" font-size=\"8.5\">h<\/text>\n<text x=\"285\" y=\"160\" fill=\"var(--txt2)\" font-size=\"8.5\">p_b<\/text>\n<polygon points=\"55,28 150,95 150,165 55,165\" fill=\"var(--blue-soft)\" stroke=\"var(--blue)\" stroke-width=\"2\"/>\n<line x1=\"150\" y1=\"95\" x2=\"150\" y2=\"165\" stroke=\"var(--blue)\" stroke-width=\"2\"/>\n<line x1=\"55\" y1=\"28\" x2=\"150\" y2=\"95\" stroke-dasharray=\"3 3\" stroke=\"var(--txt3)\" stroke-width=\"1\"/>\n<text x=\"158\" y=\"72\" fill=\"var(--txt2)\" font-size=\"8.5\">Knick bei h_s<\/text>\n<text x=\"90\" y=\"55\" fill=\"var(--txt2)\" font-size=\"8.5\">hydrostat.<\/text>\n<text x=\"100\" y=\"130\" fill=\"var(--blue)\" font-size=\"9\">p_b = const.<\/text>\n<text x=\"158\" y=\"92\" fill=\"var(--blue)\" font-size=\"9\">p_b,max<\/text>\n<\/svg>","explain":"Die DIN 18218-Formel berücksichtigt Steiggeschwindigkeit (v_b), Konsistenz (k, c-Werte je nach Klasse), Temperatur (f_t) und Betonzusammensetzung (f_v). Der Faktor f_y berücksichtigt die Wichte. Für SVB (selbstverdichtend) gilt immer volles hydrostatisches Verhalten (p_b = γ × h), unabhängig von der Steiggeschwindigkeit."},{"id":"bv-254","q":"Wie hoch ist die Betondruckfigur und was passiert bei langer Betonierzeit?","a":"Hoehe der Druckfigur: h_D = 5 x v_b (Beton belastet die Schalung ca. 5 h nach Erstarrungsbeginn nicht mehr).\nBei Betonierzeit > 5 h wandert die Druckfigur mit der Steiggeschwindigkeit nach oben (Wanderlast). Schalungshoehe h >= h_D.","tags":["Bauverfahren","Schalung","Frischbetondruck"],"reps":0,"ease":2.5,"interval":0,"due":1781338765099,"created":1781252365099,"last":null,"learning":true,"lapses":0,"explain":"Die Betondruckfigur hat die Höhe h_D = 5 × v_b, weil Beton typischerweise nach ca. 5 Stunden erstarrt. Bei sehr langer Betonierzeit (z.B. Unterbrechung) sinkt der Druck ab, weil der unten liegende Beton bereits erstarrt ist. Bei Unterbrechung > Erstarrungszeit kann von oben neu betoniert werden, ohne den alten Druck zu reaktivieren."},{"id":"bv-255","q":"Wie beeinflusst die Frischbetontemperatur den Druck (Bezug 15 Grad C)?","a":"Bezugstemperatur 15 Grad C.\nEinbringen > 15 C: p_b und h_s je ueberschreitendem Grad um 3 % vermindern (max. 30 %) - muss bis Erstarrungsende gehalten werden.\nEinbringen < 15 C: p_b und h_s je Grad unter 15 C um 3 % vergroessern.\nZementsorte: kein Einfluss.","tags":["Bauverfahren","Schalung","Frischbetondruck"],"reps":0,"ease":2.5,"interval":0,"due":1781338765099,"created":1781252365099,"last":null,"learning":true,"lapses":0,"explain":"Jeder Grad Celsius über 15°C beschleunigt das Erstarren — der Druck sinkt. Bei 25°C Einbautemperatur (10°C über Referenz) sinkt der Betondruck pro Meter Betoniergeschwindigkeit deutlich. Im Winter (< 15°C) steigt der Druck entsprechend — Schalung muss stärker bemessen werden oder Betoniergeschwindigkeit reduziert werden."},{"id":"bv-256","q":"Welche Windlast-Formel gilt fuer Schalungen und wann ist Wind kritisch?","a":"W = c_f x q x A\nW = Windlast, c_f = aerodyn. Beiwert, q = Staudruck, A = Bezugsflaeche.\nKritisch v.a. bei der ersten Wandseite oder beim Abstellen mit Richtstuetzen -> Richtstuetzen zug- und druckfest am Boden verankern, BEVOR das Element vom Kran geloest wird.\nBetonierbuehne: P = 0,3 kN (unguenstige Stellung).","tags":["Bauverfahren","Schalung","Frischbetondruck"],"reps":0,"ease":2.5,"interval":0,"due":1781338765099,"created":1781252365099,"last":null,"learning":true,"lapses":0,"explain":"Windlasten auf Schalungen werden wie auf Fassaden berechnet. c_f ist der aerodynamische Beiwert (abhängig von Geometrie: Wand, Scheibe). q ist der Staudruck nach Windzone und Höhe (aus DIN EN 1991-1-4). Wind ist besonders kritisch bei großflächigen Schalungen auf Stützen oder bei Gleit- und Kletterschalungen, die hoch und frei stehen."},{"id":"bv-257","q":"Welche 7 Anforderungen muss die Schalhaut erfuellen?","a":"1. Ausreichend stabil\n2. Bei Wasserzutritt formstabil\n3. Formbar\n4. Dicht (sonst laeuft Zementleim aus -> schlechte Oberflaeche)\n5. Frei von betonschaedlichen Stoffen (Holzzucker)\n6. Verschleissfest (hohe Einsatzzahlen)\n7. Geringe Materialkosten + gleichmaessige Oberflaeche (Sichtbeton)","tags":["Bauverfahren","Schalung"],"reps":0,"ease":2.5,"interval":0,"due":1781338765099,"created":1781252365099,"last":null,"learning":true,"lapses":0,"explain":"Stabilität: Schalhaut darf sich unter Betondruck nicht verbiegen. Formstabilität bei Feuchtigkeit: Holz quillt auf — muss dimensionsstabil bleiben. Formbarkeit: Rundungen müssen möglich sein. Dichtheit: Zementleim darf nicht auslaufen (sonst Kiesnester). Gute Trennbarkeit: Kein Kleben am Beton. Korrosionsbeständigkeit bei Stahlschalungen."},{"id":"bv-258","q":"Was bewirkt das Saugverhalten der Schalung an der Betonoberflaeche?","a":"Saugende Schalung: senkt den w/z-Wert an der Oberflaeche -> dunklerer Grauton, weniger Luftporen (eingeschlossene Luft kann entweichen), hoehere Oberflaechenfestigkeit. \"Verdursten\" vermeiden (-> Absanden).\nNicht saugende Schalung: hellere Oberflaeche, groessere Luftporen kaum vermeidbar.\nMit jedem Einsatz saugt die Schalung weniger -> heller.","tags":["Bauverfahren","Schalung"],"reps":0,"ease":2.5,"interval":0,"due":1781338765099,"created":1781252365099,"last":null,"learning":true,"lapses":0,"explain":"Saugende Schalung entzieht dem Beton an der Oberfläche Wasser — der w/z-Wert direkt an der Schalung sinkt. Niedrigerer w/z-Wert = dunklerer Grauton (mehr Zement, weniger Wasser sichtbar), festere Oberfläche, weniger Luftporen (Beton ist an der Schalhaut dichter). Das ist bei manchen Sichtbetonklassen erwünscht, bei anderen nicht. Deshalb muss die Saugfähigkeit der Schalhaut vertraglich festgelegt sein."}],"created":1781246899149,"fach":"Bauverfahren"},{"id":"bv-d4","name":"Baugruben & Verbau","desc":"Boeschungen, Normverbau, Bohrpfahlwand, Traegerbohlwand, Schlitzwand, Spundwand, HDI, Sohlabdichtung","emoji":"âš","color":"#ef4444","cards":[{"id":"bv-301","q":"Muessen Baugruben immer geBoescht sein?","a":"Nein - entweder geboescht oder verbaut.\nStatischen Nachweis nicht zwingend (abhaengig von Nachbarbebauung und Tiefe gemaess DIN 4124).","tags":["Bauverfahren","Verbau"],"reps":0,"ease":2.5,"interval":0,"due":1781333299149,"created":1781246899149,"last":null,"learning":true,"lapses":0,"explain":"DIN 4124 regelt, bis zu welcher Tiefe Böschungen ohne statischen Nachweis zulässig sind. In weichem Boden oder bei Grundwasser muss die Böschungsneigung nachgewiesen werden. Verbau (Spundwand, Bohrpfahlwand etc.) ist nötig, wenn Platz für Böschungen fehlt oder Gefährdungen bestehen. Statischer Nachweis ist immer dann erforderlich, wenn die Normvorgaben überschritten werden."},{"id":"bv-302","q":"Was regelt die DIN 4124?","a":"Boeschungsneigungen fuer Graeben und Baugruben\nAnlegen von Bermen\nNormverbau (keine Berechnung bis 5 m Tiefe)","tags":["Bauverfahren","Verbau"],"reps":0,"ease":2.5,"interval":0,"due":1781333299149,"created":1781246899149,"last":null,"learning":true,"lapses":0,"explain":"DIN 4124 unterscheidet Bodenarten: nichtbindiger Boden (Sand, Kies) darf steiler geböscht werden als bindiger (Ton, Schluff). Bermen (horizontale Absätze) unterteilen hohe Böschungen und verbessern die Standsicherheit. Normverbau (bis 5 m Tiefe ohne Berechnung) gilt nur für bestimmte Bedingungen — kein Grundwasser, keine Auflasten, bestimmte Bodenarten."},{"id":"bv-303","q":"Was bedeutet Normverbau?","a":"Art des Verbaus ist genormt - keine statische Berechnung erforderlich bis 5 m Tiefe\nArten: Senkrechter Normverbau, Waagrechter Normverbau, Diehlenkammerbau, Verbau mit Verbauplatten","tags":["Bauverfahren","Verbau"],"reps":0,"ease":2.5,"interval":0,"due":1781333299149,"created":1781246899149,"last":null,"learning":true,"lapses":0,"explain":"Normverbau nach DIN 4124 definiert Abstände, Materialdimensionen und Verlegeweise so, dass bis 5 m Tiefe ohne statischen Nachweis gearbeitet werden kann. Die vier Normverbauarten (senkrecht, waagerecht, Diehlenkammerbau, Verbauplatten) sind für verschiedene Bodenarten und Tiefen geeignet. Ab 5 m oder bei besonderen Randbedingungen ist immer ein statischer Nachweis erforderlich."},{"id":"bv-304","q":"Welche Verbauvarianten gibt es bei Baugruben?","a":"Traegerbohlwand (laermarm, sehr wirtschaftlich)\nBohrpfahlwand: aufgeloest / tangierend / ueberschnitten (relativ steif)\nSchlitzwand (sehr steif, wasserundurchlaessig)\nSpundwand (relativ weich)\nHDI-Wand (Hochdruckinjektion)","tags":["Bauverfahren","Verbau"],"reps":0,"ease":2.5,"interval":0,"due":1781333299149,"created":1781246899149,"last":null,"learning":true,"lapses":0,"explain":"Trägerbohlwand: H-Träger in Bohrlöcher gesetzt, dazwischen Holzbohlen — günstig, lärm- und erschütterungsarm, aber nicht wasserdicht. Bohrpfahlwand: Bohrpfähle dicht an dicht (tangierend) oder überschnitten (wasserdicht). Schlitzwand: Aushub unter Stützflüssigkeit, wasserdicht, sehr steif — teuer. Spundwand: Stahlprofile gerammt oder gerüttelt, wasserdicht, günstig. HDI: Hochdruckinjektion, vielseitig anwendbar."},{"id":"bv-305","q":"Nenne Auswahlkriterien fuer die Wahl des Verbaus!","a":"Grundwasser\nBodenart\nLaerm / Erschuetterungen\nPlatz (Nachbarbebauung)\nVerformungsverhalten\nKosten\nHindernisse im Boden\nSparten (Leitungen im Boden?)","tags":["Bauverfahren","Verbau"],"reps":0,"ease":2.5,"interval":0,"due":1781333299149,"created":1781246899149,"last":null,"learning":true,"lapses":0,"explain":"Grundwasser: Ist der Verbau wasserdicht nötig? Bodenart: Kann man rammen (Spundwand) oder nur bohren? Lärm/Erschütterungen: Innenstadtbaustelle → Bohrpfahlwand statt Spundwand. Platz: Reicht der Arbeitsraum für die Baumaschinen? Verformungsverhalten: Setzungsempfindliche Nachbarn → steifer Verbau. Kosten: Trägerbohlwand ist fast immer am günstigsten."},{"id":"bv-306","q":"Welche Belastungen wirken auf einen Verbau?","a":"Erddruck\nWasserdruck\nBebauung / Verkehrslasten (Auflasten)","tags":["Bauverfahren","Verbau"],"reps":0,"ease":2.5,"interval":0,"due":1781333299149,"created":1781246899149,"last":null,"learning":true,"lapses":0,"explain":"Erddruck (aktiver Erddruck aus dem Boden hinter dem Verbau) ist die Hauptbeanspruchung. Bei Grundwasser kommt der hydrostatische Wasserdruck dazu — der kann den Erddruck übersteigen. Auflasten (Gebäude, Verkehr) erhöhen den Erddruck zusätzlich (Streifenlast oder Flächenlast). Der Verbau muss für die Kombination aller Lasten bemessen werden."},{"id":"bv-307","q":"Wie werden Verbaulasten abgetragen?","a":"Eigene Steifigkeit des Verbaus\nRueckverankerungen / Aussteifungen\nFusseinspannung","tags":["Bauverfahren","Verbau"],"reps":0,"ease":2.5,"interval":0,"due":1781333299149,"created":1781246899149,"last":null,"learning":true,"lapses":0,"explain":"Eigene Steifigkeit: Die Wand (z.B. Spundwand) leitet Kräfte durch ihre eigene Biegesteifigkeit ab. Rückverankerungen (Anker in den Boden) oder Aussteifungen (Stahlstreben quer durch die Baugrube) nehmen horizontale Kräfte auf. Fußeinspannung: Das untere Ende der Wand ist im Boden eingespannt — der Boden gibt den Wandfuß horizontale Stützkräfte."},{"id":"bv-308","q":"Nenne 3 Varianten der Bohrpfahlwand und wo Bewehrung noetig ist!","a":"Aufgeloest (Luecken zwischen Pfaehlen): nur einzelne Pfaehle bewehrt\nTangierend (Pfaehle beruehren sich): alle Pfaehle bewehrt\nUeberschnitten (Pfaehle ueberlappen): primaere Pfaehle bewehrt, sekundaere unbewehrt","tags":["Bauverfahren","Verbau","Bohrpfahlwand"],"reps":0,"ease":2.5,"interval":0,"due":1781333299149,"created":1781246899149,"last":null,"learning":true,"lapses":0,"fig":"<svg viewBox=\"0 0 330 158\" xmlns=\"http://www.w3.org/2000/svg\" style=\"width:100%;max-width:330px;height:auto;font-family:ui-monospace,monospace\"><text x=\"10\" y=\"13\" fill=\"var(--txt)\" font-size=\"11\" font-weight=\"700\">Bohrpfahlwand-Varianten<\/text><text x=\"10\" y=\"26\" fill=\"var(--txt2)\" font-size=\"8.5\">tangierend (Achsabst.=D)<\/text><circle cx=\"35\" cy=\"40\" r=\"11\" fill=\"var(--surface3)\" stroke=\"var(--blue)\" stroke-width=\"1.6\"/><circle cx=\"57\" cy=\"40\" r=\"11\" fill=\"var(--surface3)\" stroke=\"var(--blue)\" stroke-width=\"1.6\"/><circle cx=\"79\" cy=\"40\" r=\"11\" fill=\"var(--surface3)\" stroke=\"var(--blue)\" stroke-width=\"1.6\"/><circle cx=\"101\" cy=\"40\" r=\"11\" fill=\"var(--surface3)\" stroke=\"var(--blue)\" stroke-width=\"1.6\"/><circle cx=\"123\" cy=\"40\" r=\"11\" fill=\"var(--surface3)\" stroke=\"var(--blue)\" stroke-width=\"1.6\"/><text x=\"10\" y=\"71\" fill=\"var(--txt2)\" font-size=\"8.5\">ueberschnitten (<D, Pilgerschritt)<\/text><circle cx=\"35\" cy=\"85\" r=\"11\" fill=\"var(--surface3)\" stroke=\"var(--blue)\" stroke-width=\"1.6\"/><circle cx=\"51\" cy=\"85\" r=\"11\" fill=\"var(--surface3)\" stroke=\"var(--blue)\" stroke-width=\"1.6\"/><circle cx=\"67\" cy=\"85\" r=\"11\" fill=\"var(--surface3)\" stroke=\"var(--blue)\" stroke-width=\"1.6\"/><circle cx=\"83\" cy=\"85\" r=\"11\" fill=\"var(--surface3)\" stroke=\"var(--blue)\" stroke-width=\"1.6\"/><circle cx=\"99\" cy=\"85\" r=\"11\" fill=\"var(--surface3)\" stroke=\"var(--blue)\" stroke-width=\"1.6\"/><text x=\"10\" y=\"121\" fill=\"var(--txt2)\" font-size=\"8.5\">aufgeloest (>D, Spritzbeton)<\/text><circle cx=\"35\" cy=\"135\" r=\"11\" fill=\"var(--surface3)\" stroke=\"var(--blue)\" stroke-width=\"1.6\"/><circle cx=\"69\" cy=\"135\" r=\"11\" fill=\"var(--surface3)\" stroke=\"var(--blue)\" stroke-width=\"1.6\"/><circle cx=\"103\" cy=\"135\" r=\"11\" fill=\"var(--surface3)\" stroke=\"var(--blue)\" stroke-width=\"1.6\"/><circle cx=\"137\" cy=\"135\" r=\"11\" fill=\"var(--surface3)\" stroke=\"var(--blue)\" stroke-width=\"1.6\"/><circle cx=\"171\" cy=\"135\" r=\"11\" fill=\"var(--surface3)\" stroke=\"var(--blue)\" stroke-width=\"1.6\"/><\/svg>","explain":"Aufgelöste Wand: Zwischen den Pfählen sind Lücken — Boden muss zwischen den Pfählen durch Spritzbetonausfachung oder Holzbohlen gesichert werden. Nicht wasserdicht. Tangierende Wand: Pfähle berühren sich — kein Lücken, aber Fugendurchlässigkeit. Überschnittene Wand: Sekundärpfähle schneiden in Primärpfähle ein — völlig dicht, da keine Fugen."},{"id":"bv-309","q":"Nenne 4 Vorteile der Bohrpfahlwand gegenueber anderen Verbauarten!","a":"Geringe Erschuetterungen\nLaermarm\nHohe Steifigkeit (ueberschnitten: wasserundurchlaessig)\nFuer beengte Verhaeltnisse geeignet\nGut bei bindigen / klueftigen Boeden","tags":["Bauverfahren","Verbau","Bohrpfahlwand"],"reps":0,"ease":2.5,"interval":0,"due":1781333299149,"created":1781246899149,"last":null,"learning":true,"lapses":0,"explain":"Geringe Erschütterungen machen Bohrpfahlwände ideal neben erschütterungsempfindlichen Gebäuden oder Geräten. Lärmarm im Vergleich zur Spundwandram mung. Überschnittene Bohrpfahlwand ist die einzige nicht wasserdruckhaltende Alternative zur Schlitzwand bei beengten Verhältnissen. Geeignet für harte, klüftige Böden, in denen Rammen nicht funktioniert."},{"id":"bv-310","q":"Nenne 5 organisatorische Punkte bei der Herstellung einer Bohrpfahlwand!","a":"Bewehrungskoerbe vorfertigen\nBetonlieferung koordinieren\nVerrohrung und Bohrgeraet\nBohrklein-Entsorgung\nPfahlkopf abarbeiten / Uebergabepunkt Rohbau","tags":["Bauverfahren","Verbau","Bohrpfahlwand"],"reps":0,"ease":2.5,"interval":0,"due":1781333299149,"created":1781246899149,"last":null,"learning":true,"lapses":0,"explain":"Bewehrungskörbe (oft mehrere Meter lang) müssen vorher auf dem Bauhof vorgefertigt werden — braucht Platz und Zeit. Beton muss genau dann ankommen, wenn das Bohrloch fertig ist (Frischbeton-Zeitfenster). Verrohrung: Das Bohrgestänge braucht Platz neben dem Bohrgerät. Bohrklein (ausgebohrter Boden) muss als Abfall entsorgt werden. Pfahlkopf wird nach dem Erhärten abgearbeitet."},{"id":"bv-311","q":"Wie kann die Wasserhaltung bei Baugruben erfolgen?","a":"Offene Wasserhaltung (Pumpen aus Graben)\nGeschlossene Wasserhaltung (Grundwasserabsenkung mit Brunnen)\nDichtwand","tags":["Bauverfahren","Verbau"],"reps":0,"ease":2.5,"interval":0,"due":1781333299149,"created":1781246899149,"last":null,"learning":true,"lapses":0,"explain":"Offene Wasserhaltung: Wasser läuft in die Baugrube und wird von dort ausgepumpt — nur bei geringen Wassermengen und standfestem Boden sinnvoll. Brunnen (geschlossene Wasserhaltung): Wasser wird vor Eindringen in die Baugrube abgesenkt — aufwändig, aber wirksam. Dichtwand: Der Verbau selbst ist wasserdicht (Schlitzwand, überschnittene Bohrpfahlwand, Spundwand) — kein Wasser kann eindringen."},{"id":"bv-312","q":"Nenne Boeschungsschutzmassnahmen!","a":"Gegen Oberflaechenerosion: Abdecken, Begruenung, Oberflaechenwasser sammeln, Spritzbeton\nGegen Boeschungsbruch: flacherer Winkel, Schotterpfaehle, Vernagelungen","tags":["Bauverfahren","Verbau"],"reps":0,"ease":2.5,"interval":0,"due":1781333299149,"created":1781246899149,"last":null,"learning":true,"lapses":0,"explain":"Oberflächenerosion: Regen wäscht Feinmaterial aus. Lösung: Abdeckfolie, Begrünung (Gras), Oberflächen-Drainagesystem, Spritzbeton. Böschungsbruch: Wenn die Scherfestigkeit überschritten wird, rutscht ein Erdkeil ab. Maßnahmen: Böschung flacher machen, Boden verfestigen (Schotterpfähle), Vernagelung (Stahlnägel mit Spritzbeton). Wasser und steile Böschungen sind die Hauptfeinde."},{"id":"bv-313","q":"Warum muessen Baugruben mit wasserundurchlaessiger Sohle abgedichtet werden?","a":"Hydraulischer Grundbruch: Auftrieb durch Grundwasser kann die Sohle hochdruecken oder den Verbau zum Versagen bringen.","tags":["Bauverfahren","Verbau","Sohlabdichtung"],"reps":0,"ease":2.5,"interval":0,"due":1781333299149,"created":1781246899149,"last":null,"learning":true,"lapses":0,"explain":"Hydraulischer Grundbruch: Das Grundwasser außerhalb der Baugrube drückt gegen die Sohle. Wenn der Wasserdruck größer ist als das Gewicht des Bodens über der Sohle, wird die Sohle aufgedrückt (Piping, Aufschwimmen). Eine wasserundurchlässige Sohlabdichtung verhindert, dass Wasser von unten eindringt. Alternativ: Wasserabsenkung auf dem Außenfeld."},{"id":"bv-314","q":"Welche Moeglichkeiten der Sohlabdichtung gibt es?","a":"Unterwasserbetonplatte (Beton unter Wasser, dann abpumpen)\nInjektionssohle / HDI-Sohle\nGefrierverfahren\nSchlitzwandsohle","tags":["Bauverfahren","Verbau","Sohlabdichtung"],"reps":0,"ease":2.5,"interval":0,"due":1781333299149,"created":1781246899149,"last":null,"learning":true,"lapses":0,"explain":"Unterwasserbetonplatte: Baugrube volllaufen lassen, unter Wasser betonieren, dann auspumpen — einfach aber teure Betonmenge. HDI-Sohle: Hochdruckinjektion erzeugt eine Schicht aus zementiertem Boden unter der Sohle. Gefrierverfahren: Boden wird zu einer Eisschicht gefroren — reversibel, sehr vielseitig. Schlitzwandsohle: Schlitzwände werden als Box geschlossen (U-Form)."},{"id":"bv-315","q":"Erlaeutere das HDI-Verfahren (Hochdruckinjektion)!","a":"1. Bohren (D = 5-15 cm)\n2. Rotierende Duese wird langsam gezogen\n3. Injizieren mit 100-400 bar -> Boden wird geloest und mit Zement vermischt\n4. Aushaerten -> wasserundurchlaessige Saeule\nVorteile: laermarm, erschuetterungsfrei, keine Setzungen, Kombination mit anderen Verfahren moeglich","tags":["Bauverfahren","Verbau","HDI"],"reps":0,"ease":2.5,"interval":0,"due":1781333299149,"created":1781246899149,"last":null,"learning":true,"lapses":0,"fig":"<svg viewBox=\"0 0 330 162\" xmlns=\"http://www.w3.org/2000/svg\" style=\"width:100%;max-width:330px;height:auto;font-family:ui-monospace,monospace\">\n<text x=\"10\" y=\"14\" fill=\"var(--txt)\" font-size=\"11\" font-weight=\"700\">Hochdruckinjektion (HDI)<\/text>\n<line x1=\"120\" y1=\"25\" x2=\"120\" y2=\"150\" stroke=\"var(--txt2)\" stroke-width=\"2.4\"/><text x=\"100\" y=\"22\" fill=\"var(--txt2)\" font-size=\"8.5\">Gestaenge<\/text>\n<ellipse cx=\"120\" cy=\"130\" rx=\"55\" ry=\"16\" fill=\"var(--acc)\" opacity=\".4\" stroke=\"var(--acc)\"/>\n<ellipse cx=\"120\" cy=\"95\" rx=\"55\" ry=\"16\" fill=\"var(--acc)\" opacity=\".3\" stroke=\"var(--acc)\"/>\n<ellipse cx=\"120\" cy=\"60\" rx=\"40\" ry=\"13\" fill=\"var(--acc)\" opacity=\".25\" stroke=\"var(--acc)\"/>\n<line x1=\"120\" y1=\"130\" x2=\"170\" y2=\"120\" stroke=\"var(--red)\" stroke-width=\"2\"/><line x1=\"120\" y1=\"130\" x2=\"70\" y2=\"120\" stroke=\"var(--red)\" stroke-width=\"2\"/>\n<text x=\"180\" y=\"95\" fill=\"var(--txt2)\" font-size=\"8.5\">100-400 bar<\/text>\n<text x=\"180\" y=\"110\" fill=\"var(--txt2)\" font-size=\"8.5\">Boden + Zement<\/text>\n<text x=\"180\" y=\"125\" fill=\"var(--txt2)\" font-size=\"8.5\">= Erdbetonsaeule<\/text>\n<\/svg>","explain":"HDI (Jet Grouting): Eine dünne Bohrstange wird in den Boden gebohrt. Beim langsamen Herausziehen rotiert eine Düse und injiziert unter sehr hohem Druck (100-400 bar) Zementleim. Der Strahl zerschneidet den Boden und vermischt ihn mit Zement. Beim Erhärten entsteht eine zylindrische, zementierte Säule. Nebeneinander angeordnete Säulen bilden eine Wand oder Sohle. Lärm- und erschütterungsarm."},{"id":"bv-316","q":"Welche Arbeitsraumbreiten gelten (lichte Mindestbreiten)?","a":"Verbaute Baugrube: min. 0,60 m\nGeboeschte Baugrube: min. 0,50 m\nGroesseres Mass massgebend (abhaengig von Rohrdurchmesser, Tiefe, Leitungsart).","tags":["Bauverfahren","Verbau"],"reps":0,"ease":2.5,"interval":0,"due":1781337176284,"created":1781250776284,"last":null,"learning":true,"lapses":0,"explain":"0,60 m Mindestarbeitsraum in verbauten Baugruben ist das absolute Minimum für einen Mann mit Werkzeug. In geböschten Baugruben reichen 0,50 m, weil mehr Manövrierraum durch die Böschung entsteht. Das Aufmaß (Abrechnung) erfolgt bis zur Außenfläche des Verbaus oder bis zur Böschungsoberkante, nicht bis zur Außenwand des zu erstellenden Gebäudes."},{"id":"bv-317","q":"Wie werden Bermen in hohen Boeschungen angeordnet?","a":"In 3 m Hoehenspruengen, mind. 1,5 m breit.","tags":["Bauverfahren","Verbau"],"reps":0,"ease":2.5,"interval":0,"due":1781337176284,"created":1781250776284,"last":null,"learning":true,"lapses":0,"fig":"<svg viewBox=\"0 0 330 158\" xmlns=\"http://www.w3.org/2000/svg\" style=\"width:100%;max-width:330px;height:auto;font-family:ui-monospace,monospace\">\n<text x=\"10\" y=\"14\" fill=\"var(--txt)\" font-size=\"11\" font-weight=\"700\">Boeschung mit Berme<\/text>\n<polyline points=\"30,40 110,40 140,90 200,90 230,140 310,140\" fill=\"none\" stroke=\"var(--acc)\" stroke-width=\"2.4\"/>\n<line x1=\"140\" y1=\"90\" x2=\"200\" y2=\"90\" stroke=\"var(--blue)\" stroke-width=\"2.4\"/>\n<text x=\"145\" y=\"84\" fill=\"var(--blue)\" font-size=\"9\">Berme &gt;= 1,5m<\/text>\n<line x1=\"320\" y1=\"40\" x2=\"320\" y2=\"90\" stroke=\"var(--txt3)\" stroke-width=\"1\"/>\n<text x=\"244\" y=\"115\" fill=\"var(--txt2)\" font-size=\"8.5\">max. 3 m Hoehensprung<\/text>\n<text x=\"60\" y=\"55\" fill=\"var(--txt2)\" font-size=\"8.5\">Gelaende<\/text>\n<\/svg>","explain":"Bermen (Absätze in der Böschung) unterteilen eine hohe Böschung in mehrere kleinere — jeder Abschnitt hat eine eigene Standsicherheit. In 3 m Schritten bedeutet: Bei 9 m Gesamthöhe gibt es zwei Bermen. Die 1,5 m Breite ist Mindestmaß für Entwässerung und Reparaturarbeiten. Bermen reduzieren außerdem das Risiko, dass bei einem Böschungsbruch das gesamte Material auf einmal abrutscht."},{"id":"bv-318","q":"Welche Einbauverfahren gibt es bei Spundwaenden?","a":"Rammen: Freifallrammen (50-100 Schl./min) / Schnellschlagrammen (100-300 Schl./min)\nRuetteln: nicht bindige rundkoernige Boeden, erschuetterungsaermer\nEinpressen: erschuetterungs- und laermfrei, fuer hohe Mantelreibung, langsamer/teurer","tags":["Bauverfahren","Verbau","Spundwand"],"reps":0,"ease":2.5,"interval":0,"due":1781337176284,"created":1781250776284,"last":null,"learning":true,"lapses":0,"explain":"Rammen: Schlaggewicht fällt auf das Spundwandprofil. Freifallrammen (langsam, 50-100 Schläge/min) erzeugen hohe Erschütterungen. Schnellschlagrammen (hydraulisch, 100-300 Schläge/min) sind präziser. Rütteln: Der Rüttler erzeugt Hochfrequenzschwingungen (15-40 Hz) — der Sand verflüssigt sich kurz, die Wand gleitet hinein. Lärm- und erschütterungsärmer als Rammen, aber nicht in allen Böden möglich. Einpressen: Hydraulisch gedrückt, erschütterungsfrei — teuerste Methode."},{"id":"bv-319","q":"Nenne Vor- und Nachteile der Spundwand!","a":"Vorteile: wasserdicht, im GW einsetzbar, in nicht standfesten Boeden, rueckbaubar, schneller Baufortschritt.\nNachteile: weicher Verbau (verformungsanfaellig), Setzungsgefahr, laerm-/erschuetterungsreich beim Rammen, schlecht bei Hindernissen.","tags":["Bauverfahren","Verbau","Spundwand"],"reps":0,"ease":2.5,"interval":0,"due":1781337176284,"created":1781250776284,"last":null,"learning":true,"lapses":0,"explain":"Spundwände sind aus Stahlprofilen (z.B. Larssen), die ineinandergreifen — dicht. Im Grundwasser einsetzbar, da wasserdicht. Nicht standfester Boden: Spundwand trägt durch Einbindung. Rückbaubar: Das Stahl profil kann nach Ende der Baugrube wieder herausgezogen werden. Nachteile: Erschütterungen beim Rammen, Geräuschentwicklung, Verformungen (Spundwand ist weicher als Bohrpfahlwand), begrenzt in Böden mit Hindernissen."},{"id":"bv-320","q":"Nenne Vor- und Nachteile der Traegerbohlwand!","a":"Vorteile: kostenguenstig, laerm-/erschuetterungsarm, hohe Anpassungsfaehigkeit an Hindernisse, fast alle Boeden, rueckbaubar.\nNachteile: weicher Verbau, Setzungsgefahr, nicht wasserdicht (nur ueber GW), Gefahr von Hohlraeumen/Nachrutschen.","tags":["Bauverfahren","Verbau","Traegerbohlwand"],"reps":0,"ease":2.5,"interval":0,"due":1781337176284,"created":1781250776284,"last":null,"learning":true,"lapses":0,"explain":"Trägerbohlwand: H-Stahlträger werden in Bohrlöcher gestellt, dazwischen kommen Holzbohlen oder Betonfertigteile. Günstig, weil Träger und Bohlen wiederverwendet werden können. Kaum Erschütterungen (Bohrverfahren). Nicht wasserdicht (Lücken zwischen Trägern und Bohlen). In Böden mit Hindernissen (alter Fundamente) oft die einzig mögliche Lösung. Geringer Platzbedarf für das Bohrgerät."},{"id":"bv-321","q":"Welche besonderen Bauweisen der Traegerbohlwand gibt es (Tunnel)?","a":"Berliner Verbau: Verbauwand als Schalung fuer Tunnelwand, 10 cm Isolierschicht\nHamburger Verbau: 1,0 m Arbeitsraum, Isolierung auf Tunnel\nMuenchner Verbau: Verbundtraeger in vorgebohrte Loecher\nStuttgarter Verbau: Ortbetonausfachung zwischen Traegern","tags":["Bauverfahren","Verbau","Traegerbohlwand"],"reps":0,"ease":2.5,"interval":0,"due":1781337176284,"created":1781250776284,"last":null,"learning":true,"lapses":0,"explain":"Berliner Verbau als Tunnelschalung: Die Bohlenwand dient als verlorene Schalung für die spätere Tunnelwand. Die Isolierschicht (10 cm) trennt Verbauwand von Tunnelwandinnenschale thermisch. Hamburger Verbau: Ähnlich, aber die Träger verbleiben nicht — sie werden in die Tunnelwand integriert oder herausgezogen. Beide Verfahren werden bei Cut-and-Cover-Tunneln eingesetzt."},{"id":"bv-322","q":"Wie wird eine Schlitzwand hergestellt?","a":"1. Leitwaende herstellen (Graben bis 1,25 m)\n2. Lamellen mit Greifer ausheben (4-6 m), staendig Bentonitsuspension nachfuellen\n3. Abschalrohre + Bewehrungskorb einsetzen\n4. Betonage im Contractorverfahren (Schuettrohr), nicht ruetteln\n5. Abschalrohre ziehen, naechste Lamelle im Pilgerschritt","tags":["Bauverfahren","Verbau","Schlitzwand"],"reps":0,"ease":2.5,"interval":0,"due":1781337176284,"created":1781250776284,"last":null,"learning":true,"lapses":0,"explain":"Schlitzwandherstellung: Zunächst werden Leitwände (kleine flache Wände beiderseits des Schlitzes) zum Führen des Greifers hergestellt. Der Greifer (Seilgreifer oder Hydrogreifer) gräbt unter Bentonitsuspension bis zur Endtiefe. Die Suspension stützt den Schlitz (thixotrop: steht unter Ruhe, fließt unter Bewegung). Nach Aushub wird die Bewehrung eingestellt, dann Beton von unten nach oben im Kontraktorverfahren eingebracht (Betonrohr, das hochgezogen wird)."},{"id":"bv-323","q":"Welche Fehler/Schwachstellen treten bei Schlitzwaenden auf?","a":"Umlaufbeton (Schalrohr von Beton umspuelt -> Undichtigkeit)\nAuswuechse (Bodenausbrueche an Flanken)\nAbweichung von der Lotrechten (mangelnder Verbund)\nFugen sind Schwachstellen.","tags":["Bauverfahren","Verbau","Schlitzwand"],"reps":0,"ease":2.5,"interval":0,"due":1781337176284,"created":1781250776284,"last":null,"learning":true,"lapses":0,"explain":"Umlaufbeton: Wenn das Betonrohr (Kontraktor) zu weit hochgezogen wird, fließt Beton außen am Rohr hoch und verdrängt die Suspension — das ergibt unkontrollierten Beton außerhalb des Schlitzes. Auswüchse: An der Schlitzwandung quillt Boden in den Schlitz (bei instabilem Boden), die Wand wird unregelmäßig. Bewehrungskorb sitzt schief: Wenn der Schlitz nicht exakt senkrecht ist."},{"id":"bv-324","q":"Wie funktioniert das Gefrierverfahren (Frostwand)?","a":"Solverfahren: Chlorkalziumsole -20 bis -40 Grad C in geschlossenem Rohrkreislauf -> Porenwasser gefriert.\nStickstoffverfahren: fluessiger N2 entweicht in Atmosphaere (nicht zurueckgefuehrt).\nDruckfestigkeit 5-15 MN/m2, Zugfestigkeit 25 % davon.","tags":["Bauverfahren","Verbau","Frostwand"],"reps":0,"ease":2.5,"interval":0,"due":1781337176284,"created":1781250776284,"last":null,"learning":true,"lapses":0,"explain":"Solverfahren: Chlorkalziumsole (-20 bis -40°C) zirkuliert in Gefrierrohren und entzieht dem Boden Wärme. Der Boden gefriert rund um die Rohre — überlappende Gefrierzylinder bilden eine Eiswand. Das ist ein reversibles Verfahren (Tauen nach Fertigstellung). Stickstoffverfahren: Flüssiger Stickstoff (-196°C) friert schneller, wird aber direkt verbraucht (offenes System)."},{"id":"bv-325","q":"Nenne Vor- und Nachteile des Gefrierverfahrens!","a":"Vorteile: fast alle Boeden, keine Setzungen, laerm-/erschuetterungsarm, Verbau loest sich am Ende auf.\nNachteile: lange Vorlaufzeit, geringe Ankerabstaende (geringe Biegefestigkeit), Hebungen moeglich, sehr teuer (Energiekosten), ausreichender Wassergehalt + geringe GW-Stroemung noetig.","tags":["Bauverfahren","Verbau","Frostwand"],"reps":0,"ease":2.5,"interval":0,"due":1781337176284,"created":1781250776284,"last":null,"learning":true,"lapses":0,"explain":"Gefrierverfahren funktioniert in fast jedem wassergesättigten Boden (Eis erhöht Scherfestigkeit enorm). Keine Setzungen (Boden wird nicht entfernt). Lärm- und erschütterungsarm. Nachteil: Energieintensiv und teuer (Kälteanlage). Zeitaufwand für das Gefrieren (Wochen). Bodenhebungen durch Eisvolumenzunahme möglich. Tauphase muss kontrolliert werden (Hebungen beim Tauen)."},{"id":"bv-326","q":"Was ist eine Elementwand (aufgeloest / geschlossen)?","a":"Aufgeloest: Spritzbetonschale + Fertigbetonplatten mit Verpressankern (verdecken 40 %), Draenschicht noetig.\nGeschlossen: bewehrte Ortbetonplatten, lueckenlos gegen Erdreich verspannt, keine Hohlraeume, von oben nach unten gebaut.","tags":["Bauverfahren","Verbau","Elementwand"],"reps":0,"ease":2.5,"interval":0,"due":1781337176284,"created":1781250776284,"last":null,"learning":true,"lapses":0,"explain":"Aufgelöste Elementwand: Spritzbetonschale zwischen Verpresspfählen oder Ankern — günstiger, aber Optik sichtbar. Geschlossene Elementwand: Fertigbetonplatten vor der Spritzbetonschale — bessere Optik, aber teurer. Elementwände werden bei harten Felsböden eingesetzt, wo keine klassischen Verbauwände möglich sind."},{"id":"bv-327","q":"Welche 4 Grundvarianten der Sohlabdichtung gibt es?","a":"1. Einbindung in wasserundurchlaessige Schicht\n2. Verlaengerung der Sickerwege (vertikaler Verbau)\n3. Grundwasserabsenkung\n4. Einbau einer auftriebssicheren Sohle (wirtschaftlichste Loesung)","tags":["Bauverfahren","Verbau","Sohlabdichtung"],"reps":0,"ease":2.5,"interval":0,"due":1781337176284,"created":1781250776284,"last":null,"learning":true,"lapses":0,"fig":"<svg viewBox=\"0 0 330 180\" xmlns=\"http://www.w3.org/2000/svg\" style=\"width:100%;max-width:330px;height:auto;font-family:ui-monospace,monospace\">\n<text x=\"10\" y=\"14\" fill=\"var(--txt)\" font-size=\"11\" font-weight=\"700\">Auftriebssichere Sohle<\/text>\n<line x1=\"60\" y1=\"40\" x2=\"60\" y2=\"130\" stroke=\"var(--txt2)\" stroke-width=\"2.4\"/>\n<line x1=\"270\" y1=\"40\" x2=\"270\" y2=\"130\" stroke=\"var(--txt2)\" stroke-width=\"2.4\"/>\n<rect x=\"60\" y=\"118\" width=\"210\" height=\"14\" fill=\"var(--blue)\" opacity=\".55\"/><text x=\"120\" y=\"129\" fill=\"#fff\" font-size=\"8.5\">Betonsohle (Eigengewicht)<\/text>\n<g stroke=\"var(--red)\" stroke-width=\"1.6\">\n<line x1=\"100\" y1=\"160\" x2=\"100\" y2=\"134\" marker-end=\"url(#up)\"/><line x1=\"165\" y1=\"160\" x2=\"165\" y2=\"134\" marker-end=\"url(#up)\"/><line x1=\"230\" y1=\"160\" x2=\"230\" y2=\"134\" marker-end=\"url(#up)\"/><\/g>\n<defs><marker id=\"up\" markerWidth=\"8\" markerHeight=\"8\" refX=\"3\" refY=\"1\" orient=\"auto\"><path d=\"M0,6 L3,0 L6,6\" fill=\"var(--red)\"/><\/marker><\/defs>\n<text x=\"105\" y=\"172\" fill=\"var(--red)\" font-size=\"8.5\">Wasserdruck / Auftrieb<\/text>\n<\/svg>","explain":"Variante 1: Verbau reicht bis in wasserundurchlässige Schicht (Ton, Fels) — kein Wasser kann unter dem Verbau eindringen. Variante 2: Unterwasserbetonplatte mit Zugpfählen — Platte wird gegen Auftrieb durch Pfähle verankert. Variante 3: Injektionssohle (HDI) — zementierter Boden bildet Abdichtschicht. Variante 4: Gefrieren — Eissohle dichtet temporär ab."},{"id":"bv-328","q":"Wie nimmt eine auftriebssichere Sohle die Auftriebskraefte auf?","a":"Eigengewicht der Betonsohle (Schwergewichtssohle, bis 4 m)\nRueckverankerung in vertikale Waende\nRueckverankerung im Baugrund (vertikale Auftriebsanker)\nInjektionssohle (1-1,5 m, HDI- oder Manschettenrohrverfahren)","tags":["Bauverfahren","Verbau","Sohlabdichtung"],"reps":0,"ease":2.5,"interval":0,"due":1781337176284,"created":1781250776284,"last":null,"learning":true,"lapses":0,"fig":"<svg viewBox=\"0 0 330 180\" xmlns=\"http://www.w3.org/2000/svg\" style=\"width:100%;max-width:330px;height:auto;font-family:ui-monospace,monospace\">\n<text x=\"10\" y=\"14\" fill=\"var(--txt)\" font-size=\"11\" font-weight=\"700\">Auftriebssichere Sohle<\/text>\n<line x1=\"60\" y1=\"40\" x2=\"60\" y2=\"130\" stroke=\"var(--txt2)\" stroke-width=\"2.4\"/>\n<line x1=\"270\" y1=\"40\" x2=\"270\" y2=\"130\" stroke=\"var(--txt2)\" stroke-width=\"2.4\"/>\n<rect x=\"60\" y=\"118\" width=\"210\" height=\"14\" fill=\"var(--blue)\" opacity=\".55\"/><text x=\"120\" y=\"129\" fill=\"#fff\" font-size=\"8.5\">Betonsohle (Eigengewicht)<\/text>\n<g stroke=\"var(--red)\" stroke-width=\"1.6\">\n<line x1=\"100\" y1=\"160\" x2=\"100\" y2=\"134\" marker-end=\"url(#up)\"/><line x1=\"165\" y1=\"160\" x2=\"165\" y2=\"134\" marker-end=\"url(#up)\"/><line x1=\"230\" y1=\"160\" x2=\"230\" y2=\"134\" marker-end=\"url(#up)\"/><\/g>\n<defs><marker id=\"up\" markerWidth=\"8\" markerHeight=\"8\" refX=\"3\" refY=\"1\" orient=\"auto\"><path d=\"M0,6 L3,0 L6,6\" fill=\"var(--red)\"/><\/marker><\/defs>\n<text x=\"105\" y=\"172\" fill=\"var(--red)\" font-size=\"8.5\">Wasserdruck / Auftrieb<\/text>\n<\/svg>","explain":"Auftriebssichere Sohle: Wenn die Baugrube tiefer liegt als der Grundwasserspiegel, drueckt das Wasser von unten gegen die Bodenplatte (Auftrieb = gamma_W * h). Vier Systeme dagegen: (1) Schwergewichtssohle: Dicke Betonplatte (bis 4 m), die allein durch ihr Eigengewicht schwer genug ist. (2) Rueckverankerung in vertikale Waende: Zuganker verbinden die Sohle mit den Baugrubenwwaenden, die den Auftrieb ins Erdreich uebertragen. (3) Auftriebsanker im Baugrund: Verpressanker gehen senkrecht in den Baugrund unterhalb der Sohle. (4) Injektionssohle (HDI oder Manschettenrohr): Im Boden wird eine verfestigte Schicht erzeugt (ca. 1-1,5 m), die als Gegengewicht und Abdichtung wirkt. Merkregel: Je tiefer die Baugrube unter GW, desto groesser der Auftrieb und desto aufwaendiger die Sicherung."}],"created":1781246899149,"fach":"Bauverfahren"},{"id":"bv-d5","name":"Terminplanung","desc":"Balkenplan, Weg-Zeit-Diagramm, Taktplanung, Netzplan, Puffer","emoji":"📅","color":"#8b5cf6","cards":[{"id":"bv-401","q":"Nenne die 3 Stufen des Balkenterminplans!","a":"Rahmenterminplan (Monate/Wochen) - erstellt der Bauherr\nKoordinationsterminplan (Wochen)\nFeinterminplan (Tage) - je weiter der Fortschritt, desto detaillierter","tags":["Bauverfahren","Terminplanung"],"reps":0,"ease":2.5,"interval":0,"due":1781333299149,"created":1781246899149,"last":null,"learning":true,"lapses":0,"explain":"Der Rahmenterminplan (Monate/Wochen) gibt die groben Meilensteine (Baubeginn, Rohbauende, Bezugstermin) vor — wird vom Bauherrn erstellt. Der Koordinationsterminplan (Wochen) koordiniert alle Gewerke untereinander. Der Feinterminplan (Tage) steuert die operative Baustellenarbeit. Je näher die Ausführung, desto detaillierter der Plan — \"Rollende Planung\"."},{"id":"bv-402","q":"Nenne die 4 Anordnungsbeziehungen im Balkenterminplan!","a":"Normalfolge (EA): Ende Vorgaenger -> Anfang Nachfolger\nEndfolge (EE): Ende -> Ende\nAnfangsfolge (AA): Anfang -> Anfang\nSprungfolge (AE): Anfang Vorgaenger -> Ende Nachfolger","tags":["Bauverfahren","Terminplanung"],"reps":0,"ease":2.5,"interval":0,"due":1781333299149,"created":1781246899149,"last":null,"learning":true,"lapses":0,"fig":"<svg viewBox=\"0 0 330 95\" xmlns=\"http://www.w3.org/2000/svg\" style=\"width:100%;max-width:330px;height:auto;font-family:ui-monospace,monospace\"><text x=\"10\" y=\"13\" fill=\"var(--txt)\" font-size=\"11\" font-weight=\"700\">Anordnungsbeziehungen (AOB)<\/text><text x=\"18\" y=\"22\" fill=\"var(--txt)\" font-size=\"9\" font-weight=\"700\">EA Normalfolge<\/text><rect x=\"18\" y=\"30\" width=\"46\" height=\"13\" rx=\"2\" fill=\"var(--surface3)\" stroke=\"var(--line2)\"/><rect x=\"18\" y=\"52\" width=\"46\" height=\"13\" rx=\"2\" fill=\"var(--surface3)\" stroke=\"var(--line2)\"/><line x1=\"64\" y1=\"36\" x2=\"70\" y2=\"58\" stroke=\"var(--acc)\" stroke-width=\"1.6\"/><circle cx=\"64\" cy=\"36\" r=\"2\" fill=\"var(--acc)\"/><circle cx=\"70\" cy=\"58\" r=\"2\" fill=\"var(--acc)\"/><text x=\"175\" y=\"22\" fill=\"var(--txt)\" font-size=\"9\" font-weight=\"700\">AA Anfangsfolge<\/text><rect x=\"175\" y=\"30\" width=\"46\" height=\"13\" rx=\"2\" fill=\"var(--surface3)\" stroke=\"var(--line2)\"/><rect x=\"175\" y=\"52\" width=\"46\" height=\"13\" rx=\"2\" fill=\"var(--surface3)\" stroke=\"var(--line2)\"/><line x1=\"175\" y1=\"36\" x2=\"175\" y2=\"58\" stroke=\"var(--acc)\" stroke-width=\"1.6\"/><circle cx=\"175\" cy=\"36\" r=\"2\" fill=\"var(--acc)\"/><circle cx=\"175\" cy=\"58\" r=\"2\" fill=\"var(--acc)\"/><text x=\"18\" y=\"84\" fill=\"var(--txt2)\" font-size=\"8.5\">EA: Ende i -> Anfang j<\/text><text x=\"175\" y=\"84\" fill=\"var(--txt2)\" font-size=\"8.5\">AA: Anfang i -> Anfang j<\/text><\/svg>","explain":"Normalfolge (EA = Ende-Anfang): Der Standardfall — A muss fertig sein, bevor B beginnt. Endfolge (EE = Ende-Ende): Beide enden gleichzeitig. Anfangsfolge (AA = Anfang-Anfang): Beide beginnen gleichzeitig (z.B. Schalung und Bewehrung in verschiedenen Abschnitten). Sprungfolge (AE = Anfang-Ende): A muss begonnen haben, bevor B endet — selten, z.B. Genehmigung muss laufen, bevor Rohbau endet."},{"id":"bv-403","q":"Nenne Vorteile des Weg-Zeit-Diagramms!","a":"Geschwindigkeit durch Neigung ersichtlich\nVerbindung mit dem Ort\nAnzahl der Kolonnen erkennbar\nArbeitsrichtung sichtbar\nKollisionen erkennbar\nSehr gut fuer Linienbaustellen","tags":["Bauverfahren","Terminplanung"],"reps":0,"ease":2.5,"interval":0,"due":1781333299149,"created":1781246899149,"last":null,"learning":true,"lapses":0,"fig":"<svg viewBox=\"0 0 330 180\" xmlns=\"http://www.w3.org/2000/svg\" style=\"width:100%;max-width:330px;height:auto;font-family:ui-monospace,monospace\">\n<text x=\"10\" y=\"14\" fill=\"var(--txt)\" font-size=\"11\" font-weight=\"700\">Weg-Zeit-Diagramm<\/text>\n<line x1=\"45\" y1=\"26\" x2=\"45\" y2=\"160\" stroke=\"var(--line2)\" stroke-width=\"1.5\"/>\n<line x1=\"45\" y1=\"160\" x2=\"305\" y2=\"160\" stroke=\"var(--line2)\" stroke-width=\"1.5\"/>\n<text x=\"14\" y=\"95\" fill=\"var(--txt2)\" font-size=\"8.5\" transform=\"rotate(-90 20 95)\">Zeit<\/text>\n<text x=\"270\" y=\"156\" fill=\"var(--txt2)\" font-size=\"8.5\">Weg<\/text>\n<line x1=\"55\" y1=\"32\" x2=\"210\" y2=\"150\" stroke=\"var(--blue)\" stroke-width=\"2.2\"/>\n<text x=\"120\" y=\"78\" fill=\"var(--blue)\" font-size=\"9\">Gewerk 1<\/text>\n<line x1=\"95\" y1=\"32\" x2=\"255\" y2=\"150\" stroke=\"var(--acc)\" stroke-width=\"2.2\"/>\n<text x=\"205\" y=\"92\" fill=\"var(--acc)\" font-size=\"9\">Gewerk 2<\/text>\n<line x1=\"150\" y1=\"91\" x2=\"190\" y2=\"91\" stroke=\"var(--red)\" stroke-width=\"1.5\" stroke-dasharray=\"3 2\"/>\n<text x=\"150\" y=\"108\" fill=\"var(--red)\" font-size=\"8.5\">krit. Annaeherung<\/text>\n<text x=\"60\" y=\"48\" fill=\"var(--txt2)\" font-size=\"8.5\">flach = schnell<\/text>\n<\/svg>","explain":"Im Weg-Zeit-Diagramm (x-Achse = Ort/Strecke, y-Achse = Zeit) zeigt die Steigung der Linie die Baugeschwindigkeit: steile Linie = langsam, flache Linie = schnell. Parallele Linien = gleiche Geschwindigkeit. Zwei sich kreuzende Linien = Kollision (zwei Kolonnen treffen sich). Ideal für Linienbaustellen (Straße, Rohr, Tunnelvortrieb)."},{"id":"bv-404","q":"Welche 5 Informationen zeigt das Weg-Zeit-Diagramm, die der Balkenplan nicht zeigt?","a":"Baugeschwindigkeit (Neigung der Linie)\nArbeitsrichtung (von A nach B)\nTreffpunkt zweier Kolonnen\nArbeitsabschnitt (raeumliche Position)\nKollisionsgefahr zweier Gewerke","tags":["Bauverfahren","Terminplanung"],"reps":0,"ease":2.5,"interval":0,"due":1781333299149,"created":1781246899149,"last":null,"learning":true,"lapses":0,"fig":"<svg viewBox=\"0 0 330 180\" xmlns=\"http://www.w3.org/2000/svg\" style=\"width:100%;max-width:330px;height:auto;font-family:ui-monospace,monospace\">\n<text x=\"10\" y=\"14\" fill=\"var(--txt)\" font-size=\"11\" font-weight=\"700\">Weg-Zeit-Diagramm<\/text>\n<line x1=\"45\" y1=\"26\" x2=\"45\" y2=\"160\" stroke=\"var(--line2)\" stroke-width=\"1.5\"/>\n<line x1=\"45\" y1=\"160\" x2=\"305\" y2=\"160\" stroke=\"var(--line2)\" stroke-width=\"1.5\"/>\n<text x=\"14\" y=\"95\" fill=\"var(--txt2)\" font-size=\"8.5\" transform=\"rotate(-90 20 95)\">Zeit<\/text>\n<text x=\"270\" y=\"156\" fill=\"var(--txt2)\" font-size=\"8.5\">Weg<\/text>\n<line x1=\"55\" y1=\"32\" x2=\"210\" y2=\"150\" stroke=\"var(--blue)\" stroke-width=\"2.2\"/>\n<text x=\"120\" y=\"78\" fill=\"var(--blue)\" font-size=\"9\">Gewerk 1<\/text>\n<line x1=\"95\" y1=\"32\" x2=\"255\" y2=\"150\" stroke=\"var(--acc)\" stroke-width=\"2.2\"/>\n<text x=\"205\" y=\"92\" fill=\"var(--acc)\" font-size=\"

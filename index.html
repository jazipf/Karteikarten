tzausgleich: Werden mehr als 2 Anschlusspunkte gemessen, wird die Lösung statistisch ausgeglichen, was Fehler erkennt und die Genauigkeit steigert."},{"id":"vm-204","q":"Was bedeuten LoD1 und LoD2 (CityGML)?","a":"Level of Detail. LoD1 = einfaches Bloeckchen-/Klotzmodell, LoD2 = detaillierter (z. B. mit Dachformen). LoD2 ist deutlich praeziser.","tags":["Vermessung","Instrumente","3D"],"reps":0,"ease":2.5,"interval":0,"due":1781373445813,"created":1781287045813,"last":null,"learning":true,"lapses":0,"explain":"LoD steht für Level of Detail — den Detaillierungsgrad eines 3D-Stadtmodells im CityGML-Standard. LoD1 ist das einfachste: Gebäude als schlichte Quader (Grundfläche + einheitliche Höhe), ohne Dach- oder Fassadendetails. LoD2 ergänzt realistische Dachformen und Fassadengliederung. Höhere Stufen (LoD3, LoD4) modellieren Fenster, Türen und Innenräume."},{"id":"vm-205","q":"Aus welchen Segmenten besteht ein Satellitenpositionierungssystem?","a":"Weltraum-/Satellitensegment, Kontrollsegment (Bodenstationen) und Nutzer-/Empfaengersegment.","tags":["Vermessung","GNSS"],"reps":0,"ease":2.5,"interval":0,"due":1781373445813,"created":1781287045813,"last":null,"learning":true,"lapses":0,"explain":"Jedes GNSS (GPS, GLONASS, Galileo, BeiDou) besteht aus drei Teilen: Das Weltraumsegment (Satelliten) sendet Signale. Das Kontrollsegment (Bodenstationen weltweit) überwacht und korrigiert die Satelliten. Das Nutzersegment (Empfänger beim Anwender) empfängt die Signale und berechnet die Position. Ohne Kontrollsegment würden Satellitenuhrfehler schnell zu großen Positionsfehlern führen."},{"id":"vm-206","q":"Welche Fehler lassen sich mit Differential-GNSS (DGPS) eliminieren?","a":"Korrelierte/systematische Fehler ueber eine Referenzstation mit bekannter Position: Satellitenbahn- und -uhrfehler sowie atmosphaerische Fehler (Ionosphaere/Troposphaere).","tags":["Vermessung","GNSS"],"reps":0,"ease":2.5,"interval":0,"due":1781373445813,"created":1781287045813,"last":null,"learning":true,"lapses":0,"explain":"Bei DGPS steht eine Referenzstation mit exakt bekannten Koordinaten in der Nähe. Sie misst dieselben Satelliten wie der Rover und berechnet Korrekturdaten. Da Satellitenbahnfehler, Uhrabweichungen und atmosphärische Einflüsse für beide Empfänger nahezu gleich sind (korreliert), heben sie sich bei der Differenzbildung auf. Ergebnis: statt ±10 m Genauigkeit erreicht man ±1–3 m oder besser."}],"created":1781287045813,"fach":"Vermessung"},{"id":"vm-d4","name":"Fehlerlehre & Genauigkeit","desc":"Fehlerarten, Toleranz, Standardabweichung, Kontrollmessung","emoji":"📊","color":"#ef4444","cards":[{"id":"vm-301","q":"Welche Arten von Fehlern/Abweichungen gibt es (mit Beispiel + Gegenmassnahme)?","a":"Grobe Fehler: z. B. falsche Ablesung - Gegenmassnahme: unabhaengige Kontrollmessung.\nSystematische Fehler: z. B. dejustiertes Geraet / falsch angelegtes Massband - Kalibrierung/Kontrollmessung.\nZufaellige Fehler: kleine zufaellige Streuung - statistische Ausgleichung.","tags":["Vermessung","Fehlerlehre"],"reps":0,"ease":2.5,"interval":0,"due":1781373445813,"created":1781287045813,"last":null,"learning":true,"lapses":0,"explain":"Grobe Fehler entstehen durch Unachtsamkeit (Zahlendreher, falsch abgelesen) — sie sind groß und einzeln erkennbar, aber nicht vorhersehbar; Gegenmassnahme: unabhängige Kontrollmessung. Systematische Fehler folgen einem Muster (zu langes Maßband: jede Messung zu kurz) — Kalibrierung behebt sie. Zufällige Fehler sind kleine, unvermeidliche Streuungen — sie lassen sich nur statistisch durch viele Messungen minimieren. Merkhilfe: grob = Ausreißer, systematisch = konstanter Offset, zufällig = Rauschen."},{"id":"vm-302","q":"Faustregel: Verhaeltnis Standardabweichung zu Toleranz bei allgemeinen Messungen?","a":"Standardabweichung etwa 1/5 der Toleranz (sigma ca. 0,2 x Toleranz).","tags":["Vermessung","Fehlerlehre"],"reps":0,"ease":2.5,"interval":0,"due":1781373445813,"created":1781287045813,"last":null,"learning":true,"lapses":0,"explain":"Die Faustregel besagt: Die Standardabweichung der Messung sollte nicht mehr als 1/5 (20%) der geforderten Toleranz betragen. Damit ist sichergestellt, dass auch ungünstige Einzelwerte die Toleranzgrenze nicht überschreiten. Beispiel: Toleranz ±5 mm → angestrebte Standardabweichung ≤ 1 mm."},{"id":"vm-303","q":"Welches Verhaeltnis gilt bei Abmessungen zur Einhaltung der vorgegebenen Toleranz?","a":"1/10 bis 1/15 der Toleranz.","tags":["Vermessung","Fehlerlehre"],"reps":0,"ease":2.5,"interval":0,"due":1781373445813,"created":1781287045813,"last":null,"learning":true,"lapses":0,"explain":"Bei Abmessungen ist der Maßstab noch strenger: 1/10 bis 1/15 der Toleranz als Standardabweichung. Das liegt daran, dass Abmessungen direkt für Bemessung und Abnahme relevant sind — Fehler haben direkte konstruktive Konsequenzen. Je enger die Toleranz, desto präziseres Messgerät und -verfahren ist nötig."},{"id":"vm-304","q":"Wie genau muessen Kontrollmessungen sein?","a":"Genauer als die geforderte Toleranz - die Standardabweichung der Kontrollmessung muss deutlich kleiner als die Toleranz sein.","tags":["Vermessung","Fehlerlehre"],"reps":0,"ease":2.5,"interval":0,"due":1781373445813,"created":1781287045813,"last":null,"learning":true,"lapses":0,"explain":"Eine Kontrollmessung soll nachweisen, dass eine Messung korrekt ist. Ist die Kontrollmessung selbst ungenauer als die Toleranz, ist der Nachweis wertlos. Daher muss die Kontrollmessung eine kleinere Standardabweichung als die geforderte Toleranz aufweisen — idealerweise nochmals deutlich genauer als die Ausgangsmessung."},{"id":"vm-305","q":"Wie bewertet man die Gegenueberstellung verschiedener Flaechenberechnungen?","a":"Die Ergebnisse muessen (nahezu) gleich sein und dienen als Kontrolle; kleine Abweichungen entstehen nur durch Rundung. Die Gauss-sche Flaechenformel liefert das genaueste Ergebnis.","tags":["Vermessung","Fehlerlehre"],"reps":0,"ease":2.5,"interval":0,"due":1781373445813,"created":1781287045813,"last":null,"learning":true,"lapses":0,"explain":"Wenn mehrere Methoden (z.B. Koordinatenformel, Dreieckszerlegung, CAD-Fläche) denselben Flächeninhalt ergeben, sind die Ergebnisse plausibel und die Messung bestätigt. Kleine Abweichungen entstehen durch unterschiedliche Rundungsschritte. Die Gaußsche Flächenformel (Koordinatenformel) ist am direktesten und genauesten, weil sie alle Eckpunktkoordinaten exakt verwendet."}],"created":1781287045813,"fach":"Vermessung"}],"log":{},"settings":{"theme":"dark","newPerDay":20,"fach":"Alle"}}</script>
<script>
/* ================= DATA ================= */
const KEY='cards.v2';
const DAY=864e5;
const today=()=>{const d=new Date();return new Date(d.getFullYear(),d.getMonth(),d.getDate()).getTime()};
const dkey=(t)=>new Date(t||Date.now()).toLocaleDateString('sv');
const uid=()=>Date.now().toString(36)+Math.random().toString(36).slice(2,7);
const SEED_V=9;
let DB=load();
function readSeed(){try{const s=document.getElementById('seedData');if(s){const sd=JSON.parse(s.textContent);if(sd&&sd.decks&&sd.decks.length)return sd;}}catch(e){}return null;}
function mergeSeed(db,seed){
  const byId={};db.decks.forEach(d=>byId[d.id]=d);
  seed.decks.forEach(sd=>{
    const ex=byId[sd.id];
    if(!ex){db.decks.push(JSON.parse(JSON.stringify(sd)));return;}
    if(sd.fach)ex.fach=sd.fach;
    const cById={};ex.cards.forEach(c=>cById[c.id]=c);
    sd.cards.forEach(sc=>{
      const ec=cById[sc.id];
      if(!ec){ex.cards.push(JSON.parse(JSON.stringify(sc)));}
      else{if(sc.q)ec.q=sc.q;if(sc.a)ec.a=sc.a;if(sc.fig)ec.fig=sc.fig;if(sc.explain)ec.explain=sc.explain;if(sc.why)ec.why=sc.why;}
    });
  });
}
function cleanupOrphans(db,seed){
  const seedByName={};seed.decks.forEach(sd=>seedByName[sd.name]=sd);
  db.decks=db.decks.filter(d=>{
    if(d.fach)return true;
    const sd=seedByName[d.name];
    if(!sd)return true;
    const hasProgress=d.cards.some(c=>(c.reps||0)>0||c.last);
    if(hasProgress){d.fach=sd.fach;return true;}
    return false;
  });
}
function load(){
  let db=null;
  try{const r=JSON.parse(localStorage.getItem(KEY));if(r&&r.decks)db=r;}catch(e){}
  if(!db){try{const o=JSON.parse(localStorage.getItem('karteikarten.v1'));
    if(o&&o.decks)db={decks:o.decks.map(d=>({...d,cards:(d.cards||[]).map(c=>({...c,tags:[]}))})),log:o.log||{},settings:{theme:o.settings?.theme||'dark',newPerDay:20}};
  }catch(e){}}
  const seed=readSeed();
  if(!db){const s=seed||{decks:[],log:{},settings:{theme:'dark',newPerDay:20}};s._seedV=SEED_V;return s;}
  if(!db.settings)db.settings={theme:'dark',newPerDay:20};
  if(seed&&db._seedV!==SEED_V){mergeSeed(db,seed);cleanupOrphans(db,seed);db._seedV=SEED_V;try{localStorage.setItem(KEY,JSON.stringify(db));}catch(e){}}
  // Always patch missing explain fields from seed (in case merge was skipped)
  if(seed){const byId={};db.decks.forEach(d=>d.cards.forEach(c=>byId[c.id]=c));let patched=0;seed.decks.forEach(sd=>sd.cards.forEach(sc=>{const ec=byId[sc.id];if(ec&&sc.explain&&!ec.explain){ec.explain=sc.explain;patched++;}}));if(patched>0){db._seedV=SEED_V;try{localStorage.setItem(KEY,JSON.stringify(db));}catch(e){}}}
  return db;
}
const save=()=>localStorage.setItem(KEY,JSON.stringify(DB));

/* ================= GITHUB GIST SYNC ================= */
const SYNC_TOKEN_KEY='cards.gist.token';
const SYNC_GIST_KEY='cards.gist.id';
function syncToken(){return localStorage.getItem(SYNC_TOKEN_KEY)||''}
function syncGistId(){return localStorage.getItem(SYNC_GIST_KEY)||''}
function syncConfigured(){return !!(syncToken()&&syncGistId())}

async function gistPush(){
  if(!syncConfigured())return;
  try{
    const body=JSON.stringify({files:{'karteikarten_sync.json':{content:JSON.stringify(DB)}}});
    const r=await fetch(`https://api.github.com/gists/${syncGistId()}`,{method:'PATCH',headers:{'Authorization':'token '+syncToken(),'Content-Type':'application/json'},body});
    if(!r.ok)throw new Error('HTTP '+r.status);
    return true;
  }catch(e){console.warn('Gist push failed:',e);return false;}
}

async function gistPull(){
  if(!syncConfigured())return null;
  try{
    const r=await fetch(`https://api.github.com/gists/${syncGistId()}`,{headers:{'Authorization':'token '+syncToken()}});
    if(!r.ok)throw new Error('HTTP '+r.status);
    const g=await r.json();
    const content=g.files?.['karteikarten_sync.json']?.content;
    if(!content)return null;
    return JSON.parse(content);
  }catch(e){console.warn('Gist pull failed:',e);return null;}
}

async function syncDown(){
  if(!syncConfigured())return;
  toast('🔄 Sync läuft…','info');
  const remote=await gistPull();
  if(!remote||!remote.decks){toast('Sync: keine Daten gefunden','err');return;}
  // Merge: behalte lokalen Stand falls remote leer ist
  DB=remote;
  const seed=readSeed();
  if(seed){
    const byId={};DB.decks.forEach(d=>d.cards.forEach(c=>byId[c.id]=c));
    seed.decks.forEach(sd=>sd.cards.forEach(sc=>{const ec=byId[sc.id];if(ec&&sc.explain&&!ec.explain)ec.explain=sc.explain;}));
  }
  save();render();toast('✅ Sync abgeschlossen','ok');
}

async function syncUp(){
  if(!syncConfigured())return;
  const ok=await gistPush();
  if(ok)toast('☁️ Hochgeladen','ok');
  else toast('Sync fehlgeschlagen','err');
}

// Auto-sync beim Start (pull) und nach jeder Bewertung (push, debounced)
let syncTimer=null;
function schedulePush(){
  clearTimeout(syncTimer);
  syncTimer=setTimeout(()=>gistPush(),3000);
}
const _origSave=save;
// Wrap save to trigger push after local save
const saveAndSync=()=>{localStorage.setItem(KEY,JSON.stringify(DB));schedulePush();};

/* ================= FÄCHER (Kategorien) ================= */
const FACH_EMOJI={Bauverfahren:'🏗️',Geotechnik:'🌍',Vermessung:'📐'};
function faecher(){const o=[];DB.decks.forEach(d=>{const f=d.fach||'Allgemein';if(!o.includes(f))o.push(f)});return o;}
function curFach(){const f=DB.settings.fach||'Alle';const fs=faecher();return(f==='Alle'||fs.includes(f))?f:'Alle';}
function decksInFach(){const f=curFach();return f==='Alle'?DB.decks:DB.decks.filter(d=>(d.fach||'Allgemein')===f);}
function fachBar(){
  const fs=faecher();if(fs.length<2)return'';
  const cur=curFach();
  const b=(k,lab)=>`<button class="fachbtn ${cur===k?'on':''}" data-fach="${esc(k)}">${lab}</button>`;
  return`<div class="fachbar">${b('Alle','Alle')}${fs.map(f=>b(f,(FACH_EMOJI[f]?FACH_EMOJI[f]+' ':'')+esc(f))).join('')}</div>`;
}

/* ================= SRS (SM-2 modifiziert) ================= */
/* ===== Intelligente Features: Settings-Helfer (alle Default AUS) ===== */
const SF_DEFAULT={fsrs:false,interleave:false,confidence:false,timer:false,elaboration:false,emotion:false};
function SF(){const s=DB.settings;s.smartFeatures=s.smartFeatures||{};for(const k in SF_DEFAULT)if(!(k in s.smartFeatures))s.smartFeatures[k]=SF_DEFAULT[k];return s.smartFeatures}
const clmp=(x,a,b)=>Math.max(a,Math.min(b,x));
let sessTick=null; // Session-Timer-Interval

/* ===== FSRS – Free Spaced Repetition Scheduler ===== */
const FSRS_W=[1.0,1.0,5.0,-0.5,-0.5,0.2,1.6,-0.02,0.9,2.5]; // Standard-Parameter
const FSRS_D0=5;        // defaultDifficulty
const FSRS_F=9;         // Faktor der Vergessenskurve (request retention ~0,9 ⇒ Intervall ≈ Stabilität)
function fsrs_R(t,S){return Math.pow(1+t/(FSRS_F*Math.max(S,0.1)),-1)}     // Retrievability aus Days_since_review
function fsrs_I(S){return clmp(Math.round(S),1,3650)}                       // Intervall aus Stabilität
function fsrs_initS(G){const v=[0.4,0.9,2.3,5.0];const w=FSRS_W[G-1];return Math.max(0.4,w>0?w:v[G-1])}
function fsrs_nextD(D,G){let nd=D-FSRS_W[6]*(G-3);nd=FSRS_W[7]*FSRS_D0+(1-FSRS_W[7])*nd;return clmp(nd,1,10)}
function fsrs_calculateNewInterval(c,r,mf){
  mf=mf==null?1:mf;                 // Modifikator (Müdigkeit/Confidence) skaliert den Stabilitätszuwachs
  const G=r+1;                      // Note 1..4 (1=Nochmal … 4=Einfach)
  if(c.difficulty==null||c.stability==null){           // Erstbewertung
    c.difficulty=clmp(FSRS_D0-FSRS_W[6]*(G-3),1,10);
    c.stability=fsrs_initS(G)*(G===1?1:mf>0?mf:1);
  }else{
    const t=Math.max(0,(today()-(c.last||today()))/DAY);
    const R=fsrs_R(t,c.stability);                     // Retrievability
    c.difficulty=fsrs_nextD(c.difficulty,G);
    if(G===1){                                         // Lapse → Stabilität sinkt
      c.stability=clmp(c.stability*0.3*(1+(FSRS_D0-c.difficulty)*0.03)*(mf<1?mf:1),0.4,c.stability);
      c.lapses=(c.lapses||0)+1;
    }else{                                             // Recall → Stabilität wächst
      const gf=G===2?0.5:G===4?1.3:1;
      const inc=Math.exp(FSRS_W[8])*(11-c.difficulty)*Math.pow(c.stability,-0.5)*(Math.exp((1-R)*FSRS_W[9])-1);
      c.stability=clmp(c.stability*(1+Math.max(0.05,inc)*gf*mf),0.4,3650);
    }
  }
  c.interval=fsrs_I(c.stability);
  c.reps=(r===0)?0:(c.reps||0)+1;
  c.learning=(r===0);
  c.due=(r===0)?today():today()+c.interval*DAY;
  c.ease=clmp(2.5+(FSRS_D0-c.difficulty)*0.2,1.3,3.5);  // Spiegel für UI/Statistik
  return c.interval;
}
/* ===== SM-2 (Fallback, wenn FSRS AUS) ===== */
function sm2_schedule(c,r){
  c.reps=c.reps||0;c.ease=c.ease||2.5;c.interval=c.interval||0;
  if(r===0){c.reps=0;c.interval=0;c.ease=Math.max(1.3,c.ease-.2);c.due=today();c.lapses=(c.lapses||0)+1;c.learning=true}
  else{
    if(c.reps===0)c.interval=r===1?1:r===2?1:3;
    else if(c.reps===1)c.interval=r===1?3:r===2?4:7;
    else c.interval=Math.max(c.interval+1,Math.round(c.interval*c.ease*(r===1?1.2:r===2?1:1.35)));
    c.interval=Math.min(c.interval,3650);
    if(r===1)c.ease=Math.max(1.3,c.ease-.15);
    if(r===3)c.ease+=.15;
    c.reps++;c.learning=false;c.due=today()+c.interval*DAY;
  }
}
/* ===== Modifikator: Confidence-Mismatch (Meta-Kognition) ===== */
function confidenceEaseMod(conf,r){if(conf==null)return 0;if(conf>=3&&r===0)return -0.30;if(conf>=3&&r===1)return -0.10;if(conf<=2&&r>=3)return +0.10;return 0}
/* ===== Dispatcher: wählt FSRS oder SM-2, wendet Modifikatoren an ===== */
function schedule(c,r,ctx){
  ctx=ctx||{};
  const fatigue=ctx.fatigue?0.7:1;                 // Session-Timer: Ease-/Stabilitätsänderung × 0,7
  const cm=confidenceEaseMod(ctx.confidence,r);    // Confidence-Mismatch
  const easeBefore=c.ease||2.5;
  if(SF().fsrs){
    fsrs_calculateNewInterval(c,r,fatigue*(1+cm));
    c.ease=clmp(c.ease+cm,1.3,3.5);                // Spiegel zusätzlich an Mismatch koppeln
  }else{
    sm2_schedule(c,r);
    let delta=(c.ease-easeBefore)*fatigue+cm;
    c.ease=clmp(easeBefore+delta,1.3,3.5);
  }
  c.last=today();
  const k=dkey();DB.log[k]=DB.log[k]||{n:0,a:0};DB.log[k].n++;if(r===0)DB.log[k].a++;
}
/* ===== Emotional Tagging: Ease-Bonus/Malus ===== */
function applyEmotionalBonus(c,e){
  c.emotion=e;                                     // 0 interessant · 1 langweilig · 2 frustrierend
  const d=e===0?0.2:e===1?-0.1:0;
  if(!d)return;
  c.ease=clmp((c.ease||2.5)+d,1.3,3.5);
  if(SF().fsrs&&c.stability){c.stability=clmp(c.stability*(1+d*0.4),0.4,3650);c.interval=fsrs_I(c.stability);if(!c.learning)c.due=today()+c.interval*DAY}
}
/* ===== Session-Timer ===== */
function sessionElapsedMin(){return (study&&study.start)?(Date.now()-study.start)/60000:0}
function startSessionTimer(){clearInterval(sessTick);sessTick=null;if(study&&SF().timer){sessTick=setInterval(tickTimer,1000);tickTimer()}}
function tickTimer(){const el=document.getElementById('sessClock');if(!el||!study){clearInterval(sessTick);sessTick=null;return}const m=sessionElapsedMin(),mm=Math.floor(m),ss=Math.floor((m-mm)*60);el.textContent=(mm<10?'0':'')+mm+':'+(ss<10?'0':'')+ss;if(m>25){el.classList.add('warn');if(!study._warned){study._warned=true;toast('Effizienz sinkt — Pause?','err')}}}
/* ===== Interleaving: gemischt (ON) vs. blockweise nach Stapel (OFF) ===== */
function orderQueue(items){
  if(SF().interleave){shuffle(items);return items}
  const order=[],g=new Map();
  items.forEach(it=>{const id=it.deck.id;if(!g.has(id)){g.set(id,[]);order.push(id)}g.get(id).push(it)});
  let out=[];order.forEach(id=>{const grp=g.get(id);shuffle(grp);out=out.concat(grp)});
  return out;
}
function nextIvl(c,r){
  if(r===0)return '<10 Min';
  let n;
  if(SF().fsrs){const t={difficulty:c.difficulty,stability:c.stability,reps:c.reps,last:c.last,interval:c.interval,ease:c.ease,lapses:c.lapses,learning:c.learning};fsrs_calculateNewInterval(t,r);n=t.interval}
  else{const reps=c.reps||0,ease=c.ease||2.5,iv=c.interval||0;if(reps===0)n=r===1?1:r===2?1:3;else if(reps===1)n=r===1?3:r===2?4:7;else n=Math.max(iv+1,Math.round(iv*ease*(r===1?1.2:r===2?1:1.35)))}
  return n>=365?(n/365).toFixed(1)+' J':n>=30?Math.round(n/30)+' Mon':n+' Tg';
}
function state(c){if(!c.reps&&!c.last)return'new';if((c.due||0)<=today())return c.learning?'learn':'due';return'ok'}
function dstats(d){let n=0,du=0,ok=0;d.cards.forEach(c=>{const s=state(c);s==='new'?n++:(s==='ok'?ok++:du++)});return{n,du,ok,t:d.cards.length}}
function dueQ(d){
  const due=d.cards.filter(c=>{const s=state(c);return s==='due'||s==='learn'});
  const news=d.cards.filter(c=>state(c)==='new').slice(0,DB.settings.newPerDay||20);
  return[...due,...news];
}

const esc=s=>String(s??'').replace(/[&<>"]/g,m=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[m]));
function fmt(s,mode){
  let h=esc(s);
  h=h.replace(/\*\*(.+?)\*\*/g,'<b>$1</b>').replace(/__(.+?)__/g,'<u>$1</u>').replace(/(?<!\*)\*(?!\*)(.+?)(?<!\*)\*(?!\*)/g,'<i>$1</i>');
  if(mode==='q')h=h.replace(/\{\{(.+?)\}\}/g,'<span class="cloze-gap">···</span>');
  else if(mode==='a')h=h.replace(/\{\{(.+?)\}\}/g,'<span class="cloze-rev">$1</span>');
  else h=h.replace(/\{\{(.+?)\}\}/g,'$1');
  return h;
}

function newStudy(items,name,free){return {items,total:items.length,done:0,good:0,again:0,flipped:false,confidence:null,free:!!free,name,start:Date.now(),interleaved:SF().interleave,_warned:false,_await:null}}
function startStudy(deck,queue){
  if(!queue.length)return toast('Keine Karten','err');
  shuffle(queue);
  study=newStudy(queue.map(c=>({c,deck})),deck.name);
  render();
}
function startStudyAll(){
  let items=[];DB.decks.forEach(d=>dueQ(d).forEach(c=>items.push({c,deck:d})));
  if(!items.length)return toast('Nichts fällig','ok');
  items=orderQueue(items);                          // Interleaving (ON) oder blockweise (OFF)
  study=newStudy(items,'Alle Fächer');
  render();
}
function startStudyFach(f){
  const ds=DB.decks.filter(d=>(d.fach||'Allgemein')===f);
  let items=[];ds.forEach(d=>dueQ(d).forEach(c=>items.push({c,deck:d})));
  if(!items.length)return toast('Nichts fällig in '+f,'ok');
  items=orderQueue(items);                          // Interleaving (ON) oder blockweise (OFF)
  study=newStudy(items,f);
  render();
}
function freeStart(d){
  const q=d.cards.slice();if(!q.length)return toast('Stapel ist leer','err');
  shuffle(q);
  study=newStudy(q.map(c=>({c,deck:d})),d.name+' · Üben',true);
  render();
}
function rStudy(){
  if(!study.items.length)return rFin();
  const it=study.items[0],c=it.c;
  const pct=study.total?((study.total-study.items.length)/study.total)*100:0;
  const cloze=isCloze(c);
  const nN=study.items.filter(i=>state(i.c)==='new').length;
  const nL=study.items.filter(i=>i._re).length;
  screen.innerHTML=`
  <div class="study-hd">
    <button class="iconbtn" id="exitS"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round"><path d="M6 6l12 12M18 6 6 18"/></svg></button>
    <div class="bar"><div class="fill" style="width:${pct}%"></div></div>
    ${SF().timer?`<span class="sess-clock" id="sessClock">00:00</span>`:''}
    <div class="cnt">${study.items.length}</div>
  </div>
  <div class="study-pills">
    ${nN?`<span class="spill n">${nN} neu</span>`:''}
    ${nL?`<span class="spill l">${nL} retry</span>`:''}
    <span class="spill r">${study.done} ok</span>
  </div>
  <div class="card-stage">
    <div class="fcard slide-in ${study.flipped?'flipped':''}" id="fc">
      <div class="face">
        <div class="tag-line"><span class="side-lab">// ${cloze?'Lückentext':'Frage'}</span>
        ${(c.tags||[]).length?`<div class="fc-tags">${c.tags.slice(0,3).map(t=>`<span class="fc-tag">#${esc(t)}</span>`).join('')}</div>`:''}</div>
        <div class="body"><div class="qtxt ${plain(c.q).length>140?'long':''}">${fmt(c.q,'q')}</div></div>
        <div class="hint-foot">${SF().confidence?'Sicherheit wählen ↓':'Tippen → umdrehen'}</div>
      </div>
      <div class="face back">
        <div class="tag-line"><span class="side-lab ans">// Antwort</span></div>
        <div class="body">
          ${cloze?`<div class="qtxt ${plain(c.q).length>140?'long':''}">${fmt(c.q,'a')}</div>${c.a?`<div style="font-size:14px;color:var(--txt2);white-space:pre-wrap">${fmt(c.a,'a')}</div>`:''}`:`
          <div class="small-q">${fmt(c.q)}</div>
          <div class="qtxt ${plain(c.a).length>140?'long':''}">${fmt(c.a,'a')}</div>`}
          ${c.fig?`<div class="cardfig">${c.fig}</div>`:''}
        </div>
      </div>
    </div>
  </div>
  <div id="rateArea">${study.flipped?answerControls(c):preFlipControls()}</div>`;
  $('exitS').onclick=()=>{clearInterval(sessTick);sessTick=null;study=null;render()};
  $('fc').onclick=flip;
  if(study.flipped){bindAnswerControls()}
  else{
    $('flipBtn')&&($('flipBtn').onclick=flip);
    screen.querySelectorAll('[data-cf]').forEach(b=>b.onclick=()=>{study.confidence=+b.dataset.cf;flip()});
  }
  startSessionTimer();                                  // Session-Timer (nur wenn Feature ON)
}
function rateRow(c){
  return `<div class="rate-row">
    <button class="rate-btn r0" data-r="0">Nochmal<small>${nextIvl(c,0)}</small></button>
    <button class="rate-btn r1" data-r="1">Schwer<small>${nextIvl(c,1)}</small></button>
    <button class="rate-btn r2" data-r="2">Gut<small>${nextIvl(c,2)}</small></button>
    <button class="rate-btn r3" data-r="3">Einfach<small>${nextIvl(c,3)}</small></button>
  </div>`;
}
/* Vor dem Aufdecken: Confidence-Buttons (ON) oder normaler Aufdecken-Button */
function preFlipControls(){
  if(SF().confidence)return `<div class="conf-wrap"><div class="conf-lab">Wie sicher bist du? <span>(vor dem Aufdecken)</span></div><div class="conf-row">${[1,2,3,4].map(n=>`<button class="conf-btn${study.confidence===n?' on':''}" data-cf="${n}">${n}</button>`).join('')}</div></div>`;
  return `<button class="flip-cta" id="flipBtn">Antwort zeigen</button>`;
}
/* Nach dem Aufdecken: Vorhersage-Spiegel + Elaboration + Bewertung */
function answerControls(c){
  let h='';
  if(SF().confidence&&study.confidence!=null)h+=`<div class="pred">Selbsteinschätzung vorher: <b>${'★'.repeat(study.confidence)}${'☆'.repeat(4-study.confidence)}</b></div>`;
  if(c.explain)h+=`<button class="explain-btn" id="explBtn">📖 Ausführliche Erklärung</button><div class="explain-box" id="explBox">${fmt(c.explain)}</div>`;
  if(SF().elaboration&&c.why)h+=`<button class="why-btn" id="whyBtn">💡 Denkanstoß: Warum ist das so?</button><div class="why-box" id="whyBox">${fmt(c.why)}</div>`;
  h+=rateRow(c);
  return h;
}
function bindRate(){document.querySelectorAll('[data-r]').forEach(b=>b.onclick=()=>rate(+b.dataset.r))}
function bindAnswerControls(){bindRate();
  const e=$('explBtn');e&&(e.onclick=()=>{const b=$('explBox');if(b)b.classList.add('show');e.style.display='none'});
  const w=$('whyBtn');w&&(w.onclick=()=>{const b=$('whyBox');if(b)b.classList.add('show');w.style.display='none'})}
function flip(){
  if(study.flipped)return;
  if(SF().confidence&&study.confidence==null)return;   // erst Sicherheit wählen
  haptic();study.flipped=true;
  $('fc').classList.add('flipped');
  $('rateArea').innerHTML=answerControls(study.items[0].c);
  bindAnswerControls();
}
function rate(r){
  const it=study.items[0],c=it.c;
  const ctx={};
  if(SF().confidence)ctx.confidence=study.confidence;
  if(SF().timer&&sessionElapsedMin()>25)ctx.fatigue=true;   // Müdigkeitsfaktor ab Min 25
  if(!study.free){schedule(c,r,ctx);saveAndSync()}
  study._lastR=r;
  if(SF().confidence&&study.confidence!=null){            // Vorhersage vs. Realität
    const real=['Nochmal','Schwer','Gut','Einfach'][r];
    const ok=(study.confidence>=3)===(r>=2);
    toast('Vorhersage '+study.confidence+'★ → '+real,ok?'ok':'err');
  }
  if(SF().emotion&&!study.free){renderEmotionStep();return} // erst Emotion abfragen, dann weiter
  advanceCard(r);
}
function renderEmotionStep(){
  const a=$('rateArea');if(!a)return;
  a.innerHTML=`<div class="emo-lab">Wie war diese Karte?</div><div class="emo-row">
    <button class="emo-btn" data-e="0">🔥<small>interessant</small></button>
    <button class="emo-btn" data-e="1">😴<small>langweilig</small></button>
    <button class="emo-btn" data-e="2">😤<small>frustrierend</small></button></div>`;
  a.querySelectorAll('[data-e]').forEach(b=>b.onclick=()=>{const e=+b.dataset.e;if(!study.free){applyEmotionalBonus(study.items[0].c,e);save()}advanceCard(study._lastR)});
}
function advanceCard(r){
  haptic();
  const it=study.items.shift();
  study.done++;r===0?study.again++:study.good++;
  if(r===0&&!study.free){it._re=true;study.items.splice(Math.min(study.items.length,3+Math.floor(Math.random()*3)),0,it)}
  study.flipped=false;study.confidence=null;
  const fc=$('fc');
  if(fc&&study.items.length){fc.classList.add('slide-out');setTimeout(render,150)}else render();
}
function rFin(){
  clearInterval(sessTick);sessTick=null;
  const acc=study.done?Math.round(study.good/study.done*100):100;
  const msg=acc>=90?'Hervorragend.':acc>=70?'Gut gemacht.':'Dranbleiben zahlt sich aus.';
  screen.innerHTML=`<div class="fin">
    <div class="emo">[✓]</div><h2>${msg}</h2><p>SESSION FERTIG · ${esc(study.name).toUpperCase()}</p>
    <div class="fin-stats">
      <div class="fin-stat"><b>${study.done}</b><span>Karten</span></div>
      <div class="fin-stat"><b style="color:var(--green)">${acc}%</b><span>Richtig</span></div>
      <div class="fin-stat"><b>${calcStreak()}</b><span>Streak</span></div>
    </div>
    <button class="btn btn-acc btn-block" id="finOk">Fertig</button>
  </div>`;
  $('finOk').onclick=()=>{study=null;tab='home';render()};
}

/* ================= STATS ================= */
function calcStreak(){let s=0;for(let i=0;i<999;i++){const k=dkey(Date.now()-i*DAY);if((DB.log[k]||{}).n>0)s++;else if(i>0)break}return s}
function rStats(){
  const all=DB.decks.flatMap(d=>d.cards);
  let nw=0,du=0,ok=0,mature=0;
  all.forEach(c=>{const s=state(c);s==='new'?nw++:s==='ok'?ok++:du++;if((c.interval||0)>=21)mature++});
  const totalRev=Object.values(DB.log).reduce((a,b)=>a+b.n,0);
  const totalAgain=Object.values(DB.log).reduce((a,b)=>a+b.a,0);
  const retention=totalRev?Math.round((totalRev-totalAgain)/totalRev*100):100;
  const cells=[];for(let i=0;i<105;i++){const v=(DB.log[dkey(Date.now()-i*DAY)]||{}).n||0;cells.push(v===0?'':v<10?'h1':v<25?'h2':'h3')}
  const fc=[];for(let i=0;i<7;i++){const t0=today()+i*DAY;fc.push({l:i===0?'Heute':new Date(t0).toLocaleDateString('de',{weekday:'short'}).slice(0,2),v:all.filter(c=>state(c)!=='new'&&c.due>=t0&&c.due<t0+DAY||(i===0&&(state(c)==='due'||state(c)==='learn'))).length})}
  const fmx=Math.max(4,...fc.map(d=>d.v));
  screen.innerHTML=`
  <div class="hdr"><div><h1>Statistik</h1><div class="sub">DEIN FORTSCHRITT</div></div><button class="iconbtn" id="thBtn">${themeIcon()}</button></div>
  <div class="sgrid">
    <div class="scard"><b>${calcStreak()}</b><span>Streak</span></div>
    <div class="scard"><b>${retention}%</b><span>Quote</span></div>
    <div class="scard"><b>${all.length}</b><span>Karten</span></div>
    <div class="scard"><b>${mature}</b><span>Langzeit</span></div>
    <div class="scard"><b>${totalRev}</b><span>Reviews</span></div>
    <div class="scard"><b style="color:var(--orange)">${nw+du}</b><span>Fällig</span></div>
  </div>
  <div class="panel"><h3>Aktivität · 15 Wochen</h3><div class="heat">${cells.map(c=>`<i class="${c}"></i>`).join('')}</div></div>
  <div class="panel"><h3>Prognose · fällige Karten</h3><div class="bars">${fc.map(d=>`<div class="c"><div class="b" style="height:${d.v/fmx*100}%${d.v===0?';opacity:.2':''}"></div><div class="l">${d.l}</div></div>`).join('')}</div></div>
  <div class="panel"><h3>Stapel-Fortschritt</h3>
  ${DB.decks.length?DB.decks.map(d=>{const s=dstats(d);return `<div class="dprog"><div class="t"><span>${d.emoji} ${esc(d.name)}</span><span>${s.ok}/${s.t}</span></div><div class="tr"><div class="fl" style="width:${s.t?s.ok/s.t*100:0}%;background:${d.color}"></div></div></div>`}).join(''):'<p style="color:var(--txt3);font-size:14px">Noch keine Stapel.</p>'}
  </div>`;
  $('thBtn').onclick=toggleTheme;
}

function syncSetupSheet(){
  const hasToken=syncToken();const hasGist=syncGistId();
  openSheet(`<div class="sh-h"><h2>☁️ Sync einrichten</h2><button class="iconbtn" onclick="closeSheet()">✕</button></div>
  <div class="sh-b" style="padding-bottom:calc(var(--sab)+24px)">
    <p style="color:var(--txt2);font-size:13px;margin-bottom:16px">Daten werden nur auf deinem GitHub Gist gespeichert. Weder Token noch Daten werden an andere Server gesendet.</p>
    <div style="margin-bottom:12px"><label style="font-size:12px;color:var(--txt2);display:block;margin-bottom:4px">GITHUB PERSONAL ACCESS TOKEN</label>
    <input id="syncTokInp" type="password" placeholder="ghp_..." value="${hasToken?'••••••••••••':''}" style="width:100%;padding:10px 12px;border-radius:var(--r);background:var(--surface2);border:1px solid var(--line2);color:var(--txt);font-family:var(--mono);font-size:13px"></div>
    <div style="margin-bottom:16px"><label style="font-size:12px;color:var(--txt2);display:block;margin-bottom:4px">GIST-ID</label>
    <input id="syncGistInp" type="text" placeholder="b296ed395e037c90c5ec922cc1a3329c" value="${hasGist||''}" style="width:100%;padding:10px 12px;border-radius:var(--r);background:var(--surface2);border:1px solid var(--line2);color:var(--txt);font-family:var(--mono);font-size:13px"></div>
    <button id="syncSaveBtn" style="width:100%;padding:13px;border-radius:var(--r);background:var(--acc);color:var(--acc-ink);font-weight:700;font-size:15px;margin-bottom:8px">Speichern & testen</button>
    ${hasToken?`<button id="syncDelBtn" style="width:100%;padding:11px;border-radius:var(--r);background:var(--surface2);color:var(--red);font-weight:600;font-size:14px">Sync deaktivieren</button>`:''}
  </div>`);
  $('syncSaveBtn').onclick=async()=>{
    const tok=$('syncTokInp').value.trim();
    const gid=$('syncGistInp').value.trim();
    if(!tok||tok==='••••••••••••'){toast('Bitte Token eingeben','err');return;}
    if(!gid){toast('Bitte Gist-ID eingeben','err');return;}
    localStorage.setItem(SYNC_TOKEN_KEY,tok);
    localStorage.setItem(SYNC_GIST_KEY,gid);
    toast('Teste Verbindung…','info');
    const r=await fetch(`https://api.github.com/gists/${gid}`,{headers:{'Authorization':'token '+tok}});
    if(r.ok){toast('✅ Verbindung erfolgreich!','ok');closeSheet();render();}
    else{toast('Fehler: '+r.status+' — Token oder Gist-ID prüfen','err');}
  };
  $('syncDelBtn')&&($('syncDelBtn').onclick=()=>{if(confirm('Sync wirklich deaktivieren?')){localStorage.removeItem(SYNC_TOKEN_KEY);localStorage.removeItem(SYNC_GIST_KEY);closeSheet();render();toast('Sync deaktiviert','ok');}});
}

  ${DB.decks.map(d=>`<button class="menu-item" data-p="${d.id}"><span class="mi" style="filter:none;border-left:3px solid ${d.color}">${d.emoji}</span><span>${esc(d.name)}<small>${d.cards.length} Karten</small></span><span class="arrow">→</span></button>`).join('')}
  </div></div>`);
  box.querySelectorAll('[data-p]').forEach(b=>b.onclick=()=>{const d=DB.decks.find(x=>x.id===b.dataset.p);closeSheet();cb(d)});
}

function deckSheet(id){
  const d=id?DB.decks.find(x=>x.id===id):null;
  const sel={e:d?.emoji||'🧠',c:d?.color||COLORS[0]};
  openSheet(`<div class="sh-h"><h2>${d?'Stapel bearbeiten':'Neuer Stapel'}</h2><button class="iconbtn" onclick="closeSheet()">✕</button></div>
  <div class="sh-b">
    <div class="fld"><label>Name</label><input id="dN" value="${d?esc(d.name):''}" placeholder="z.B. Anatomie · Knochen" maxlength="60"></div>
    <div class="fld"><label>Beschreibung (optional)</label><input id="dD" value="${d?esc(d.desc||''):''}" maxlength="100" placeholder="Kurzinfo"></div>
    <div class="fld"><label>Symbol</label><div class="epick" id="eP">${EMOJIS.map(e=>`<button data-e="${e}" class="${e===sel.e?'sel':''}">${e}</button>`).join('')}</div></div>
    <div class="fld"><label>Farbe</label><div class="cpick" id="cP">${COLORS.map(c=>`<button data-c="${c}" style="background:${c}" class="${c===sel.c?'sel':''}"></button>`).join('')}</div></div>
  </div>
  <div class="sh-f">
    <button class="btn btn-soft" onclick="closeSheet()">Abbrechen</button>
    <button class="btn btn-acc" id="dSave" style="flex:1">${d?'Speichern':'Erstellen'}</button>
  </div>`);
  $('eP').querySelectorAll('button').forEach(b=>b.onclick=()=>{sel.e=b.dataset.e;$('eP').querySelectorAll('button').forEach(x=>x.classList.toggle('sel',x===b))});
  $('cP').querySelectorAll('button').forEach(b=>b.onclick=()=>{sel.c=b.dataset.c;$('cP').querySelectorAll('button').forEach(x=>x.classList.toggle('sel',x===b))});
  $('dSave').onclick=()=>{
    const name=$('dN').value.trim();if(!name)return $('dN').focus();
    if(d){d.name=name;d.desc=$('dD').value.trim();d.emoji=sel.e;d.color=sel.c}
    else{const nd={id:uid(),name,desc:$('dD').value.trim(),emoji:sel.e,color:sel.c,cards:[],created:Date.now()};DB.decks.push(nd);curDeck=nd}
    save();closeSheet();toast(d?'Gespeichert':'Stapel erstellt','ok');render();
  };
}

function deckMenuSheet(d){
  openSheet(`<div class="sh-h"><h2>${d.emoji} ${esc(d.name)}</h2><button class="iconbtn" onclick="closeSheet()">✕</button></div>
  <div class="sh-b" style="padding-bottom:calc(var(--sab) + 24px)"><div class="menu-list">
    <button class="menu-item" id="dmEdit"><span class="mi">✏️</span><span>Bearbeiten<small>Name, Symbol, Farbe</small></span><span class="arrow">→</span></button>
    <button class="menu-item" id="dmShare"><span class="mi">📤</span><span>Teilen / Exportieren<small>Als Datei an Kommilitonen senden</small></span><span class="arrow">→</span></button>
    <button class="menu-item" id="dmReset"><span class="mi">↺</span><span>Lernfortschritt zurücksetzen<small>Alle Karten wieder auf „neu“</small></span></button>
    <button class="menu-item danger" id="dmDel"><span class="mi">🗑️</span><span>Stapel löschen<small>${d.cards.length} Karten werden gelöscht</small></span></button>
  </div></div>`);
  $('dmEdit').onclick=()=>deckSheet(d.id);
  $('dmShare').onclick=()=>{exportDeck(d);closeSheet()};
  $('dmReset').onclick=()=>{if(confirm('Lernfortschritt aller Karten zurücksetzen?')){d.cards.forEach(c=>{c.reps=0;c.ease=2.5;c.interval=0;c.due=today();delete c.last;delete c.learning});save();closeSheet();toast('Zurückgesetzt','ok');render()}};
  $('dmDel').onclick=()=>{if(confirm(`„${d.name}" mit ${d.cards.length} Karten löschen?`)){DB.decks=DB.decks.filter(x=>x.id!==d.id);save();closeSheet();curDeck=null;toast('Gelöscht','ok');render()}};
}

function cardSheet(id){
  const d=curDeck;const c=id?d.cards.find(x=>x.id===id):null;
  openSheet(`<div class="sh-h"><h2>${c?'Karte bearbeiten':'Neue Karte'}</h2><button class="iconbtn" onclick="closeSheet()">✕</button></div>
  <div class="sh-b">
    <div class="fld"><label>Vorderseite · Frage</label><textarea id="cQ" placeholder="Frage… oder Lückentext mit {{Lücke}}">${c?esc(c.q):''}</textarea>
    <div class="note">**fett** · *kursiv* · {{Lücke}} für Lückentext</div></div>
    <div class="fld"><label>Rückseite · Antwort <span style="text-transform:none;letter-spacing:0">(bei Lückentext optional)</span></label><textarea id="cA" placeholder="Antwort…">${c?esc(c.a):''}</textarea></div>
    <div class="fld"><label>Tags (mit Komma trennen)</label><input id="cT" value="${c?esc((c.tags||[]).join(', ')):''}" placeholder="klausur, kapitel-3"></div>
  </div>
  <div class="sh-f">
    ${c?`<button class="btn btn-soft" id="cDel" style="color:var(--red)">Löschen</button>`:`<button class="btn btn-soft" id="cMore">＋ Weitere</button>`}
    <button class="btn btn-acc" id="cSave" style="flex:1">Speichern</button>
  </div>`);
  $('cQ').focus();
  const doSave=()=>{
    const q=$('cQ').value.trim(),a=$('cA').value.trim();
    if(!q||(!a&&!/\{\{.+?\}\}/.test(q))){toast('Frage + Antwort (oder {{Lücke}}) nötig','err');return false}
    const tags=$('cT').value.split(',').map(t=>t.trim().toLowerCase()).filter(Boolean);
    if(c){c.q=q;c.a=a;c.tags=tags}
    else d.cards.push({id:uid(),q,a,tags,reps:0,ease:2.5,interval:0,due:today(),created:Date.now()});
    save();return true;
  };
  $('cSave').onclick=()=>{if(doSave()){closeSheet();toast(c?'Gespeichert':'Karte hinzugefügt','ok');render()}};
  $('cMore')&&($('cMore').onclick=()=>{if(doSave()){$('cQ').value='';$('cA').value='';$('cT').value='';$('cQ').focus();toast('Hinzugefügt — nächste','ok')}});
  $('cDel')&&($('cDel').onclick=()=>{if(confirm('Karte löschen?')){d.cards=d.cards.filter(x=>x.id!==c.id);save();closeSheet();toast('Gelöscht','ok');render()}});
}

function csvSheet(){
  if(!DB.decks.length){toast('Erstelle zuerst einen Stapel','err');return deckSheet()}
  openSheet(`<div class="sh-h"><h2>Text-Import</h2><button class="iconbtn" onclick="closeSheet()">✕</button></div>
  <div class="sh-b">
    <div class="fld"><label>Ziel-Stapel</label><select id="iD">${DB.decks.map(d=>`<option value="${d.id}">${d.emoji} ${esc(d.name)}</option>`).join('')}</select></div>
    <div class="fld"><label>Karten einfügen — eine pro Zeile</label>
    <textarea id="iT" style="min-height:150px" placeholder="Frage; Antwort&#10;Mitochondrium; Kraftwerk der Zelle&#10;ATP ist {{Adenosintriphosphat}}"></textarea>
    <div class="note">Trenner: ; Tab oder | — Zeile mit {{Lücke}} ohne Trenner = Lückentext</div></div>
  </div>
  <div class="sh-f"><button class="btn btn-soft" onclick="closeSheet()">Abbrechen</button><button class="btn btn-acc" id="iGo" style="flex:1">Importieren</button></div>`);
  $('iGo').onclick=()=>{
    const d=DB.decks.find(x=>x.id===$('iD').value);
    const lines=$('iT').value.split('\n').map(l=>l.trim()).filter(Boolean);let n=0;
    lines.forEach(l=>{
      const p=l.split(/\t|;|\|/).map(s=>s.trim());
      if(p.length>=2&&p[0]&&p[1]){d.cards.push(mkCard(p[0],p.slice(1).join(' — ')));n++}
      else if(/\{\{.+?\}\}/.test(l)){d.cards.push(mkCard(l,''));n++}
    });
    save();closeSheet();n?toast(`${n} Karten importiert`,'ok'):toast('Keine gültigen Zeilen gefunden','err');render();
  };
}
const mkCard=(q,a,tags)=>({id:uid(),q,a,tags:tags||[],reps:0,ease:2.5,interval:0,due:today(),created:Date.now()});

function shareSheet(){
  if(!DB.decks.length)return toast('Keine Stapel vorhanden','err');
  pickDeckSheet(d=>exportDeck(d));
}
function freeSheet(){
  if(DB.decks.length===1)return freeStart(DB.decks[0]);
  pickDeckSheet(d=>freeStart(d));
}

/* ================= IO ================= */
function exportDeck(d){dl(`stapel-${slug(d.name)}.json`,JSON.stringify({type:'cards-deck',v:2,deck:d}));toast('Exportiert — Datei jetzt teilen','ok')}
function importFile(){
  const inp=document.createElement('input');inp.type='file';inp.accept='.json,application/json,.txt';
  inp.onchange=()=>{const f=inp.files[0];if(!f)return;const r=new FileReader();
    r.onload=()=>{try{
      const data=JSON.parse(r.result);
      if((data.type==='cards-deck'||data.type==='karteikarten-deck')&&data.deck){addDeck(data.deck);toast(`„${data.deck.name}" importiert`,'ok')}
      else if((data.type==='cards-backup'||data.type==='karteikarten-backup')&&Array.isArray(data.decks)){data.decks.forEach(addDeck);toast(`${data.decks.length} Stapel importiert`,'ok')}
      else toast('Unbekanntes Format','err');
      save();closeSheet();render();
    }catch(e){toast('Datei nicht lesbar','err')}};
    r.readAsText(f)};
  inp.click();
}
function addDeck(d){
  DB.decks.push({id:uid(),name:d.name||'Importiert',desc:d.desc||'',emoji:d.emoji||'📚',color:d.color||COLORS[0],created:Date.now(),
    cards:(d.cards||[]).map(c=>({id:uid(),q:c.q||'',a:c.a||'',fig:c.fig||'',explain:c.explain||'',why:c.why||'',tags:c.tags||[],reps:c.reps||0,ease:c.ease||2.5,interval:c.interval||0,due:c.due||today(),last:c.last||c.lastReview,learning:c.learning,lapses:c.lapses,created:c.created||Date.now()}))});
}
function dl(name,content){const u=URL.createObjectURL(new Blob([content],{type:'application/json'}));const a=document.createElement('a');a.href=u;a.download=name;a.click();setTimeout(()=>URL.revokeObjectURL(u),500)}
const slug=s=>s.toLowerCase().replace(/[^a-z0-9äöüß]+/g,'-').replace(/^-|-$/g,'').slice(0,40)||'stapel';

/* ================= MISC ================= */
function shuffle(a){for(let i=a.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[a[i],a[j]]=[a[j],a[i]]}return a}
let toastT;
function toast(m,t){const el=$('toast');$('toastMsg').textContent=m;$('toastIco').textContent=t==='ok'?'✓':t==='info'?'↻':'!';el.className='show '+(t||'');el.id='toast';clearTimeout(toastT);toastT=setTimeout(()=>el.classList.remove('show'),2400)}
const THEME_NEXT={dark:'light',light:'night',night:'dark'};
const THEME_COLOR={dark:'#0c0c0d',light:'#f1f1ed',night:'#0a0705'};
function themeIcon(){const t=document.body.dataset.theme;
  if(t==='night')return '<svg viewBox="0 0 24 24" fill="currentColor"><path d="M21 12.8A9 9 0 1 1 11.2 3a7 7 0 0 0 9.8 9.8Z"/></svg>';
  return t==='dark'
  ?'<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><path d="M21 12.8A9 9 0 1 1 11.2 3a7 7 0 0 0 9.8 9.8Z"/></svg>'
  :'<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><circle cx="12" cy="12" r="4.5"/><path d="M12 2v2.5M12 19.5V22M4.9 4.9l1.8 1.8M17.3 17.3l1.8 1.8M2 12h2.5M19.5 12H22M4.9 19.1l1.8-1.8M17.3 6.7l1.8-1.8"/></svg>'}
function setTheme(t){document.body.dataset.theme=t;DB.settings.theme=t;save();document.querySelector('meta[name=theme-color]').content=THEME_COLOR[t]||'#0c0c0d';render();closeSheet()}
function toggleTheme(){setTheme(THEME_NEXT[document.body.dataset.theme]||'dark')}

/* keyboard (desktop) */
document.addEventListener('keydown',e=>{
  if(wrap.classList.contains('show')){if(e.key==='Escape')closeSheet();return}
  if(study&&study.items.length){
    if(!study.flipped&&(e.key===' '||e.key==='Enter')){e.preventDefault();flip()}
    else if(study.flipped&&['1','2','3','4'].includes(e.key)){e.preventDefault();rate(+e.key-1)}
    else if(study.flipped&&e.key===' '){e.preventDefault();rate(2)}
  }
});

/* init */
document.body.dataset.theme=DB.settings.theme||'dark';
document.querySelector('meta[name=theme-color]').content=DB.settings.theme==='light'?'#f1f1ed':'#0c0c0d';
render();
// Auto-pull beim Start
if(syncConfigured())syncDown();
</script>
</body>

<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, user-scalable=no">
<meta name="theme-color" content="#0c0c0d">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<title>CARDS</title>
<style>
:root{
  --bg:#0c0c0d; --surface:#131315; --surface2:#19191c; --surface3:#222226;
  --line:#28282d; --line2:#3a3a41;
  --txt:#f2f2ef; --txt2:#9b9ba4; --txt3:#5c5c66;
  --acc:#d7fb3f; --acc-ink:#101204; --acc-dim:rgba(215,251,63,.12);
  --green:#5be49b; --green-soft:rgba(91,228,155,.1);
  --red:#ff6b5e; --red-soft:rgba(255,107,94,.1);
  --orange:#ffac42; --orange-soft:rgba(255,172,66,.1);
  --blue:#6cb8ff; --blue-soft:rgba(108,184,255,.1);
  --dot:#1c1c20;
  --r:10px; --r-lg:14px;
  --sat:env(safe-area-inset-top,0px); --sab:env(safe-area-inset-bottom,0px);
  --font:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,"Helvetica Neue",sans-serif;
  --mono:ui-monospace,"SF Mono","Cascadia Code",Consolas,monospace;
}
[data-theme="light"]{
  --bg:#f1f1ed; --surface:#fbfbf9; --surface2:#f3f3ef; --surface3:#e9e9e3;
  --line:#dededa; --line2:#c8c8c2;
  --txt:#141414; --txt2:#5f5f64; --txt3:#9c9ca0;
  --acc:#cdf32e; --acc-ink:#131502; --acc-dim:rgba(160,200,10,.14);
  --green:#0f9d58; --green-soft:rgba(15,157,88,.09);
  --red:#dd3b2e; --red-soft:rgba(221,59,46,.08);
  --orange:#d97a06; --orange-soft:rgba(217,122,6,.09);
  --blue:#1769c4; --blue-soft:rgba(23,105,196,.08);
  --dot:#dcdcd6;
}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
html{height:100%}
body{min-height:100%;background:var(--bg);background-image:radial-gradient(var(--dot) 1px,transparent 1px);background-size:24px 24px;background-position:-1px -1px;color:var(--txt);font-family:var(--font);font-size:15.5px;line-height:1.5;-webkit-font-smoothing:antialiased;overscroll-behavior-y:none}
button{font:inherit;color:inherit;background:none;border:none;cursor:pointer;touch-action:manipulation}
input,textarea,select{font:inherit}
::selection{background:var(--acc);color:var(--acc-ink)}
h1,h2,h3{letter-spacing:-.03em}

/* ===== shell ===== */
#screen{padding:calc(var(--sat) + 16px) 18px calc(var(--sab) + 92px);max-width:640px;margin:0 auto;animation:sIn .22s ease-out}
@keyframes sIn{from{opacity:0;transform:translateY(6px)}}
@media(min-width:900px){#screen{max-width:740px}}

/* ===== tab bar — flat technical strip ===== */
#tabbar{position:fixed;bottom:0;left:0;right:0;z-index:50;background:var(--surface);border-top:1px solid var(--line);padding-bottom:var(--sab)}
.tab-inner{display:flex;max-width:640px;margin:0 auto;align-items:stretch}
.tab{flex:1;display:flex;flex-direction:column;align-items:center;gap:3px;padding:11px 0 10px;color:var(--txt3);font-size:9.5px;font-weight:700;letter-spacing:.12em;text-transform:uppercase;font-family:var(--mono);position:relative;transition:color .15s}
.tab svg{width:21px;height:21px}
.tab.active{color:var(--txt)}
.tab.active::before{content:"";position:absolute;top:-1px;left:20%;right:20%;height:2px;background:var(--acc)}
.tab:active{transform:scale(.94)}
.tab-fab{align-self:center;width:46px;height:46px;background:var(--acc);color:var(--acc-ink);display:grid;place-items:center;border-radius:12px;margin:0 10px;transition:transform .12s}
.tab-fab:active{transform:scale(.88)}
.tab-fab svg{width:22px;height:22px}

/* ===== header ===== */
.hdr{display:flex;align-items:center;justify-content:space-between;gap:12px;margin-bottom:22px}
.hdr h1{font-size:26px;font-weight:800}
.hdr .sub{color:var(--txt2);font-size:11px;margin-top:3px;font-family:var(--mono);letter-spacing:.08em}
.iconbtn{width:42px;height:42px;border-radius:var(--r);background:var(--surface);border:1px solid var(--line);display:grid;place-items:center;color:var(--txt2);flex-shrink:0;transition:transform .12s,border-color .15s}
.iconbtn:active{transform:scale(.9);border-color:var(--line2)}
.iconbtn svg{width:19px;height:19px}

/* ===== buttons ===== */
.btn{display:inline-flex;align-items:center;justify-content:center;gap:8px;padding:13px 20px;border-radius:var(--r);font-weight:700;font-size:14.5px;transition:transform .12s;white-space:nowrap;letter-spacing:.01em}
.btn:active{transform:scale(.97)}
.btn-acc{background:var(--acc);color:var(--acc-ink)}
.btn-soft{background:var(--surface2);border:1px solid var(--line);color:var(--txt)}
.btn-block{width:100%}

/* ===== hero — editorial ===== */
.hero{background:var(--surface);border:1px solid var(--line2);border-radius:var(--r-lg);padding:0;margin-bottom:24px;position:relative;overflow:hidden}
.hero .hrule{display:flex;align-items:center;justify-content:space-between;padding:11px 18px;border-bottom:1px solid var(--line);font-family:var(--mono);font-size:10px;letter-spacing:.14em;color:var(--txt3);text-transform:uppercase}
.hero .hrule b{color:var(--acc);font-weight:700}
[data-theme="light"] .hero .hrule b{color:#84a811}
.hero .hbody{padding:20px 22px 24px;position:relative}
.hero .big{font-size:54px;font-weight:800;line-height:.92;letter-spacing:-.05em;font-variant-numeric:tabular-nums;display:flex;align-items:baseline;gap:12px}
.hero .big em{font-style:normal;font-size:62px;color:var(--acc)}
[data-theme="light"] .hero .big em{color:inherit;background:var(--acc);padding:0 6px;border-radius:6px;line-height:.9}
.hero .big.solo{font-size:40px}
.hero p{color:var(--txt2);font-size:13.5px;margin:10px 0 18px;max-width:78%}
.hero .scale{position:absolute;right:0;top:18px;bottom:70px;width:30px;display:flex;flex-direction:column;justify-content:space-between;align-items:flex-end;pointer-events:none}
.hero .scale i{height:1px;background:var(--line2)}
.hero .scale i:nth-child(odd){width:9px}
.hero .scale i:nth-child(even){width:16px}
.hero .scale i:nth-child(5){background:var(--acc);width:22px;height:2px}

/* ===== deck rows ===== */
.fachgroup{border:1px solid var(--line);border-radius:var(--r-lg);overflow:hidden;background:var(--surface);margin-bottom:14px}
.fachhead{display:flex;align-items:center;gap:13px;padding:15px 16px;cursor:pointer;position:relative;transition:background .15s}
.fachhead:active{background:var(--surface2)}
.fachhead .fchev{width:18px;height:18px;color:var(--txt3);flex-shrink:0;transition:transform .2s}
.fachgroup.open .fachhead .fchev{transform:rotate(90deg)}
.fachhead .femoji{width:40px;height:40px;border-radius:var(--r);display:grid;place-items:center;font-size:21px;flex-shrink:0;background:var(--surface2);border:1px solid var(--line)}
.fachhead .fmeta{flex:1;min-width:0}
.fachhead .fmeta h3{font-size:16.5px;font-weight:750;letter-spacing:-.01em}
.fachhead .finfo{font-size:11px;color:var(--txt2);margin-top:2px;font-family:var(--mono)}
.flearn{flex-shrink:0;padding:8px 13px;border-radius:999px;background:var(--acc);color:var(--acc-ink);font-weight:750;font-size:12.5px;white-space:nowrap;transition:transform .1s}
.flearn:active{transform:scale(.93)}
.fachgroup .deck-list{border:none;border-top:1px solid var(--line);border-radius:0}
.deck-list{display:flex;flex-direction:column;border:1px solid var(--line);border-radius:var(--r-lg);overflow:hidden;background:var(--surface)}
.deck{padding:16px 18px;display:flex;align-items:center;gap:15px;cursor:pointer;position:relative;transition:background .15s}
.deck+.deck{border-top:1px solid var(--line)}
.deck:active{background:var(--surface2)}
.deck .idx{font-family:var(--mono);font-size:11px;font-weight:700;color:var(--txt3);flex-shrink:0;letter-spacing:.04em;align-self:flex-start;margin-top:2px}
.deck .glyph{width:46px;height:46px;border-radius:var(--r);display:grid;place-items:center;font-size:22px;flex-shrink:0;background:var(--surface2);border:1px solid var(--line);border-left:3px solid var(--g,var(--acc))}
.deck .meta{flex:1;min-width:0}
.deck h3{font-size:16px;font-weight:700;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.deck .info{font-size:11px;color:var(--txt2);margin-top:3px;display:flex;gap:12px;font-family:var(--mono)}
.pip{display:inline-flex;align-items:center;gap:5px}
.pip i{width:6px;height:6px;display:inline-block;background:currentColor}
.deck .due-chip{font-family:var(--mono);background:var(--acc);color:var(--acc-ink);font-weight:800;font-size:13.5px;padding:6px 11px;border-radius:8px;flex-shrink:0;font-variant-numeric:tabular-nums}
.deck .ok-chip{color:var(--txt3);font-size:15px;flex-shrink:0;font-family:var(--mono)}
.deck .prog{position:absolute;bottom:0;left:0;height:2px;background:var(--g,var(--acc));opacity:.7}

.section-t{font-size:10.5px;font-weight:700;color:var(--txt3);text-transform:uppercase;letter-spacing:.16em;margin:26px 0 10px;font-family:var(--mono);display:flex;align-items:center;gap:10px}
.section-t::after{content:"";flex:1;height:1px;background:var(--line)}

/* ===== empty ===== */
.empty{text-align:center;padding:54px 24px;color:var(--txt2)}
.empty .art{font-size:40px;margin-bottom:16px;color:var(--txt3);font-family:var(--mono)}
.empty h2{color:var(--txt);font-size:20px;font-weight:800;margin-bottom:7px}
.empty p{font-size:14px;margin-bottom:22px}

/* ===== study ===== */
.study-hd{display:flex;align-items:center;gap:13px;margin-bottom:14px}
.study-hd .bar{flex:1;height:4px;background:var(--surface3);overflow:hidden;border-radius:2px}
.study-hd .fill{height:100%;background:var(--acc);transition:width .35s cubic-bezier(.3,.8,.3,1)}
.study-hd .cnt{font-size:13px;font-weight:700;color:var(--txt2);min-width:34px;text-align:right;font-family:var(--mono);font-variant-numeric:tabular-nums}
.study-pills{display:flex;justify-content:center;gap:7px;margin-bottom:14px}
.spill{font-size:10px;font-weight:700;padding:4px 11px;border-radius:6px;font-family:var(--mono);letter-spacing:.06em;text-transform:uppercase;border:1px solid var(--line)}
.spill.n{color:var(--blue)} .spill.l{color:var(--red)} .spill.r{color:var(--green)}

.card-stage{perspective:1400px;min-height:380px;margin-bottom:16px;position:relative}
@media(min-height:760px){.card-stage{min-height:max(380px,calc(100dvh - 410px))}}
.fcard{position:absolute;inset:0;transform-style:preserve-3d;transition:transform .45s cubic-bezier(.3,.9,.35,1);cursor:pointer}
.fcard.flipped{transform:rotateY(180deg)}
.fcard.slide-out{transition:transform .25s,opacity .25s;transform:translateX(-60px)!important;opacity:0}
.fcard.slide-in{animation:cIn .3s ease-out}
@keyframes cIn{from{transform:translateX(50px);opacity:0}}
.face{position:absolute;inset:0;backface-visibility:hidden;-webkit-backface-visibility:hidden;background:var(--surface);border:1px solid var(--line2);border-radius:var(--r-lg);display:flex;flex-direction:column;padding:20px 22px;overflow:hidden}
.face::after{content:"";position:absolute;top:10px;right:10px;width:14px;height:14px;border-top:2px solid var(--acc);border-right:2px solid var(--acc)}
.face::before{content:"";position:absolute;bottom:10px;left:10px;width:14px;height:14px;border-bottom:2px solid var(--line2);border-left:2px solid var(--line2)}
.face.back{transform:rotateY(180deg)}
.face.back::after{border-color:var(--green)}
.face .tag-line{display:flex;align-items:center;justify-content:space-between;margin-bottom:6px;gap:8px}
.face .side-lab{font-size:10px;font-weight:700;letter-spacing:.18em;text-transform:uppercase;color:var(--txt3);font-family:var(--mono)}
.face .side-lab.ans{color:var(--green)}
.face .body{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;text-align:center;overflow-y:auto;width:100%;gap:12px;padding:8px 0}
.face .qtxt{font-size:clamp(18px,5.5vw,24px);font-weight:650;line-height:1.42;word-break:break-word;white-space:pre-wrap;width:100%}
.face .qtxt.long{font-size:clamp(15px,4.2vw,17.5px);font-weight:500}
.face .hint-foot{text-align:center;color:var(--txt3);font-size:10px;padding-top:8px;font-family:var(--mono);letter-spacing:.12em;text-transform:uppercase}
.face .small-q{font-size:13px;color:var(--txt2);border-bottom:1px solid var(--line);padding-bottom:10px;margin-bottom:4px;white-space:pre-wrap;max-height:74px;overflow-y:auto;width:100%;text-align:center}
.cardfig{width:100%;display:flex;justify-content:center;margin-top:6px;padding:10px 6px;background:var(--surface2);border:1px solid var(--line);border-radius:var(--r)}
.cardfig svg{display:block}
/* ===== Nachtmodus: maximal blau-reduziert, warm & augenschonend ===== */
[data-theme="night"]{
  --bg:#0a0705; --surface:#15100b; --surface2:#1c1610; --surface3:#251d14;
  --line:#2a2018; --line2:#3d2e20;
  --txt:#ecdcc4; --txt2:#b89b78; --txt3:#7a6347;
  --acc:#ff9f45; --acc-ink:#1a0f04; --acc-dim:rgba(255,159,69,.12);
  --red:#e8896b; --red-soft:rgba(232,137,107,.12);
  --blue:#d8a96b; --blue-soft:rgba(216,169,107,.12);
  --green:#cbb463; --dot:#1c150d;
}
[data-theme="night"] body{filter:brightness(.96)}
/* ===== Smart-Features: Toggle-Switch & Settings ===== */
.switch{width:42px;height:24px;border-radius:999px;background:var(--line2);position:relative;flex-shrink:0;transition:background .15s}
.switch::after{content:"";position:absolute;top:2px;left:2px;width:20px;height:20px;border-radius:50%;background:var(--txt2);transition:transform .15s,background .15s}
.switch.on{background:var(--acc)}.switch.on::after{transform:translateX(18px);background:var(--acc-ink)}
.sf-head{font-size:10.5px;font-weight:700;color:var(--txt3);text-transform:uppercase;letter-spacing:.14em;font-family:var(--mono);padding:12px 14px 4px}
.sf-item .switch{margin-left:auto}
/* ===== Confidence-Rating ===== */
.conf-wrap{display:flex;flex-direction:column;gap:9px;align-items:center}
.conf-lab{font-size:13px;color:var(--txt2);font-weight:600}.conf-lab span{color:var(--txt3);font-size:11px}
.conf-row{display:flex;gap:8px;width:100%}
.conf-btn{flex:1;padding:15px 0;border-radius:var(--r);background:var(--surface2);border:1px solid var(--line2);font-weight:750;font-size:17px;color:var(--txt);transition:transform .1s}
.conf-btn:active{transform:scale(.94)}.conf-btn.on{background:var(--acc);color:var(--acc-ink);border-color:var(--acc)}
.pred{font-size:12.5px;color:var(--txt2);text-align:center;margin-bottom:8px}.pred b{color:var(--acc)}
/* ===== Erklärung / Denkanstoß ===== */
.why-btn,.explain-btn{display:block;width:100%;padding:12px;border-radius:var(--r);background:var(--surface2);border:1px dashed var(--line2);color:var(--txt);font-weight:650;font-size:13.5px;margin-bottom:8px;transition:transform .1s}
.why-btn:active,.explain-btn:active{transform:scale(.97)}
.explain-btn{border-style:solid;border-color:var(--acc);color:var(--acc)}
.why-box,.explain-box{display:none;background:var(--surface2);border:1px solid var(--line);border-radius:var(--r);padding:13px 15px;margin-bottom:10px;font-size:13.5px;line-height:1.58;color:var(--txt);text-align:left;white-space:pre-wrap}
.why-box.show,.explain-box.show{display:block}
/* ===== Emotional Tagging ===== */
.emo-lab{font-size:12.5px;color:var(--txt2);text-align:center;margin-bottom:8px}
.emo-row{display:flex;gap:8px}
.emo-btn{flex:1;display:flex;flex-direction:column;align-items:center;gap:3px;padding:12px 0;border-radius:var(--r);background:var(--surface2);border:1px solid var(--line2);font-size:22px;transition:transform .1s}
.emo-btn small{font-size:10px;color:var(--txt2);font-weight:600}.emo-btn:active{transform:scale(.93)}
/* ===== Session-Timer ===== */
.sess-clock{font-family:var(--mono);font-size:13px;font-weight:700;color:var(--txt2);font-variant-numeric:tabular-nums}
.sess-clock.warn{color:var(--red)}
/* ===== Intelligente Features ===== */
.sf-head{font-size:11px;font-weight:700;color:var(--txt2);text-transform:uppercase;letter-spacing:.1em;font-family:var(--mono);margin:22px 4px 8px;display:flex;justify-content:space-between;align-items:baseline}
.sf-head span{font-size:9px;color:var(--txt3);text-transform:none;letter-spacing:0}
.switch{flex-shrink:0;width:42px;height:24px;border-radius:999px;background:var(--surface3);border:1px solid var(--line2);position:relative;transition:background .18s,border-color .18s}
.switch i{position:absolute;top:2px;left:2px;width:18px;height:18px;border-radius:50%;background:var(--txt2);transition:transform .18s,background .18s}
.switch.on{background:var(--acc);border-color:var(--acc)}
.switch.on i{transform:translateX(18px);background:var(--acc-ink)}
.sess-clock{font-family:var(--mono);font-size:12px;font-weight:700;color:var(--txt2);padding:3px 8px;border-radius:7px;background:var(--surface2);border:1px solid var(--line);flex-shrink:0}
.sess-clock.warn{color:var(--red);border-color:var(--red)}
.conf-wrap{text-align:center}
.conf-lab{font-size:13px;color:var(--txt2);margin-bottom:10px;font-weight:600}.conf-lab span{color:var(--txt3);font-size:11px}
.conf-row{display:flex;gap:8px}
.conf-btn{flex:1;padding:16px 0;border-radius:var(--r);background:var(--surface2);border:1px solid var(--line2);font-size:20px;font-weight:800;color:var(--txt);transition:transform .1s,background .12s,border-color .12s}
.conf-btn:active{transform:scale(.94)}
.conf-btn.on{background:var(--blue);border-color:var(--blue);color:#fff}
.pred{text-align:center;font-size:12px;color:var(--txt2);margin-bottom:10px}.pred b{color:var(--acc);letter-spacing:1px}
.why-btn{width:100%;padding:11px;border-radius:var(--r);background:var(--blue-soft);border:1px dashed var(--blue);color:var(--blue);font-weight:650;font-size:13px;margin-bottom:10px}
.why-box{display:none;background:var(--surface2);border:1px solid var(--line);border-left:3px solid var(--blue);border-radius:var(--r);padding:12px 14px;margin-bottom:12px;font-size:14px;color:var(--txt);text-align:left;white-space:pre-wrap}
.why-box.show{display:block}
.emo-lab{text-align:center;font-size:12px;color:var(--txt2);margin-bottom:10px}
.emo-row{display:flex;gap:8px}
.emo-btn{flex:1;display:flex;flex-direction:column;align-items:center;gap:4px;padding:12px 0;border-radius:var(--r);background:var(--surface2);border:1px solid var(--line2);font-size:24px;transition:transform .1s,border-color .12s}
.emo-btn:active{transform:scale(.93)}
.emo-btn small{font-size:10px;color:var(--txt2);font-weight:600}
.cloze-gap{background:var(--acc-dim);color:var(--acc);padding:1px 12px;border-radius:5px;font-weight:700;border-bottom:2px solid var(--acc)}
[data-theme="light"] .cloze-gap{color:#5e7404}
.cloze-rev{background:var(--green-soft);color:var(--green);padding:1px 8px;border-radius:5px;font-weight:700}
.fc-tags{display:flex;gap:5px;flex-wrap:wrap}
.fc-tag{font-size:9.5px;background:var(--surface3);color:var(--txt2);padding:2px 8px;border-radius:4px;font-weight:600;font-family:var(--mono);letter-spacing:.04em}

.rate-row{display:grid;grid-template-columns:repeat(4,1fr);gap:8px}
.rate-btn{padding:12px 4px;border-radius:var(--r);display:flex;flex-direction:column;align-items:center;gap:2px;font-weight:750;font-size:14px;border:1px solid var(--line);background:var(--surface);transition:transform .1s;border-bottom:3px solid var(--line)}
.rate-btn:active{transform:scale(.93)}
.rate-btn small{font-size:10px;font-weight:600;color:var(--txt3);font-family:var(--mono)}
.rate-btn.r0{color:var(--red);border-bottom-color:var(--red)}
.rate-btn.r1{color:var(--orange);border-bottom-color:var(--orange)}
.rate-btn.r2{color:var(--green);border-bottom-color:var(--green)}
.rate-btn.r3{color:var(--blue);border-bottom-color:var(--blue)}
.flip-cta{width:100%;padding:15px;border-radius:var(--r);background:var(--acc);color:var(--acc-ink);font-weight:800;font-size:15px;letter-spacing:.02em;transition:transform .12s}
.flip-cta:active{transform:scale(.97)}

/* done */
.fin{text-align:center;padding:44px 20px}
.fin .emo{font-size:46px;color:var(--acc);font-family:var(--mono);animation:pop .45s cubic-bezier(.3,1.5,.5,1)}
@keyframes pop{from{transform:scale(0)}}
.fin h2{font-size:25px;font-weight:800;margin:14px 0 6px}
.fin p{color:var(--txt2);margin-bottom:24px;font-family:var(--mono);font-size:11.5px;letter-spacing:.08em}
.fin-stats{display:flex;justify-content:center;margin-bottom:26px;border:1px solid var(--line);border-radius:var(--r-lg);overflow:hidden;background:var(--surface)}
.fin-stat{padding:16px 0;flex:1}
.fin-stat+.fin-stat{border-left:1px solid var(--line)}
.fin-stat b{font-size:24px;display:block;font-variant-numeric:tabular-nums}
.fin-stat span{font-size:9.5px;color:var(--txt3);font-weight:700;font-family:var(--mono);text-transform:uppercase;letter-spacing:.12em}

/* ===== browse ===== */
.searchbar{position:relative;margin-bottom:12px}
.searchbar input{width:100%;padding:12px 16px 12px 42px;border-radius:var(--r);background:var(--surface);border:1px solid var(--line);color:var(--txt);font-size:15px}
.searchbar input:focus{outline:none;border-color:var(--acc)}
.searchbar svg{position:absolute;left:14px;top:50%;transform:translateY(-50%);width:17px;height:17px;color:var(--txt3)}
.chip-row{display:flex;gap:6px;overflow-x:auto;padding-bottom:10px;margin-bottom:6px;scrollbar-width:none}
.chip-row::-webkit-scrollbar{display:none}
.chip{flex-shrink:0;font-size:11px;font-weight:700;padding:7px 13px;border-radius:7px;background:var(--surface);border:1px solid var(--line);color:var(--txt2);transition:.15s;font-family:var(--mono);letter-spacing:.04em}
.chip.on{background:var(--txt);border-color:var(--txt);color:var(--bg)}
.cardrow{background:var(--surface);border:1px solid var(--line);border-radius:var(--r);padding:12px 14px;margin-bottom:8px;display:flex;gap:12px;align-items:flex-start;cursor:pointer;transition:background .12s}
.cardrow:active{background:var(--surface2)}
.cardrow .dot{width:3px;align-self:stretch;border-radius:2px;flex-shrink:0}
.cardrow .txts{flex:1;min-width:0}
.cardrow .q{font-weight:650;font-size:14.5px;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden}
.cardrow .a{font-size:13px;color:var(--txt2);margin-top:2px;display:-webkit-box;-webkit-line-clamp:1;-webkit-box-orient:vertical;overflow:hidden}
.cardrow .ivl{font-size:9.5px;color:var(--txt3);font-weight:700;flex-shrink:0;margin-top:4px;font-family:var(--mono);text-transform:uppercase;letter-spacing:.08em}

/* ===== stats ===== */
.sgrid{display:grid;grid-template-columns:1fr 1fr 1fr;margin-bottom:14px;border:1px solid var(--line);border-radius:var(--r-lg);overflow:hidden;background:var(--surface)}
.scard{padding:16px 14px;border-right:1px solid var(--line);border-bottom:1px solid var(--line)}
.scard:nth-child(3n){border-right:none}
.scard:nth-child(n+4){border-bottom:none}
.scard b{font-size:23px;font-weight:800;display:block;line-height:1.15;font-variant-numeric:tabular-nums;letter-spacing:-.03em}
.scard span{font-size:9px;color:var(--txt3);font-weight:700;font-family:var(--mono);text-transform:uppercase;letter-spacing:.1em}
.panel{background:var(--surface);border:1px solid var(--line);border-radius:var(--r-lg);padding:18px;margin-bottom:14px}
.panel h3{font-size:10px;font-weight:700;margin-bottom:14px;font-family:var(--mono);text-transform:uppercase;letter-spacing:.14em;color:var(--txt2)}
.heat{display:grid;grid-template-columns:repeat(auto-fill,minmax(13px,1fr));gap:3px;direction:rtl}
.heat i{aspect-ratio:1;border-radius:2px;background:var(--surface3)}
.heat i.h1{background:#56641a}.heat i.h2{background:#94ad26}.heat i.h3{background:var(--acc)}
[data-theme="light"] .heat i.h1{background:#dbe9a0}[data-theme="light"] .heat i.h2{background:#b8d653}[data-theme="light"] .heat i.h3{background:#84a811}
.bars{display:flex;align-items:flex-end;gap:5px;height:110px}
.bars .c{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:flex-end;gap:5px;height:100%}
.bars .b{width:100%;max-width:26px;background:var(--acc);border-radius:3px 3px 0 0;min-height:3px;transition:height .5s}
.bars .l{font-size:9px;color:var(--txt3);font-weight:700;font-family:var(--mono);text-transform:uppercase}
.dprog{margin-bottom:13px}
.dprog .t{display:flex;justify-content:space-between;font-size:13px;margin-bottom:5px}
.dprog .t span:last-child{color:var(--txt2);font-family:var(--mono);font-size:11px}
.dprog .tr{height:5px;background:var(--surface3);border-radius:3px;overflow:hidden}
.dprog .fl{height:100%;transition:width .5s}

/* ===== sheets ===== */
.sheet-wrap{position:fixed;inset:0;z-index:100;display:none}
.sheet-wrap.show{display:block}
.sheet-bg{position:absolute;inset:0;background:rgba(0,0,0,.6);animation:fade .18s}
@keyframes fade{from{opacity:0}}
.sheet{position:absolute;bottom:0;left:0;right:0;background:var(--surface);border:1px solid var(--line2);border-bottom:none;border-radius:var(--r-lg) var(--r-lg) 0 0;max-height:92dvh;display:flex;flex-direction:column;animation:up .28s cubic-bezier(.2,.9,.3,1)}
@keyframes up{from{transform:translateY(100%)}}
@media(min-width:700px){.sheet{left:50%;right:auto;width:560px;border-radius:var(--r-lg);border-bottom:1px solid var(--line2);bottom:auto;top:50%;transform:translate(-50%,-50%);animation:pop2 .2s ease-out}
@keyframes pop2{from{transform:translate(-50%,-47%);opacity:0}}}
.sheet .grab{width:40px;height:4px;border-radius:2px;background:var(--line2);margin:10px auto 0;flex-shrink:0}
@media(min-width:700px){.sheet .grab{display:none}}
.sheet .sh-h{display:flex;align-items:center;justify-content:space-between;padding:14px 22px 4px;flex-shrink:0}
.sheet .sh-h h2{font-size:18px;font-weight:800}
.sheet .sh-b{padding:14px 22px;overflow-y:auto;flex:1}
.sheet .sh-f{padding:12px 22px calc(var(--sab) + 16px);display:flex;gap:10px;flex-shrink:0;border-top:1px solid var(--line)}
.fld{margin-bottom:15px}
.fld label{display:block;font-size:10px;font-weight:700;color:var(--txt2);margin-bottom:7px;font-family:var(--mono);text-transform:uppercase;letter-spacing:.1em}
.fld input,.fld textarea,.fld select{width:100%;padding:12px 14px;border-radius:var(--r);background:var(--surface2);border:1px solid var(--line);color:var(--txt);transition:border .15s}
.fld input:focus,.fld textarea:focus,.fld select:focus{outline:none;border-color:var(--acc)}
.fld textarea{resize:vertical;min-height:84px;line-height:1.5}
.fld .note{font-size:10.5px;color:var(--txt3);margin-top:5px;font-family:var(--mono)}
.epick{display:grid;grid-template-columns:repeat(8,1fr);gap:6px}
.epick button{aspect-ratio:1;border-radius:8px;background:var(--surface2);border:1px solid var(--line);font-size:19px;transition:.12s}
.epick button.sel{border-color:var(--acc);background:var(--acc-dim)}
.cpick{display:flex;gap:10px;flex-wrap:wrap}
.cpick button{width:32px;height:32px;border-radius:8px;border:2px solid transparent;transition:.12s}
.cpick button.sel{border-color:var(--txt);transform:scale(1.12)}
.menu-list{display:flex;flex-direction:column}
.menu-item{display:flex;align-items:center;gap:14px;padding:14px 4px;font-weight:650;font-size:15px;text-align:left;transition:opacity .15s;width:100%}
.menu-item+.menu-item{border-top:1px solid var(--line)}
.menu-item:active{opacity:.6}
.menu-item .mi{width:38px;height:38px;border-radius:var(--r);display:grid;place-items:center;font-size:17px;flex-shrink:0;background:var(--surface2);border:1px solid var(--line);filter:grayscale(1)}
.menu-item small{display:block;font-weight:500;font-size:11.5px;color:var(--txt3)}
.menu-item.danger{color:var(--red)}
.menu-item .arrow{margin-left:auto;color:var(--txt3);font-family:var(--mono)}

/* ===== toast ===== */
#toast{position:fixed;top:calc(var(--sat) + 14px);left:50%;transform:translateX(-50%) translateY(-90px);background:var(--txt);color:var(--bg);padding:10px 18px;border-radius:8px;z-index:300;transition:transform .3s cubic-bezier(.3,1.2,.4,1);font-weight:700;font-size:13.5px;display:flex;gap:8px;align-items:center;max-width:90vw}
#toast.show{transform:translateX(-50%) translateY(0)}
#toast .ti{font-family:var(--mono)}
#toast.ok .ti{color:#84a811}
#toast.err .ti{color:var(--red)}

.hidden{display:none!important}
kbd{background:var(--surface3);border:1px solid var(--line2);padding:1px 6px;border-radius:4px;font-size:11px;font-family:var(--mono)}
</style>
</head>

<script type="application/json" id="seedData">{"decks":[{"id":"bv-d1","name":"Grundlagen & Bauvorbereitung","desc":"Unternehmerformen, Vertragsformen, Planmanagement, Beweissicherung","emoji":"🏗️","color":"#6366f1","cards":[{"id":"bv-001","q":"Nenne die verschiedenen Unternehmerformen!","a":"Fachunternehmer\nGeneralunternehmer (GU)\nTotalunternehmer (TU)\nARGE (Arbeitsgemeinschaft)","tags":["Bauverfahren","Grundlagen"],"reps":0,"ease":2.5,"interval":0,"due":1781333299149,"created":1781246899149,"last":null,"learning":true,"lapses":0,"explain":"Der Fachunternehmer führt nur sein Gewerk aus (z.B. Elektriker, Maurer). Der Generalunternehmer (GU) übernimmt alle Bauleistungen — koordiniert Nachunternehmer, bleibt aber Hauptverantwortlicher. Der Totalunternehmer (TU) geht noch weiter und übernimmt zusätzlich die Planung. Die ARGE ist ein Zusammenschluss mehrerer Firmen für ein Großprojekt mit gesamtschuldnerischer Haftung. Merkhilfe: Fach=Spezialist, GU=Bau-Koordinator, TU=Planen+Bauen, ARGE=Firmen-Team."},{"id":"bv-002","q":"Nenne die verschiedenen Vertragsformen!","a":"Einheitspreisvertrag\nPauschalierter Einheitspreisvertrag\nPauschalierter Funktionalpreisvertrag","tags":["Bauverfahren","Grundlagen"],"reps":0,"ease":2.5,"interval":0,"due":1781333299149,"created":1781246899149,"last":null,"learning":true,"lapses":0,"explain":"Beim Einheitspreisvertrag wird jede Position mit einer Einheitspreis-Menge ausgeschrieben; abgerechnet wird nach tatsächlichem Aufmaß. Der pauschalierte Einheitspreisvertrag fixiert die Gesamtsumme, behält aber Einheitspreise für Nachträge. Der pauschalierte Funktionalpreisvertrag schreibt eine Funktion aus (z.B. \"Parkhaus für 500 Autos\") — der AN plant selbst. Je mehr pauschaliert wird, desto mehr Risiko trägt der Auftragnehmer."},{"id":"bv-003","q":"Nenne 3 Vorteile einer GU-Vergabe aus Bauherrensicht!","a":"Ein Ansprechpartner\nGU haftet komplett\nKürzere Bauzeit (eingespieltes Team)","tags":["Bauverfahren","Grundlagen"],"reps":0,"ease":2.5,"interval":0,"due":1781333299149,"created":1781246899149,"last":null,"learning":true,"lapses":0,"explain":"Ein Ansprechpartner statt vieler Einzelgewerke reduziert den Koordinationsaufwand des Bauherrn erheblich. Die Vollhaftung des GU bedeutet: Bei Mängeln muss er für alle Gewerke geradestehen, auch wenn Nachunternehmer schuld sind. Ein eingespieltes Team aus Stammfirmen kann schneller arbeiten, weil Schnittstellen bekannt sind. Merkhilfe: GU = \"Rundum-sorglos-Paket\" für den Bauherrn."},{"id":"bv-004","q":"Nenne 3 Nachteile einer GU-Vergabe!","a":"Geringere Flexibilität\nKein Mitspracherecht bei Nachunternehmern\nFachliche Qualität schwerer kontrollierbar","tags":["Bauverfahren","Grundlagen"],"reps":0,"ease":2.5,"interval":0,"due":1781333299149,"created":1781246899149,"last":null,"learning":true,"lapses":0,"explain":"Der Bauherr verliert Einfluss darauf, welche Nachunternehmer eingesetzt werden — er kennt sie oft nicht. Die fachliche Qualitätskontrolle ist schwieriger, weil zwischen Bauherr und ausführender Firma der GU steht. Geringere Flexibilität bei Planänderungen, da jede Änderung über den GU läuft und teurer werden kann. Merkhilfe: Mit dem GU kauft man Komfort, gibt aber Kontrolle ab."},{"id":"bv-005","q":"Nenne Bereiche der Bauvorbereitung!","a":"Baufeldbesichtigung\nBeweissicherung\nSpartenanalyse\nPlanmanagement\nÜbergabegespräch Bauleitung - Kalkulation\nÜbergabegespräch Bauleitung - Bauherr","tags":["Bauverfahren","Bauvorbereitung"],"reps":0,"ease":2.5,"interval":0,"due":1781333299149,"created":1781246899149,"last":null,"learning":true,"lapses":0,"explain":"Die Bauvorbereitung beginnt noch vor dem ersten Spatenstich. Baufeldbesichtigung: Ist das Gelände so wie geplant? Beweissicherung: Zustand von Nachbarbauwerken dokumentieren, bevor man Schäden verursacht. Spartenanalyse: Welche Leitungen (Strom, Gas, Wasser) verlaufen wo? Planmanagement: Wer bekommt welchen Plan wann? Das Übergabegespräch übergibt das Wissen von der Planungs- in die Ausführungsphase."},{"id":"bv-006","q":"Was wird beim Übergabegespräch Bauherr an Baufirma übergeben?","a":"Hauptachsen\nFestpunktnetz\nHöhenfestpunkt\nGrenzpunkte","tags":["Bauverfahren","Bauvorbereitung"],"reps":0,"ease":2.5,"interval":0,"due":1781333299149,"created":1781246899149,"last":null,"learning":true,"lapses":0,"explain":"Der Bauherr übergibt der Baufirma die geodätischen Grundlagen, die für eine lagetreue Ausführung notwendig sind. Hauptachsen definieren das Raster des Gebäudes. Das Festpunktnetz und der Höhenfestpunkt ermöglichen präzise Höhen- und Lagemessungen. Grenzpunkte zeigen, wo das Grundstück endet. Ohne diese Übergabe könnte die Baufirma das Gebäude nicht korrekt verorten."},{"id":"bv-007","q":"Nenne die Ziele des Planmanagements!","a":"Gezielte Planverteilung (virtueller Projektraum)\nLückenlose Dokumentation\nMaximale Prozessaktualität\nVorteile: Verfügbarkeit von überall, strukturierte Ablage, Historienverlauf, dynamische Suchfunktion, Zeitersparnis","tags":["Bauverfahren","Bauvorbereitung"],"reps":0,"ease":2.5,"interval":0,"due":1781333299149,"created":1781246899149,"last":null,"learning":true,"lapses":0,"explain":"Ein virtueller Projektraum (z.B. SharePoint, BIMcollab) stellt sicher, dass alle Beteiligten immer die aktuelle Planversion nutzen. Lückenlose Dokumentation schützt rechtlich — wer hat wann welchen Plan erhalten? Maximale Prozessaktualität verhindert, dass nach veralteten Plänen gebaut wird. Der Historienverlauf zeigt, wann welche Änderung gemacht wurde. Merkhilfe: Planmanagement = \"digitale Planverteilung mit Nachverfolgung\"."},{"id":"bv-008","q":"Welche 2 Voraussetzungen braucht eine Planverwaltung?","a":"Alle müssen mitmachen\nEinheitlicher Standard / gleicher Planschlüssel","tags":["Bauverfahren","Bauvorbereitung"],"reps":0,"ease":2.5,"interval":0,"due":1781333299149,"created":1781246899149,"last":null,"learning":true,"lapses":0,"explain":"Planmanagement funktioniert nur, wenn alle Beteiligten (Planer, Bauherr, Baufirma) das System nutzen — ein einzelner, der weiter E-Mails schickt, untergräbt das System. Ein einheitlicher Planschlüssel (Nummernschema) stellt sicher, dass Plan \"A-EG-01-Rev3\" für alle dasselbe bedeutet. Ohne diese Grundbedingungen entsteht Chaos mit mehreren umlaufenden Planversionen."},{"id":"bv-009","q":"Wer führt die Beweissicherung durch?","a":"Gutachter\nBauleitung (Fotos)\nMessprogramm (z.B. Setzungsmessungen)","tags":["Bauverfahren","Bauvorbereitung"],"reps":0,"ease":2.5,"interval":0,"due":1781333299149,"created":1781246899149,"last":null,"learning":true,"lapses":0,"explain":"Die Beweissicherung dokumentiert den Zustand von Nachbargebäuden, Straßen und Leitungen VOR Baubeginn — mit Fotos, Rissen, Setzungsmarkierungen. Ein unabhängiger Gutachter macht dies glaubwürdig. Das Messprogramm (z.B. Setzungsmessungen) läuft während der Bauzeit und zeigt, ob Bauaktivitäten Schäden verursachen. Ohne Beweissicherung kann man bei Streit nicht belegen, ob ein Riss schon vorher da war."},{"id":"bv-010","q":"Was versteht man unter einem Messprogramm im Beweissicherungsverfahren?","a":"Festlegung von Art, Ort und Haeufigkeit der Messungen vor Baubeginn, um Schaeden an Nachbarbauwerken dokumentieren und ggf. widerlegen zu koennen.","tags":["Bauverfahren","Bauvorbereitung"],"reps":0,"ease":2.5,"interval":0,"due":1781333299149,"created":1781246899149,"last":null,"learning":true,"lapses":0,"explain":"Vor Baubeginn wird festgelegt: Welche Messungen (Setzung, Risse, Grundwasser), an welchen Punkten, wie oft (täglich, wöchentlich). So entsteht ein lückenloser Datensatz, der im Schadensfall belegt, ob der Bauschaden durch das eigene Projekt verursacht wurde oder schon vorher bestand. Das Messprogramm ist ein rechtliches Schutzinstrument."},{"id":"bv-011","q":"Nenne 4 Messungen im Rahmen eines Messprogramms!","a":"Setzungsmessungen\nRissmessungen\nGrundwasserspiegelmessungen\nErschuetterungsmessungen\nNeigungsmessungen","tags":["Bauverfahren","Bauvorbereitung"],"reps":0,"ease":2.5,"interval":0,"due":1781333299149,"created":1781246899149,"last":null,"learning":true,"lapses":0,"explain":"Setzungsmessungen erfassen, ob Nachbarbauwerke absinken. Rissmessungen dokumentieren bestehende Risse und erkennen neue. Grundwasserspiegelmessungen zeigen, ob Grundwasserabsenkung Schäden an Fundament oder Vegetation verursacht. Erschütterungsmessungen schützen bei Rammarbeiten (Grenzwerte nach DIN 4150). Neigungsmessungen erfassen Schiefstellungen. Merkhilfe: Messen was sich bewegt, was sich verschiebt, was sich neigt."},{"id":"bv-012","q":"Was versteht man unter Einheitspreisvertrag?","a":"Verguetung nach tatsaechlich erbrachten Mengen x Einheitspreis.\nPreisrisiko beim Auftragnehmer, Mengenrisiko beim Auftraggeber.\nAbrechnung nach Aufmass.","tags":["Bauverfahren","Grundlagen"],"reps":0,"ease":2.5,"interval":0,"due":1781333299149,"created":1781246899149,"last":null,"learning":true,"lapses":0,"explain":"Beim Einheitspreisvertrag trägt der Auftraggeber das Mengenrisiko (wenn mehr oder weniger Material benötigt wird als geplant, ändert sich die Gesamtsumme) und der Auftragnehmer das Preisrisiko (der vereinbarte Einheitspreis bleibt). Abgerechnet wird nach Aufmaß — tatsächlich erbrachte Mengen × Einheitspreis. Das ist der häufigste Vertragstyp im deutschen Hochbau."},{"id":"bv-013","q":"Was ist eine ARGE und wie haftet sie?","a":"Arbeitsgemeinschaft mehrerer Firmen fuer ein Projekt.\nGesamtschuldnerische Haftung aller Partner.\nOrgane: Aufsichtsstelle, technische + kaufmaennische Geschaeftsfuehrung, Bauleitung.","tags":["Bauverfahren","Grundlagen"],"reps":0,"ease":2.5,"interval":0,"due":1781337176284,"created":1781250776284,"last":null,"learning":true,"lapses":0,"explain":"Eine ARGE (Arbeitsgemeinschaft) wird gegründet, wenn ein Projekt für eine Firma alleine zu groß ist oder wenn man Know-how bündeln will. Alle ARGE-Mitglieder haften gesamtschuldnerisch — der Bauherr kann jeden einzelnen für den gesamten Schaden in Anspruch nehmen. Die ARGE ist eine GbR (Gesellschaft bürgerlichen Rechts), also eine Gesellschaft ohne eigene Rechtspersönlichkeit."},{"id":"bv-014","q":"Unterschied GU vs. GUe (Generaluebernehmer)?","a":"GU: erbringt wesentliche Bauleistungen selbst + vergibt Rest an NU.\nGUe (Generaluebernehmer): erbringt KEINE Eigenleistung, vergibt alles an NU, koordiniert nur.","tags":["Bauverfahren","Grundlagen"],"reps":0,"ease":2.5,"interval":0,"due":1781337176284,"created":1781250776284,"last":null,"learning":true,"lapses":0,"explain":"Der GU führt wesentliche Bauleistungen selbst aus und vergibt den Rest an Nachunternehmer (NU). Der Generalübernehmer (GÜ) erbringt keine eigenen Bauleistungen — er koordiniert nur und vergibt alles an NU. Für den Bauherrn ist das Ergebnis ähnlich, aber beim GÜ ist die Kontrolle über die Ausführungsqualität noch schwieriger, weil kein direkter Handwerker dahintersteht."},{"id":"bv-015","q":"Was ist ein Totalunternehmer (TU)?","a":"Wie GU, aber zusaetzlich mit Planungsleistung. Uebernimmt also Planung UND Ausfuehrung aus einer Hand.","tags":["Bauverfahren","Grundlagen"],"reps":0,"ease":2.5,"interval":0,"due":1781337176284,"created":1781250776284,"last":null,"learning":true,"lapses":0,"explain":"Der Totalunternehmer (TU) übernimmt die Planungsverantwortung (Architekt, Statiker etc.) und die Ausführung aus einer Hand. Das ist attraktiv bei Projekten mit funktionaler Ausschreibung (\"Ich brauche ein Bürogebäude für 200 Personen mit diesen Anforderungen\"). Der Bauherr gibt viel Kontrolle ab, bekommt aber maximale Kostensicherheit (Totalpauschalpreis) und einen einzigen Ansprechpartner."},{"id":"bv-016","q":"Detail-Pauschalvertrag: Wer traegt welches Risiko?","a":"Auftragnehmer traegt das Mengenermittlungsrisiko (muss Mengen pruefen).\nAuftraggeber traegt das Vollstaendigkeitsrisiko des LV (fehlende Positionen = Nachtrag).\nGrundlage: detailliertes LV + Ausfuehrungsplaene.","tags":["Bauverfahren","Grundlagen"],"reps":0,"ease":2.5,"interval":0,"due":1781337176284,"created":1781250776284,"last":null,"learning":true,"lapses":0,"explain":"Beim Detail-Pauschalvertrag ist die Planung fertig (detailliertes LV vorhanden), die Menge aber pauschaliert. Der AN muss die Mengen aus den Plänen selbst prüfen — er trägt das Mengenrisiko. Der AG trägt das Vollständigkeitsrisiko (wenn er etwas vergessen hat, muss er es nachträglich beauftragen). Merkhilfe: Detail = Planung liegt vor, aber Menge ist pauschal."},{"id":"bv-017","q":"Global-Pauschalvertrag (funktionale Ausschreibung): Wer traegt welches Risiko?","a":"Auftragnehmer traegt BEIDE Risiken: Mengenermittlung UND Vollstaendigkeit.\nSchuldet alle Leistungen fuer das funktionsfaehige Leistungsziel.\nGrundlage: funktionale Baubeschreibung + Plaene.","tags":["Bauverfahren","Grundlagen"],"reps":0,"ease":2.5,"interval":0,"due":1781337176284,"created":1781250776284,"last":null,"learning":true,"lapses":0,"explain":"Beim Global-Pauschalvertrag schreibt der AG nur eine Funktion aus (z.B. \"Lagerhalle, 5000 m², 10 m Höhe\"). Der AN plant selbst, ermittelt Mengen selbst und trägt beide Risiken: Vollständigkeit (hat er alles eingeplant?) und Mengen (sind die Massen richtig?). Dafür hat der AG maximale Kostensicherheit. Merkhilfe: Global = AN trägt alles, AG zahlt nur den Pauschalpreis."},{"id":"bv-018","q":"Welche Buergschaften / Sicherheitsleistungen gibt es?","a":"Vertragserfuellungsbuergschaft: 10 % des Auftragwerts\nGewaehrleistungsbuergschaft: 5 % des Auftragwerts\n§650f BGB: Bauhandwerkersicherung (AN sichert Verguetungsanspruch)","tags":["Bauverfahren","Grundlagen"],"reps":0,"ease":2.5,"interval":0,"due":1781337176284,"created":1781250776284,"last":null,"learning":true,"lapses":0,"explain":"Die Vertragserfüllungsbürgschaft (10% des Auftragswerts) sichert den AG ab, falls der AN während der Bauphase insolvent wird oder nicht liefert. Die Gewährleistungsbürgschaft (5%) gilt nach Abnahme für die Mängelgewährleistung (üblicherweise 4-5 Jahre). Bürgschaften werden von Banken oder Versicherungen ausgestellt. Der AN muss diese Kosten im Angebot einkalkulieren."},{"id":"bv-019","q":"Wer nimmt am Uebergabegespraech (Projektbeteiligte) teil?","a":"Oberbauleiter/Bauleiter, Projektsteuerer, Kalkulator, Schluesselmitarbeiter aus Entwurfs-/Ausfuehrungsplanung (Architekt), Tragwerksplanung (Statiker), Bodengutachten (Geologe), Pruefingenieure, zustaendige Behoerden.","tags":["Bauverfahren","Bauvorbereitung"],"reps":0,"ease":2.5,"interval":0,"due":1781337176284,"created":1781250776284,"last":null,"learning":true,"lapses":0,"explain":"Das Übergabegespräch ist der interne Wissenstransfer von der Angebotsphase (Kalkulator kennt die Hintergründe des Preises) zur Ausführungsphase (Bauleitung muss damit bauen). Auch der Bauherr nimmt teil, um vertragliche Besonderheiten zu besprechen. Fehlender Wissenstransfer ist eine der häufigsten Ursachen für spätere Nachträge und Konflikte."},{"id":"bv-020","q":"Wer ist fuer Kampfmittelfreiheit verantwortlich und wie wird sondiert?","a":"Der Bauherr als \"Zustandsstoerer\" ist verantwortlich, muss vor Baubeginn untersuchen lassen.\nSondierung: Elektromagnetik, Radaraufnahmen, Baggeraufsicht, Luftbildauswertung, Sondierungsbohrungen.","tags":["Bauverfahren","Bauvorbereitung"],"reps":0,"ease":2.5,"interval":0,"due":1781337176284,"created":1781250776284,"last":null,"learning":true,"lapses":0,"explain":"Kampfmittel (Bomben aus dem 2. WK) sind ein Zustandsstörer-Problem: Der Eigentümer des Grundstücks ist verantwortlich, unabhängig davon, wer die Bomben gelegt hat. Vor Baubeginn muss der Bauherr eine Kampfmitteluntersuchung beauftragen (magnetische Sondierung). In manchen Bundesländern ist dies Pflicht. Findet man etwas, kommen Kampfmittelräumdienste."},{"id":"bv-021","q":"Was regelt VOB/B §3 zur Absteckung?","a":"Das Abstecken der Hauptachsen, der Grenzen des Gelaendes und das Schaffen der Hoehenfestpunkte in unmittelbarer Naehe der baulichen Anlagen sind Sache des Auftraggebers.","tags":["Bauverfahren","Bauvorbereitung"],"reps":0,"ease":2.5,"interval":0,"due":1781337176284,"created":1781250776284,"last":null,"learning":true,"lapses":0,"explain":"VOB/B §3 regelt die Mitwirkungspflichten des Auftraggebers: Er muss der Baufirma die Grundlagen für die Absteckung übergeben (Hauptachsen, Festpunkte, Höhenfestpunkt, Grenzpunkte). Die Absteckung selbst (Umsetzen dieser Punkte auf die Baustelle) ist dann Sache der Baufirma. Fehler bei der Übergabe gehen zu Lasten des AG, Fehler bei der Absteckung zu Lasten des AN."}],"created":1781246899149,"fach":"Bauverfahren"},{"id":"bv-d2","name":"Baustelleneinrichtung","desc":"Kraene, Betonpumpen, Unterkunft, Verkehrssicherung, Baustrassen","emoji":"🏠","color":"#f59e0b","cards":[{"id":"bv-101","q":"Warum benoetigt man eine Verkehrssicherung?","a":"Schutz der Fussgaenger\nSchutz von Personal & Baufeld\nSchutz des Strassenverkehrs\nRechtssicherheit","tags":["Bauverfahren","Baustelleneinrichtung"],"reps":0,"ease":2.5,"interval":0,"due":1781333299149,"created":1781246899149,"last":null,"learning":true,"lapses":0,"explain":"Ohne Verkehrssicherung auf einer Baustelle haftet die Baufirma für alle Unfälle. Rechtssicherheit bedeutet: Wer die Vorschriften (RSA-95, DGUV) einhält, kann seine Sorgfaltspflicht nachweisen. Der Schutz des Straßenverkehrs vor hereinragenden Bauteilen, Staub und unkontrolliertem Fahrzeugverkehr ist genauso wichtig wie der Personenschutz. Merkhilfe: Verkehrssicherung = Schutz aller Beteiligten + Rechtssicherheit."},{"id":"bv-102","q":"Nenne Massnahmen fuer Fussgaenger bei der Baustelleneinrichtung!","a":"Fusswege einrichten\nEinhausung / Schutztunnel\nUeberbrueckung","tags":["Bauverfahren","Baustelleneinrichtung"],"reps":0,"ease":2.5,"interval":0,"due":1781333299149,"created":1781246899149,"last":null,"learning":true,"lapses":0,"explain":"Wenn eine Baustelle den Gehweg blockiert, muss ein sicherer Ersatz geschaffen werden. Die Einhausung (Schutztunnel aus Stahl) schützt Fußgänger vor herabfallenden Gegenständen. Eine Überbrückung führt Fußgänger über das Baufeld. Die Wahl hängt von Breite, Dauer und Gefährdung ab. Bei hochgefährlichen Arbeiten (Kranarbeiten über Gehweg) muss der Gehweg temporär gesperrt werden."},{"id":"bv-103","q":"Nenne Massnahmen fuer den Strassenverkehr!","a":"Beschilderung\nMarkierung\nUmleitungsstrecken\nAntrag bei Verkehrssicherungsbehoerde mit Lageplan","tags":["Bauverfahren","Baustelleneinrichtung"],"reps":0,"ease":2.5,"interval":0,"due":1781333299149,"created":1781246899149,"last":null,"learning":true,"lapses":0,"explain":"Beschilderung nach RSA (Richtlinie für die Sicherung von Arbeitsstellen an Straßen) ist verpflichtend. Markierungen (Leitbaken, Absperrbaken) führen den Verkehr sicher am Baufeld vorbei. Umleitungsstrecken müssen frühzeitig ausgeschildert und mit der Verkehrsbehörde abgestimmt sein. Der Antrag bei der Verkehrssicherungsbehörde mit Lageplan ist die formale Grundlage."},{"id":"bv-104","q":"Welche Unterkunftsvarianten plant man auf einer Baustelle ein?","a":"Sanitaere Anlagen\nTagesunterkuenfte (ca. 8-9 Arbeiter)\nMagazine\nBuero / Besprechungsraum\nSanitaetsraum (ab 50 A) / Sanitaeter (ab 100 A)\nContainer (3x6m, 2,4x6m, 2,4x5m)","tags":["Bauverfahren","Baustelleneinrichtung"],"reps":0,"ease":2.5,"interval":0,"due":1781333299149,"created":1781246899149,"last":null,"learning":true,"lapses":0,"explain":"Nach DGUV (Deutsche Gesetzliche Unfallversicherung) sind Mindeststandards verpflichtend. Tagesunterkünfte (Aufenthaltsräume) für ca. 8-9 Arbeiter pro Einheit bieten Pausen- und Umkleideraum. Magazine sind Lagerräume für Werkzeug und Kleinmaterial. Ab 50 Arbeitern braucht man einen Sanitätsraum, ab 100 einen Sanitäter. Container (3×6 m, 2,4×6 m) sind die flexible Standardlösung."},{"id":"bv-105","q":"Welche Flaechen benoetigt man in der Baustelleneinrichtung?","a":"Materiallager (Rohre, Steine)\nBewehrung (Vorbinden, Lagerung)\nSchalung (Lagern, Reinigen, Zusammenbauen)\nContaineranlagen\nHochbaukraene\nBetonpumpe\nAuswaschflaechen\nAutokrane, Abstell- und Parkflaechen","tags":["Bauverfahren","Baustelleneinrichtung"],"reps":0,"ease":2.5,"interval":0,"due":1781333299149,"created":1781246899149,"last":null,"learning":true,"lapses":0,"explain":"Der BE-Plan (Baustelleneinrichtungsplan) zeichnet all diese Flächen maßstäblich ein. Bewehrungsstahl muss sortiert und trocken gelagert werden. Schalung braucht Platz zum Reinigen und Zusammenbauen. Auswaschflächen (mit Absetzbecken) sind gesetzlich vorgeschrieben — Betonreste dürfen nicht in die Kanalisation. Der BE-Plan ist ein Planungsdokument, das sich während der Bauzeit ändert."},{"id":"bv-106","q":"Nenne 3 Anforderungen an Lagerflaechen auf Baustellen!","a":"Tragfaehig und befestigt\nGut zugaenglich und erreichbar\nGeordnet und sicher (Diebstahl, Witterung)","tags":["Bauverfahren","Baustelleneinrichtung"],"reps":0,"ease":2.5,"interval":0,"due":1781333299149,"created":1781246899149,"last":null,"learning":true,"lapses":0,"explain":"Tragfähig und befestigt: LKW und Kran dürfen nicht einsinken. Gut zugänglich: Kurze Wege reduzieren Transportzeiten. Geordnet: Material muss schnell auffindbar sein, FIFO-Prinzip (First In, First Out) bei zeitkritischen Materialien. Sicher gegen Diebstahl (Bauzaun, Beleuchtung) und Witterung (Abdeckung). Ungeordnete Lager führen zu Suchzeiten und Unfällen."},{"id":"bv-107","q":"Wie wird die Stromversorgung auf einer Baustelle aufgebaut?","a":"Trafo -> Anschlussschrank -> Gruppenverteiler -> (Haupt-)Verteiler -> Unterverteiler -> Steckdosenverteiler","tags":["Bauverfahren","Baustelleneinrichtung"],"reps":0,"ease":2.5,"interval":0,"due":1781333299149,"created":1781246899149,"last":null,"learning":true,"lapses":0,"explain":"Der Trafo transformiert die Netzspannung auf Baustellenniveau. Der Anschlussschrank ist der Übergabepunkt vom Versorger. Gruppen- und Hauptverteiler verteilen auf die verschiedenen Bereiche. Unterverteiler und Steckdosenverteiler gehen zu den einzelnen Arbeitsstellen. Jede Ebene hat eigene Schutzeinrichtungen (FI-Schalter, Sicherungen). Merkhilfe: Kaskade von groß nach klein, jede Stufe mit eigenem Schutz."},{"id":"bv-108","q":"Welche Masse hat eine Baustrasse fuer LKW-Verkehr?","a":"Breite: 3 m (einspurig)\nTragschichtdicke: 40 cm\nMax. Steigungsverhaeltnis: < 15 %","tags":["Bauverfahren","Baustelleneinrichtung"],"reps":0,"ease":2.5,"interval":0,"due":1781333299149,"created":1781246899149,"last":null,"learning":true,"lapses":0,"explain":"3 m Breite reicht für einen LKW (Standardbreite 2,5 m + je 25 cm Sicherheitsabstand). Die 40 cm Tragschicht verhindert Einsinken auch bei nasser Witterung — meist Schotter oder Recyclingmaterial. Steigungen über 15% können beladene LKW nicht mehr sicher befahren. Bei Kurven sind Kurvenradius > 15 m nötig. Diese Werte sind praxisbewährt, keine Normpflicht."},{"id":"bv-109","q":"Was bedeutet die Bezeichnung M36 einer Betonpumpe?","a":"Mastpumpe mit 36 m Ausfalthoehe (maximale vertikale Reichhoehe des entfalteten Betonverteilermasts)","tags":["Bauverfahren","Baustelleneinrichtung","Betonpumpe"],"reps":0,"ease":2.5,"interval":0,"due":1781333299149,"created":1781246899149,"last":null,"learning":true,"lapses":0,"explain":"M steht für Mastpumpe (mit ausklappbarem Betonverteilermast), die Zahl für die maximale Ausfalthöhe in Metern. Eine M36 kann also bis in 36 m Höhe Beton fördern. Davon zu unterscheiden: die horizontale Reichweite (hängt von der Mastgeometrie ab). Stationäre Pumpen ohne Mast werden anders bezeichnet (z.B. nach Förderleistung in m³/h)."},{"id":"bv-110","q":"Was versteht man unter der Ausfalthoehe einer Betonpumpe?","a":"Die maximale vertikale Reichhoehe des entfalteten Betonverteilermasts von der Standflaehe bis zur Mastspitze.","tags":["Bauverfahren","Baustelleneinrichtung","Betonpumpe"],"reps":0,"ease":2.5,"interval":0,"due":1781333299149,"created":1781246899149,"last":null,"learning":true,"lapses":0,"explain":"Die Ausfalthöhe ist der wichtigste Auswahlparameter für Betonpumpen bei Hochbauten. Sie gibt an, wie hoch der Mast maximal gestreckt werden kann — aber nicht, wie weit das Betonrohr am Ende horizontal reicht. Die tatsächliche Deckenhöhe, bis zu der betoniert werden kann, ist etwas geringer als die Ausfalthöhe (wegen der Aufstellfläche und Mastgeometrie)."},{"id":"bv-111","q":"Wovon haengt die Foerderleistung einer Betonpumpe ab?","a":"Geraet (Pumpentyp)\nFoerderhoehe\nSchlauchleitungslaenge und Boegen\nBetonrezeptur\nSchlauchdurchmesser\nLaufzeit der Pumpe","tags":["Bauverfahren","Baustelleneinrichtung","Betonpumpe"],"reps":0,"ease":2.5,"interval":0,"due":1781333299149,"created":1781246899149,"last":null,"learning":true,"lapses":0,"explain":"Jeder dieser Faktoren reduziert die nutzbare Förderleistung. Jeder Bogen im Schlauch entspricht einem zusätzlichen Druckwiderstand. SVB-Beton (selbstverdichtend) kann leichter gepumpt werden als steifer C30-Beton. Die Rezeptur (Zementgehalt, w/z-Wert, Zuschlagsgröße) beeinflusst die Pumpbarkeit direkt. Merkhilfe: Alles was den Fluss behindert, reduziert die Leistung."},{"id":"bv-112","q":"Wovon haengen die Kosten einer Betonpumpe ab?","a":"Groesse (Masttyp)\nMenge\nReinigungsgebuehr\nWartezeiten\nUmsetzvorgaenge","tags":["Bauverfahren","Baustelleneinrichtung","Betonpumpe"],"reps":0,"ease":2.5,"interval":0,"due":1781333299149,"created":1781246899149,"last":null,"learning":true,"lapses":0,"explain":"Die Größe bestimmt die Mietrate (M28 < M36 < M52). Die geförderte Menge (m³) bestimmt meist den Mengentarif. Reinigungsgebühr: Pumpe und Leitungen müssen nach jeder Schicht gespült werden. Wartezeiten (kein Beton, Kran besetzt) werden in Rechnung gestellt. Umsetzungen (Pumpe umfahren) kosten extra. Merkhilfe: Pumpe kostet Grundmiete + Menge + Nebenkosten."},{"id":"bv-113","q":"Nach welchen Kriterien waehlt man einen Kran aus?","a":"Auslegerlaenge\nTraglast (Tragkurve)\nMassgebende Hakenheoehe (ca. 10 m hoeher als Gebaeude)\nKosten","tags":["Bauverfahren","Baustelleneinrichtung","Kran"],"reps":0,"ease":2.5,"interval":0,"due":1781333299149,"created":1781246899149,"last":null,"learning":true,"lapses":0,"fig":"<svg viewBox=\"0 0 330 168\" xmlns=\"http://www.w3.org/2000/svg\" style=\"width:100%;max-width:330px;height:auto;font-family:ui-monospace,monospace\">\n<text x=\"10\" y=\"14\" fill=\"var(--txt)\" font-size=\"11\" font-weight=\"700\">Hakenhoehe = Summe<\/text>\n<rect x=\"40\" y=\"90\" width=\"70\" height=\"70\" fill=\"var(--surface3)\" stroke=\"var(--line2)\"/><text x=\"50\" y=\"130\" fill=\"var(--txt2)\" font-size=\"8.5\">Gebaeude<\/text>\n<line x1=\"150\" y1=\"30\" x2=\"150\" y2=\"160\" stroke=\"var(--txt2)\" stroke-width=\"2.4\"/><line x1=\"150\" y1=\"40\" x2=\"290\" y2=\"40\" stroke=\"var(--txt2)\" stroke-width=\"2\"/>\n<line x1=\"250\" y1=\"40\" x2=\"250\" y2=\"60\" stroke=\"var(--acc)\" stroke-width=\"2\"/>\n<text x=\"160\" y=\"55\" fill=\"var(--acc)\" font-size=\"8.5\">Gehaenge + Lasthoehe<\/text>\n<line x1=\"320\" y1=\"40\" x2=\"320\" y2=\"160\" stroke=\"var(--blue)\" stroke-width=\"1.5\"/>\n<text x=\"160\" y=\"150\" fill=\"var(--txt2)\" font-size=\"8.5\">+ Sicherheitsabstand<\/text>\n<\/svg>","explain":"Die Auslegerlänge bestimmt die maximale horizontale Reichweite. Die Tragkurve (Diagramm: Auslegerradius vs. Traglast) ist entscheidend — am langen Ausleger kann weniger gehoben werden. Die maßgebende Hakenhöhe muss ca. 10 m über dem Gebäude liegen, damit Lasten sicher übergeschwenkt werden können. Kosten (Mietrate) steigen stark mit Größe und Kapazität."},{"id":"bv-114","q":"Wie bestimmt man die Anzahl der Kraene?","a":"Kranaufwandswerte -> Bauzeit\nBruttorauminhalt pro Monat\nNach Anzahl der Arbeiter (unter Beruecksichtigung des Bauverfahrens)\nLeistungsberechnung: Q = Menge x Spielzeit","tags":["Bauverfahren","Baustelleneinrichtung","Kran"],"reps":0,"ease":2.5,"interval":0,"due":1781333299149,"created":1781246899149,"last":null,"learning":true,"lapses":0,"explain":"Kranaufwandswerte (z.B. AW in Kranspielstunden/m³ BRI) erlauben die Berechnung der Kranstunden je Monat, daraus die Anzahl Kräne für die gewünschte Bauzeit. Als Faustformel: 1 Kran für ca. 10-15 Arbeiter (abhängig vom Bauverfahren). Die Leistungsberechnung Q = Menge × Spielzeit gibt direkt die benötigte Krankapazität."},{"id":"bv-115","q":"Welche Unterkonstruktionen gibt es fuer Hochbaukraene?","a":"Innerhalb Gebaeude (Aufzugschacht): Turmkletterkran\nAusserhalb:\n1. Fundamentrahmen mit Ballastierung\n2. Fundament mit Anker","tags":["Bauverfahren","Baustelleneinrichtung","Kran"],"reps":0,"ease":2.5,"interval":0,"due":1781333299149,"created":1781246899149,"last":null,"learning":true,"lapses":0,"explain":"Innerhalb des Gebäudes klettert der Turmkletterkran durch den Aufzugschacht oder durch die Decken hoch — er wächst mit dem Gebäude. Außerhalb wird der Kran auf einem Fundamentrahmen (mit Gegengewicht als Ballast) oder einem einbetonierten Fundament mit Ankern gegründet. Die Wahl hängt von verfügbarem Platz und Gebäudegeometrie ab."},{"id":"bv-116","q":"Welche Herstellerangabe braucht man zur Bemessung des Verbaus, wenn der Kran am Baugrubenrand steht?","a":"Die Radlasten / Aufstandsdruecke des Krans (Fundamentlasten), um die Zusatzlast auf den Verbau bemessen zu koennen.","tags":["Bauverfahren","Baustelleneinrichtung","Kran"],"reps":0,"ease":2.5,"interval":0,"due":1781333299149,"created":1781246899149,"last":null,"learning":true,"lapses":0,"explain":"Ein Kran am Baugrubenrand erzeugt erhebliche Zusatzlasten auf den Verbau. Der Verbaustatiker muss wissen, welche Kräfte in den Boden eingeleitet werden (Rad- oder Fundamentlasten in kN), um den Verbau entsprechend zu bemessen. Ohne diese Herstellerangabe müsste man konservativ schätzen — was teurer wird."},{"id":"bv-117","q":"Koennen Hochbaukraene in der Naehe von Flughaefen montiert werden?","a":"Ja, aber nur mit Genehmigung der Luftfahrtbehoerde.\nVoraussetzungen: Hindernisbefeuerung (Blinklicht), Eintragung als Luftfahrthindernis, ggf. Hoehenbegraenzung.","tags":["Bauverfahren","Baustelleneinrichtung","Kran"],"reps":0,"ease":2.5,"interval":0,"due":1781333299149,"created":1781246899149,"last":null,"learning":true,"lapses":0,"explain":"In Kontrollzonen um Flughäfen gelten Bauhöhenbeschränkungen. Wird eine Bauhöhe überschritten, muss die Luftfahrtbehörde zustimmen, das Hindernis mit einer Hindernisbefeuerung (rotes Blinklicht) ausgestattet und in die Luftfahrtkarte eingetragen werden. Der Kranbetrieb in der Nacht (wenn Befeuerung nötig) wird dadurch teurer."},{"id":"bv-118","q":"Nenne 10 Elemente der Baustelleneinrichtung fuer den BE-Plan!","a":"Kraene, Betonpumpe, Containeranlagen, Lagerplaetze, Baustrassen, Bauzaun, Strom-/Wasserversorgung, Auswaschflaeche, WC/Sanitaer, Parkplaetze","tags":["Bauverfahren","Baustelleneinrichtung"],"reps":0,"ease":2.5,"interval":0,"due":1781333299149,"created":1781246899149,"last":null,"learning":true,"lapses":0,"explain":"Der BE-Plan (Maßstab 1:500 oder 1:200) zeigt die räumliche Anordnung aller Elemente. Er ist Planungsdokument und Genehmigungsunterlage zugleich. Kran und Betonpumpe bestimmen maßgebend die Geometrie. Container müssen so stehen, dass Fluchtwege frei bleiben. Der BE-Plan ändert sich im Bauablauf (Phasen-BE-Plan)."},{"id":"bv-119","q":"Unterschied Untendreher vs. Obendreher?","a":"Untendreher: Drehkranz zwischen Unterwagen und Turm; gesamter Turm dreht; Krane kleinerer Bauart, ungeeignet fuer grosse Turmhoehen.\nObendreher: Drehkranz am oberen Turmende; nur Ausleger+Gegenausleger drehen; Krane groesserer Bauart, grosse Hoehen/Lastmomente.","tags":["Bauverfahren","Baustelleneinrichtung","Kran"],"reps":0,"ease":2.5,"interval":0,"due":1781337176284,"created":1781250776284,"last":null,"learning":true,"lapses":0,"explain":"Beim Untendreher dreht der gesamte Turm um den Unterwagen — günstig bei kleinen Baustellen, aber der Gegenausleger dreht mit und braucht Platz. Beim Obendreher dreht nur der Ausleger oben, der Turm bleibt starr — besser für beengte Verhältnisse, da weniger Schwenkraum nötig. Obendreher können außerdem höher gebaut werden (Kletterfunktion)."},{"id":"bv-120","q":"Welche Auslegerarten gibt es bei Turmkranen?","a":"Katzausleger: Waagebalken mit Laufkatze, radiale Bewegung\nNadelausleger: Bewegung durch Wippen, \"toter Bereich\" turmnah, kann Hindernissen ausweichen\nKnickausleger: Laufkatze + abknickbar, ueber Stoerkanten heben\nKlappausleger","tags":["Bauverfahren","Baustelleneinrichtung","Kran"],"reps":0,"ease":2.5,"interval":0,"due":1781337176284,"created":1781250776284,"last":null,"learning":true,"lapses":0,"fig":"<svg viewBox=\"0 0 330 150\" xmlns=\"http://www.w3.org/2000/svg\" style=\"width:100%;max-width:330px;height:auto;font-family:ui-monospace,monospace\">\n<text x=\"10\" y=\"13\" fill=\"var(--txt)\" font-size=\"11\" font-weight=\"700\">Auslegerarten Turmkran<\/text>\n<g stroke=\"var(--txt2)\" stroke-width=\"2\" fill=\"none\">\n<line x1=\"40\" y1=\"40\" x2=\"40\" y2=\"120\"/><line x1=\"20\" y1=\"55\" x2=\"100\" y2=\"55\"/>\n<line x1=\"20\" y1=\"55\" x2=\"20\" y2=\"62\"/><line x1=\"100\" y1=\"55\" x2=\"100\" y2=\"62\"/><\/g>\n<text x=\"30\" y=\"138\" fill=\"var(--txt2)\" font-size=\"8.5\">Katz<\/text>\n<g stroke=\"var(--txt2)\" stroke-width=\"2\" fill=\"none\"><line x1=\"160\" y1=\"40\" x2=\"160\" y2=\"120\"/><line x1=\"160\" y1=\"42\" x2=\"225\" y2=\"62\"/><line x1=\"140\" y1=\"55\" x2=\"160\" y2=\"50\"/><\/g>\n<text x=\"150\" y=\"138\" fill=\"var(--txt2)\" font-size=\"8.5\">Nadel (wippen)<\/text>\n<g stroke=\"var(--txt2)\" stroke-width=\"2\" fill=\"none\"><line x1=\"285\" y1=\"40\" x2=\"285\" y2=\"120\"/><line x1=\"285\" y1=\"48\" x2=\"305\" y2=\"40\"/><line x1=\"305\" y1=\"40\" x2=\"320\" y2=\"58\"/><\/g>\n<text x=\"278\" y=\"138\" fill=\"var(--txt2)\" font-size=\"8.5\">Knick<\/text>\n<\/svg>","explain":"Der Katzausleger ist ein horizontaler Balken; die Laufkatze fährt auf dem Ausleger vor und zurück — Beton kann so in einem Radius erreicht werden. Der Nadelausleger schwenkt und neigt sich — flexibler, aber komplexer in der Steuerung. Katzausleger sind bei Hochbaukränen häufiger, weil sie präziser positionieren."},{"id":"bv-121","q":"Welche Unterkonstruktionen/Fahrwerke gibt es fuer Turmkrane?","a":"Fundamentkreuz/-rahmen (Spindeln, mit Zentralballast)\nFundamentkern (Einspannung in Ortbetonfundament, Zentralballast entfaellt)\nGleisfahrwerk (Aktionsraum erweitern)\nRaupenfahrwerk","tags":["Bauverfahren","Baustelleneinrichtung","Kran"],"reps":0,"ease":2.5,"interval":0,"due":1781337176284,"created":1781250776284,"last":null,"learning":true,"lapses":0,"explain":"Fundamentkreuz: auf der Geländeoberfläche, mit Betonballast beschwert — einfach zu montieren/demontieren. Fundamentkern: einbetoniertes Element — stabiler, aber nicht rückbaubar. Fahrwerk: Kran auf Schienen, kann umgesetzt werden — für Linienbaustellen. Klettergerüst: Kran wächst innerhalb des Gebäudes mit."},{"id":"bv-122","q":"Nenne die Montagesysteme von Turmkranen!","a":"Baukastensystem (Obendreher, Einzelelemente per Autokran)\nTurmkletterkran (Obendreher, klettert mit Fuehrungsstueck)\nStockwerkkletterkran (Obendreher, in Fahrstuhlschaecht)\nKompaktkran (Oberdreher, Vormontage am Boden)\nSchnellaufbaukran (Unterdreher, selbst aufrichtend)","tags":["Bauverfahren","Baustelleneinrichtung","Kran"],"reps":0,"ease":2.5,"interval":0,"due":1781337176284,"created":1781250776284,"last":null,"learning":true,"lapses":0,"explain":"Baukastensystem: Turm wird aus Einzelelementen mit dem Autokran aufgebaut. Turmkletterkran: klettert selbst nach oben, braucht nur anfangs einen Autokran. Schnellmontagekran (SMK): kompakt, kann sich selbst aufrichten ohne Autokran — ideal für kleinere Baustellen. Die Wahl beeinflusst Montagekosten und -zeit."},{"id":"bv-123","q":"Wie funktioniert die Begrenzung des Aktionsraums?","a":"Elektronische Begrenzung spart Bereiche im Aktionskreis aus (Hindernisse, Hochspannung, Bahnlinien). Bei Erreichen der Bereichsgrenze schaltet das Drehwerk automatisch ab. Bei 2 Kranen auch dynamische Begrenzung.","tags":["Bauverfahren","Baustelleneinrichtung","Kran"],"reps":0,"ease":2.5,"interval":0,"due":1781337176284,"created":1781250776284,"last":null,"learning":true,"lapses":0,"explain":"Elektronische Hubbegrenzungen verhindern, dass der Kran Hindernisse (Hochspannungsleitungen, Nachbarsgebäude) trifft. Kollisionsschutz bei mehreren Kränen verhindert, dass zwei Ausleger kollidieren — beide werden elektronisch koordiniert. Der Schwenkbereich kann auf bestimmte Sektoren begrenzt werden."},{"id":"bv-124","q":"Was gilt fuer Personenbefoerderung mit dem Turmkran?","a":"Nur in zugelassenen Personenbefoerderungskoerben. Anmeldung je Kran bei der Berufsgenossenschaft (BG) erforderlich.","tags":["Bauverfahren","Baustelleneinrichtung","Kran"],"reps":0,"ease":2.5,"interval":0,"due":1781337176284,"created":1781250776284,"last":null,"learning":true,"lapses":0,"explain":"Personen dürfen nicht im Lastgeschirr transportiert werden — nur in zugelassenen Personenbeförderungskörben mit Sicherheitseinrichtungen. Jeder Kran, der Personen befördern soll, muss bei der Berufsgenossenschaft angemeldet und regelmäßig geprüft werden. Dies ist die Ausnahme, nicht die Regel — in der Praxis werden meist Gerüste oder Aufzüge genutzt."},{"id":"bv-125","q":"Wovon haengt die maximale Foerderleistung einer Betonpumpe ab?","a":"Geraeteleistung, Leitungsdurchmesser, Leitungslaenge, Foerderhoehe, Rohrboegen, Pumpenlaufzeit (ca. 45 min/h wegen Mischerwechsel).","tags":["Bauverfahren","Baustelleneinrichtung","Betonpumpe"],"reps":0,"ease":2.5,"interval":0,"due":1781337176284,"created":1781250776284,"last":null,"learning":true,"lapses":0,"explain":"Gerätelei stung ist die hydraulische Leistung der Pumpe selbst. Leitungsdurchmesser und -länge bestimmen den Strömungswiderstand. Je mehr Bögen, desto mehr Druckverlust. Förderhoehe erzeugt geodätischen Gegendruck. Die Betonrezeptur muss pumpfähig sein (Zement, Wasser, Zuschlag aufeinander abgestimmt)."},{"id":"bv-126","q":"Welche Streckenfuehrungen gibt es bei Baustrassen?","a":"Stichstrasse: meist 2-spurig, Wendeplatz noetig\nUmfahrt: nur ein Anschluss, lang und teuer\nDurchfahrt: zwei Anschluesse (oft keine Genehmigung), kurz und billig","tags":["Bauverfahren","Baustelleneinrichtung","Baustrasse"],"reps":0,"ease":2.5,"interval":0,"due":1781337176284,"created":1781250776284,"last":null,"learning":true,"lapses":0,"explain":"Stichstraße endet in einer Sackgasse — Fahrzeuge müssen wenden (Wendeplatz nötig, mind. 24 m Durchmesser). Umfahrt: die Straße umschließt das Baufeld — kein Wenden nötig, aber längere Straße. Die Wahl hängt vom verfügbaren Platz und dem Verkehrsaufkommen auf der Baustelle ab."},{"id":"bv-127","q":"Nenne die Kennwerte einer Baustrasse!","a":"Kurvenradius > 15 m\nWendekreis > 24 m\nEinspurig 3,5 m, zweispurig 6,0 m breit\nSteigung < 15 % (Baugrubenrampen bis 40 %)\nSchottertragschicht min. 30 cm\nSicherheitsabstand 0,5 m (Geraete) / 1,0 m (Ausgaenge)","tags":["Bauverfahren","Baustelleneinrichtung","Baustrasse"],"reps":0,"ease":2.5,"interval":0,"due":1781337176284,"created":1781250776284,"last":null,"learning":true,"lapses":0,"explain":"Diese Kennwerte leiten sich aus den Fahrzeugeigenschaften von Baustellenfahrzeugen ab (LKW-Wenderadius ~12 m → Wendekreis 24 m). Einspurige Straße (3,5 m) erfordert Ausweichstellen. Zweispurig (6 m) ermöglicht Begegnungsverkehr. Steigung < 15% ist das Maximum für beladene LKW ohne Schlupf. Gefälle für Wasserabfluss 2-3%."},{"id":"bv-128","q":"Welche Werkplaetze gibt es auf der Baustelle?","a":"Zimmerplatz (Wetterschutz, Reissboden fuer Schalungsvormontage)\nBiegeplatz (heute meist automatisiert, Fertiglieferung)\nMagazine (Werkzeuglager in Containern)","tags":["Bauverfahren","Baustelleneinrichtung"],"reps":0,"ease":2.5,"interval":0,"due":1781337176284,"created":1781250776284,"last":null,"learning":true,"lapses":0,"explain":"Der Zimmerplatz braucht Wetterschutz (Regen quillt Holz auf) und einen Reißboden zum maßgenauen Abzeichnen von Schalungselementen. Der Biegeplatz heute meist als mobiles Biegegerät, das direkt auf der Baustelle eingesetzt wird — Vorbiegen in der Werkstatt für komplexe Formen. Werkplätze sind auf dem BE-Plan einzuplanen."},{"id":"bv-129","q":"Welche sanitaeren Anforderungen gelten nach Personenzahl?","a":"Toilette: je 1 fuer 10 AN\nDusche: je 1 fuer 20 AN\nKochplatte: je 1 fuer 2 AN\nSanitaetsraum ab 50 AN, Sanitaeter ab 100 AN, Krankentrage ab 20 AN\nTagesunterkunft: ab >4 AN und >1 Woche","tags":["Bauverfahren","Baustelleneinrichtung"],"reps":0,"ease":2.5,"interval":0,"due":1781337176284,"created":1781250776284,"last":null,"learning":true,"lapses":0,"explain":"Diese Zahlen stammen aus der DGUV (Berufsgenossenschaft Bau). 1 Toilette je 10 Arbeitnehmer verhindert Hygieneproblem. 1 Dusche je 20 AN ist nötig bei schmutziger Arbeit. 1 Kochplatte je 2 AN ermöglicht Mittagspause auf der Baustelle. Sanitätsraum ab 50 AN, weil die Wahrscheinlichkeit von Verletzungen mit der Personenzahl steigt."},{"id":"bv-130","q":"Wie wird ein Zwischenlagerplatz fuer Boden angelegt?","a":"Zweckmaessig am Rand der Baustelle, stoert Kranbetrieb nicht, max. 2 m hoch, Boeschungswinkel < 45 Grad.","tags":["Bauverfahren","Baustelleneinrichtung"],"reps":0,"ease":2.5,"interval":0,"due":1781337176284,"created":1781250776284,"last":null,"learning":true,"lapses":0,"explain":"Am Rand stören Bodenzwischenlager nicht den Kranbereich (Kreis um Kranstandort). Max. 2 m Höhe verhindert Böschungsbruch und ist sicherheitsrelevant. Böschungswinkel nach DIN 4124 oder standsicherer Nachweis. Wenn Bodenmaterial später wiederverwendet wird (Verfüllung), muss es sauber und trocken gelagert werden."}],"created":1781246899149,"fach":"Bauverfahren"},{"id":"bv-d3","name":"Schalungen","desc":"Wand-, Decken-, Schacht-, Kletter-, Gleitschalung, Frischbetondruck, Sichtbeton, DIN 18202","emoji":"🧱","color":"#10b981","cards":[{"id":"bv-201","q":"Welche Materialien gibt es fuer Schalhaut?","a":"Holz\nHolzwerkstoffe (Spanplatte, OSB, 3-Schicht-Platte)\nKunststoff\nStahl\nVerbundstoffe\nVerlorene Schalhaut: Faserzement, Pappschalung, Wickelrohre","tags":["Bauverfahren","Schalung"],"reps":0,"ease":2.5,"interval":0,"due":1781333299149,"created":1781246899149,"last":null,"learning":true,"lapses":0,"explain":"Holz ist günstig und leicht, aber empfindlich gegen Feuchtigkeit. Holzwerkstoffe (OSB, 3-Schicht-Platte) sind dimensionsstabiler. Kunststoff ist leicht und wiederverwendbar, aber teurer. Stahl ist hochbelastbar und sehr wiederverwendbar — ideal für Systemschalungen. Verlorene Schalhaut (Faserzement, Wickelrohr) bleibt im Bauteil und spart das Ausschalen."},{"id":"bv-202","q":"Welche Beschichtungen fuer Schalhaut gibt es?","a":"Venolharzbeschichtung (nicht saugend - glatte Oberflaeche)\nMelaminharzbeschichtung (saugend - rauere Oberflaeche)","tags":["Bauverfahren","Schalung"],"reps":0,"ease":2.5,"interval":0,"due":1781333299149,"created":1781246899149,"last":null,"learning":true,"lapses":0,"explain":"Venolharzbeschichtung (Phenolharz) macht die Oberfläche glatt und nicht saugend — der Beton haftet kaum an, wenige Poren, glatte Betonoberfläche. Melaminharzbeschichtung ist leicht saugend — die Oberfläche nimmt etwas Wasser auf, der Beton haftet besser an, rauere Textur. Für Sichtbeton wählt man je nach gewünschter Optik. Nicht saugend = mehr Luftporen sichtbar."},{"id":"bv-203","q":"Welche Fugenarten gibt es bei Schalungen?","a":"Raue Fuge\nGlatte Fuge\nProfilierte Fuge","tags":["Bauverfahren","Schalung"],"reps":0,"ease":2.5,"interval":0,"due":1781333299149,"created":1781246899149,"last":null,"learning":true,"lapses":0,"explain":"Raue Fuge entsteht, wenn zwei Schalungskanten ohne Dichtung stoßen — sichtbar im Beton als Linie. Glatte Fuge: Kanten sind exakt abgedichtet, kaum sichtbar. Profilierte Fuge: bewusst gestaltetes Fugenprofil (z.B. V-Nut) als gestalterisches Element. Bei Sichtbeton muss die Fugenart im Leistungsverzeichnis exakt beschrieben sein."},{"id":"bv-204","q":"Nenne Vorteile der Rahmenschalung!","a":"Flache Bauart (besser fuer Transport)\nHaelt hohen Betonierdruck\nGut fuer Sichtbetonbereich\nWirtschaftlichkeit bei vielseitigem Einsatz","tags":["Bauverfahren","Schalung"],"reps":0,"ease":2.5,"interval":0,"due":1781333299149,"created":1781246899149,"last":null,"learning":true,"lapses":0,"explain":"Rahmenschalung (z.B. Doka Framax, Peri Trio) hat einen Stahlrahmen mit eingespannter Schalhaut. Die flache Bauart erlaubt effizienteren Transport auf LKW. Der Stahlrahmen überträgt den Betondruck großflächig — höhere zulässige Betonierdrücke als bei Trägerschalung. Gut für Sichtbeton, weil die Schalhaut gleichmäßig spannt."},{"id":"bv-205","q":"Welche Wandschalungssysteme gibt es?","a":"Traegerschalung (Holztraeger)\nRahmenschalung\nHandschalung\nRundschalung\nSchachtschalung\nKletterschalung\nGleitschalung","tags":["Bauverfahren","Schalung"],"reps":0,"ease":2.5,"interval":0,"due":1781333299149,"created":1781246899149,"last":null,"learning":true,"lapses":0,"explain":"Trägerschalung (Holzträger H20) ist sehr flexibel — jede Größe möglich. Rahmenschalung ist schnell, aber auf Standardmaße beschränkt. Handschalung für kleine Flächen und Sonderfälle. Rundschalung für Kreisquerschnitte (Silos, Türme). Schachtschalung für Treppenhäuser. Kletterschalung für vertikal weiterwachsende Bauteile. Gleitschalung für kontinuierliche Herstellung."},{"id":"bv-206","q":"Wie kann man eine Stuetze einschalen?","a":"Rahmenschalung\nUniversalelement\nTraegerschalung\nStsuetzenschalung mit Saeulenkranz (nimmt hoeheren Betonierdruck auf)","tags":["Bauverfahren","Schalung"],"reps":0,"ease":2.5,"interval":0,"due":1781333299149,"created":1781246899149,"last":null,"learning":true,"lapses":0,"explain":"Bei Stützen ist der Betondruck höher als bei Wänden (weil kleiner Querschnitt → höhere Fließgeschwindigkeit beim Betonieren). Der Säulenkranz (Stahlband) umschließt die Schalung von außen und nimmt den Ringdruck auf. Rahmenschalung und Universalelemente sind universell, aber begrenzt bei sehr hohem Druck. Für runde Stützen gibt es Rohrschalungen."},{"id":"bv-207","q":"Was ist der Unterschied zwischen Wandschalung und Stuetzenschalung?","a":"Bei Stuetzenschalung treten deutlich hoehere Betondruecke auf. Diese werden durch den Saeulenkranz abgeleitet.","tags":["Bauverfahren","Schalung"],"reps":0,"ease":2.5,"interval":0,"due":1781333299149,"created":1781246899149,"last":null,"learning":true,"lapses":0,"explain":"Bei Wänden (große Fläche) verteilt sich der Betondruck auf viele Anker. Bei Stützen (kleiner Querschnitt) konzentriert sich der Druck, und durch die schnelle Befüllung des kleinen Querschnitts steigt der Betondruck oft auf das hydrostatische Maximum. Deshalb braucht Stützenschalung den Säulenkranz als zusätzliches Sicherungselement."},{"id":"bv-208","q":"Welche Deckenschalungssysteme gibt es?","a":"Flexschalung (System 1-2-4)\nSchaltische / Deckentische\nElementschalungen (Traegerrost, Paneel-System)\nPaneel-System mit Traegerrost","tags":["Bauverfahren","Schalung"],"reps":0,"ease":2.5,"interval":0,"due":1781333299149,"created":1781246899149,"last":null,"learning":true,"lapses":0,"explain":"Flexschalung (System 1-2-4): Querträger alle 0,5 m, Jochträger alle 2 m, Stützen alle 1 m — flexibel für jede Geometrie. Schaltische/Deckentische: vorgefertigte Einheit aus Trägern + Stützen + Schalhaut, die mit dem Kran umgesetzt wird — schnell bei großen Flächen. Elementschalungen (Paneele): standardisierte Elemente mit fixem Trägerkaster."},{"id":"bv-209","q":"Was ist eine Flexschalung und wo wird sie eingesetzt?","a":"Bestandteile: Jochtraeger, Stuetzen, Quertraeger, Schalhaut.\nSystem 1-2-4: Quertraeger 0,5m, Jochtraeger 2m, Stuetzen 1m.\nEinsatz: kleine Flaechen, unguenstige Geometrien.","tags":["Bauverfahren","Schalung"],"reps":0,"ease":2.5,"interval":0,"due":1781333299149,"created":1781246899149,"last":null,"learning":true,"lapses":0,"fig":"<svg viewBox=\"0 0 330 160\" xmlns=\"http://www.w3.org/2000/svg\" style=\"width:100%;max-width:330px;height:auto;font-family:ui-monospace,monospace\">\n<text x=\"10\" y=\"14\" fill=\"var(--txt)\" font-size=\"11\" font-weight=\"700\">Flexschalung (System 1-2-4)<\/text>\n<rect x=\"40\" y=\"30\" width=\"260\" height=\"9\" fill=\"var(--surface3)\" stroke=\"var(--line2)\"/><text x=\"305\" y=\"38\" fill=\"var(--txt2)\" font-size=\"8.5\">Schalhaut<\/text>\n<g stroke=\"var(--blue)\" stroke-width=\"2\"><line x1=\"60\" y1=\"42\" x2=\"60\" y2=\"58\"/><line x1=\"110\" y1=\"42\" x2=\"110\" y2=\"58\"/><line x1=\"160\" y1=\"42\" x2=\"160\" y2=\"58\"/><line x1=\"210\" y1=\"42\" x2=\"210\" y2=\"58\"/><line x1=\"260\" y1=\"42\" x2=\"260\" y2=\"58\"/><\/g>\n<text x=\"40\" y=\"54\" fill=\"var(--blue)\" font-size=\"8\">Quertraeger 0,5m<\/text>\n<g stroke=\"var(--acc)\" stroke-width=\"2.4\"><line x1=\"50\" y1=\"62\" x2=\"290\" y2=\"62\"/><line x1=\"50\" y1=\"82\" x2=\"290\" y2=\"82\"/><\/g>\n<text x=\"40\" y=\"76\" fill=\"var(--acc)\" font-size=\"8\">Jochtraeger 2,0m<\/text>\n<g stroke=\"var(--txt2)\" stroke-width=\"2.6\"><line x1=\"80\" y1=\"86\" x2=\"80\" y2=\"150\"/><line x1=\"180\" y1=\"86\" x2=\"180\" y2=\"150\"/><line x1=\"280\" y1=\"86\" x2=\"280\" y2=\"150\"/><\/g>\n<text x=\"40\" y=\"120\" fill=\"var(--txt2)\" font-size=\"8.5\">Stuetzen 1,0m<\/text>\n<\/svg>","explain":"Das System 1-2-4 gibt die Abstände vor: Querträger alle 50 cm, Jochträger alle 2 m, Stützen alle 1 m — diese Abstände sind so berechnet, dass die Schalhaut (i.d.R. 21 mm Sperrholz) das Gewicht des Betons trägt. Für kleine, unregelmäßige Flächen oder Grundrisse mit vielen Ecken ist Flexschalung wirtschaftlicher als Systemschalung."},{"id":"bv-210","q":"Wann setzt man Deckentische ein?","a":"Bei grossen Flaechen\nBei gleicher Geometrie\nBei genuegend Wiederholungen.\nZusatzgeraete: Entenschnabel, Verfahrwagen, Tischhubsystem, Kran","tags":["Bauverfahren","Schalung"],"reps":0,"ease":2.5,"interval":0,"due":1781333299149,"created":1781246899149,"last":null,"learning":true,"lapses":0,"explain":"Deckentische (Schaltische) sind vorgefertigte Schalungseinheiten — Träger, Stützen und Schalhaut bereits verbunden. Sie werden mit dem Kran in einem Stück umgesetzt (mit Entenschnabel und Verfahrwagen). Wirtschaftlich erst ab vielen Wiederholungen, weil die Montage der Tische einmalig aufwändig ist. Der Tischhub hebt den Tisch ab, der Verfahrwagen fährt ihn weg."},{"id":"bv-211","q":"Wie schalt man eine Decke aus?","a":"Immer von der Mitte zum Rand hin - wegen besserer Lastverteilung","tags":["Bauverfahren","Schalung"],"reps":0,"ease":2.5,"interval":0,"due":1781333299149,"created":1781246899149,"last":null,"learning":true,"lapses":0,"explain":"Von der Mitte zum Rand: In der Mitte ist die Deckendurchbiegung am größten (maximales Biegemoment). Wenn man dort die Stützen zuerst entfernt, ergibt sich eine gleichmäßige Lastumverteilung zur Seite. Würde man am Rand beginnen, entstehen Spannungsspitzen in der Mitte. Außerdem: Die Decke ist in der Mitte bereits am festesten (höchste Betondruckfestigkeit)."},{"id":"bv-212","q":"Was versteht man unter Fruehausschalen?","a":"Ausschalen, bevor die Enddruckfestigkeit erreicht ist.\nFall 1: Eigengewicht aktiviert -> Notunterstuetzung (Fallkopfstuetze) muss bleiben\nFall 2: Eigengewicht nicht aktiviert -> keine Notabstuetzung erforderlich","tags":["Bauverfahren","Schalung"],"reps":0,"ease":2.5,"interval":0,"due":1781333299149,"created":1781246899149,"last":null,"learning":true,"lapses":0,"explain":"Frühausschalen bedeutet: Die Schalung wird entfernt, bevor der Beton seine rechnerische Enddruckfestigkeit (28-Tage-Wert) erreicht hat. Fall 1: Wenn das Bauteil durch sein Eigengewicht bereits beansprucht wird (Decke), müssen Notunterstützungen (Fallkopfstützen) bleiben, bis die Festigkeit erreicht ist. Fall 2: Wenn das Eigengewicht noch nicht aktiviert ist (Wand, Stütze), kann man vollständig ausschalen."},{"id":"bv-213","q":"Warum ist Fruehausschalen von Decken erforderlich?","a":"Um Schalungsmaterial fruehzeitig wieder einzusetzen\nUm Platz fuer Folgegewerke zu schaffen","tags":["Bauverfahren","Schalung"],"reps":0,"ease":2.5,"interval":0,"due":1781333299149,"created":1781246899149,"last":null,"learning":true,"lapses":0,"explain":"Schalungsmaterial ist teuer — eine frühzeitige Weitergabe an die

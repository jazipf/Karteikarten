9\">Gewerk 2<\/text>\n<line x1=\"150\" y1=\"91\" x2=\"190\" y2=\"91\" stroke=\"var(--red)\" stroke-width=\"1.5\" stroke-dasharray=\"3 2\"/>\n<text x=\"150\" y=\"108\" fill=\"var(--red)\" font-size=\"8.5\">krit. Annaeherung<\/text>\n<text x=\"60\" y=\"48\" fill=\"var(--txt2)\" font-size=\"8.5\">flach = schnell<\/text>\n<\/svg>","explain":"Der Balkenplan zeigt nur, wann etwas passiert (Zeit), nicht wo. Das Weg-Zeit-Diagramm zeigt zusätzlich den Ort (Strecke). Daraus ergeben sich Informationen, die im Balkenplan unsichtbar sind: Wo sind zwei Kolonnen gleichzeitig am selben Ort (Kollision)? Wohin arbeitet eine Kolonne (Richtung)? Wie schnell arbeitet sie (Neigung der Linie)?"},{"id":"bv-405","q":"Welche Voraussetzungen braucht die Taktplanung?","a":"Teilbarkeit des Bauwerks in gleiche Abschnitte\nGleiche Ausfuehrungsdauer je Vorgang und Abschnitt\nGleiche Kapazitaeten je Vorgang und Abschnitt\nWiederholbare Prozesse","tags":["Bauverfahren","Terminplanung","Taktplanung"],"reps":0,"ease":2.5,"interval":0,"due":1781333299149,"created":1781246899149,"last":null,"learning":true,"lapses":0,"fig":"<svg viewBox=\"0 0 330 180\" xmlns=\"http://www.w3.org/2000/svg\" style=\"width:100%;max-width:330px;height:auto;font-family:ui-monospace,monospace\">\n<text x=\"10\" y=\"14\" fill=\"var(--txt)\" font-size=\"11\" font-weight=\"700\">Taktfertigung<\/text>\n<line x1=\"45\" y1=\"26\" x2=\"45\" y2=\"158\" stroke=\"var(--line2)\" stroke-width=\"1.5\"/>\n<line x1=\"45\" y1=\"158\" x2=\"305\" y2=\"158\" stroke=\"var(--line2)\" stroke-width=\"1.5\"/>\n<text x=\"14\" y=\"100\" fill=\"var(--txt2)\" font-size=\"8.5\" transform=\"rotate(-90 20 100)\">Abschnitt<\/text>\n<text x=\"255\" y=\"154\" fill=\"var(--txt2)\" font-size=\"8.5\">Takteinheiten<\/text>\n<line x1=\"55\" y1=\"150\" x2=\"150\" y2=\"34\" stroke=\"var(--red)\" stroke-width=\"2\"/>\n<line x1=\"95\" y1=\"150\" x2=\"190\" y2=\"34\" stroke=\"var(--blue)\" stroke-width=\"2\"/>\n<line x1=\"135\" y1=\"150\" x2=\"230\" y2=\"34\" stroke=\"var(--acc)\" stroke-width=\"2\"/>\n<line x1=\"55\" y1=\"150\" x2=\"95\" y2=\"150\" stroke=\"var(--txt)\" stroke-width=\"1.5\"/>\n<text x=\"60\" y=\"146\" fill=\"var(--txt2)\" font-size=\"8.5\">t<\/text>\n<text x=\"200\" y=\"60\" fill=\"var(--txt2)\" font-size=\"8.5\">je Vorgang um Taktzeit t versetzt<\/text>\n<\/svg>","explain":"Taktplanung funktioniert nur, wenn das Bauwerk in gleich große Abschnitte (z.B. Geschosse, Achsabschnitte) geteilt werden kann. Jeder Vorgang (Schalung, Bewehrung, Beton) muss in jedem Abschnitt gleich lang dauern. Gleiche Kapazitäten: Die Kolonne arbeitet immer mit der gleichen Mannschaftsstärke und denselben Geräten."},{"id":"bv-406","q":"Nenne Vorteile der Taktarbeit!","a":"Kuerzeere Bauzeit, schnelleres Arbeiten\nAusgeglichene Kapazitaeten (Arbeitskraefte)\nGeringerer Materialvorhalt (Ruestung)","tags":["Bauverfahren","Terminplanung","Taktplanung"],"reps":0,"ease":2.5,"interval":0,"due":1781333299149,"created":1781246899149,"last":null,"learning":true,"lapses":0,"explain":"Kürzere Bauzeit, weil immer alle Kolonnen arbeiten (kein Leerstand). Ausgeglichene Kapazitäten: Keine Spitzen im Personaleinsatz — weniger Rüstzeiten, vorhersehbarer Ressourcenbedarf. Geringerer Materialvorhalt: Schalung wird taktweise umgesetzt, kein Vorhalt mehrerer Sets nötig. Der Lernkurveneffekt (Einarbeitungseffekt) tritt auf — mit jeder Wiederholung wird die Kolonne schneller."},{"id":"bv-407","q":"Nenne Nachteile der Taktarbeit!","a":"Hoeherer Planungsaufwand\nStoeranfaellig -> Kettenreaktion\nEnge Zeitvorgaben\nGgf. unwirtschaftlich fuer Einzelunternehmer\nGeringe Flexibilitaet","tags":["Bauverfahren","Terminplanung","Taktplanung"],"reps":0,"ease":2.5,"interval":0,"due":1781333299149,"created":1781246899149,"last":null,"learning":true,"lapses":0,"explain":"Höherer Planungsaufwand: Abschnitte müssen exakt gleichgroß geplant werden — das gelingt selten perfekt. Störanfällig: Eine verspätete Kolonne blockiert alle nachfolgenden (Kettenreaktion). Enge Zeitvorgaben: Jeder Takt ist genau getaktet — kein Spielraum für Aufholen. Für Einzelunternehmer unwirtschaftlich, wenn ihr Anteil klein und die Rüstzeiten groß sind."},{"id":"bv-408","q":"Wie berechnet man die Gesamtausfuehrungsdauer bei Taktarbeit?","a":"Gesamtdauer = (n + m - 1) x t\nn = Anzahl Vorgaenge, m = Anzahl Abschnitte, t = Taktzeit\nDauer eines Vorgangs = m x t\nBearbeitungsdauer eines Abschnitts = n x t","tags":["Bauverfahren","Terminplanung","Taktplanung"],"reps":0,"ease":2.5,"interval":0,"due":1781333299149,"created":1781246899149,"last":null,"learning":true,"lapses":0,"fig":"<svg viewBox=\"0 0 330 180\" xmlns=\"http://www.w3.org/2000/svg\" style=\"width:100%;max-width:330px;height:auto;font-family:ui-monospace,monospace\">\n<text x=\"10\" y=\"14\" fill=\"var(--txt)\" font-size=\"11\" font-weight=\"700\">Taktfertigung<\/text>\n<line x1=\"45\" y1=\"26\" x2=\"45\" y2=\"158\" stroke=\"var(--line2)\" stroke-width=\"1.5\"/>\n<line x1=\"45\" y1=\"158\" x2=\"305\" y2=\"158\" stroke=\"var(--line2)\" stroke-width=\"1.5\"/>\n<text x=\"14\" y=\"100\" fill=\"var(--txt2)\" font-size=\"8.5\" transform=\"rotate(-90 20 100)\">Abschnitt<\/text>\n<text x=\"255\" y=\"154\" fill=\"var(--txt2)\" font-size=\"8.5\">Takteinheiten<\/text>\n<line x1=\"55\" y1=\"150\" x2=\"150\" y2=\"34\" stroke=\"var(--red)\" stroke-width=\"2\"/>\n<line x1=\"95\" y1=\"150\" x2=\"190\" y2=\"34\" stroke=\"var(--blue)\" stroke-width=\"2\"/>\n<line x1=\"135\" y1=\"150\" x2=\"230\" y2=\"34\" stroke=\"var(--acc)\" stroke-width=\"2\"/>\n<line x1=\"55\" y1=\"150\" x2=\"95\" y2=\"150\" stroke=\"var(--txt)\" stroke-width=\"1.5\"/>\n<text x=\"60\" y=\"146\" fill=\"var(--txt2)\" font-size=\"8.5\">t<\/text>\n<text x=\"200\" y=\"60\" fill=\"var(--txt2)\" font-size=\"8.5\">je Vorgang um Taktzeit t versetzt<\/text>\n<\/svg>","explain":"Formel: Gesamtdauer = (n + m - 1) × t. n = Anzahl der Vorgänge (z.B. Schalung, Bewehrung, Beton = 3), m = Anzahl der Abschnitte (z.B. 4 Geschosse), t = Taktzeit. Für n=3, m=4, t=1 Woche: (3+4-1) × 1 = 6 Wochen. Intuitiv: n Wochen Einschwingen am Anfang + m Wochen Vollbetrieb + Ausschwingen. Die Formel ergibt sich aus dem Taktdiagramm."},{"id":"bv-409","q":"Was macht man bei der Strukturanalyse im Netzplan?","a":"Vorgaenge definieren\nDauer berechnen (Massen x Aufwandswerte)\nAbhaengigkeiten ermitteln und darstellen","tags":["Bauverfahren","Terminplanung","Netzplan"],"reps":0,"ease":2.5,"interval":0,"due":1781333299149,"created":1781246899149,"last":null,"learning":true,"lapses":0,"explain":"Bei der Strukturanalyse werden zuerst alle Vorgänge (Aktivitäten) aufgelistet. Dann wird für jeden Vorgang die Dauer berechnet: Menge (aus Ausschreibung/Planung) × Aufwandswert (aus Normen/Erfahrung). Schließlich werden die Abhängigkeiten (Anordnungsbeziehungen) definiert: Was muss vor was fertig sein? Das Ergebnis ist die Netzplanstruktur."},{"id":"bv-410","q":"Was macht man bei der Zeitanalyse im Netzplan?","a":"Vorwaertsrechnung: frueheste Zeitpunkte (FZ)\nRueckwaertsrechnung: spaeteste Zeitpunkte (SZ)\nKritischen Weg ermitteln (wo FZ = SZ)\nPufferzeiten berechnen","tags":["Bauverfahren","Terminplanung","Netzplan"],"reps":0,"ease":2.5,"interval":0,"due":1781333299149,"created":1781246899149,"last":null,"learning":true,"lapses":0,"explain":"Vorwärtsrechnung: Vom ersten Ereignis aus werden die frühesten Zeitpunkte (FZ) berechnet — wann kann jeder Vorgang frühestens beginnen/enden? Rückwärtsrechnung: Vom letzten Ereignis aus werden die spätesten Zeitpunkte (SZ) berechnet — wann darf jeder Vorgang spätestens beginnen/enden, ohne das Projektende zu verschieben? Differenz = Puffer."},{"id":"bv-411","q":"Was ist der kritische Weg?","a":"Der Weg durch den Netzplan, auf dem alle Vorgaenge keinen Puffer haben (FZ = SZ). Verschiebungen auf dem kritischen Weg fuehren direkt zur Verlaengerung der Projektdauer.","tags":["Bauverfahren","Terminplanung","Netzplan"],"reps":0,"ease":2.5,"interval":0,"due":1781333299149,"created":1781246899149,"last":null,"learning":true,"lapses":0,"fig":"<svg viewBox=\"0 0 330 168\" xmlns=\"http://www.w3.org/2000/svg\" style=\"width:100%;max-width:330px;height:auto;font-family:ui-monospace,monospace\">\n<text x=\"10\" y=\"14\" fill=\"var(--txt)\" font-size=\"11\" font-weight=\"700\">Vorgangspfeil-Netzplan<\/text>\n<line x1=\"70\" y1=\"55\" x2=\"250\" y2=\"55\" stroke=\"var(--txt2)\" stroke-width=\"1.6\" marker-end=\"url(#ar)\"/>\n<line x1=\"70\" y1=\"55\" x2=\"150\" y2=\"125\" stroke=\"var(--txt2)\" stroke-width=\"1.6\" marker-end=\"url(#ar)\"/>\n<line x1=\"150\" y1=\"125\" x2=\"250\" y2=\"55\" stroke=\"var(--acc)\" stroke-width=\"1.8\" marker-end=\"url(#ar)\"/>\n<defs><marker id=\"ar\" markerWidth=\"7\" markerHeight=\"7\" refX=\"6\" refY=\"3\" orient=\"auto\"><path d=\"M0,0 L6,3 L0,6\" fill=\"var(--txt2)\"/><\/marker><\/defs>\n<circle cx=\"62\" cy=\"55\" r=\"15\" fill=\"var(--surface)\" stroke=\"var(--blue)\" stroke-width=\"2\"/><text x=\"58\" y=\"59\" fill=\"var(--txt2)\" font-size=\"10\">1<\/text>\n<circle cx=\"150\" cy=\"128\" r=\"15\" fill=\"var(--surface)\" stroke=\"var(--blue)\" stroke-width=\"2\"/><text x=\"146\" y=\"132\" fill=\"var(--txt2)\" font-size=\"10\">2<\/text>\n<circle cx=\"258\" cy=\"55\" r=\"15\" fill=\"var(--surface)\" stroke=\"var(--blue)\" stroke-width=\"2\"/><text x=\"254\" y=\"59\" fill=\"var(--txt2)\" font-size=\"10\">4<\/text>\n<text x=\"150\" y=\"44\" fill=\"var(--txt2)\" font-size=\"8.5\">2<\/text><text x=\"95\" y=\"105\" fill=\"var(--txt2)\" font-size=\"8.5\">2<\/text><text x=\"205\" y=\"100\" fill=\"var(--acc)\" font-size=\"9\">3<\/text>\n<text x=\"60\" y=\"160\" fill=\"var(--txt2)\" font-size=\"8.5\">Kreis=Ereignis (FZ/SZ), Pfeil=Vorgang<\/text>\n<\/svg>","explain":"Der kritische Weg ist die längste Kette von Vorgängen durch den Netzplan — er bestimmt die Projektdauer. Auf diesem Weg ist kein Puffer vorhanden (FZ = SZ). Wenn ein Vorgang auf dem kritischen Weg länger dauert, verschiebt sich das Projektende um denselben Zeitraum. Beim Termincontrolling konzentriert man sich auf kritische Vorgänge."},{"id":"bv-412","q":"Wie werden die Puffer im Netzplan berechnet?","a":"Gesamtpuffer: GP = SZ_j - FZ_i - D\nFreier Puffer: FP = FZ_j - FZ_i - D\nUnabhaengiger Puffer: UP = FZ_j - SZ_i - D\n(i = Anfangsereignis, j = Endereignis, D = Dauer)","tags":["Bauverfahren","Terminplanung","Netzplan"],"reps":0,"ease":2.5,"interval":0,"due":1781333299149,"created":1781246899149,"last":null,"learning":true,"lapses":0,"fig":"<svg viewBox=\"0 0 330 132\" xmlns=\"http://www.w3.org/2000/svg\" style=\"width:100%;max-width:330px;height:auto;font-family:ui-monospace,monospace\">\n<text x=\"10\" y=\"14\" fill=\"var(--txt)\" font-size=\"11\" font-weight=\"700\">Pufferzeiten<\/text>\n<rect x=\"40\" y=\"30\" width=\"80\" height=\"14\" rx=\"2\" fill=\"var(--blue)\" opacity=\".8\"/>\n<text x=\"124\" y=\"41\" fill=\"var(--txt2)\" font-size=\"8.5\">Vorgang i (D)<\/text>\n<line x1=\"120\" y1=\"56\" x2=\"250\" y2=\"56\" stroke=\"var(--acc)\" stroke-width=\"2\"/>\n<text x=\"124\" y=\"52\" fill=\"var(--acc)\" font-size=\"9\">GP = SZj - FZi - D<\/text>\n<line x1=\"120\" y1=\"80\" x2=\"210\" y2=\"80\" stroke=\"var(--green)\" stroke-width=\"2\"/>\n<text x=\"124\" y=\"76\" fill=\"var(--green)\" font-size=\"9\">FP = FZj - FZi - D<\/text>\n<line x1=\"160\" y1=\"104\" x2=\"210\" y2=\"104\" stroke=\"var(--red)\" stroke-width=\"2\"/>\n<text x=\"124\" y=\"120\" fill=\"var(--red)\" font-size=\"9\">UP = FZj - SZi - D<\/text>\n<\/svg>","explain":"Gesamtpuffer GP: Wie lange kann ein Vorgang verschoben werden, ohne das Projektende zu verschieben? Freier Puffer FP: Wie lange kann ein Vorgang verschoben werden, ohne den Nachfolger zu verzögern? Unabhängiger Puffer UP: Wie lange bei spätestem Vorgänger und frühestem Nachfolger? i = Startereignis, j = Endereignis, D = Dauer des Vorgangs."},{"id":"bv-413","q":"Was ist ein Vorgangs-Pfeil-Netzplan (VPN)?","a":"Vorgaenge als Pfeile, Ereignisse als Kreise.\nJeder Knoten hat FZ (fruehesten) und SZ (spaetesten) Zeitpunkt.\nKritischer Weg: alle Knoten mit FZ = SZ","tags":["Bauverfahren","Terminplanung","Netzplan"],"reps":0,"ease":2.5,"interval":0,"due":1781333299149,"created":1781246899149,"last":null,"learning":true,"lapses":0,"fig":"<svg viewBox=\"0 0 330 168\" xmlns=\"http://www.w3.org/2000/svg\" style=\"width:100%;max-width:330px;height:auto;font-family:ui-monospace,monospace\">\n<text x=\"10\" y=\"14\" fill=\"var(--txt)\" font-size=\"11\" font-weight=\"700\">Vorgangspfeil-Netzplan<\/text>\n<line x1=\"70\" y1=\"55\" x2=\"250\" y2=\"55\" stroke=\"var(--txt2)\" stroke-width=\"1.6\" marker-end=\"url(#ar)\"/>\n<line x1=\"70\" y1=\"55\" x2=\"150\" y2=\"125\" stroke=\"var(--txt2)\" stroke-width=\"1.6\" marker-end=\"url(#ar)\"/>\n<line x1=\"150\" y1=\"125\" x2=\"250\" y2=\"55\" stroke=\"var(--acc)\" stroke-width=\"1.8\" marker-end=\"url(#ar)\"/>\n<defs><marker id=\"ar\" markerWidth=\"7\" markerHeight=\"7\" refX=\"6\" refY=\"3\" orient=\"auto\"><path d=\"M0,0 L6,3 L0,6\" fill=\"var(--txt2)\"/><\/marker><\/defs>\n<circle cx=\"62\" cy=\"55\" r=\"15\" fill=\"var(--surface)\" stroke=\"var(--blue)\" stroke-width=\"2\"/><text x=\"58\" y=\"59\" fill=\"var(--txt2)\" font-size=\"10\">1<\/text>\n<circle cx=\"150\" cy=\"128\" r=\"15\" fill=\"var(--surface)\" stroke=\"var(--blue)\" stroke-width=\"2\"/><text x=\"146\" y=\"132\" fill=\"var(--txt2)\" font-size=\"10\">2<\/text>\n<circle cx=\"258\" cy=\"55\" r=\"15\" fill=\"var(--surface)\" stroke=\"var(--blue)\" stroke-width=\"2\"/><text x=\"254\" y=\"59\" fill=\"var(--txt2)\" font-size=\"10\">4<\/text>\n<text x=\"150\" y=\"44\" fill=\"var(--txt2)\" font-size=\"8.5\">2<\/text><text x=\"95\" y=\"105\" fill=\"var(--txt2)\" font-size=\"8.5\">2<\/text><text x=\"205\" y=\"100\" fill=\"var(--acc)\" font-size=\"9\">3<\/text>\n<text x=\"60\" y=\"160\" fill=\"var(--txt2)\" font-size=\"8.5\">Kreis=Ereignis (FZ/SZ), Pfeil=Vorgang<\/text>\n<\/svg>","explain":"Im Vorgangspfeil-Netzplan (VPN) sind Vorgänge die Pfeile und Ereignisse (Zeitpunkte) die Knoten. Jeder Knoten hat FZ (frühester Zeitpunkt) und SZ (spätester Zeitpunkt). Schein- oder Dummy-Vorgänge (gestrichelte Pfeile, Dauer 0) zeigen reine Abhängigkeiten ohne Aktivität. Kritischer Weg = alle Knoten, bei denen FZ = SZ."},{"id":"bv-414","q":"Was ist ein Vorgangs-Knoten-Netzplan (VKN)?","a":"Vorgaenge als Rechtecke (Knoten), Abhaengigkeiten als Pfeile.\nJeder Knoten enthaelt: FA, FE, SA, SE und Pufferzeiten.\nFA = fruehester Anfang, FE = FA + D","tags":["Bauverfahren","Terminplanung","Netzplan"],"reps":0,"ease":2.5,"interval":0,"due":1781333299149,"created":1781246899149,"last":null,"learning":true,"lapses":0,"explain":"Im Vorgangsknotennetzplan (VKN) ist jeder Vorgang ein Rechteck (Knoten) mit FA (frühester Anfang), FE (frühestes Ende), SA (spätester Anfang), SE (spätestes Ende) und Puffer. Die Pfeile zeigen nur die Abhängigkeiten. FE = FA + D (Dauer). Der VKN ist übersichtlicher als VPN bei komplexen Projekten."},{"id":"bv-415","q":"Was sind die 3 Mindesteingaben fuer Terminplanungssoftware?","a":"Vorgaenge (Aktivitaeten)\nDauern der Vorgaenge\nAbhaengigkeiten / Anordnungsbeziehungen","tags":["Bauverfahren","Terminplanung"],"reps":0,"ease":2.5,"interval":0,"due":1781333299149,"created":1781246899149,"last":null,"learning":true,"lapses":0,"explain":"Terminplanungssoftware (MS Project, Primavera, Asta Powerproject) braucht mindestens diese drei Angaben, um eine Terminrechnung durchzuführen. Ohne Vorgänge keine Struktur. Ohne Dauern keine Zeitachse. Ohne Abhängigkeiten kein Netzplan, sondern nur eine Liste. Alles weitere (Ressourcen, Kosten, Risiken) ist optional."},{"id":"bv-416","q":"Wovon ist die Vorgangsdauer abhaengig?","a":"Kapazitaeten (Arbeitskraefte, Geraete)\nBauverfahren\nTechnologische Abhaengigkeiten (z.B. Aushaertezeiten)\nVertragliche Rahmenbedingungen\nWirtschaftlichkeit","tags":["Bauverfahren","Terminplanung"],"reps":0,"ease":2.5,"interval":0,"due":1781333299149,"created":1781246899149,"last":null,"learning":true,"lapses":0,"explain":"Kapazitäten bestimmen, wie viele Arbeitsstunden pro Tag möglich sind. Bauverfahren beeinflusst die Produktivität. Technologische Abhängigkeiten: Beton muss X Tage erhärten — Mindestdauer unabhängig von Kapazitäten. Vertragliche Rahmenbedingungen: Anlieferzeiten, Nutzungseinschränkungen. Wirtschaftlichkeit: Eine zu kleine Kolonne verlängert den Vorgang unwirtschaftlich."},{"id":"bv-417","q":"Wie kommt man zur Anzahl der Arbeiter?","a":"Gesamtaufwand ermitteln (Massen x Aufwandswert)\nAnzahl Arbeiter = Gesamtaufwand / (Bauzeit [Wochen] x 40 h/Woche)","tags":["Bauverfahren","Terminplanung"],"reps":0,"ease":2.5,"interval":0,"due":1781333299149,"created":1781246899149,"last":null,"learning":true,"lapses":0,"explain":"Beispiel: Rohbau 5.000 m² Decke. Schalung: 5.000 m² × 0,7 Ah/m² = 3.500 Ah. Bei 10 Wochen Bauzeit: 3.500 / (10 × 40) = 8,75 → 9 Schalungsarbeiter. Diese Methode gilt für jeden Vorgang. Aufwandswerte stammen aus REFA-Studien oder firmeneigener Erfahrung. Kritisch: Aufwandswerte variieren stark je nach Verfahren und Qualifikation."},{"id":"bv-418","q":"Was ist der Feinterminplan und welchen Zweck hat er?","a":"Detaillierter Terminplan auf Tagesebene.\nZweck: operative Steuerung auf der Baustelle, koordiniert Arbeitskraefte und Material.\nDetaillierungsgrad: Vorgaenge in Tagesschritten mit genauen Mengen, Personal und Geraeten.","tags":["Bauverfahren","Terminplanung"],"reps":0,"ease":2.5,"interval":0,"due":1781333299149,"created":1781246899149,"last":null,"learning":true,"lapses":0,"explain":"Der Feinterminplan hat eine Tageseinteilung — konkrete Arbeitsanweisungen (heute: Achse A-B einschalen, morgen: Bewehrung). Er wird wöchentlich aktualisiert und zeigt nur die nächsten 2-4 Wochen im Detail. Er ist das Arbeitsinstrument des Bauleiters, nicht des Projektleiters. Er leitet sich aus dem Koordinationsterminplan ab, nicht umgekehrt."},{"id":"bv-419","q":"Welche Massnahmen zur Synchronisation in der Taktplanung gibt es?","a":"Aussetzbetrieb (Kolonne setzt aus)\nSpringerbetrieb (Kolonne springt zwischen Abschnitten)\nWechselbetrieb (andere Taetigkeit im gleichen Abschnitt)","tags":["Bauverfahren","Terminplanung","Taktplanung"],"reps":0,"ease":2.5,"interval":0,"due":1781333299149,"created":1781246899149,"last":null,"learning":true,"lapses":0,"explain":"Aussetzbetrieb: Kolonne arbeitet 2 Takte, pausiert 1 Takt — sinnvoll, wenn eine Kolonne schneller als die Nachfolgekolonne ist. Springerbetrieb: Kolonne springt vom letzten Abschnitt zurück zum ersten — für sehr schnelle Kolonnen. Wechselbetrieb: Kolonne macht in einem Abschnitt eine andere Tätigkeit, während sie auf den nächsten Abschnitt wartet."},{"id":"bv-420","q":"Was ist der Einarbeitungseffekt?","a":"Aufwandswerte sinken mit der Wiederholung gleichartiger Taetigkeiten. Ersteinsatz = hoechster Aufwand, je Wiederholung Reduktion, nach 4-5 Einsaetzen konstanter Aufwand. Voraussetzung: gleiche Besetzung, Arbeiten, Geometrie, Technik, Bedingungen.","tags":["Bauverfahren","Terminplanung"],"reps":0,"ease":2.5,"interval":0,"due":1781337176284,"created":1781250776284,"last":null,"learning":true,"lapses":0,"explain":"Der Einarbeitungseffekt (auch Lernkurve) beschreibt, dass die Produktivität mit zunehmender Wiederholung steigt. Beim ersten Takt ist die Kolonne langsamer (unbekannte Gegebenheiten). Ab dem 3.-5. Takt ist Vollgeschwindigkeit erreicht. Für die Terminplanung bedeutet das: Erster Takt länger einplanen, spätere Takte kürzer. REFA-Aufwandswerte gelten meist für eingespielten Betrieb."},{"id":"bv-421","q":"Was gilt fuer die optimale Kolonnenstaerke?","a":"Zu wenige ODER zu viele Arbeitskraefte -> spez. Aufwandswert steigt.\nMindestens 3 FA.\nMinimale Bewegungsflaeche ca. 20-30 m2 je FA.","tags":["Bauverfahren","Terminplanung"],"reps":0,"ease":2.5,"interval":0,"due":1781337176284,"created":1781250776284,"last":null,"learning":true,"lapses":0,"explain":"Zu wenig Leute: Das Bauteil schreitet zu langsam voran (Rüstzeiten unverhältnismäßig groß). Zu viele Leute: Behinderung untereinander (zu enge Verhältnisse, Wartezeiten). Die optimale Kolonnengroße liegt im Bereich minimaler spezifischer Aufwandswert. In der Praxis: 4-6 Personen für eine Wandkolonne, 6-10 für eine Deckenkolonne."},{"id":"bv-422","q":"Welcher Planungsansatz gilt fuer die taegliche Arbeitszeit?","a":"8 Std./Tag, 5 Tage/Woche. Bei Erhoehung auf 10 h: Reservezeiten gehen verloren, Unfallgefahr durch Ermuedung, Leistungsverluste.","tags":["Bauverfahren","Terminplanung"],"reps":0,"ease":2.5,"interval":0,"due":1781337176284,"created":1781250776284,"last":null,"learning":true,"lapses":0,"explain":"Bei 10 h/Tag gehen Pufferzeiten verloren — kleine Störungen führen sofort zu Überstunden oder Terminverzug. Außerdem: Überstunden kosten Zuschläge (25-50%), die Produktivität pro Stunde sinkt nach 8 Stunden. Regelarbeitszeit 8 h/Tag = stabiler Rhythmus, verlässliche Produktivität, klare Abgrenzung für Nacht- und Sonntagszuschläge."},{"id":"bv-423","q":"Wie berechnet man die Vorgangsdauer (Aufwand)?","a":"W = V x w = Q x D x Td\nW = Aufwand [Ah], V = Produktmenge, w = spez. Aufwandswert\nQ = Einsatzmittel, D = Vorgangsdauer [d], Td = taegl. Arbeitszeit [h/d]\nProduktionsgeschwindigkeit v = V / (D x Td)","tags":["Bauverfahren","Terminplanung"],"reps":0,"ease":2.5,"interval":0,"due":1781337176284,"created":1781250776284,"last":null,"learning":true,"lapses":0,"explain":"W = V × w: Aufwand in Arbeitsstunden = Produktmenge × spezifischer Aufwandswert. Alternativ: W = Q × D × Td (Kapazität × Dauer × Tagesarbeitszeit). Daraus folgt: Dauer = W / (Q × Td) = Aufwand / (Kapazität × Arbeitsstunden/Tag). Beispiel: 200 m² Schalung, 0,7 Ah/m², 4 Mann, 8 h/Tag: Dauer = 140 Ah / (4 × 8) = 4,4 Tage ≈ 5 Tage."},{"id":"bv-424","q":"Unterschied Synchron- vs. Asynchronbetrieb?","a":"Synchronbetrieb: Vorgaenge mit gleicher Baugeschwindigkeit.\nAsynchronbetrieb: unterschiedliche Geschwindigkeit -> unabhaengige Vorgaenge, Vor-/Nachlaeufer oder Stoerbetrieb (zu langsam/zu schnell).","tags":["Bauverfahren","Terminplanung","Taktplanung"],"reps":0,"ease":2.5,"interval":0,"due":1781337176284,"created":1781250776284,"last":null,"learning":true,"lapses":0,"explain":"Synchronbetrieb: Alle Kolonnen (Schalung, Bewehrung, Beton) haben dieselbe Baugeschwindigkeit — idealer Taktbetrieb. Asynchronbetrieb: Kolonnen haben verschiedene Geschwindigkeiten, überholen sich, Kollisionen im Weg-Zeit-Diagramm möglich. Synchronbetrieb ist das Ziel der Taktplanung; Asynchronbetrieb erfordert Synchronisationsmaßnahmen (Aussetzen, Springen, Wechseln)."},{"id":"bv-425","q":"Nenne die 10 Schritte der Bauprozessplanung!","a":"1. Gliederung in Bauabschnitte\n2. Verfahrensplanung\n3. Ablaufstruktur\n4. Aufwandswerte bestimmen\n5. Ressourcen vorgeben\n6. Vorgangsdauer berechnen\n7. Ablaufplan konstruieren\n8. Ressourcenganglinie ermitteln\n9. Planung pruefen\n10. Iterative Optimierung","tags":["Bauverfahren","Terminplanung"],"reps":0,"ease":2.5,"interval":0,"due":1781337176284,"created":1781250776284,"last":null,"learning":true,"lapses":0,"explain":"Diese 10 Schritte sind ein systematisches Vorgehen von der Idee bis zum Terminplan. Gliederung in Bauabschnitte → Verfahrensplanung (wie?) → Ablaufstruktur (in welcher Reihenfolge?) → Aufwandsermittlung (wie lange?) → Kapazitätsplanung (wie viele?) → Terminplan erstellen → Ressourcenabstimmung → Optimierung → Freigabe → Controlling."}],"created":1781246899149,"fach":"Bauverfahren"},{"id":"bv-d6","name":"Projektmanagement","desc":"PM-Aufgaben, Lean Management, Personalplanung","emoji":"📊","color":"#06b6d4","cards":[{"id":"bv-501","q":"Welche Aufgaben hat das Projektmanagement?","a":"Termine (Terminplanung und -kontrolle)\nKosten (Kostenkontrolle)\nQualitaet (Qualitaetssicherung)","tags":["Bauverfahren","Projektmanagement"],"reps":0,"ease":2.5,"interval":0,"due":1781333299149,"created":1781246899149,"last":null,"learning":true,"lapses":0,"explain":"Das magische Dreieck des Projektmanagements: Termine, Kosten, Qualität — alle drei hängen zusammen. Wer Termine verkürzt, riskiert Qualitätsverlust oder Mehrkosten. Der Bauleiter muss alle drei im Blick behalten. Im Baubetrieb kommt die Sicherheit als vierte Dimension hinzu (QUKS = Qualität, Umwelt, Kosten, Sicherheit)."},{"id":"bv-502","q":"Was erfordert Projektmanagement?","a":"Planung\nOrganisation\nUeberwachung und Durchsetzung","tags":["Bauverfahren","Projektmanagement"],"reps":0,"ease":2.5,"interval":0,"due":1781333299149,"created":1781246899149,"last":null,"learning":true,"lapses":0,"explain":"Planung allein reicht nicht — wer plant, aber nicht organisiert (wer macht was wann?), scheitert. Überwachung deckt Abweichungen früh auf. Durchsetzung ist nötig, wenn Beteiligte nicht liefern (Nachunternehmer verzögern, AG ändert Pläne). PM ohne Durchsetzungskompetenz ist zahnlos."},{"id":"bv-503","q":"Was versteht man unter Lean Management?","a":"Schlankes Management - moeglichst wenig Verschwendung.\nPrinzipien:\nFliessprinzip (kontinuierliche Auslastung)\nTaktprinzip\nZiehprinzip\nNull-Fehler-Prinzip","tags":["Bauverfahren","Projektmanagement","Lean"],"reps":0,"ease":2.5,"interval":0,"due":1781333299149,"created":1781246899149,"last":null,"learning":true,"lapses":0,"explain":"Lean Construction (schlanke Bauproduktion) überträgt Toyota-Prinzipien auf den Bau. Fließprinzip: kontinuierliche Wertschöpfung ohne Unterbrechungen. Taktprinzip: gleichmäßiger Rhythmus (wie Taktplanung). Ziehprinzip (Pull): der Nachfolger bestimmt, wann der Vorgänger liefert (statt schieben). Null-Fehler: Fehler sofort beheben statt am Ende. Lean reduziert Verschwendung (Wartezeiten, Überproduktion, Transport)."},{"id":"bv-504","q":"Wie berechnet man die Anzahl der Arbeiter (Personalplanung)?","a":"Gesamtaufwand [h] = Summe (Masse x Aufwandswert)\nAnzahl Arbeiter = Gesamtaufwand / (Bauzeit [Wochen] x 40 h/Woche)\nTyp. Aufwandswerte: Schalung 0,7 h/m2, Beton Decke/Pumpe 0,4 h/m3, Beton Wand/Kuebel 1,2 h/m3, Bewehrung horizontal 8 h/t, vertikal 10 h/t","tags":["Bauverfahren","Projektmanagement"],"reps":0,"ease":2.5,"interval":0,"due":1781333299149,"created":1781246899149,"last":null,"learning":true,"lapses":0,"explain":"Typische Aufwandswerte (aus REFA/BKI): Schalung 0,7 Ah/m², Bewehrung horizontal 8 Ah/t, vertikal 10 Ah/t, Beton Decke/Pumpe 0,4 Ah/m³, Beton Wand/Kübel 1,2 Ah/m³. Gesamtaufwand dividiert durch Bauzeit × 40 h/Woche = Anzahl Arbeiter. Wichtig: Diese Werte sind Mittelwerte — tatsächliche Werte hängen stark von Randbedingungen ab."},{"id":"bv-505","q":"Was kennzeichnet die Bauproduktion als instationaere Produktion?","a":"Bewegliche Arbeitsplaetze, kein bewegliches Produkt - die Produktion kommt zum Kunden. Vorhaltung von Kapazitaeten ohne zu wissen wann; stets neue Standortbedingungen; grosse logistische Herausforderung; Losgroesse 1 (Unikat).","tags":["Bauverfahren","Projektmanagement"],"reps":0,"ease":2.5,"interval":0,"due":1781337176284,"created":1781250776284,"last":null,"learning":true,"lapses":0,"explain":"In der Fabrik bewegt sich das Produkt (Fließband), der Arbeitsplatz bleibt fest. Auf der Baustelle ist es umgekehrt: Das Bauwerk wächst am Ort, die Arbeitskräfte wandern. Diese Besonderheit macht Bauproduktion schwieriger zu standardisieren als Fabrikproduktion — jedes Bauwerk ist ein Unikat, jede Baustelle hat andere Bedingungen."},{"id":"bv-506","q":"Was besagt VOB/B §1 Abs. 3 zur Aenderung?","a":"\"Aenderungen des Bauentwurfs anzuordnen bleibt dem Auftraggeber vorbehalten.\" Der AG hat das Recht zur laufenden Aenderung des Projekt-Solls -> erforderliche Prozessaenderung waehrend der laufenden Produktion.","tags":["Bauverfahren","Projektmanagement"],"reps":0,"ease":2.5,"interval":0,"due":1781337176284,"created":1781250776284,"last":null,"learning":true,"lapses":0,"explain":"VOB/B §1 Abs. 3 gibt dem AG das Recht, Änderungen anzuordnen. Der AN ist verpflichtet, diese auszuführen — auch wenn er das nicht möchte. Aber: Der AN hat Anspruch auf Vergütungsanpassung (Nachtrag). Der AN muss Änderungsanordnungen schriftlich bestätigen lassen und darf nicht einfach ohne Vergütungsregelung ausführen."},{"id":"bv-507","q":"Was ist der PDCA-Zyklus im Baubetrieb?","a":"Plan-Do-Check-Act: kontinuierlicher Verbesserungsprozess. Im Baubetrieb v.a. als staendiger Soll-Ist-Vergleich (Check) bei der Baufortschrittskontrolle umgesetzt.","tags":["Bauverfahren","Projektmanagement","Lean"],"reps":0,"ease":2.5,"interval":0,"due":1781337176284,"created":1781250776284,"last":null,"learning":true,"lapses":0,"explain":"PDCA = Plan-Do-Check-Act (Deming-Zyklus). Im Baubetrieb: Plan = Terminplan, Do = Ausführung, Check = Soll-Ist-Vergleich (Kontrolle), Act = Steuerungsmaßnahmen. Lean Construction nutzt PDCA auf Tagesebene (Last Planner System). Das Ziel ist kontinuierliche Verbesserung der Bauprozesse durch systematisches Lernen aus Fehlern."},{"id":"bv-508","q":"Nenne die 4 Prinzipien der Prozessoptimierung (Lean)!","a":"Fliess-Prinzip: enge Verzahnung aller Prozesse, sachlogische Reihenfolge\nTakt-Prinzip: \"Herzschlag\", gleichmaessige Verteilung der Arbeit\nZieh-Prinzip: bedarfsorientierte Anforderung nachfolgender Prozesse\nNull-Fehler-Prinzip: KVP","tags":["Bauverfahren","Projektmanagement","Lean"],"reps":0,"ease":2.5,"interval":0,"due":1781337176284,"created":1781250776284,"last":null,"learning":true,"lapses":0,"explain":"Fließ-Prinzip: Prozesse werden so eng verknüpft, dass kein Leerlauf entsteht — wie ein Fließband. Takt-Prinzip: Alle Vorgänge im selben Rhythmus. Zieh-Prinzip: der Nachfolger \"zieht\" den Vorgänger (Demand-Pull statt Push). Null-Fehler-Prinzip: Fehler werden sofort am Entstehungsort behoben, nicht weitergegeben. Gemeinsam reduzieren diese Prinzipien die 7 Arten der Verschwendung (Muda) auf dem Bau."}],"created":1781246899149,"fach":"Bauverfahren"},{"id":"bv-d7","name":"Gerueste","desc":"Arbeits-, Schutz-, Traggeruste, Lastklassen, Bemessungsklassen, Geruestbau-Pflichten","emoji":"🪜","color":"#ec4899","cards":[{"id":"bv-601","q":"Unterscheide Arbeits-, Schutz- und Traggeruest!","a":"Arbeitsgeruest: Standplatz zum Arbeiten + Absetzplatz fuer Material.\nSchutzgeruest: Fang-/Dachfanggeruest, faengt Personen/Material (Passantenschutz).\nTraggeruest: nimmt Lasten auf, bis die Konstruktion selbst tragfaehig ist.","tags":["Bauverfahren","Geruest"],"reps":0,"ease":2.5,"interval":0,"due":1781337176284,"created":1781250776284,"last":null,"learning":true,"lapses":0,"explain":"Arbeitsgerüst: Gibt dem Arbeiter eine stabile Standfläche in Höhe und bietet Platz für Material. Schutzgerüst: Schützt Personen unter dem Gerüst (Fanggerüst) oder auf dem Dach (Dachfanggerüst) vor herabfallenden Gegenständen oder Absturz — es ist kein Arbeitsplatz. Traggerüst: Unterstützt Lasten (z.B. Lehrgerüst für Brücken, Schalungsgerüst) — reine Traglastfunktion."},{"id":"bv-602","q":"Unterschied systemfreie vs. Systemgerueste?","a":"Systemfrei (z.B. Stahlrohr-Kupplungsgeruest): aus Rohren/Kupplungen, flexibel, geringe Anschaffungskosten, aufwendige Montage.\nSystemgeruest: vorgefertigte Bauteile, hohe Anschaffungskosten, schnelle/effiziente Montage, Abmessungen durch Bauteile vorbestimmt.","tags":["Bauverfahren","Geruest"],"reps":0,"ease":2.5,"interval":0,"due":1781337176284,"created":1781250776284,"last":null,"learning":true,"lapses":0,"explain":"Systemfreie Gerüste (Kupplungsgerüst): Einzelne Stahlrohre werden mit Kupplungen verbunden — maximale Flexibilität für komplizierte Geometrien, aber mehr Montageaufwand und Ingenieurnachweis nötig. Systemgerüste (z.B. Layher Allround, Peri Up): vorgefertigte Knoten und Riegel — schnelle Montage, aber begrenzte Flexibilität. Systemgerüste dominieren die Praxis."},{"id":"bv-603","q":"Unterschied Rahmengeruest vs. Modulgeruest?","a":"Rahmengeruest: senkrechte/waagerechte Tragglieder als Rahmen vorgefertigt.\nModulgeruest: an Staendern in Modulabstaenden vorgefertigte Knotenpunkte -> sehr flexible Geruestformen durch viele Feldlaengen/Hoehenraster.","tags":["Bauverfahren","Geruest"],"reps":0,"ease":2.5,"interval":0,"due":1781337176284,"created":1781250776284,"last":null,"learning":true,"lapses":0,"explain":"Rahmengerüst: Senkrechte und waagerechte Träger sind zu Rahmen vorgefertigt — einfach, schnell, aber weniger flexibel. Modulgerüst: Einzelne Knoten (Rosettenknoten) nehmen mehrere Riegel und Diagonalen auf — sehr flexibel, auch für komplexe 3D-Formen geeignet. Layher Allround ist das bekannteste Modulgerüst in Deutschland."},{"id":"bv-604","q":"Nenne die Lastklassen 1-3 von Arbeitsgeruesten!","a":"LK1: Inspektionstaetigkeiten, 0,75 kN/m2 (ca. Person mit Werkzeug)\nLK2: keine Materiallagerung, 1,50 kN/m2 (Anstrich, Putz, Verfugen)\nLK3: bis 2,0 kN/m2 (Malerarbeiten, Dachdecken, Fassade, geringe Materiallagerung)","tags":["Bauverfahren","Geruest","Lastklassen"],"reps":0,"ease":2.5,"interval":0,"due":1781337176284,"created":1781250776284,"last":null,"learning":true,"lapses":0,"fig":"<svg viewBox=\"0 0 330 172\" xmlns=\"http://www.w3.org/2000/svg\" style=\"width:100%;max-width:330px;height:auto;font-family:ui-monospace,monospace\">\n<text x=\"10\" y=\"14\" fill=\"var(--txt)\" font-size=\"11\" font-weight=\"700\">Lastklassen Arbeitsgeruest (kN/m2)<\/text>\n<line x1=\"50\" y1=\"30\" x2=\"50\" y2=\"150\" stroke=\"var(--line2)\" stroke-width=\"1.5\"/><line x1=\"50\" y1=\"150\" x2=\"310\" y2=\"150\" stroke=\"var(--line2)\" stroke-width=\"1.5\"/>\n<rect x=\"60\" y=\"120\" width=\"34\" height=\"30\" fill=\"var(--acc)\" opacity=\".8\"/><text x=\"62\" y=\"146\" fill=\"var(--acc-ink)\" font-size=\"8\">0,75<\/text><text x=\"64\" y=\"164\" fill=\"var(--txt2)\" font-size=\"8.5\">LK1<\/text>\n<rect x=\"110\" y=\"90\" width=\"34\" height=\"60\" fill=\"var(--blue)\" opacity=\".8\"/><text x=\"114\" y=\"118\" fill=\"#fff\" font-size=\"8\">1,5<\/text><text x=\"114\" y=\"164\" fill=\"var(--txt2)\" font-size=\"8.5\">LK2<\/text>\n<rect x=\"160\" y=\"70\" width=\"34\" height=\"80\" fill=\"var(--green)\" opacity=\".8\"/><text x=\"164\" y=\"98\" fill=\"#fff\" font-size=\"8\">2,0<\/text><text x=\"164\" y=\"164\" fill=\"var(--txt2)\" font-size=\"8.5\">LK3<\/text>\n<rect x=\"215\" y=\"50\" width=\"80\" height=\"100\" fill=\"var(--red)\" opacity=\".7\"/><text x=\"228\" y=\"100\" fill=\"#fff\" font-size=\"8\">LK4-6 Lagerung<\/text>\n<\/svg>","explain":"LK1 (0,75 kN/m²): Nur für Inspektion/Kontrolle (eine Person mit leichtem Werkzeug). LK2 (1,5 kN/m²): Geringe Lasten, kein Material. LK3 (2,0 kN/m²): Handwerkerarbeiten mit geringem Materialbedarf. Diese Klassen werden für Fassadenarbeiten ohne schweres Material (z.B. Maler, Klempner) verwendet. Die Klasse bestimmt Belagstärke und Rahmengröße."},{"id":"bv-605","q":"Wofuer dienen die Lastklassen 4-6 von Arbeitsgeruesten?","a":"LK4, LK5, LK6: fuer Arbeiten MIT Materiallagerung (Baustoffe/Bauteile auf dem Geruest), z.B. Maurerarbeiten, Bewehrungsarbeiten, Natursteinarbeiten, Montagearbeiten mit hohem Materialanteil.","tags":["Bauverfahren","Geruest","Lastklassen"],"reps":0,"ease":2.5,"interval":0,"due":1781337176284,"created":1781250776284,"last":null,"learning":true,"lapses":0,"fig":"<svg viewBox=\"0 0 330 172\" xmlns=\"http://www.w3.org/2000/svg\" style=\"width:100%;max-width:330px;height:auto;font-family:ui-monospace,monospace\">\n<text x=\"10\" y=\"14\" fill=\"var(--txt)\" font-size=\"11\" font-weight=\"700\">Lastklassen Arbeitsgeruest (kN/m2)<\/text>\n<line x1=\"50\" y1=\"30\" x2=\"50\" y2=\"150\" stroke=\"var(--line2)\" stroke-width=\"1.5\"/><line x1=\"50\" y1=\"150\" x2=\"310\" y2=\"150\" stroke=\"var(--line2)\" stroke-width=\"1.5\"/>\n<rect x=\"60\" y=\"120\" width=\"34\" height=\"30\" fill=\"var(--acc)\" opacity=\".8\"/><text x=\"62\" y=\"146\" fill=\"var(--acc-ink)\" font-size=\"8\">0,75<\/text><text x=\"64\" y=\"164\" fill=\"var(--txt2)\" font-size=\"8.5\">LK1<\/text>\n<rect x=\"110\" y=\"90\" width=\"34\" height=\"60\" fill=\"var(--blue)\" opacity=\".8\"/><text x=\"114\" y=\"118\" fill=\"#fff\" font-size=\"8\">1,5<\/text><text x=\"114\" y=\"164\" fill=\"var(--txt2)\" font-size=\"8.5\">LK2<\/text>\n<rect x=\"160\" y=\"70\" width=\"34\" height=\"80\" fill=\"var(--green)\" opacity=\".8\"/><text x=\"164\" y=\"98\" fill=\"#fff\" font-size=\"8\">2,0<\/text><text x=\"164\" y=\"164\" fill=\"var(--txt2)\" font-size=\"8.5\">LK3<\/text>\n<rect x=\"215\" y=\"50\" width=\"80\" height=\"100\" fill=\"var(--red)\" opacity=\".7\"/><text x=\"228\" y=\"100\" fill=\"#fff\" font-size=\"8\">LK4-6 Lagerung<\/text>\n<\/svg>","explain":"LK4 (3,0 kN/m²), LK5 (4,5 kN/m²), LK6 (6,0 kN/m²): Für Maurerarbeiten, Steinmetzarbeiten oder wenn schwere Baustoffe auf dem Gerüst gelagert werden. LK6 ist die schwerste Klasse — für intensive Materiallagerung. Je höher die Lastklasse, desto stärker müssen Belag, Rahmen, Stiele und Fundamente bemessen werden."},{"id":"bv-606","q":"Welche Bemessungsklassen gibt es bei Traggeruesten?","a":"Klasse A: bewaehrte Praxis - nur bis Einbauhoehe 3,5 m, Stuetzweite 6,0 m, Deckenstaerke 30 cm.\nKlasse B: Bemessung nach Eurocode\n- B1: hohe Anforderungen an rechnerische Erfassung\n- B2: vereinfachte Annahmen erlaubt","tags":["Bauverfahren","Geruest","Bemessungsklassen"],"reps":0,"ease":2.5,"interval":0,"due":1781337176284,"created":1781250776284,"last":null,"learning":true,"lapses":0,"explain":"Klasse A (bewährte Praxis): Nur bis 3,5 m Einbauhöhe und 6 m Stützweite — keine Berechnung nötig, nur Nachweis nach Standardwerten. Klasse B: Einbauhöhe 3,5-6 m, Stützweite bis 6 m, einfache Berechnung. Klasse C: Alles darüber — vollständiger statischer Nachweis durch Ingenieur erforderlich. Die Klasseneinteilung spart Planungsaufwand bei einfachen Verhältnissen."},{"id":"bv-607","q":"Welche Einwirkungen wirken auf Traggerueste?","a":"Vertikal: Eigengewicht Schalung/Geruest, Frischbetonauflast, Arbeitsbetrieb (0,75 kN/m2), Zusatzlast.\nHorizontal: horizontale Ersatzlast, Frischbetondruck auf Seitenabschalung, Windlast (Arbeitswind + max. Wind), fliessendes Wasser, Erdbeben.","tags":["Bauverfahren","Geruest"],"reps":0,"ease":2.5,"interval":0,"due":1781337176284,"created":1781250776284,"last":null,"learning":true,"lapses":0,"explain":"Vertikal: Eigengewicht der Schalung (~0,5-1 kN/m²) + Betonauflast (γ × h, ggf. > 20 kN/m²) + Arbeitsgeräte (0,75 kN/m² nach Norm). Horizontal: Frischbetonschub, Wind (nach DIN EN 1991-1-4), unbeabsichtigte Ausmitten, Kranlasten. Das Traggerüst muss für die maßgebende Kombination aus vertikalen und horizontalen Einwirkungen bemessen werden."},{"id":"bv-608","q":"Welche Standgeruest-Typen gibt es (nach Bauart)?","a":"Leitergeruest (Holz, selten)\nRahmengeruest (2 m Staenderrahmen, LK 3+4)\nKupplungsgeruest (grosse Spannweiten, LK 5+6)\nAuslegergeruest (max. 1,3 m Kragarm, nur Massivdecken)\nKonsolgeruest (Konsole an Fassade, min. 2 Aufhaengungen)","tags":["Bauverfahren","Geruest"],"reps":0,"ease":2.5,"interval":0,"due":1781337176284,"created":1781250776284,"last":null,"learning":true,"lapses":0,"explain":"Leitergerüst: historisch, kaum noch im Einsatz. Rahmengerüst: Standardlösung bis LK4 für Hochbaugerüste. Kupplungsgerüst: für Sondergeometrien (Bögen, Hallen). Konsolgerüst: hängt an der Fassade ohne Bodenstütze — für schmale Bürgersteige. Hängegerüst: an Dachträgern oder Brücken aufgehängt."},{"id":"bv-609","q":"Anforderungen an Fang- und Dachfanggeruest?","a":"Fanggeruest: min. LK2, Belag kragt ueber Absturzkante, Fallhoehe < 3 m.\nDachfanggeruest: Belagbreite min. 60 cm, max. 1,5 m unter Traufkante, Schutzwand min. 70 cm ueber Traufkante.","tags":["Bauverfahren","Geruest"],"reps":0,"ease":2.5,"interval":0,"due":1781337176284,"created":1781250776284,"last":null,"learning":true,"lapses":0,"explain":"Fanggerüst: Aufgefangen werden Personen und Gegenstände, die von der Fassade fallen. LK2 Mindestlast, Belag muss über die Absturzkante auskragen. Die Fallhöhe zum Fanggerüst darf max. 3 m betragen (sonst zu harte Aufprallenergie). Dachfanggerüst: Schützt vor Absturz vom Dach — Montage am Traufrand, Breite mind. 1,5 m, Außenbordkante abgesichert."},{"id":"bv-610","q":"Welche Pflichten hat der Geruestersteller?","a":"Sicherer Auf-/Um-/Abbau, Lagerung, Transport, Pruefung nach Montage.\nGefaehrdungsbeurteilung (§3 BetrSichV), Unterweisung, befaehigte Aufsichtsperson, Montageanweisung (Aufbau-/Verwendungsanleitung), Pruefung der Gebrauchstauglichkeit -> Pruefprotokoll (min. 3 Monate ueber Standzeit aufbewahren).","tags":["Bauverfahren","Geruest"],"reps":0,"ease":2.5,"interval":0,"due":1781337176284,"created":1781250776284,"last":null,"learning":true,"lapses":0,"explain":"Der Gerüstersteller haftet für eine fachgerechte Montage. Er muss eine Gefährdungsbeurteilung erstellen (DGUV Regel 101-011). Nach der Montage muss eine Prüfung durch eine befähigte Person erfolgen (Abnahme), bevor das Gerüst benutzt werden darf. Der Gerüstnutzer (Baufirma) übernimmt nach Abnahme die Verkehrssicherungspflicht für das Gerüst."}],"created":1781250776284,"fach":"Bauverfahren"},{"id":"gt-d1","name":"GT1 – Grundlagen","desc":"Geologie, Bodenklassifizierung, Baugrunderkundung, Laborversuche, Spannungen, Grundwasser","emoji":"🌍","color":"#6cb8ff","cards":[{"id":"gt-101","q":"Nenne die beiden grundsätzlichen Arten magmatischer Gesteine mit je einem Beispiel.","a":"**Plutonite** (Tiefengestein): z.B. Granit\n**Vulkanite** (Ergussgestein): z.B. Basalt","tags":["Geotechnik","Geologie"],"reps":0,"ease":2.5,"interval":0,"due":1781338792034,"created":1781252392034,"last":null,"learning":true,"lapses":0,"explain":"Magmatische Gesteine entstehen aus erstarrender Gesteinsschmelze (Magma). Plutonite (Tiefengesteine) erstarren langsam in der Erdkruste — große Kristalle entstehen (Granit, gut erkennbares Kristallgefüge). Vulkanite (Ergussgesteine) erstarren schnell an der Oberfläche — kleine oder gar keine Kristalle (Basalt, dicht und fein). Merkhilfe: Pluton = tief = langsam = groß, Vulkan = oben = schnell = klein."},{"id":"gt-102","q":"Warum unterscheidet sich das Gefüge von Plutoniten und Vulkaniten?","a":"Wegen der **Abkühlgeschwindigkeit**:\n• Plutonit: kühlt langsam in der Tiefe ab → grobkristallin (große Kristalle)\n• Vulkanit: kühlt schnell an der Oberfläche ab → feinkristallin/glasig","tags":["Geotechnik","Geologie"],"reps":0,"ease":2.5,"interval":0,"due":1781338792034,"created":1781252392034,"last":null,"learning":true,"lapses":0,"explain":"In der Erdkruste (Plutonit) dauert das Abkühlen Millionen Jahre — Mineralkristalle haben Zeit zu wachsen und werden makroskopisch sichtbar (Granit: deutliche Quarze, Feldspäte, Glimmer). An der Oberfläche (Vulkanit) kühlt Lava innerhalb von Tagen bis Wochen ab — Kristalle haben kaum Zeit zu wachsen, das Gefüge ist fein oder glasig. Das Gefüge verrät also die Entstehungsgeschichte des Gesteins."},{"id":"gt-103","q":"Von welchen beiden Faktoren hängt die Metamorphose von Gesteinen ab? Nenne ein Beispiel.","a":"**Druck** und **Temperatur**\n\nBeispiel: Kalkstein → Marmor (durch hohe Temperatur, z.B. Kontaktmetamorphose am Magmakörper).","tags":["Geotechnik","Geologie"],"reps":0,"ease":2.5,"interval":0,"due":1781338792034,"created":1781252392034,"last":null,"learning":true,"lapses":0,"explain":"Metamorphe Gesteine (Umwandlungsgesteine) entstehen, wenn vorhandene Gesteine im Untergrund hohem Druck und/oder hoher Temperatur ausgesetzt werden — ohne zu schmelzen. Klassisches Beispiel: Kalkstein → Marmor (Temperatur rekristallisiert die Calcitkristalle). Tonschiefer → Glimmerschiefer (Druck richtet Glimmer aus). Wichtig für die Geotechnik: Metamorphite sind oft anisotrop (unterschiedliche Festigkeit in verschiedene Richtungen)."},{"id":"gt-104","q":"Was beschreiben die drei Parameter Streichen, Fallen und Fallrichtung gemeinsam?","a":"Die **Raumlage (Orientierung)** einer geologischen Fläche (z.B. Schicht- oder Kluftfläche) im Raum.\n\n• Streichen = waagerechte Linie in der Fläche\n• Fallen = Neigungswinkel gegen die Horizontale\n• Fallrichtung = Himmelsrichtung des steilsten Gefälles","tags":["Geotechnik","Geologie"],"reps":0,"ease":2.5,"interval":0,"due":1781338792034,"created":1781252392034,"last":null,"learning":true,"lapses":0,"explain":"Streichen gibt die Richtung an, in der eine geologische Fläche (z.B. Gesteinsschicht) horizontal verläuft — wie ein Kompassazimut (z.B. N30°O). Fallen ist der Winkel, den die Fläche mit der Horizontalen einschließt (z.B. 45°). Fallrichtung ist die Himmelsrichtung, in die die Fläche abfällt. Diese drei Angaben definieren eindeutig, wie eine Schicht im Raum liegt — wichtig für Stabilitätsberechnungen an Böschungen und Tunneln."},{"id":"gt-105","q":"Nenne die drei grundsätzlichen Arten von (nicht gespannten) Grundwasserleitern und das jeweilige Gestein.","a":"**Porengrundwasserleiter** → Lockergestein (Sand, Kies)\n**Kluftgrundwasserleiter** → klüftiges Festgestein (Fels)\n**Karstgrundwasserleiter** → lösliches Gestein (Kalkstein, Gips)","tags":["Geotechnik","Grundwasser"],"reps":0,"ease":2.5,"interval":0,"due":1781338792034,"created":1781252392034,"last":null,"learning":true,"lapses":0,"explain":"Porengrundwasserleiter: Wasser fließt durch die Hohlräume zwischen den Körnern (Poren) in Sand und Kies — häufigste Form, gut erschließbar. Kluftgrundwasserleiter: Wasser fließt durch Risse und Klüfte im Fels (z.B. Granit, Sandstein) — unregelmäßige Strömung, schwer vorherzusagen. Karstgrundwasserleiter: Wasser löst das Gestein (Kalk) auf und schafft Hohlräume und Höhlen — sehr schnelle Strömung, starke Schüttungsschwankungen."},{"id":"gt-106","q":"Wie ist die Kurzzeichen-Schreibweise von Boden nach DIN 4022/EN ISO 14688 aufgebaut?","a":"Großbuchstabe = **Hauptanteil**\nKleinbuchstabe = Nebenanteil, dabei:\n• Stern * = **stark** (z.B. t*)\n• ohne Zeichen = mittel\n• Apostroph ' = **schwach** (z.B. fs')\n\nReihenfolge: Hauptanteil zuerst, dann Nebenanteile.","tags":["Geotechnik","Klassifizierung"],"reps":0,"ease":2.5,"interval":0,"due":1781338792034,"created":1781252392034,"last":null,"learning":true,"lapses":0,"explain":"Das DIN-Kurzzeichensystem beschreibt Böden mit Groß- und Kleinbuchstaben: Großbuchstabe = Hauptbodenart (S = Sand, G = Kies, T = Ton, U = Schluff), Kleinbuchstabe = Nebenanteil. Sternchen (*) bedeutet \"stark\" (> 30%), Apostroph bedeutet \"schwach\" (< 15%). Beispiel: Su* = stark schluffiger Sand (Sand mit > 30% Schluff). Diese Kurzzeichen stehen im Baugrundgutachten und Bohrprofil."},{"id":"gt-107","q":"Beschreibe die DIN-4022-Kurzzeichen:\na) U, t*, fs'\nb) mS, u*, fg'\nc) X, gg*, s'","a":"a) **Schluff**, stark tonig, schwach feinsandig\nb) **Mittelsand**, stark schluffig, schwach feinkiesig\nc) **Steine**, stark grobkiesig, schwach sandig","tags":["Geotechnik","Klassifizierung"],"reps":0,"ease":2.5,"interval":0,"due":1781338792034,"created":1781252392034,"last":null,"learning":true,"lapses":0,"explain":"U = Schluff (Hauptanteil), t* = stark tonig (Tonanteil > 30%), fs = schwach feinsandig (Feinsandanteil < 15%). Ergibt: stark toniger Schluff mit geringem Feinsandanteil. mS = Mittelsand (Hauptanteil), u* = stark schluffig, fg = schwach feingiesig. Ergibt: stark schluffiger Mittelsand mit geringem Feinkiesanteil. Das Lesen dieser Kurzzeichen ist Pflichtkompe tenz im Bauwesen."},{"id":"gt-108","q":"Bodengruppen GE, SE, TM, GW (DIN 18196):\nWelcher Boden eignet sich am besten für eine gut verdichtbare Tragschicht? Begründung.","a":"**GW** (weitgestufter Kies-Sand).\nWeitgestuft = gut abgestuftes Korngerüst → Hohlräume werden gut gefüllt → sehr gut verdichtbar und tragfähig.","tags":["Geotechnik","Klassifizierung"],"reps":0,"ease":2.5,"interval":0,"due":1781338792034,"created":1781252392034,"last":null,"learning":true,"lapses":0,"explain":"GW = gut abgestufter Kies mit Sand: Das Korngerüst ist lückenlos verteilt — grobe Körner, mittlere Körner und Feinkörner füllen gegenseitig die Hohlräume. Ergebnis: hohe Dichte, gute Tragfähigkeit, kaum setzungsgefährdet. GW ist der \"Traumuntergrund\" für Flachgründungen. GE (eng gestufte Kies) hat dagegen lauter gleich große Körner — mehr Hohlräume, geringere Tragfähigkeit."},{"id":"gt-109","q":"Bodengruppen GE, SE, TM, GW:\nWelcher Boden hat die geringste Wasserdurchlässigkeit k? Begründung.","a":"**TM** (mittelplastischer Ton).\nBindiger Boden mit sehr feinen Poren → sehr kleines k (nahezu wasserundurchlässig).","tags":["Geotechnik","Klassifizierung"],"reps":0,"ease":2.5,"interval":0,"due":1781338792034,"created":1781252392034,"last":null,"learning":true,"lapses":0,"explain":"TM = mittelplastischer Ton: Ton hat extrem feine Körner (< 0,002 mm) mit großer spezifischer Oberfläche. Wasser wird an der Kornoberfläche gebunden — der Boden ist wasserundurchlässig (k < 10⁻⁸ m/s). Für Dichtwände und Deponieabdichtungen ideal. Nachteil: hohe Setzungen (Wasser wird langsam ausgepresst) und geringe kurzfristige Scherfestigkeit."},{"id":"gt-110","q":"Schneckenbohrung oder Rammkernbohrung – welches Verfahren eignet sich für die Baugrunderkundung? Begründung.","a":"**Rammkernbohrung.**\nSie liefert einen durchgehenden Bohrkern → Schichtenfolge und Bodenarten bleiben erkennbar, Proben sind weitgehend ungestört.\nBei der Schneckenbohrung wird das Material vermischt → keine klare Schichtzuordnung.","tags":["Geotechnik","Erkundung"],"reps":0,"ease":2.5,"interval":0,"due":1781338792034,"created":1781252392034,"last":null,"learning":true,"lapses":0,"explain":"Die Schneckenbohrung fördert Boden an die Oberfläche, aber vermischt die Schichten dabei — man sieht nur, was in welchem Tiefenbereich vorhanden ist, aber die genaue Schichtgrenze ist unscharf. Die Rammkernbohrung (Liner Sampler) drückt einen Zylinder in den Boden und zieht ihn heraus — der Boden bleibt in der ursprünglichen Schichtabfolge erhalten. Für Labortests (Scherversuche, Setzungsberechnungen) braucht man ungestörte Proben aus Rammkernbohrungen."},{"id":"gt-111","q":"Rammsondierung DPL und DPH: Welche beiden Geräteparameter unterscheiden sich?","a":"**Rammbärgewicht** und **Fallhöhe**.\n• DPL = leicht (10 kg)\n• DPH = schwer (50 kg)\n(Gezählt werden die Schläge N10 je 10 cm Eindringung.)","tags":["Geotechnik","Erkundung"],"reps":0,"ease":2.5,"interval":0,"due":1781338792034,"created":1781252392034,"last":null,"learning":true,"lapses":0,"explain":"DPL = Dynamic Probing Light: Rammbär 10 kg, Fallhöhe 0,5 m = 50 J Energie je Schlag. DPH = Dynamic Probing Heavy: Rammbär 50 kg, Fallhöhe 0,5 m = 250 J. Der Unterschied macht DPH geeignet für tiefere Eindringtiefen und festere Böden. Die Anzahl der Schläge je 10 cm Eindringtiefe (N10) ist das Ergebnis und korreliert mit der Lagerungsdichte."},{"id":"gt-112","q":"Welche bodenmechanische Kenngröße wird bei nichtbindigen Böden aus den Schlagzahlen (DPL/DPH) abgeleitet? Was ist zu beachten?","a":"Die **Lagerungsdichte** (bzw. bezogene Lagerungsdichte).\nZu beachten: DPL und DPH liefern für denselben Boden **unterschiedliche Schlagzahlen** → es müssen die jeweils gerätespezifischen Auswertungen/Diagramme verwendet werden.","tags":["Geotechnik","Erkundung"],"reps":0,"ease":2.5,"interval":0,"due":1781338792034,"created":1781252392034,"last":null,"learning":true,"lapses":0,"explain":"In nichtbindigen Böden (Sand, Kies) gibt es kein Wasser in den Poren, das langsam ausgepresst wird — die Festigkeit hängt vor allem von der Packungsdichte der Körner ab (locker = wenig Kontakte = wenig Reibung). Die Lagerungsdichte D (bzw. relative Dichte Id) beschreibt, wie dicht die Körner gepackt sind: D = (emax - e) / (emax - emin). Aus dem SPT/DPH-Wert kann D abgeschätzt werden."},{"id":"gt-113","q":"Was ist der grundsätzliche Unterschied zwischen DPH und SPT?","a":"**DPH**: durchgehende Rammsondierung von der Geländeoberfläche aus (kontinuierlich).\n**SPT**: Sondierung **im Bohrloch** (Standard Penetration Test), nur abschnittsweise; liefert zusätzlich eine Probe.","tags":["Geotechnik","Erkundung"],"reps":0,"ease":2.5,"interval":0,"due":1781338792034,"created":1781252392034,"last":null,"learning":true,"lapses":0,"explain":"DPH rammt kontinuierlich von der Oberfläche bis zur Endtiefe ohne Unterbrechung. SPT (Standard Penetration Test) wird nur an bestimmten Tiefen im Bohrrohr durchgeführt: Erst bohren, dann Probe nehmen (30 cm Einschlag, Anzahl Schläge = N-Wert). SPT liefert außerdem eine Bodenprobe, DPH nicht. SPT ist international weiter verbreitet (US-Norm), DPH mehr im deutschsprachigen Raum."},{"id":"gt-114","q":"Erläutere das Mehrphasensystem Boden (mit Skizze). Wie sind Porenanteil n und Porenzahl e definiert?","a":"Boden besteht aus 3 Phasen:\n\n```\n  ┌─────────┐ Luft   (Vl)\n  ├─────────┤ Wasser (Vw)  } Poren Vp\n  ├─────────┤\n  │ Feststoff│ (Vs)\n  └─────────┘\n```\n**Porenanteil** n = Vp / V  (Poren / Gesamtvolumen)\n**Porenzahl** e = Vp / Vs  (Poren / Feststoff)","tags":["Geotechnik","Laborversuche"],"reps":0,"ease":2.5,"interval":0,"due":1781338792034,"created":1781252392034,"last":null,"learning":true,"lapses":0,"explain":"Boden besteht aus festen Körnern (Feststoffanteil Vs), Wasser (Vw) und Luft (Vl). Das Verhältnis dieser drei Phasen bestimmt alle bodenmechanischen Eigenschaften. Porenzahl e = Vp/Vs (Porenvolumen zu Feststoffvolumen). Sättigungsgrad Sr = Vw/Vp (Wasseranteil der Poren). Wassergehalt w = Mw/Ms × 100% (Wassermasse zu Feststoffmasse). Bei vollem Boden (Sr = 1) sind alle Poren mit Wasser gefüllt."},{"id":"gt-115","q":"Zustandsgrenzen (Konsistenzgrenzen): An welchen Böden werden sie bestimmt und über welche Kenngröße?","a":"An **bindigen Böden** (Ton, Schluff).\nDefiniert über den **Wassergehalt w**.","tags":["Geotechnik","Laborversuche"],"reps":0,"ease":2.5,"interval":0,"due":1781338792034,"created":1781252392034,"last":null,"learning":true,"lapses":0,"explain":"Bindige Böden (Ton, Schluff) ändern ihr Verhalten stark mit dem Wassergehalt: Trocken = fest und brüchig (spröde). Bei zunehmendem Wasser: halbfest → steif → weich → breiig → flüssig. Die Zustandsgrenzen (Fließgrenze wL, Ausrollgrenze wP) definieren, bei welchem Wassergehalt der Übergang zwischen diesen Zuständen stattfindet. Nichtbindige Böden (Sand, Kies) haben keine Zustandsgrenzen — der Begriff gilt nur für bindige Böden."},{"id":"gt-116","q":"Welche beiden Versuche bestimmen die Zustandsgrenzen? Wie ist der plastische Bereich definiert?","a":"**Fließgrenze wL** (Casagrande-Gerät / Fallkegel)\n**Ausrollgrenze wP** (Ausrollen zu 3-mm-Walzen)\n\nPlastischer Bereich = Bereich zwischen wP und wL.\nPlastizitätszahl: **IP = wL − wP**","tags":["Geotechnik","Laborversuche"],"reps":0,"ease":2.5,"interval":0,"due":1781338792034,"created":1781252392034,"last":null,"learning":true,"lapses":0,"explain":"Fließgrenze wL: Unterhalb dieser Grenze fließt der Boden nicht mehr (bestimmt mit Casagrande-Gerät oder Fallkegel). Ausrollgrenze wP: Unterhalb dieser Grenze kann der Boden nicht mehr zu 3-mm-Würsten ausgerollt werden (er bröckelt). Plastizitätszahl Ip = wL - wP: Gibt den Wassergehaltsbereich an, in dem der Boden plastisch ist. Konsistenzzahl Ic = (wL - w) / Ip: Gibt an, wo im Plastizitätsbereich der aktuelle Zustand liegt."},{"id":"gt-117","q":"Zeichne das Konsistenzband mit den 2 Grenzen und 6 Konsistenzen.","a":"```\nWassergehalt →  trocken ........... nass\n\n  fest | halbfest | steif | weich | breiig | flüssig\n       ^                  ^               ^\n   Schrumpf-          Ausroll-        Fließ-\n   grenze wS          grenze wP       grenze wL\n```\nIc (Konsistenzzahl) nimmt von links (1) nach rechts (0) ab.","tags":["Geotechnik","Laborversuche"],"reps":0,"ease":2.5,"interval":0,"due":1781338792034,"created":1781252392034,"last":null,"learning":true,"lapses":0,"explain":"Das Konsistenzband zeigt: links trocken = fest, rechts nass = flüssig. Die Ausrollgrenze wP trennt halbfest von steif. Die Fließgrenze wL trennt weich von breiig/flüssig. Zwischen wP und wL liegt die plastische Zone (steif, weich) — hier ist der Boden formbar ohne zu brechen oder zu fließen. Ein Boden im Zustand \"weich\" (w nahe wL) hat geringe Scherfestigkeit und hohe Setzungsneigung."},{"id":"gt-118","q":"Triaxialversuch / Mohr-Coulomb: Wie hängen Spannungskreise und Grenzbedingung zusammen? Wie heißt die Gerade und welche Parameter bestimmt sie?","a":"Jeder Versuch liefert einen **Mohrschen Spannungskreis** (σ-τ-Diagramm). Die Tangente an die Bruch-Kreise ist die **Schergerade (Coulombsche Gerade)**:\n\nτ = c + σ · tan φ\n\n```\nτ │        ___---  Schergerade\n  │   _---  )  )  ) Kreise\n  │ c)__)__)__)____→ σ\n```\nParameter: **c** = Kohäsion (Achsenabschnitt), **φ** = Reibungswinkel (Steigung).","tags":["Geotechnik","Laborversuche"],"reps":0,"ease":2.5,"interval":0,"due":1781338792034,"created":1781252392034,"last":null,"learning":true,"lapses":0,"explain":"Im Triaxialversuch wird eine zylindrische Bodenprobe unter allseitigem Druck (σ3) und zusätzlicher Axiallast (σ1) belastet, bis sie versagt. Jeder Versuch liefert einen Mohr-Kreis (Kreis im σ-τ-Diagramm). Mehrere Versuche mit verschiedenen σ3 liefern mehrere Kreise. Die gemeinsame Tangente dieser Kreise ist die Bruchhüllkurve (Coulomb-Gerade): τf = c + σ × tan(φ). c = Kohäsion, φ = Reibungswinkel."},{"id":"gt-119","q":"Wie breiten sich Zusatzspannungen aus einer Bauwerkslast im Boden qualitativ aus? (Skizze)","a":"Glockenförmig / zwiebelförmig nach unten – die **Druckzwiebel**. Die Spannung nimmt mit der Tiefe und seitlich ab.\n\n```\n   ▼▼▼ Last\n  ┌───┐\n  ( ( ( )))   Linien gleicher\n   (  (  )    Zusatzspannung\n    ( ( )      (nehmen nach\n     ( )       unten ab)\n```","tags":["Geotechnik","Spannungen"],"reps":0,"ease":2.5,"interval":0,"due":1781338792034,"created":1781252392034,"last":null,"learning":true,"lapses":0,"explain":"Eine Fundamentlast breitet sich im Boden wie eine Zwiebel nach unten und zur Seite aus — die \"Druckzwiebel\". In ca. 2 × Fundamentbreite Tiefe ist die Zusatzspannung auf ca. 20% abgeklungen. Weiche Schichten unterhalb dieser \"aktiven Zone\" werden kaum noch beansprucht. Die Druckzwiebel erklärt, warum tiefe weiche Schichten für Setzungen relevant sein können und warum Nachbarbauwerke sich gegenseitig beeinflussen."},{"id":"gt-120","q":"Wie hängt der Erddruck von der Wandbewegung ab? Nenne die Grenzspannungszustände. (Diagramm)","a":"```\nE │\n  │\\ \n E0┤ \\____ Erdruhedruck (keine Bewegung)\n  │      \\___\n Ea┤__________●  aktiv (Wand weg vom Boden, Minimum)\n  └───────────────→ Bewegung\nEp ↑ passiv (Wand gegen Boden, Maximum) – steiler Anstieg\n```\n• **E0** Erdruhedruck (Wand unbewegt)\n• **Ea** aktiver Erddruck (kleine Bewegung weg → Minimum)\n• **Ep** passiver Erddruck/Erdwiderstand (Bewegung gegen Boden → Maximum, große Bewegung nötig)","tags":["Geotechnik","Erddruck"],"reps":0,"ease":2.5,"interval":0,"due":1781338792034,"created":1781252392034,"last":null,"learning":true,"lapses":0,"explain":"Erdruhedruck E0: Keine Wandbewegung — der Boden ist im Ruhezustand (K0-Zustand). Aktiver Erddruck Ea: Wand bewegt sich vom Boden weg (Boden dehnt sich aus) — kleinster möglicher Erddruck, Scherfestigkeit wird voll mobilisiert. Passiver Erddruck Ep: Wand drückt in den Boden — größter möglicher Erdwiderstand. Merkhilfe: aktiv = Boden greift an (kleiner Wert), passiv = Boden wehrt sich (großer Wert)."},{"id":"gt-121","q":"Von welchen beiden Größen hängt die Wahl des Grundwasserabsenkverfahrens ab?","a":"**Durchlässigkeit k** des Bodens und **Absenktiefe** (erforderliche Absenkung des Grundwasserspiegels).","tags":["Geotechnik","Grundwasser"],"reps":0,"ease":2.5,"interval":0,"due":1781338792034,"created":1781252392034,"last":null,"learning":true,"lapses":0,"explain":"Bei hoher Durchlässigkeit (k > 10⁻⁴ m/s, Kies/Sand) fließt viel Wasser zu — einstufige Brunnen reichen oft, aber viele Pumpen nötig. Bei geringer Durchlässigkeit (k < 10⁻⁵ m/s, Feinsand, Schluff) fließt wenig Wasser, aber die Absenkung ist schwierig — mehrstufige Brunnen oder Vakuumabsenkung nötig. Bei sehr geringer Durchlässigkeit (Ton, k < 10⁻⁸) ist Brunnenabsenkung unwirtschaftlich — besser: Dichtwand."},{"id":"gt-122","q":"Baugrube im Sand bis 20 m unter GOK (15 m unter GW): Nenne ein geeignetes Verfahren zur Grundwasserabsenkung bis zur Sohle.","a":"**Mehrstufige Brunnenanlage / Tiefbrunnen** (ggf. mit Unterwasserpumpen). Eine einstufige Vakuum-/Wellpointanlage reicht nur für geringe Tiefen (~4–5 m), daher hier mehrstufig oder Tiefbrunnen.","tags":["Geotechnik","Grundwasser"],"reps":0,"ease":2.5,"interval":0,"due":1781338792034,"created":1781252392034,"last":null,"learning":true,"lapses":0,"explain":"In einer 20 m tiefen Baugrube mit GW bei 5 m müssen 15 m Wasser abgesenkt werden — das ist nur mit Tiefbrunnen (Unterwasserpumpen in Rohrbrunnen) möglich. Einstufige Wellpunktanlagen funktionieren nur bis ca. 5-6 m Absenktiefe (Saugkopfprinzip). Mehrstufige Anlage: mehrere Wellpunktreihen in verschiedenen Höhen. Tiefbrunnen mit Unterwassermotorpumpen können beliebige Tiefen entwässern."}],"created":1781252392034,"fach":"Geotechnik"},{"id":"gt-d2","name":"GT2 – Berechnungsgrundlagen","desc":"Sicherheitskonzept EC7/DIN 1054: charakt. Wert, Bemessungswert, Teilsicherheiten, Bemessungssituationen, Nachweisverfahren","emoji":"📐","color":"#a78bfa","cards":[{"id":"gt-201","q":"Wie wird aus einem Laborversuchsergebnis der charakteristische Wert bestimmt?","a":"Durch **statistische Auswertung mehrerer Versuche** → vorsichtiger Schätzwert (i.d.R. auf der sicheren Seite, nicht der Mittelwert allein).","tags":["Geotechnik","Berechnungsgrundlagen"],"reps":0,"ease":2.5,"interval":0,"due":1781338792034,"created":1781252392034,"last":null,"learning":true,"lapses":0,"explain":"Laborergebnisse streuen — ein einziger Versuch wäre zu unsicher. Man führt mehrere Versuche durch und nimmt den \"vorsichtigen Schätzwert\" (charakteristischen Wert fk): nicht den Mittelwert, sondern ein Fraktilwert (meist 5%-Fraktile für Widerstand, 95%-Fraktile für Einwirkung). So ist mit 95% Wahrscheinlichkeit der wirkliche Wert günstiger als angenommen. Im Eurocode-System ist das die erste Sicherheitsstufe."},{"id":"gt-202","q":"Wie wird aus dem charakteristischen Wert der Bemessungswert bestimmt?","a":"Durch Anwendung des **Teilsicherheitsbeiwertes γ**:\n• Einwirkung: Fd = Fk · γF (multiplizieren)\n• Widerstand: Rd = Rk / γR (dividieren)","tags":["Geotechnik","Berechnungsgrundlagen"],"reps":0,"ease":2.5,"interval":0,"due":1781338792034,"created":1781252392034,"last":null,"learning":true,"lapses":0,"explain":"Der Teilsicherheitsbeiwert γ trennt charakteristischen von Bemessungswert. Bei Einwirkungen (Lasten) wird multipliziert: Fd = Fk × γF > Fk (ungünstiger). Bei Widerständen (Tragfähigkeit) wird dividiert: Rd = Rk / γR < Rk (ungünstiger). So wird die Unsicherheit in der Berechnung explizit berücksichtigt, statt pauschale \"Sicherheit\" anzunehmen. Nachweis gilt: Ed ≤ Rd."},{"id":"gt-203","q":"Nenne zwei Faktoren, die die Größe des Unterschieds zwischen charakteristischem Wert und Bemessungswert bestimmen.","a":"1. Ob es sich um eine **Beanspruchung (Einwirkung)** oder einen **Widerstand** handelt\n2. Ob die Last **ständig oder veränderlich** ist\n(weitere: Bemessungssituation, Grenzzustand)","tags":["Geotechnik","Berechnungsgrundlagen"],"reps":0,"ease":2.5,"interval":0,"due":1781338792034,"created":1781252392034,"last":null,"learning":true,"lapses":0,"explain":"Einwirkungen (Lasten) sind mit γ > 1,0 anzusetzen (ungünstiger). Widerstände (Tragfähigkeit) sind durch γ > 1,0 zu dividieren (ungünstiger). Günstige ständige Lasten (z.B. Eigengewicht, das stabilisierend wirkt) werden mit γ ≤ 1,0 angesetzt. Die Berechnung ob mit 1,35 oder 1,5 multipliziert wird, hängt davon ab ob eine Last ständig oder veränderlich ist."},{"id":"gt-204","q":"Nenne die vier Bemessungssituationen im Grenzzustand der Tragfähigkeit (ULS) nach EC7.","a":"**BS-P** – ständig (persistent)\n**BS-T** – vorübergehend (transient)\n**BS-A** – außergewöhnlich (accidental)\n**BS-E** – Erdbeben (earthquake)","tags":["Geotechnik","Berechnungsgrundlagen"],"reps":0,"ease":2.5,"interval":0,"due":1781338792034,"created":1781252392034,"last":null,"learning":true,"lapses":0,"explain":"BS-P (persistent): Normalbetrieb, längere Zeitdauer — höchste Sicherheitsanforderungen. BS-T (transient): Bauzustand, vorübergehend — etwas niedrigere Teilsicherheiten. BS-A (außergewöhnlich): Unfall, Erdbeben, Ausfall einer Stütze — niedrigste Teilsicherheiten (Extremereignis). BS-E (seismisch): Erdbeben — spezielle Regeln nach DIN EN 1998. Je kürzer und seltener ein Zustand, desto geringer die geforderte Sicherheit."},{"id":"gt-205","q":"Welche Bemessungssituation ist normalerweise für eine Baugrubenwand maßgebend und warum?","a":"**BS-T (vorübergehend)** – eine Baugrube ist ein **zeitlich begrenztes** Bauwerk (nur während der Bauzeit). Daher dürfen geringere Teilsicherheiten als bei dauerhaften Bauwerken (BS-P) angesetzt werden.","tags":["Geotechnik","Berechnungsgrundlagen"],"reps":0,"ease":2.5,"interval":0,"due":1781338792034,"created":1781252392034,"last":null,"learning":true,"lapses":0,"explain":"Eine Baugrube existiert nur temporär (Wochen bis Monate) — kein Dauerzustand. BS-T hat etwas niedrigere Teilsicherheitsbeiwerte als BS-P, weil die Eintrittswahrscheinlichkeit eines Versagens im kurzen Zeitraum geringer ist. In der Praxis: γ für veränderliche Einwirkung ist 1,3 (BS-T) statt 1,5 (BS-P) — macht die Baugrubenwand etwas schlanker bemessen."},{"id":"gt-206","q":"Warum muss der Nachweis der Steifen einer Baugrube mit einer anderen Bemessungssituation geführt werden? Welche?","a":"**BS-A (außergewöhnlich).**\nGrund: Es muss der **Ausfall einer benachbarten Steife** berücksichtigt werden (Umlagerung der Kräfte auf die übrigen Steifen) – ein außergewöhnliches Ereignis.","tags":["Geotechnik","Berechnungsgrundlagen"],"reps":0,"ease":2.5,"interval":0,"due":1781338792034,"created":1781252392034,"last":null,"learning":true,"lapses":0,"explain":"Eine Steife stützt die Baugrubenwand horizontal. Fällt sie aus (durch Bruch, Demontage, Unfall), muss die benachbarte Steife die volle Last übernehmen. Dieses Szenario ist \"außergewöhnlich\" (unwahrscheinlich, aber nicht unmöglich) → BS-A. BS-A hat niedrigere Teilsicherheiten (γF ≈ 1,0 für außergewöhnliche Einwirkung), aber der Lastfall selbst (Steifen-Ausfall-Szenario) ist dafür die maßgebende Beanspruchung."},{"id":"gt-207","q":"Wozu dient ein Teilsicherheitsbeiwert?","a":"Um das **Versagensrisiko zu begrenzen** – er deckt Streuungen und Unsicherheiten bei Einwirkungen, Widerständen und im Modell ab.","tags":["Geotechnik","Berechnungsgrundlagen"],"reps":0,"ease":2.5,"interval":0,"due":1781338792034,"created":1781252392034,"last":null,"learning":true,"lapses":0,"explain":"Materialeigenschaften streuen (Beton ist nicht exakt C30, Stahl nicht exakt 500 MPa). Lasten sind unsicher (echter Schnee kann 1,2× so schwer sein wie angenommen). Der Teilsicherheitsbeiwert deckt diese Streuungen so ab, dass das Versagen mit einer definierten Wahrscheinlichkeit (z.B. 10⁻⁶ pro Jahr) ausgeschlossen ist. Ohne Teilsicherheitsbeiwerte müsste man mit extrem konservativen Extremwerten rechnen."},{"id":"gt-208","q":"Wie wird der Teilsicherheitsbeiwert bei Beanspruchungen und wie bei Widerständen eingerechnet?","a":"Beanspruchung (Einwirkung): **Fd = Fk · γF** (vergrößern, multiplizieren)\nWiderstand: **Rd = Rk / γR** (verkleinern, dividieren)","tags":["Geotechnik","Berechnungsgrundlagen"],"reps":0,"ease":2.5,"interval":0,"due":1781338792034,"created":1781252392034,"last":null,"learning":true,"lapses":0,"explain":"Beanspruchungen (Lasten) werden vergrößert: Fd = Fk × γF. Das simuliert eine \"ungünstigere\" Last. Widerstände (Tragfähigkeit) werden verkleinert: Rd = Rk / γR. Das simuliert einen \"schwächeren\" Boden oder Bauteil. Der Nachweis gilt, wenn die vergrößerte Beanspruchung die verkleinerte Tragfähigkeit nicht überschreitet: Ed ≤ Rd."},{"id":"gt-209","q":"Nenne drei Faktoren, von denen die Größe der Teilsicherheitsbeiwerte abhängt.","a":"1. **Grenzzustand** (ULS/SLS bzw. GEO-2/GEO-3 …)\n2. **Bemessungssituation** (BS-P/T/A/E)\n3. **Art der Last** (ständig / veränderlich, günstig / ungünstig)","tags":["Geotechnik","Berechnungsgrundlagen"],"reps":0,"ease":2.5,"interval":0,"due":1781338792034,"created":1781252392034,"last":null,"learning":true,"lapses":0,"explain":"Grenzzustand: ULS (Tragfähigkeit, Versagen) hat höhere γ als SLS (Gebrauchstauglichkeit, Verformung). Bemessungssituation: BS-P > BS-T > BS-A (abnehmende Anforderungen). Bodenparameter: Reibungswinkel φ und Kohäsion c haben eigene γM (Materialbeiwert) in GEO-3. Das System schafft eine abgestufte Sicherheit je nach Konsequenz und Wahrscheinlichkeit des Versagens."},{"id":"gt-210","q":"Wie ist der Ausnutzungsgrad definiert?","a":"μ = **Ed / Rd**  (Bemessungswert der Beanspruchung / des Widerstands).\nNachweis erfüllt, wenn μ ≤ 1,0.","tags":["Geotechnik","Berechnungsgrundlagen"],"reps":0,"ease":2.5,"interval":0,"due":1781338792034,"created":1781252392034,"last":null,"learning":true,"lapses":0,"explain":"Der Ausnutzungsgrad μ = Ed/Rd ist das Verhältnis von Beanspruchung zu Widerstand. μ = 1,0 bedeutet: Der Nachweis ist gerade noch erfüllt (Grenzfall). μ < 1,0: Nachweis erfüllt mit Reserve. μ > 1,0: Nachweis nicht erfüllt — Bauteil oder Abmessung muss vergrößert werden. Merkhilfe: μ wie \"Auslastung\" — 80% Auslastung = μ = 0,8."},{"id":"gt-211","q":"Wie groß sind die Teilsicherheitsbeiwerte im Grenzzustand SLS und warum?","a":"γ = **1,0**.\nIm SLS wird die **Gebrauchstauglichkeit** (Verformungen/Setzungen) nachgewiesen – mit den charakteristischen Werten, ohne zusätzliche Sicherheit, da kein Versagen, sondern Gebrauchstauglichkeit betrachtet wird.","tags":["Geotechnik","Berechnungsgrundlagen"],"reps":0,"ease":2.5,"interval":0,"due":1781338792034,"created":1781252392034,"last":null,"learning":true,"lapses":0,"explain":"Im SLS (Serviceability Limit State) wird die Gebrauchstauglichkeit nachgewiesen — z.B. dass Setzungen kleiner als 25 mm sind oder Rissbreiten kleiner als 0,3 mm. Da hier kein Versagen droht, sondern nur Unbehagen oder Funktionseinschränkung, reichen γ = 1,0 (charakteristische Werte). Der SLS-Nachweis ist oft die maßgebende Größe bei weichen Böden (Setzungsbegrenzung)."},{"id":"gt-212","q":"Wodurch unterscheiden sich die Nachweisverfahren NWV 2 und NWV 3 (EC7/DIN 1054)? Nenne je ein Beispiel.","a":"**NWV 2 (GEO-2):** Teilsicherheiten auf **Beanspruchungen und Widerstände**.\nBeispiel: Grundbruch, Gleiten, Pfähle, Erdwiderstand von Baugrubenwänden.\n\n**NWV 3 (GEO-3):** Teilsicherheiten auf **Einwirkungen und die Scherfestigkeit des Bodens**.\nBeispiel: Böschungs-/Geländebruch, Gesamtstandsicherheit.","tags":["Geotechnik","Berechnungsgrundlagen"],"reps":0,"ease":2.5,"interval":0,"due":1781338792034,"created":1781252392034,"last":null,"learning":true,"lapses":0,"explain":"NWV 2 (GEO-2): Teilsicherheiten werden auf charakteristische Einwirkungen und Widerstände angewendet. Beispiel: Grundbruchnachweis für Flachgründung in Deutschland. NWV 3 (GEO-3): Teilsicherheiten werden auf Bodenparameter (c, φ) angewendet. Beispiel: Böschungsbruchnachweis (Kreisgleitfläche). Beide Verfahren führen bei korrekter Anwendung zu vergleichbaren Ergebnissen, aber die Rechenwege unterscheiden sich."},{"id":"gt-213","q":"Warum sind im GEO-2 die Teilsicherheiten für Beanspruchungen in BS-T kleiner als in BS-P?","a":"BS-T (vorübergehend) tritt nur **kurzzeitig** auf → geringere Wahrscheinlichkeit, dass ungünstige Lasten gleichzeitig im Maximum auftreten → kleinere Sicherheit ausreichend.","tags":["Geotechnik","Berechnungsgrundlagen"],"reps":0,"ease":2.5,"interval":0,"due":1781338792034,"created":1781252392034,"last":null,"learning":true,"lapses":0,"explain":"BS-T gilt für Bauzustände (Baugrube, temporäre Böschung) — die Zeitdauer ist begrenzt. In kurzer Zeit ist die Wahrscheinlichkeit eines extremen Lastfalles geringer als bei dauerhaften Zuständen (BS-P). Deshalb dürfen die Teilsicherheiten in BS-T etwas niedriger sein. In der Praxis: γQ = 1,3 (BS-T) statt 1,5 (BS-P) für veränderliche Einwirkungen."},{"id":"gt-214","q":"Warum sind die Teilsicherheiten für ungünstige veränderliche Einwirkungen größer als für ständige Einwirkungen?","a":"Veränderliche Lasten **streuen stärker** und sind schlechter vorhersehbar als ständige Lasten → größere Unsicherheit → höhere Sicherheit erforderlich.","tags":["Geotechnik","Berechnungsgrundlagen"],"reps":0,"ease":2.5,"interval":0,"due":1781338792034,"created":1781252392034,"last":null,"learning":true,"lapses":0,"explain":"Veränderliche Lasten (Schnee, Wind, Verkehr) variieren stark und sind schwerer vorherzusagen — deshalb γQ = 1,5. Ständige Lasten (Eigengewicht) sind konstant und gut bekannt — deshalb γG = 1,35 (ungünstig) oder 1,0 (günstig). Die höheren Beiwerte für veränderliche Lasten spiegeln die größere Unsicherheit wider."}],"created":1781252392034,"fach":"Geotechnik"},{"id":"gt-d3","name":"GT2 – Flachgründungen","desc":"Grundbruch, Tragfähigkeits- und Gebrauchstauglichkeitsnachweise, vereinfachter Nachweis, klaffende Fuge","emoji":"🏛️","color":"#5be49b","cards":[{"id":"gt-301","q":"Erläutere und skizziere den Versagensmechanismus beim Grundbruch. Wo/warum kommt es zum Bruch?","a":"Unter steigender Vertikallast bildet sich ein **Gleitkörper (Bruchfuge)** unter dem Fundament; der Boden weicht seitlich und nach oben aus.\n\n```\n     ▼ V\n   ┌────┐\n___│    │___ GOK\n   \\    /↑↑   Boden wird\n    \\__/ aufgewölbt\n   Gleitfuge\n```\nBruch, wenn der **Sohldruck > Grundbruchwiderstand** wird.","tags":["Geotechnik","Flachgründungen"],"reps":0,"ease":2.5,"interval":0,"due":1781338792034,"created":1781252392034,"last":null,"learning":true,"lapses":0,"explain":"Beim Grundbruch schiebt die Fundamentlast einen keilförmigen Gleitkörper unter dem Fundament nach unten. Dieser Keil verdrängt seitlich das Erdreich, das sich in Heave-Zonen seitlich und oben herausdrückt. Man sieht es an aufgewölbtem Boden neben dem Fundament. Grundbruch tritt plötzlich ein (kein Vorzeichen) — deshalb ist er ein ULS-Nachweis mit hohen Sicherheiten."},{"id":"gt-302","q":"Welche drei wesentlichen Einflussgrößen bestimmen den Grundbruchwiderstand?","a":"1. **Scherfestigkeit** des Bodens (c, φ)\n2. **Gründungstiefe** d\n3. **Fundamentbreite** b","tags":["Geotechnik","Flachgründungen"],"reps":0,"ease":2.5,"interval":0,"due":1781338792034,"created":1781252392034,"last":null,"learning":true,"lapses":0,"explain":"Scherfestigkeit (c, φ): Bestimmt, wie viel Widerstand der Boden dem Gleiten entgegensetzt. Gründungstiefe d: Tiefere Fundamente haben mehr Bodenlast oben → mehr passiver Widerstand → höhere Grundbruchlast. Fundamentgröße: Größere Fläche → mehr Widerstand; aber Spannungsverteilung im Boden und Gleitkörpergeometrie ändern sich. Alle drei wirken über Grundbruchbeiwerte (Nc, Nq, Nγ) in der Grundbruchformel."},{"id":"gt-303","q":"In welchem Grenzzustand erfolgt der Grundbruchnachweis?","a":"**GEO-2** (Grenzzustand der Tragfähigkeit, ULS) – Nachweisverfahren 2.","tags":["Geotechnik","Flachgründungen"],"reps":0,"ease":2.5,"interval":0,"due":1781338792034,"created":1781252392034,"last":null,"learning":true,"lapses":0,"explain":"Grundbruch ist ein Versagen der Gesamtkonstruktion → klassischer ULS → GEO-2 (Deutschland, NWV 2). Der Nachweis lautet: Bd,i ≤ Rd (Beanspruchung ≤ Widerstand). Der Grundbruchwiderstand wird aus charakteristischen Bodenparametern (c, phi) und Fundamentgeometrie berechnet, dann mit γR geteilt. Beanspruchung ist die Fundamentlast Fd = Fk × γF."},{"id":"gt-304","q":"Nenne drei Tragfähigkeitsnachweise (ULS), die für Flachgründungen erfüllt sein müssen.","a":"**Grundbruch**\n**Gleiten**\n**Kippen** (Lagesicherheit / klaffende Fuge)\n(zusätzlich: Materialversagen des Betons)","tags":["Geotechnik","Flachgründungen"],"reps":0,"ease":2.5,"interval":0,"due":1781338792034,"created":1781252392034,"last":null,"learning":true,"lapses":0,"explain":"Grundbruch: Vertikale Last ist zu groß → Boden versagt. Gleiten: Horizontale Kraft schiebt Fundament auf dem Untergrund weg. Kippen: Exzentrische Last hebt eine Seite des Fundaments an — Fundament \"kippt\" um Kante. Klaffende Fuge: Fundament hebt auf einer Seite ab → nur Teil der Sohlfläche ist aktiv (bei exzentrischer Last). Alle diese Nachweise sind ULS-Nachweise."},{"id":"gt-305","q":"Nenne einen Gebrauchstauglichkeitsnachweis (SLS), der für Flachgründungen maßgebend wird.","a":"**Setzungen** bzw. **Fundamentverdrehung/Schiefstellung** (zulässige Verformungen einhalten).","tags":["Geotechnik","Flachgründungen"],"reps":0,"ease":2.5,"interval":0,"due":1781338792034,"created":1781252392034,"last":null,"learning":true,"lapses":0,"explain":"Setzungen im SLS-Nachweis: Wie viel setzt sich das Fundament insgesamt (Absolutsetzung) und wie schief stellt es sich (Differenzsetzung)? Zulässige Werte hängen vom Bauwerk ab (Maschinen: < 5 mm, Wohnbau: < 25 mm, Industriehalle: < 50 mm). Zu große Setzungen können zu Rissen, Funktionsverlust oder Schiefstellung führen. Setzungsberechnung nach Oedometerversuch."},{"id":"gt-306","q":"Mit welchem Nachweis kann bei einfachen Verhältnissen die Tragfähigkeit und Gebrauchstauglichkeit vereinfacht nachgewiesen werden?","a":"Mit dem **vereinfachten Nachweis über den zulässigen Sohldruck** (Tabellenwerte nach EC7 / DIN 1054).","tags":["Geotechnik","Flachgründungen"],"reps":0,"ease":2.5,"interval":0,"due":1781338792034,"created":1781252392034,"last":null,"learning":true,"lapses":0,"explain":"Der vereinfachte Nachweis verwendet tabellierte zulässige Sohldrücke aus DIN 1054 (Anhang) — abhängig von Bodenart und Gründungstiefe. Statt aufwändiger Grundbruchberechnung wird einfach geprüft: Vorhandener Sohldruck < Tabellenwert. Schneller, aber konservativer als der genaue Nachweis. Nur für einfache Verhältnisse (GK1) zugelassen."},{"id":"gt-307","q":"In welchen Fällen darf der vereinfachte Nachweis in Regelfällen (Tabellenwerte) angewendet werden?","a":"Nur bei **einfachen Verhältnissen (Geotechnische Kategorie GK 1)** – einfacher Baugrund und einfache Gründung.","tags":["Geotechnik","Flachgründungen"],"reps":0,"ease":2.5,"interval":0,"due":1781338792034,"created":1781252392034,"last":null,"learning":true,"lapses":0,"explain":"GK1 (Geotechnische Kategorie 1): Einfache Bauwerke auf gut bekanntem Baugrund ohne Grundwasserprobleme. Dazu: Homogener Baugrund, keine starken Lasten, kein Grundwasser. Sobald der Baugrund schwierig ist (weicher Ton, Grundwasser, Hanglagen) oder das Bauwerk groß ist, gilt GK2 oder GK3 — dann ist ein vollständiger Nachweis Pflicht."},{"id":"gt-308","q":"Welche beiden Größen werden beim vereinfachten Nachweis gegenübergestellt?","a":"**Sohldruckbeanspruchung Ed** (vorhandener Sohldruck) gegen **Sohlwiderstand Rd** (zulässiger Sohldruck aus Tabelle).","tags":["Geotechnik","Flachgründungen"],"reps":0,"ease":2.5,"interval":0,"due":1781338792034,"created":1781252392034,"last":null,"learning":true,"lapses":0,"explain":"Sohldruckbeanspruchung Ed = Fundamentlast Fd / Sohlflache A. Sohlwiderstand Rd = zulässiger Sohldruck × A (aus Tabelle). Nachweis: Ed ≤ Rd. Für den Grundbruchnachweis gilt: Ed ≤ Rd. Der Tabellenwert für Rd enthält bereits die Teilsicherheiten (er ist der \"zulässige\" Wert nach alter Methode, der mit dem Bemessungsansatz angepasst wurde)."},{"id":"gt-309","q":"Welcher ULS- und welcher SLS-Nachweis wird mit den Tabellenwerten des vereinfachten Nachweises abgedeckt?","a":"ULS: **Grundbruch**\nSLS: **Setzungen** (und Verdrehungen)","tags":["Geotechnik","Flachgründungen"],"reps":0,"ease":2.5,"interval":0,"due":1781338792034,"created":1781252392034,"last":null,"learning":true,"lapses":0,"explain":"Mit dem vereinfachten Nachweis wird gleichzeitig Grundbruch (ULS) und Setzung (SLS) nachgewiesen — das ist die Stärke dieses Verfahrens. Die Tabellenwerte sind so konservativ, dass bei Einhaltung beides ausreichend sicher ist. Für genauere Aussagen (z.B. bei setzungsempfindlichen Bauwerken) muss trotzdem eine gesonderte Setzungsberechnung erfolgen."},{"id":"gt-310","q":"Wann und warum kann eine \"klaffende Fuge\" bei Fundamenten auftreten?","a":"Bei **exzentrischer (außermittiger) Belastung** – wenn ein Moment wirkt, verschiebt sich die Resultierende aus der Mitte. Dann kann sich die Sohlpressung auf einen Teil der Fläche konzentrieren, der Rest hebt ab (Fuge klafft, da Boden keine Zugspannungen aufnimmt).","tags":["Geotechnik","Flachgründungen"],"reps":0,"ease":2.5,"interval":0,"due":1781338792034,"created":1781252392034,"last":null,"learning":true,"la
